<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ambitio — Espace Sales</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script>(function(){var r=localStorage.getItem("ambitio_role");if(r==="coach")window.location.href="coaching.html";if(!r)window.location.href="login.html";})();<\/script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080f;--bg2:#0f0f1a;--bg3:#14141f;--bg4:#1a1a28;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --red:#c41c1c;--red2:#ef4444;--red3:#fca5a5;
  --gold:#f59e0b;--green2:#34d399;--blue:#3b82f6;
  --text:rgba(255,255,255,0.92);--muted:rgba(255,255,255,0.45);--muted2:rgba(255,255,255,0.22);
  --radius:12px;--radius2:16px;
  --font-d:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--font-m:'DM Mono',monospace;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:13px;overflow-x:hidden}
.topbar{position:sticky;top:0;z-index:100;background:rgba(8,8,15,0.96);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);padding:0 28px;height:56px;display:flex;align-items:center;gap:14px}
.tb-logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#7f1d1d,#b91c1c);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:white;font-family:var(--font-d);box-shadow:0 4px 14px rgba(185,28,28,0.4)}
.tb-title{font-size:15px;font-weight:700;font-family:var(--font-d);letter-spacing:-0.3px}
.tb-title span{color:var(--red3);opacity:0.7}
.tb-div{width:1px;height:22px;background:var(--border2)}
.month-sel{display:flex;align-items:center;gap:6px}
.month-btn{width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.month-btn:hover{border-color:var(--border2);color:var(--text)}
#month-lbl{font-size:13px;font-weight:600;min-width:110px;text-align:center}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.alert-chip{display:none;align-items:center;gap:5px;padding:4px 10px;border-radius:7px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.2);font-size:11px;font-weight:600;color:var(--gold);cursor:pointer}
.alert-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pdot 2s infinite}
@keyframes pdot{0%,100%{opacity:1}50%{opacity:0.3}}
.tb-user{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:9px;background:var(--bg3);border:1px solid var(--border)}
.tb-av{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#7f1d1d,#ef4444);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white}
.tb-nm{font-size:12px;font-weight:600}.tb-rl{font-size:10px;color:var(--muted)}
.mod-nav{display:flex;gap:2px;padding:10px 28px 0;border-bottom:1px solid var(--border);background:var(--bg);overflow-x:auto;scrollbar-width:none}
.mod-nav::-webkit-scrollbar{display:none}
.mod-tab{display:flex;align-items:center;gap:6px;padding:8px 14px 10px;border-radius:10px 10px 0 0;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);border:1px solid transparent;border-bottom:none;transition:all 0.15s;white-space:nowrap;position:relative;bottom:-1px}
.mod-tab:hover{color:var(--text);background:var(--bg3)}
.mod-tab.active{color:var(--text);background:var(--bg2);border-color:var(--border)}
.mod-tab.active::after{content:"";position:absolute;bottom:-1px;left:0;right:0;height:1px;background:var(--bg2)}
.mod-tab-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;background:rgba(245,158,11,0.12);color:var(--gold)}
.main{padding:22px 28px;min-height:calc(100vh - 120px)}
.mod-view{display:none}
.mod-view.active{display:block;animation:fiu 0.2s ease}
@keyframes fiu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:13px}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:13px}
.g12{display:grid;grid-template-columns:1fr 2fr;gap:13px}
.mb13{margin-bottom:13px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:17px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.ct{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted)}
.ca{font-size:11px;color:var(--muted);cursor:pointer;transition:color 0.15s}
.ca:hover{color:var(--text)}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:17px 19px;position:relative;overflow:hidden;transition:border-color 0.2s}
.kpi:hover{border-color:var(--border2)}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--kc,#ef4444);opacity:0.7}
.kpi-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:7px}
.kpi-v{font-size:26px;font-weight:700;font-family:var(--font-d);letter-spacing:-0.8px;line-height:1}
.kpi-s{font-size:11px;color:var(--muted);margin-top:4px}
.kpi-pg{margin-top:9px}
.kpi-pb{height:3px;background:rgba(255,255,255,0.07);border-radius:99px;overflow:hidden;margin-top:4px}
.kpi-pf{height:100%;border-radius:99px;transition:width 0.9s ease}
.kpi-pl{display:flex;justify-content:space-between;font-size:10px;color:var(--muted)}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.st{font-size:14px;font-weight:700;font-family:var(--font-d)}
.ss{font-size:11px;color:var(--muted);margin-top:1px}
.sa{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border:none;border-radius:8px;font-family:var(--font-b);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s}
.btn-red{background:linear-gradient(135deg,#b91c1c,#ef4444);color:white;box-shadow:0 3px 10px rgba(185,28,28,0.3)}
.btn-red:hover{opacity:0.9;transform:translateY(-1px)}
.btn-ghost{background:var(--bg3);border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.itabs{display:flex;gap:3px;padding:3px;background:var(--bg3);border-radius:9px;border:1px solid var(--border);width:fit-content}
.itab{padding:5px 11px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);transition:all 0.15s}
.itab.active{background:var(--bg4);color:var(--text)}
.pr{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.pr:last-child{border-bottom:none}
.pr-l{font-size:12px;font-weight:600;min-width:145px}
.pr-b{flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden}
.pr-f{height:100%;border-radius:99px;transition:width 0.9s ease}
.pr-v{font-size:11px;font-family:var(--font-m);color:var(--muted);min-width:90px;text-align:right}
.pr-p{font-size:11px;font-weight:700;min-width:38px;text-align:right}
.fnl{display:flex;flex-direction:column;gap:4px}
.fs{display:flex;align-items:center;gap:11px;padding:9px 13px;border-radius:9px;background:var(--bg3);border:1px solid var(--border);transition:border-color 0.15s}
.fs:hover{border-color:var(--border2)}
.fs-l{font-size:12px;font-weight:600;min-width:160px}
.fs-b{flex:1;height:7px;background:rgba(255,255,255,0.05);border-radius:99px;overflow:hidden}
.fs-f{height:100%;border-radius:99px;background:linear-gradient(90deg,#b91c1c,#ef4444)}
.fs-v{font-size:14px;font-weight:700;font-family:var(--font-d);min-width:40px;text-align:right}
.fs-r{font-size:10px;color:var(--muted);min-width:42px;text-align:right}
.wg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.wc{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px}
.wc:hover,.wc.cur{border-color:rgba(239,68,68,0.3);background:rgba(239,68,68,0.04)}
.wl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:7px;display:flex;justify-content:space-between}
.wv{font-size:20px;font-weight:700;font-family:var(--font-d)}.wvl{font-size:9px;color:var(--muted);margin-top:2px}
.wmg{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:9px}
.wm{background:rgba(255,255,255,0.04);border-radius:7px;padding:5px 7px}
.wmv{font-size:13px;font-weight:700;font-family:var(--font-d)}.wml{font-size:9px;color:var(--muted)}
.ttbl{width:100%;border-collapse:collapse}
.ttbl th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);padding:7px 11px;border-bottom:1px solid var(--border);text-align:left}
.ttbl td{padding:11px 11px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px}
.ttbl tr:last-child td{border-bottom:none}
.ttbl tbody tr:hover td{background:rgba(255,255,255,0.02)}
.tac{display:flex;align-items:center;gap:9px}
.tav{width:29px;height:29px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;flex-shrink:0}
.tnm{font-weight:600;font-size:13px}.trt{font-size:10px;font-weight:600;padding:2px 6px;border-radius:20px;background:rgba(255,255,255,0.07);color:var(--muted)}
.tn{font-family:var(--font-m);font-size:12px}
.tn.ok{color:var(--green2)}.tn.wn{color:var(--gold)}.tn.bd{color:var(--red2)}
.ctbl{width:100%;border-collapse:collapse}
.ctbl th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);padding:7px 11px;border-bottom:1px solid var(--border);text-align:left}
.ctbl td{padding:10px 11px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px}
.ctbl tr:last-child td{border-bottom:none}
.ctbl tbody tr{cursor:pointer;transition:background 0.1s}
.ctbl tbody tr:hover td{background:rgba(255,255,255,0.02)}
.ctbl tbody tr.sel td{background:rgba(239,68,68,0.05)}
.bdg{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.bdg-cl{background:rgba(239,68,68,0.12);color:var(--red2)}
.bdg-st{background:rgba(59,130,246,0.12);color:#60a5fa}
.bdg-ok{background:rgba(16,185,129,0.12);color:var(--green2)}
.bdg-pd{background:rgba(245,158,11,0.12);color:var(--gold)}
.cs{background:linear-gradient(135deg,rgba(127,29,29,0.3),rgba(185,28,28,0.15));border:1px solid rgba(239,68,68,0.2);border-radius:var(--radius2);padding:19px}
.csv{font-size:30px;font-weight:800;font-family:var(--font-d);color:var(--gold);margin-bottom:15px}
.csr{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:12px}
.csr:last-child{border:none;padding-top:9px}
.csr.tot{font-weight:700;font-size:13px;color:var(--gold)}
.cst{display:flex;align-items:center;gap:5px;padding:9px 13px;border-radius:9px;font-size:12px;font-weight:600;margin-top:10px}
.cst.due{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);color:var(--gold)}
.cst.paid{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);color:var(--green2)}
.ap{background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.15);border-radius:var(--radius);padding:11px 15px;display:flex;align-items:flex-start;gap:9px;margin-bottom:12px}
.ap-ic{font-size:15px;margin-top:1px}.ap-ti{font-weight:700;color:var(--gold);margin-bottom:2px;font-size:12px}
.ap-tx{font-size:12px;color:rgba(255,255,255,0.65);line-height:1.5}
.ap.rd{background:rgba(239,68,68,0.06);border-color:rgba(239,68,68,0.15)}
.ap.rd .ap-ti{color:var(--red2)}
.chrt{display:flex;gap:4px;align-items:flex-end;height:150px;padding:0 4px}
.chrt-bar{flex:1;border-radius:4px 4px 0 0;min-height:2px;transition:height 0.7s ease;cursor:pointer}
.chrt-bar:hover{filter:brightness(1.2)}
.chrt-a{background:linear-gradient(180deg,#ef4444,#b91c1c)}
.chrt-p{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.12)}
.chrt-lbl{font-size:9px;color:var(--muted);text-align:center;margin-top:5px;font-family:var(--font-m)}
.mbk{position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:500;backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;animation:fdi 0.2s ease}
@keyframes fdi{from{opacity:0}to{opacity:1}}
.mdl{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,0.6);margin:20px;animation:slu 0.25s cubic-bezier(.4,0,.2,1)}
@keyframes slu{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
.mh{padding:21px 23px 0;display:flex;align-items:center;justify-content:space-between}
.mti{font-size:15px;font-weight:700;font-family:var(--font-d)}
.mc{width:29px;height:29px;border:1px solid var(--border);border-radius:7px;background:var(--bg3);cursor:pointer;color:var(--muted);font-size:13px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.mc:hover{background:var(--bg4);color:var(--text)}
.mb{padding:19px 23px 23px}.ff{margin-bottom:13px}
.fl{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:4px}
.fi{width:100%;padding:8px 12px;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.08);border-radius:9px;color:var(--text);font-family:var(--font-b);font-size:13px;outline:none;transition:border-color 0.15s}
.fi:focus{border-color:var(--red2);background:rgba(239,68,68,0.04)}
.fi::placeholder{color:var(--muted2)}.fi option{background:#1a1a2e}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.09);border-radius:99px}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(18px);background:#1a2e1a;border:1px solid rgba(16,185,129,0.3);color:#6ee7b7;font-size:12px;font-weight:600;padding:8px 17px;border-radius:9px;z-index:2000;opacity:0;transition:all 0.28s;white-space:nowrap}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}.wg{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.main{padding:14px}.g2,.g21,.g12{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="topbar">
  <div class="tb-logo">S</div>
  <div class="tb-title">Ambitio <span>Sales</span></div>
  <div class="tb-div"></div>
  <div class="month-sel">
    <button class="month-btn" onclick="SalesApp.changeMonth(-1)">&#9664;</button>
    <div id="month-lbl">F&#233;vrier 2026</div>
    <button class="month-btn" onclick="SalesApp.changeMonth(1)">&#9654;</button>
  </div>
  <div class="tb-right">
    <div class="alert-chip" id="alert-chip" onclick="SalesApp.switchMod('dashboard')">
      <div class="alert-dot"></div><span id="alert-txt">alertes</span>
    </div>
    <div class="tb-user">
      <div class="tb-av" id="tb-av">G</div>
      <div><div class="tb-nm" id="tb-nm">Guillaume</div><div class="tb-rl">&#128200; Commercial</div></div>
    </div>
  </div>
</div>
<div class="mod-nav">
  <div class="mod-tab active" data-mod="dashboard"   onclick="SalesApp.switchMod('dashboard')">&#9672; Dashboard</div>
  <div class="mod-tab"        data-mod="closing"     onclick="SalesApp.switchMod('closing')">&#127919; Closing</div>
  <div class="mod-tab"        data-mod="setting"     onclick="SalesApp.switchMod('setting')">&#128222; Setting</div>
  <div class="mod-tab"        data-mod="equipe"      onclick="SalesApp.switchMod('equipe')">&#128101; &#201;quipe</div>
  <div class="mod-tab"        data-mod="commissions" onclick="SalesApp.switchMod('commissions')">
    &#128176; Commissions <span class="mod-tab-badge" id="comm-badge">2 125 &#8364;</span>
  </div>
  <div class="mod-tab"        data-mod="projections" onclick="SalesApp.switchMod('projections')">&#128200; Projections</div>
</div>
<div class="main">
  <div class="mod-view active" id="mod-dashboard"></div>
  <div class="mod-view"        id="mod-closing"></div>
  <div class="mod-view"        id="mod-setting"></div>
  <div class="mod-view"        id="mod-equipe"></div>
  <div class="mod-view"        id="mod-commissions"></div>
  <div class="mod-view"        id="mod-projections"></div>
</div>
<div id="toast"></div>
<script src="modules/sales-core.js"><\/script>
<script src="modules/mod-dashboard.js"><\/script>
<script src="modules/mod-closing.js"><\/script>
<script src="modules/mod-setting.js"><\/script>
<script src="modules/mod-equipe.js"><\/script>
<script src="modules/mod-commissions.js"><\/script>
<script src="modules/mod-projections.js"><\/script>
<script>
const SalesApp=(()=>{
  const MODS={
    dashboard:{mod:ModDashboard,rendered:false},
    closing:{mod:ModClosing,rendered:false},
    setting:{mod:ModSetting,rendered:false},
    equipe:{mod:ModEquipe,rendered:false},
    commissions:{mod:ModCommissions,rendered:false},
    projections:{mod:ModProjections,rendered:false},
  };
  function switchMod(id){
    STATE.activeModule=id;
    document.querySelectorAll(".mod-tab").forEach(t=>t.classList.toggle("active",t.dataset.mod===id));
    document.querySelectorAll(".mod-view").forEach(v=>v.classList.toggle("active",v.id==="mod-"+id));
    const e=MODS[id];if(!e)return;
    if(!e.rendered){e.mod.init(document.getElementById("mod-"+id));e.rendered=true;}
    e.mod.render();Bus.emit("modSwitch",id);
  }
  function changeMonth(dir){
    DB.cm.month+=dir;
    if(DB.cm.month>11){DB.cm.month=0;DB.cm.year++;}
    if(DB.cm.month<0){DB.cm.month=11;DB.cm.year--;}
    document.getElementById("month-lbl").textContent=DB.months[DB.cm.month]+" "+DB.cm.year;
    Bus.emit("monthChange",DB.cm);
    const e=MODS[STATE.activeModule];if(e&&e.rendered)e.mod.render();
  }
  function init(){
    const nm=localStorage.getItem("ambitio_name")||"Guillaume";
    document.getElementById("tb-nm").textContent=nm;
    document.getElementById("tb-av").textContent=nm[0].toUpperCase();
    Bus.on("dealAdded",()=>{const mk=U.currentMonthKey();const b=document.getElementById("comm-badge");if(b)b.textContent=U.euro(DB.commissions[mk]?.totalComm||0);});
    Bus.on("monthChange",()=>{const mk=U.currentMonthKey();const b=document.getElementById("comm-badge");if(b)b.textContent=U.euro(DB.commissions[mk]?.totalComm||0);});
    ModDashboard.init(document.getElementById("mod-dashboard"));
    MODS.dashboard.rendered=true;ModDashboard.render();
  }
  return{switchMod,changeMonth,init};
})();
window.addEventListener("DOMContentLoaded",SalesApp.init);
<\/script>
</body>
</html>
