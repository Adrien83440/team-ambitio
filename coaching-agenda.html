<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>Ambitio — Espace <span>Coaching</span></title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blue-dark:#0f1f5c;--blue-main:#1a3dce;--blue-light:#4f7ef8;--blue-ghost:#f0f4ff;
      --text:#1a1f36;--muted:#6b7280;--border:#e2e8f0;--bg:#f5f7ff;--radius:14px;
      --green:#10b981;--green-light:#d1fae5;--orange:#f59e0b;--orange-light:#fef3c7;
      --red:#ef4444;--red-light:#fee2e2;--purple:#6366f1;--purple-light:#eef2ff;--teal:#14b8a6;
    }
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}

    /* ── TOPBAR ── */
    .topbar{background:white;border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 8px rgba(15,31,92,.04)}
    .topbar-left{display:flex;align-items:center;gap:14px}
    .topbar-logo{width:38px;height:38px;background:linear-gradient(135deg,var(--blue-dark),var(--blue-main));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:white}
    .topbar-left h1{font-size:18px;font-weight:800}
    .topbar-left h1 span{color:var(--blue-main)}
    .topbar-sub{font-size:11px;color:var(--muted)}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .btn{padding:8px 16px;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:6px}
    .btn-primary{background:linear-gradient(135deg,var(--blue-main),var(--blue-light));color:white;box-shadow:0 3px 12px rgba(26,61,206,.25)}
    .btn-primary:hover{opacity:.9;transform:translateY(-1px)}
    .btn-outline{background:white;color:var(--text);border:1.5px solid var(--border)}
    .btn-outline:hover{border-color:var(--blue-main);background:var(--blue-ghost)}
    .btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
    .user-badge{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--blue-ghost);border-radius:10px}
    .user-avatar{width:28px;height:28px;background:linear-gradient(135deg,var(--blue-light),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white}
    .user-badge-name{font-size:12px;font-weight:600}
    .user-badge-role{font-size:10px;color:var(--muted)}

    /* ── COACHING NAV TABS ── */
    .cnav{background:white;border-bottom:2px solid var(--border);padding:0 28px;position:sticky;z-index:40}
    .cnav-inner{display:flex;align-items:center;gap:0}
    .cnav-tab{padding:14px 20px;font-family:inherit;font-size:13px;font-weight:700;border:none;background:none;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .18s;text-decoration:none;display:flex;align-items:center;gap:7px;white-space:nowrap}
    .cnav-tab:hover{color:var(--text)}
    .cnav-tab.active{color:var(--blue-main);border-bottom-color:var(--blue-main)}
    .cnav-badge{background:var(--red);color:white;font-size:10px;padding:1px 6px;border-radius:99px;font-weight:700;min-width:18px;text-align:center}
    .cnav-badge.warn{background:var(--orange)}

    /* ── TOAST ── */
    .toast{position:fixed;bottom:24px;right:24px;background:#1a1f36;color:white;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s}
    .toast.show{transform:translateY(0);opacity:1}
    .toast.success{background:var(--green)}
    .toast.error{background:var(--red)}

    /* ── CARDS & LAYOUT UTILS ── */
    .page-body{padding:24px 28px}
    .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
    .kpi-card{background:white;border:1.5px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;transition:box-shadow .15s}
    .kpi-card:hover{box-shadow:0 4px 20px rgba(26,61,206,.08)}
    .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
    .kpi-card.blue::before{background:linear-gradient(90deg,var(--blue-main),var(--blue-light))}
    .kpi-card.green::before{background:linear-gradient(90deg,#10b981,#34d399)}
    .kpi-card.orange::before{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
    .kpi-card.red::before{background:linear-gradient(90deg,#ef4444,#f87171)}
    .kpi-card.purple::before{background:linear-gradient(90deg,#6366f1,#818cf8)}
    .kpi-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
    .kpi-val{font-size:32px;font-weight:800;line-height:1;margin-bottom:4px}
    .kpi-sub{font-size:11px;color:var(--muted);font-weight:500}
    .kpi-icon{position:absolute;top:16px;right:16px;font-size:24px;opacity:.15}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
    .grid-wide{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px}
    .card{background:white;border:1.5px solid var(--border);border-radius:14px;overflow:hidden}
    .card-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .card-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
    .card-sub{font-size:11px;color:var(--muted)}
    .card-body{padding:16px 18px}

    @media(max-width:900px){
      .kpi-row{grid-template-columns:repeat(2,1fr)}
      .grid-2,.grid-wide{grid-template-columns:1fr}
      .page-body{padding:16px}
    }


    .agenda-wrap{display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start}
    .cal-card{background:white;border:1.5px solid var(--border);border-radius:14px;overflow:hidden}
    .cal-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .cal-title{font-size:14px;font-weight:700;text-transform:capitalize}
    .cal-nav{display:flex;gap:4px}
    .cal-nav-btn{width:28px;height:28px;border:1.5px solid var(--border);border-radius:7px;background:white;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .12s}
    .cal-nav-btn:hover{border-color:var(--blue-main);background:var(--blue-ghost)}
    .cal-grid{padding:12px}
    .cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px}
    .cal-wd{text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:4px 0;text-transform:uppercase}
    .cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
    .cal-day{text-align:center;padding:6px 2px;font-size:12px;font-weight:500;border-radius:8px;cursor:pointer;transition:all .12s;min-height:34px;position:relative}
    .cal-day:hover:not(.empty):not(.other-month){background:var(--blue-ghost)}
    .cal-day.today{background:var(--blue-main);color:white;font-weight:700}
    .cal-day.selected{background:var(--blue-ghost);border:1.5px solid var(--blue-main)}
    .cal-day.has-sess::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--green)}
    .cal-day.today.has-sess::after{background:white}
    .cal-day.other-month{color:#d1d5db;cursor:default}
    .plan-btn{width:calc(100% - 24px);margin:12px 12px 0;padding:10px;background:linear-gradient(135deg,var(--blue-main),var(--blue-light));color:white;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;display:block;transition:opacity .15s}
    .plan-btn:hover{opacity:.9}
    .agenda-main{background:white;border:1.5px solid var(--border);border-radius:14px;overflow:hidden}
    .agenda-day-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .agenda-day-title{font-size:13px;font-weight:700}
    .agenda-list{padding:12px}
    .agenda-empty{padding:40px;text-align:center;color:var(--muted)}
    .agenda-empty-icon{font-size:36px;margin-bottom:8px}
    .sess-row{display:flex;align-items:flex-start;gap:12px;padding:12px;border-radius:10px;cursor:pointer;transition:background .12s;border:1px solid transparent;margin-bottom:4px}
    .sess-row:hover{background:var(--bg);border-color:var(--border)}
    .sess-time{min-width:44px;font-size:11px;font-weight:700;color:var(--muted);padding-top:1px}
    .sess-dot{width:10px;height:10px;border-radius:50%;margin-top:3px;flex-shrink:0}
    .sess-info{flex:1}
    .sess-name{font-size:13px;font-weight:700}
    .sess-meta{font-size:11px;color:var(--muted);margin-top:2px}
    .sess-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap}
    .sess-badge.ok{background:var(--green-light);color:var(--green)}
    .sess-badge.warn{background:var(--orange-light);color:var(--orange)}
    .sess-badge.late{background:var(--red-light);color:var(--red)}
    .no-plan-card{background:white;border:1.5px solid var(--border);border-radius:14px;margin-top:14px;overflow:hidden}
    .week-card{background:white;border:1.5px solid var(--border);border-radius:14px;margin-top:14px;overflow:hidden}
    /* Plan modal */
    .pm-backdrop{position:fixed;inset:0;background:rgba(15,31,92,.45);backdrop-filter:blur(4px);z-index:500;display:none;align-items:center;justify-content:center}
    .pm-backdrop.show{display:flex}
    .pm-modal{background:white;border-radius:18px;width:100%;max-width:480px;margin:20px;box-shadow:0 24px 60px rgba(15,31,92,.2)}
    .pm-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .pm-head h3{font-size:16px;font-weight:700}
    .pm-body{padding:20px 24px}
    .pm-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
    .pm-f{margin-bottom:14px}
    .pm-f label{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;display:block}
    .pm-f input,.pm-f select,.pm-f textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;outline:none}
    .pm-f input:focus,.pm-f select:focus{border-color:var(--blue-main)}
    .pm-f-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:900px){.agenda-wrap{grid-template-columns:1fr}}

  </style>
  <script>
    (function(){
      const role = localStorage.getItem('ambitio_role');
      if(role && role === 'sales') window.location.href = 'sales.html';
    })();
  </script>
  <script src="nav.js"></script>
  
</head>
<body>


<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">A</div>
    <div>
      <h1>Espace <span>Coaching</span></h1>
      <div class="topbar-sub">Espace Coaching — Espace <span>Coaching</span></div>
    </div>
  </div>
  <div class="topbar-right">
    
    <div class="user-badge">
      <div class="user-avatar" id="uAvatar">A</div>
      <div>
        <div class="user-badge-name" id="uName">—</div>
        <div class="user-badge-role" id="uRole">Admin</div>
      </div>
    </div>
    <button class="btn btn-outline btn-sm" onclick="handleLogout()" title="Déconnexion">🚪</button>
  </div>
</div>
<div class="cnav"><div class="cnav-inner"><a class="cnav-tab" href="coaching.html">👥 Clients</a>
<a class="cnav-tab" href="coaching-dashboard.html">📊 Dashboard</a>
<a class="cnav-tab" href="coaching-analyse.html">📈 Analyse</a>
<a class="cnav-tab active" href="coaching-agenda.html">📅 Agenda<span class="cnav-badge warn" id="badge-agenda" style="display:none">0</span></a>
</div></div>


<div class="page-body" id="page-content">
  <div style="padding:60px;text-align:center;color:var(--muted)">⏳ Chargement…</div>
</div>

<!-- Plan modal -->
<div class="pm-backdrop" id="pmBackdrop">
  <div class="pm-modal">
    <div class="pm-head">
      <h3>📅 Planifier une séance</h3>
      <button style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted)" onclick="closePlanModal()">✕</button>
    </div>
    <div class="pm-body">
      <div class="pm-f"><label>Client *</label><select id="pm-client"></select></div>
      <div class="pm-f-row">
        <div class="pm-f"><label>Date *</label><input type="date" id="pm-date"/></div>
        <div class="pm-f"><label>Heure</label><input type="time" id="pm-time" value="09:00"/></div>
      </div>
      <div class="pm-f"><label>Coach</label><input id="pm-coach" placeholder="Nom du coach…"/></div>
      <div class="pm-f"><label>Notes</label><textarea id="pm-notes" rows="3" style="resize:vertical"></textarea></div>
    </div>
    <div class="pm-foot">
      <button class="btn btn-outline btn-sm" onclick="closePlanModal()">Annuler</button>
      <button class="btn btn-primary btn-sm" onclick="savePlanSession()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>


<script type="module">
  import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import{getFirestore,doc,setDoc,getDoc,collection,getDocs,deleteDoc,updateDoc}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  const app=initializeApp({
    apiKey:"AIzaSyDo30FASeWnhvx4mYWYungKOu4AMhyJz6o",
    authDomain:"ambitio-team.firebaseapp.com",
    projectId:"ambitio-team",
    storageBucket:"ambitio-team.firebasestorage.app",
    messagingSenderId:"1079366902268",
    appId:"1:1079366902268:web:b4ec1691dba54230339279"
  });
  const auth=getAuth(app),db=getFirestore(app);
  window._auth=auth;window._db=db;window._doc=doc;window._setDoc=setDoc;
  window._getDoc=getDoc;window._collection=collection;window._getDocs=getDocs;
  window._deleteDoc=deleteDoc;window._updateDoc=updateDoc;window._signOut=signOut;

  onAuthStateChanged(auth,async user=>{
    if(!user){window.location.href='index.html';return;}
    window._uid=user.uid;
    const uSnap=await getDoc(doc(db,'users',user.uid));
    const uData=uSnap.exists()?uSnap.data():{};
    const role=uData.role||'admin';
    if(role==='sales'){window.location.href='sales.html';return;}
    window._role=role;
    window._userName=user.displayName||user.email.split('@')[0];
    const el=id=>document.getElementById(id);
    if(el('uName'))  el('uName').textContent=window._userName;
    if(el('uAvatar'))el('uAvatar').textContent=window._userName.charAt(0).toUpperCase();
    if(el('uRole'))  el('uRole').textContent=role==='admin'?'Administrateur':role==='coach'?'Coach':'Sales';
    window._firebaseReady=true;
    if(window.onFirebaseReady) window.onFirebaseReady();
  });
</script>
<script src="coaching-shared.js"></script>
<script>
async function handleLogout(){await window._signOut(window._auth);window.location.href='index.html';}

window.onFirebaseReady = function() {
  window.loadCoachingClients(function(clients) {
    window._clients = clients;
    onClientsLoaded(clients);
  });
};


let _clients = [];
let _agendaYear, _agendaMonth, _agendaDay;

function onClientsLoaded(clients) {
  _clients = clients;
  const now = new Date();
  if (!_agendaYear) { _agendaYear = now.getFullYear(); _agendaMonth = now.getMonth(); }
  _agendaDay = _agendaDay || now.toISOString().slice(0,10);
  renderPage();
}

function renderPage() {
  const now = new Date();
  const todayStr = now.toISOString().slice(0,10);
  const planned = JSON.parse(localStorage.getItem('coaching_planned_sessions') || '[]');

  // Séances planifiées par date
  const upcomingMap = {};
  planned.forEach(s => {
    if (s.date >= todayStr) {
      if (!upcomingMap[s.date]) upcomingMap[s.date] = [];
      upcomingMap[s.date].push(s);
    }
  });

  // Badge agenda
  const upCount = planned.filter(s => s.date >= todayStr).length;
  const badge = document.getElementById('badge-agenda');
  if (badge) { badge.textContent = upCount; badge.style.display = upCount>0 ? '' : 'none'; }

  // Calendrier
  const firstDay = new Date(_agendaYear, _agendaMonth, 1);
  const lastDay  = new Date(_agendaYear, _agendaMonth+1, 0);
  const startDow = (firstDay.getDay()+6)%7;
  let calDays = '';
  for (let i=0; i<startDow; i++) {
    const d = new Date(_agendaYear, _agendaMonth, -startDow+i+1);
    calDays += `<div class="cal-day other-month">${d.getDate()}</div>`;
  }
  for (let d=1; d<=lastDay.getDate(); d++) {
    const ds = `${_agendaYear}-${String(_agendaMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday    = ds === todayStr;
    const isSelected = ds === _agendaDay;
    const hasSess    = (upcomingMap[ds]||[]).length > 0;
    calDays += `<div class="cal-day${isToday?' today':''}${isSelected?' selected':''}${hasSess?' has-sess':''}" onclick="selectDay('${ds}')">${d}</div>`;
  }

  // Séances du jour
  const dayLabel = new Date(_agendaDay).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  const daySess  = (upcomingMap[_agendaDay]||[]).sort((a,b)=>(a.time||'').localeCompare(b.time||''));

  // Prochaines séances 7j
  const in7 = new Date(); in7.setDate(in7.getDate()+7);
  const week = planned.filter(s=>{const d=new Date(s.date);return d>=now&&d<=in7;})
    .sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));

  // Actifs sans plan
  const actifs = _clients.filter(c=>(c.nbCoachingsFaits||0)<(c.nbCoachingsTotal||12));
  const withPlan = new Set(planned.filter(s=>new Date(s.date)>=now).map(s=>s.clientId));
  const noPlan   = actifs.filter(c=>!withPlan.has(c._id)).slice(0,5);

  // Remplir select modal
  const sel = document.getElementById('pm-client');
  if (sel) sel.innerHTML = actifs.map(c=>`<option value="${c._id}">${c.nom}</option>`).join('');
  const pdEl = document.getElementById('pm-date');
  if (pdEl) pdEl.value = _agendaDay;

  document.getElementById('page-content').innerHTML = `
    <div class="agenda-wrap">
      <div>
        <div class="cal-card">
          <div class="cal-head">
            <div class="cal-title">${new Date(_agendaYear,_agendaMonth).toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</div>
            <div class="cal-nav">
              <button class="cal-nav-btn" onclick="calNav(-1)">◀</button>
              <button class="cal-nav-btn" onclick="calNav(1)">▶</button>
            </div>
          </div>
          <div class="cal-grid">
            <div class="cal-weekdays">${['Lu','Ma','Me','Je','Ve','Sa','Di'].map(d=>`<div class="cal-wd">${d}</div>`).join('')}</div>
            <div class="cal-days">${calDays}</div>
          </div>
        </div>
        <button class="plan-btn" onclick="openPlanModal()">+ Planifier une séance</button>

        ${noPlan.length>0?`
        <div class="no-plan-card">
          <div class="card-head"><div class="card-title" style="font-size:12px">⚠️ Sans séance planifiée</div></div>
          <div style="padding:10px 14px">
            ${noPlan.map(c=>`
            <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)">
              <div>
                <div style="font-size:12px;font-weight:700">${c.nom}</div>
                <div style="font-size:10px;color:var(--muted)">${c.programme||'—'}</div>
              </div>
              <button class="btn btn-outline btn-sm" style="font-size:11px" onclick="openPlanModalFor('${c._id}')">Planifier</button>
            </div>`).join('')}
          </div>
        </div>`:''} 
      </div>

      <div>
        <div class="agenda-main">
          <div class="agenda-day-head">
            <div class="agenda-day-title">📅 ${dayLabel.charAt(0).toUpperCase()+dayLabel.slice(1)}</div>
            <button class="btn btn-primary btn-sm" onclick="openPlanModal()">+ Séance</button>
          </div>
          <div class="agenda-list">
            ${daySess.length===0
              ? `<div class="agenda-empty"><div class="agenda-empty-icon">📭</div>Aucune séance planifiée<br><span style="font-size:12px">Cliquez sur "+ Séance" pour en ajouter</span></div>`
              : daySess.map(s=>{
                  const c = _clients.find(x=>x._id===s.clientId);
                  const alert = c?getAlertStatus(c):'ok';
                  return `<div class="sess-row">
                    <div class="sess-time">${s.time||'—'}</div>
                    <div class="sess-dot" style="background:${alert==='alert'?'var(--red)':alert==='warning'?'var(--orange)':'var(--green)'}"></div>
                    <div class="sess-info">
                      <div class="sess-name">${s.clientName||'—'}</div>
                      <div class="sess-meta">${s.coach||'Coach non défini'} · ${s.notes||'Aucune note'}</div>
                    </div>
                    <span class="sess-badge ${alert==='alert'?'late':alert==='warning'?'warn':'ok'}">${alert==='alert'?'En retard':alert==='warning'?'Attention':'À jour'}</span>
                    <button onclick="event.stopPropagation();deleteSession('${s.id}')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px">✕</button>
                  </div>`;
                }).join('')}
          </div>
        </div>

        ${week.length>0?`
        <div class="week-card">
          <div class="card-head"><div class="card-title">🗓 Cette semaine (${week.length})</div></div>
          <div style="padding:12px">
            ${week.slice(0,8).map(s=>{
              const d=new Date(s.date).toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
              return `<div class="sess-row">
                <div class="sess-time" style="min-width:64px">${d}</div>
                <div class="sess-dot" style="background:var(--blue-main)"></div>
                <div class="sess-info">
                  <div class="sess-name">${s.clientName||'—'}</div>
                  <div class="sess-meta">${s.time||'—'} · ${s.coach||'—'}</div>
                </div>
                <button onclick="event.stopPropagation();deleteSession('${s.id}')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px">✕</button>
              </div>`;
            }).join('')}
          </div>
        </div>`:''} 
      </div>
    </div>
  `;
}

function selectDay(ds) { _agendaDay=ds; renderPage(); }
function calNav(delta) {
  _agendaMonth+=delta;
  if(_agendaMonth>11){_agendaMonth=0;_agendaYear++;}
  if(_agendaMonth<0) {_agendaMonth=11;_agendaYear--;}
  renderPage();
}
function openPlanModal() {
  document.getElementById('pmBackdrop').classList.add('show');
  const sel=document.getElementById('pm-client');
  const actifs=_clients.filter(c=>(c.nbCoachingsFaits||0)<(c.nbCoachingsTotal||12));
  sel.innerHTML=actifs.map(c=>`<option value="${c._id}">${c.nom}</option>`).join('');
  document.getElementById('pm-date').value=_agendaDay||new Date().toISOString().slice(0,10);
}
function openPlanModalFor(id) { openPlanModal(); document.getElementById('pm-client').value=id; }
function closePlanModal() { document.getElementById('pmBackdrop').classList.remove('show'); }
function savePlanSession() {
  const clientId=document.getElementById('pm-client')?.value;
  const date=document.getElementById('pm-date')?.value;
  const time=document.getElementById('pm-time')?.value;
  const coach=document.getElementById('pm-coach')?.value.trim();
  const notes=document.getElementById('pm-notes')?.value.trim();
  if(!clientId||!date){showToast('Client et date requis','error');return;}
  const c=_clients.find(x=>x._id===clientId);
  const planned=JSON.parse(localStorage.getItem('coaching_planned_sessions')||'[]');
  planned.push({id:'ps_'+Date.now(),clientId,clientName:c?.nom||'—',date,time,coach,notes});
  localStorage.setItem('coaching_planned_sessions',JSON.stringify(planned));
  closePlanModal();
  _agendaDay=date;
  renderPage();
  showToast('✅ Séance planifiée !','success');
}
function deleteSession(id) {
  if(!confirm('Supprimer cette séance ?')) return;
  const planned=JSON.parse(localStorage.getItem('coaching_planned_sessions')||'[]');
  localStorage.setItem('coaching_planned_sessions',JSON.stringify(planned.filter(s=>s.id!==id)));
  renderPage();
}
window.calNav=calNav;
window.selectDay=selectDay;
window.openPlanModal=openPlanModal;
window.openPlanModalFor=openPlanModalFor;
window.closePlanModal=closePlanModal;
window.savePlanSession=savePlanSession;
window.deleteSession=deleteSession;

</script>
</body>
</html>
