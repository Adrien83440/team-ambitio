<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>Ambitio — Agenda Coaching</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blue-dark:#0f1f5c;--blue-main:#1a3dce;--blue-light:#4f7ef8;--blue-ghost:#f0f4ff;
      --text:#1a1f36;--muted:#6b7280;--border:#e2e8f0;--bg:#f5f7ff;--radius:14px;
      --green:#10b981;--green-light:#d1fae5;--orange:#f59e0b;--orange-light:#fef3c7;
      --red:#ef4444;--red-light:#fee2e2;--purple:#6366f1;--purple-light:#eef2ff;--teal:#14b8a6;
    }
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}
    .topbar{background:white;border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 8px rgba(15,31,92,.04)}
    .topbar-left{display:flex;align-items:center;gap:14px}
    .topbar-logo{width:38px;height:38px;background:linear-gradient(135deg,var(--blue-dark),var(--blue-main));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:white}
    .topbar-left h1{font-size:18px;font-weight:800}
    .topbar-left h1 span{color:var(--blue-main)}
    .topbar-sub{font-size:11px;color:var(--muted)}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .btn{padding:8px 16px;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:6px}
    .btn-outline{background:white;color:var(--text);border:1.5px solid var(--border)}
    .btn-outline:hover{border-color:var(--blue-main);background:var(--blue-ghost)}
    .btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
    .user-badge{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--blue-ghost);border-radius:10px}
    .user-avatar{width:28px;height:28px;background:linear-gradient(135deg,var(--blue-light),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white}
    .user-badge-name{font-size:12px;font-weight:600}
    .user-badge-role{font-size:10px;color:var(--muted)}
    .cnav{background:white;border-bottom:2px solid var(--border);padding:0 28px;position:sticky;z-index:40}
    .cnav-inner{display:flex;align-items:center;gap:0}
    .cnav-tab{padding:14px 20px;font-family:inherit;font-size:13px;font-weight:700;border:none;background:none;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .18s;text-decoration:none;display:flex;align-items:center;gap:7px;white-space:nowrap}
    .cnav-tab:hover{color:var(--text)}
    .cnav-tab.active{color:var(--blue-main);border-bottom-color:var(--blue-main)}
    .toast{position:fixed;bottom:24px;right:24px;background:#1a1f36;color:white;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s}
    .toast.show{transform:translateY(0);opacity:1}
    .toast.success{background:var(--green)}
    .toast.error{background:var(--red)}

    /* ── AGENDA TOOLBAR ── */
    .agenda-toolbar{padding:14px 28px;display:flex;align-items:center;gap:12px;background:white;border-bottom:1px solid var(--border);flex-wrap:wrap}
    .agenda-nav{display:flex;align-items:center;gap:8px}
    .agenda-nav-btn{width:34px;height:34px;border:1.5px solid var(--border);border-radius:8px;background:white;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .agenda-nav-btn:hover{border-color:var(--blue-main);background:var(--blue-ghost)}
    .agenda-date-label{font-size:16px;font-weight:800;min-width:220px;text-align:center;text-transform:capitalize}
    .agenda-today-btn{font-size:12px;font-weight:700;color:var(--blue-main);cursor:pointer;padding:6px 14px;border-radius:8px;background:var(--blue-ghost);border:1.5px solid transparent;font-family:inherit;transition:all .15s}
    .agenda-today-btn:hover{border-color:var(--blue-main)}
    .view-tabs{display:flex;gap:4px;background:var(--bg);padding:3px;border-radius:10px;border:1px solid var(--border);margin-left:auto}
    .view-tab{padding:6px 14px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .15s}
    .view-tab.active{background:white;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}
    .agenda-stats{display:flex;gap:14px;font-size:12px;font-weight:600;color:var(--muted)}
    .agenda-stats .num{font-size:16px;font-weight:800;color:var(--text)}

    /* ── MONTH VIEW ── */
    .month-grid{display:grid;grid-template-columns:repeat(7,1fr);background:white;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .month-header-cell{padding:10px;text-align:center;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;border-bottom:1.5px solid var(--border);background:#f8faff}
    .month-day{min-height:110px;border-right:1px solid #f1f5f9;border-bottom:1px solid #f1f5f9;padding:4px;position:relative;transition:background .1s}
    .month-day:nth-child(7n){border-right:none}
    .month-day:hover{background:rgba(26,61,206,.015)}
    .month-day.other-month{opacity:.35}
    .month-day.today{background:rgba(26,61,206,.04)}
    .month-day-num{font-size:12px;font-weight:700;padding:2px 6px;display:inline-block;border-radius:6px;margin-bottom:2px}
    .month-day.today .month-day-num{background:var(--blue-main);color:white}
    .month-event{display:block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:all .1s;border-left:2px solid}
    .month-event:hover{transform:translateX(2px)}
    .month-event.coaching{background:#eff6ff;color:#1e40af;border-color:#3b82f6}
    .month-event.rdv72h{background:#fef3c7;color:#92400e;border-color:#f59e0b}
    .month-event.meeting{background:#f0fdf4;color:#166534;border-color:#10b981}
    .month-event.other{background:#f5f3ff;color:#5b21b6;border-color:#8b5cf6}
    .month-more{font-size:10px;font-weight:700;color:var(--blue-main);padding:2px 6px;cursor:pointer}

    /* ── LIST VIEW ── */
    .list-container{padding:20px 28px}
    .list-day-group{margin-bottom:16px}
    .list-day-header{font-size:13px;font-weight:800;padding:8px 0;border-bottom:1.5px solid var(--border);margin-bottom:8px;text-transform:capitalize;display:flex;align-items:center;gap:8px}
    .list-day-header .day-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;background:var(--blue-ghost);color:var(--blue-main)}
    .list-event-row{display:flex;align-items:flex-start;gap:12px;padding:10px 12px;border-radius:10px;margin-bottom:4px;cursor:pointer;transition:all .12s;border:1px solid transparent}
    .list-event-row:hover{background:var(--bg);border-color:var(--border)}
    .list-event-time{min-width:90px;font-size:12px;font-weight:700;color:var(--muted);padding-top:2px}
    .list-event-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;margin-top:4px}
    .list-event-info{flex:1;min-width:0}
    .list-event-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .list-event-meta{font-size:11px;color:var(--muted);margin-top:2px}

    /* ── WEEK VIEW ── */
    .week-container{background:white;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;position:relative}
    .week-header{display:grid;grid-template-columns:56px repeat(7,1fr);border-bottom:1.5px solid var(--border);position:sticky;top:0;z-index:5;background:#f8faff}
    .week-h-cell{padding:10px 4px;text-align:center;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase}
    .week-h-cell.today{color:var(--blue-main);background:var(--blue-ghost)}
    .week-h-day{font-size:20px;font-weight:800;color:var(--text);line-height:1.2}
    .week-h-cell.today .week-h-day{color:var(--blue-main)}
    .week-body{display:grid;grid-template-columns:56px repeat(7,1fr);max-height:calc(100vh - 260px);overflow-y:auto}
    .week-time{padding:4px 6px;font-size:10px;font-weight:600;color:var(--muted);text-align:right;height:60px;border-right:1px solid var(--border);background:#fafbff;border-bottom:1px solid #f8f9fb}
    .week-cell{height:60px;border-right:1px solid #f8f9fb;border-bottom:1px solid #f8f9fb;position:relative;overflow:visible}
    .week-cell.today-col{background:rgba(26,61,206,.015)}
    .cal-event{position:absolute;left:2px;right:2px;border-radius:6px;padding:3px 6px;font-size:10px;font-weight:600;overflow:hidden;cursor:pointer;z-index:3;transition:all .15s;border-left:3px solid;line-height:1.3}
    .cal-event:hover{box-shadow:0 4px 12px rgba(0,0,0,.12);z-index:10}
    .cal-event .ev-time{font-size:9px;font-weight:700;opacity:.7;display:block}
    .cal-event .ev-title{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cal-event.coaching{background:#eff6ff;color:#1e40af;border-color:#3b82f6}
    .cal-event.rdv72h{background:#fef3c7;color:#92400e;border-color:#f59e0b}
    .cal-event.meeting{background:#f0fdf4;color:#166534;border-color:#10b981}
    .cal-event.other{background:#f5f3ff;color:#5b21b6;border-color:#8b5cf6}

    /* ── EVENT POPUP ── */
    .ep-overlay{position:fixed;inset:0;background:rgba(15,31,92,.35);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center}
    .ep-overlay.show{display:flex}
    .ep-box{background:white;border-radius:18px;width:100%;max-width:440px;box-shadow:0 24px 60px rgba(15,31,92,.2);overflow:hidden;margin:20px;animation:epSlide .25s ease}
    @keyframes epSlide{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
    .ep-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .ep-title{font-size:16px;font-weight:800;line-height:1.3}
    .ep-close{width:32px;height:32px;border:1.5px solid var(--border);border-radius:8px;background:white;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0;transition:all .15s}
    .ep-close:hover{background:var(--red-light);border-color:var(--red);color:var(--red)}
    .ep-body{padding:20px 24px}
    .ep-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;font-size:13px}
    .ep-row-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center}
    .ep-row-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
    .ep-row-val{font-weight:600;margin-top:2px}
    .ep-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700}

    .agenda-error{padding:60px;text-align:center}
    .agenda-error-icon{font-size:48px;margin-bottom:12px}
    .agenda-error-title{font-size:16px;font-weight:800;margin-bottom:6px}
    .agenda-error-sub{font-size:13px;color:var(--muted);max-width:420px;margin:0 auto;line-height:1.6}

    @media(max-width:900px){
      .agenda-toolbar{padding:10px 14px;gap:8px}
      .agenda-date-label{min-width:auto;font-size:14px}
      .list-container{padding:14px}
    }
  </style>
  <script>
    (function(){
      var role = localStorage.getItem('ambitio_role');
      if(role && role === 'sales') window.location.href = 'sales.html';
    })();
  </script>
  <script src="nav.js"></script>
</head>

<!-- CALENDAR FILTERS -->
<div id="calLegend" style="padding:8px 28px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:white;border-bottom:1px solid var(--border)"></div>

<div id="weekView" style="padding:0 28px 28px">
  <div style="padding:60px;text-align:center;color:var(--muted)">⏳ Chargement…</div>
</div>

<div class="ep-overlay" id="epOverlay" onclick="if(event.target===this)closeEP()">
  <div class="ep-box" id="epContent"></div>
</div>

<script type="module">
  import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import{getFirestore,doc,getDoc}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  const app=initializeApp({
    apiKey:"AIzaSyDo30FASeWnhvx4mYWYungKOu4AMhyJz6o",
    authDomain:"ambitio-team.firebaseapp.com",
    projectId:"ambitio-team",
    storageBucket:"ambitio-team.firebasestorage.app",
    messagingSenderId:"1079366902268",
    appId:"1:1079366902268:web:b4ec1691dba54230339279"
  });
  const auth=getAuth(app),db=getFirestore(app);
  window._auth=auth;window._signOut=signOut;
  onAuthStateChanged(auth,async user=>{
    if(!user){window.location.href='index.html';return;}
    const uSnap=await getDoc(doc(db,'users',user.uid));
    const uData=uSnap.exists()?uSnap.data():{};
    const role=uData.role||'admin';
    if(role==='sales'){window.location.href='sales.html';return;}
    window._userName=user.displayName||user.email.split('@')[0];
    var el=function(id){return document.getElementById(id);};
    if(el('uName'))el('uName').textContent=window._userName;
    if(el('uAvatar'))el('uAvatar').textContent=window._userName.charAt(0).toUpperCase();
    if(el('uRole'))el('uRole').textContent=role==='admin'?'Administrateur':'Coach';
    initAgenda();
  });
</script>

<script>
// ══════════════════════════════════════════════
// GOOGLE CALENDAR — PUBLIC API
// ══════════════════════════════════════════════

// ── CONFIGURATION MULTI-CALENDRIERS ──
var GCAL_API_KEY = 'AIzaSyAQqk_05zaAIyDY5sI2mmn1oYbbuRrw_ZY';
var GCAL_BASE = 'https://www.googleapis.com/calendar/v3/calendars';

var CALENDARS = [
  { id: 'coaching@adrienemily.com',
    label: 'Coaching (principal)',
    color: '#3b82f6', bg: '#eff6ff', textColor: '#1e40af', enabled: true },
  { id: 'c_5898d324e45cc9b88c06ddd404f34e94d296c10dbf0f7aaaa61832c1964f003d@group.calendar.google.com',
    label: 'Edouard',
    color: '#10b981', bg: '#d1fae5', textColor: '#065f46', enabled: true },
  { id: 'c_c56c1da8ccae6157369a62f92d5522a911f25d25123daa0c69bc15b07af1ae25@group.calendar.google.com',
    label: 'Mickael',
    color: '#f59e0b', bg: '#fef3c7', textColor: '#92400e', enabled: true },
];

var _allEvents = [];
var _events = []; // filtered
var _view = 'week';
var _vd = new Date();

// ── FETCH ALL CALENDARS ──
async function fetchAllCalendars(tMin, tMax){
  var results = await Promise.allSettled(
    CALENDARS.map(function(cal){ return fetchOneCalendar(cal, tMin, tMax); })
  );
  var all = [];
  var errors = [];
  results.forEach(function(r, i){
    if(r.status === 'fulfilled') all = all.concat(r.value);
    else errors.push(CALENDARS[i].label);
  });
  if(errors.length > 0 && all.length === 0){
    showErr('⚠️','Impossible de charger les calendriers: '+errors.join(', '));
  } else if(errors.length > 0){
    showToast('⚠️ Calendrier(s) inaccessible(s): '+errors.join(', '),'error');
  }
  // Sort by start time
  all.sort(function(a,b){ return a.start - b.start; });
  return all;
}

async function fetchOneCalendar(cal, tMin, tMax){
  var calId = encodeURIComponent(cal.id);
  var params = 'key='+GCAL_API_KEY
    +'&timeMin='+tMin.toISOString()
    +'&timeMax='+tMax.toISOString()
    +'&singleEvents=true&orderBy=startTime&maxResults=250';
  var url = GCAL_BASE+'/'+calId+'/events?'+params;
  var res = await fetch(url);
  if(!res.ok){
    var err = await res.json().catch(function(){return {};});
    console.error('Calendar error ['+cal.label+']:', res.status, err);
    throw new Error(cal.label+': '+(err.error?err.error.message:res.statusText));
  }
  var data = await res.json();
  return (data.items||[]).map(function(item){ return parseEv(item, cal); });
}

function parseEv(item, cal){
  var s = item.start&&item.start.dateTime ? new Date(item.start.dateTime) : new Date((item.start&&item.start.date||'')+'T00:00:00');
  var e = item.end&&item.end.dateTime ? new Date(item.end.dateTime) : new Date((item.end&&item.end.date||'')+'T23:59:59');
  var allDay = !item.start||!item.start.dateTime;
  var title = item.summary||'(Sans titre)';
  return {id:item.id,title:title,desc:item.description||'',loc:item.location||'',start:s,end:e,allDay:allDay,
    type:classEv(title),link:item.htmlLink||'',
    calId:cal.id, calLabel:cal.label, calColor:cal.color, calBg:cal.bg, calTextColor:cal.textColor};
}

function applyFilters(){
  var enabledIds = CALENDARS.filter(function(c){return c.enabled;}).map(function(c){return c.id;});
  _events = _allEvents.filter(function(ev){return enabledIds.indexOf(ev.calId)!==-1;});
}

function classEv(t){
  var l=t.toLowerCase();
  if(/rdv\s*(urgent|72h)|post.inscription|72\s*h/.test(l)) return 'rdv72h';
  if(/coaching|coach|1[:.:]1|séance/.test(l)) return 'coaching';
  if(/réunion|meeting|point|sync|standup|weekly/.test(l)) return 'meeting';
  return 'other';
}

function evLabel(type){
  if(type==='coaching') return {l:'🎓 Coaching',bg:'#eff6ff',c:'#1e40af',d:'#3b82f6'};
  if(type==='rdv72h')   return {l:'⚡ RDV 72H',bg:'#fef3c7',c:'#92400e',d:'#f59e0b'};
  if(type==='meeting')  return {l:'🤝 Réunion',bg:'#f0fdf4',c:'#166534',d:'#10b981'};
  return {l:'📌 Autre',bg:'#f5f3ff',c:'#5b21b6',d:'#8b5cf6'};
}

function showErr(icon,msg){
  document.getElementById('weekView').innerHTML='<div class="agenda-error"><div class="agenda-error-icon">'+icon+'</div><div class="agenda-error-title">Connexion au calendrier impossible</div><div class="agenda-error-sub">'+msg+'</div></div>';
}

// ── INIT & NAV ──
async function initAgenda(){
  updateLabel();
  await loadEv();
  render();
}

async function loadEv(){
  var d=new Date(_vd);
  var min=new Date(d.getFullYear(),d.getMonth()-1,1);
  var max=new Date(d.getFullYear(),d.getMonth()+2,0,23,59,59);
  document.getElementById('weekView').innerHTML='<div style="padding:60px;text-align:center;color:var(--muted)">⏳ Chargement des calendriers…</div>';
  _allEvents=await fetchAllCalendars(min,max);
  applyFilters();
  updateStats();
  renderCalendarLegend();
}

function updateStats(){
  var ws=weekStart(_vd),we=new Date(ws);we.setDate(we.getDate()+7);
  document.getElementById('statEvW').textContent=_events.filter(function(e){return e.start>=ws&&e.start<we;}).length;
  var ms=new Date(_vd.getFullYear(),_vd.getMonth(),1);
  var me=new Date(_vd.getFullYear(),_vd.getMonth()+1,0,23,59,59);
  document.getElementById('statEvM').textContent=_events.filter(function(e){return e.start>=ms&&e.start<=me;}).length;
}

function navigateAgenda(delta){
  if(_view==='month') _vd.setMonth(_vd.getMonth()+delta);
  else _vd.setDate(_vd.getDate()+delta*7);
  updateLabel();loadEv().then(render);
}

function goToday(){_vd=new Date();updateLabel();loadEv().then(render);}

function updateLabel(){
  var el=document.getElementById('agendaDateLabel');
  if(_view==='month'){
    el.textContent=_vd.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
  } else {
    var ws=weekStart(_vd),we=new Date(ws);we.setDate(we.getDate()+6);
    el.textContent=ws.getDate()+' – '+we.getDate()+' '+we.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
  }
}

function setAgendaView(v,btn){
  _view=v;
  document.querySelectorAll('.view-tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById('weekView').style.display=v==='week'?'':'none';
  document.getElementById('monthView').style.display=v==='month'?'':'none';
  document.getElementById('listView').style.display=v==='list'?'':'none';
  updateLabel();render();
}

function render(){
  if(_view==='week') renderWeek();
  else if(_view==='month') renderMonth();
  else renderList();
  updateStats();
}

// ── WEEK VIEW ──
function weekStart(d){
  var dt=new Date(d);var day=dt.getDay();dt.setDate(dt.getDate()-(day===0?6:day-1));dt.setHours(0,0,0,0);return dt;
}

function renderWeek(){
  var ws=weekStart(_vd);
  var td=new Date();td.setHours(0,0,0,0);
  var HS=7,HE=21;
  var dn=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  var h='<div class="week-container"><div class="week-header"><div class="week-h-cell"></div>';
  for(var d=0;d<7;d++){
    var day=new Date(ws);day.setDate(day.getDate()+d);
    var isT=day.getTime()===td.getTime();
    h+='<div class="week-h-cell'+(isT?' today':'')+'"><div>'+dn[d]+'</div><div class="week-h-day">'+day.getDate()+'</div></div>';
  }
  h+='</div><div class="week-body">';
  for(var hr=HS;hr<=HE;hr++){
    h+='<div class="week-time">'+String(hr).padStart(2,'0')+':00</div>';
    for(var d=0;d<7;d++){
      var day=new Date(ws);day.setDate(day.getDate()+d);
      var isT=day.getTime()===td.getTime();
      h+='<div class="week-cell'+(isT?' today-col':'')+'" id="wc-'+d+'-'+hr+'"></div>';
    }
  }
  h+='</div></div>';
  document.getElementById('weekView').innerHTML=h;

  // Place events
  for(var d=0;d<7;d++){
    var ds=new Date(ws);ds.setDate(ds.getDate()+d);ds.setHours(0,0,0,0);
    var de=new Date(ds);de.setDate(de.getDate()+1);
    var dayEv=_events.filter(function(e){return !e.allDay&&e.start<de&&e.end>ds;});
    dayEv.forEach(function(ev){
      var sh=Math.max(ev.start.getHours()+ev.start.getMinutes()/60,HS);
      var eh=Math.min(ev.end.getHours()+ev.end.getMinutes()/60,HE+1);
      if(eh<=HS||sh>=HE+1) return;
      var topPx=(sh-HS)*60;
      var hPx=Math.max((eh-sh)*60,20);
      var cell=document.getElementById('wc-'+d+'-'+HS);
      if(!cell) return;
      cell.style.overflow='visible';
      var el=document.createElement('div');
      el.className='cal-event';
      el.style.cssText='top:'+topPx+'px;height:'+hPx+'px;background:'+ev.calBg+';color:'+ev.calTextColor+';border-color:'+ev.calColor;
      el.innerHTML=(hPx>28?'<span class="ev-time">'+fmtT(ev.start)+' – '+fmtT(ev.end)+'</span>':'')
        +'<span class="ev-title">'+esc(ev.title)+'</span>';
      el.onclick=function(e){e.stopPropagation();openEP(ev);};
      cell.appendChild(el);
    });
  }
}

// ── MONTH VIEW ──
function renderMonth(){
  var y=_vd.getFullYear(),m=_vd.getMonth();
  var first=new Date(y,m,1);
  var td=new Date();td.setHours(0,0,0,0);
  var start=new Date(first);var dow=start.getDay();start.setDate(start.getDate()-(dow===0?6:dow-1));
  var dn=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  var h='<div class="month-grid">';
  dn.forEach(function(n){h+='<div class="month-header-cell">'+n+'</div>';});
  var cur=new Date(start);
  for(var w=0;w<6;w++){
    for(var d=0;d<7;d++){
      var isO=cur.getMonth()!==m;
      var isT=cur.getTime()===td.getTime();
      var ds=new Date(cur);ds.setHours(0,0,0,0);
      var de=new Date(ds);de.setDate(de.getDate()+1);
      var devs=_events.filter(function(e){return e.start>=ds&&e.start<de;});
      h+='<div class="month-day'+(isO?' other-month':'')+(isT?' today':'')+'">';
      h+='<div class="month-day-num">'+cur.getDate()+'</div>';
      devs.slice(0,3).forEach(function(ev){
        h+='<div class="month-event" style="background:'+ev.calBg+';color:'+ev.calTextColor+';border-color:'+ev.calColor+'" onclick="openEPById(\''+ev.id+'\')" title="'+esc(ev.calLabel+': '+ev.title)+'">'
          +(ev.allDay?'':fmtT(ev.start)+' ')+esc(ev.title)+'</div>';
      });
      if(devs.length>3) h+='<div class="month-more">+'+(devs.length-3)+' autre'+(devs.length>4?'s':'')+'</div>';
      h+='</div>';
      cur.setDate(cur.getDate()+1);
    }
    if(cur.getMonth()!==m&&w>=4) break;
  }
  h+='</div>';
  document.getElementById('monthView').innerHTML=h;
}

// ── LIST VIEW ──
function renderList(){
  var ws=weekStart(_vd),we=new Date(ws);we.setDate(we.getDate()+7);
  var wevs=_events.filter(function(e){return e.start>=ws&&e.start<we;});
  if(!wevs.length){
    document.getElementById('listView').innerHTML='<div class="list-container"><div style="padding:60px;text-align:center;color:var(--muted)"><div style="font-size:36px;margin-bottom:8px">📅</div>Aucun événement cette semaine</div></div>';
    return;
  }
  var groups={};
  wevs.forEach(function(ev){var k=ev.start.toISOString().slice(0,10);if(!groups[k])groups[k]=[];groups[k].push(ev);});
  var h='<div class="list-container">';
  Object.keys(groups).sort().forEach(function(dk){
    var d=new Date(dk+'T00:00:00');
    var td=new Date();td.setHours(0,0,0,0);
    var isT=d.getTime()===td.getTime();
    var evts=groups[dk].sort(function(a,b){return a.start-b.start;});
    h+='<div class="list-day-group"><div class="list-day-header">'+d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})
      +(isT?' <span class="day-badge">Aujourd\'hui</span>':'')
      +' <span style="margin-left:auto;font-size:11px;font-weight:600;color:var(--muted)">'+evts.length+' évt'+(evts.length>1?'s':'')+'</span></div>';
    evts.forEach(function(ev){
      var t=evLabel(ev.type);
      h+='<div class="list-event-row" onclick="openEPById(\''+ev.id+'\')">'
        +'<div class="list-event-time">'+(ev.allDay?'Journée':fmtT(ev.start)+' – '+fmtT(ev.end))+'</div>'
        +'<div class="list-event-dot" style="background:'+ev.calColor+'"></div>'
        +'<div class="list-event-info">'
        +'<div class="list-event-title">'+esc(ev.title)+'</div>'
        +'<div class="list-event-meta"><span style="color:'+ev.calTextColor+';background:'+ev.calBg+';padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700">'+esc(ev.calLabel)+'</span> · '+t.l+(ev.loc?' · 📍 '+esc(ev.loc):'')+'</div>'
        +'</div></div>';
    });
    h+='</div>';
  });
  h+='</div>';
  document.getElementById('listView').innerHTML=h;
}

// ── EVENT POPUP ──
function openEP(ev){
  var t=evLabel(ev.type);
  var dur=Math.round((ev.end-ev.start)/60000);
  var durL=dur>=60?Math.floor(dur/60)+'h'+(dur%60>0?String(dur%60).padStart(2,'0'):''):dur+'min';
  var h='<div class="ep-head"><div class="ep-title">'+esc(ev.title)+'</div><button class="ep-close" onclick="closeEP()">✕</button></div>';
  h+='<div class="ep-body">';
  h+='<div style="margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap"><span class="ep-badge" style="background:'+t.bg+';color:'+t.c+'">'+t.l+'</span>'
    +'<span class="ep-badge" style="background:'+ev.calBg+';color:'+ev.calTextColor+';border:1px solid '+ev.calColor+'">📅 '+esc(ev.calLabel)+'</span></div>';
  h+='<div class="ep-row"><span class="ep-row-icon">📅</span><div><div class="ep-row-label">Date & heure</div><div class="ep-row-val">'
    +ev.start.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})
    +(ev.allDay?' (journée entière)':'<br>'+fmtT(ev.start)+' – '+fmtT(ev.end)+' ('+durL+')')
    +'</div></div></div>';
  if(ev.loc) h+='<div class="ep-row"><span class="ep-row-icon">📍</span><div><div class="ep-row-label">Lieu</div><div class="ep-row-val">'+esc(ev.loc)+'</div></div></div>';
  if(ev.desc) h+='<div class="ep-row"><span class="ep-row-icon">📝</span><div><div class="ep-row-label">Description</div><div class="ep-row-val" style="white-space:pre-wrap;font-size:12px;line-height:1.6;max-height:200px;overflow-y:auto">'+esc(ev.desc)+'</div></div></div>';
  if(ev.link) h+='<div style="margin-top:8px;padding-top:12px;border-top:1px solid var(--border)"><a href="'+ev.link+'" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:var(--blue-ghost);color:var(--blue-main);border-radius:8px;font-size:12px;font-weight:700;text-decoration:none">🔗 Ouvrir dans Google Calendar</a></div>';
  h+='</div>';
  document.getElementById('epContent').innerHTML=h;
  document.getElementById('epOverlay').classList.add('show');
}
function openEPById(id){var ev=_events.find(function(e){return e.id===id;});if(ev)openEP(ev);}
function closeEP(){document.getElementById('epOverlay').classList.remove('show');}

// ── CALENDAR LEGEND / FILTERS ──
function renderCalendarLegend(){
  var h='<span style="font-size:11px;font-weight:700;color:var(--muted);margin-right:4px">Calendriers :</span>';
  CALENDARS.forEach(function(cal,i){
    var opacity = cal.enabled ? '1' : '0.35';
    var strike = cal.enabled ? '' : 'text-decoration:line-through;';
    h+='<button onclick="toggleCal('+i+')" style="display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;border:1.5px solid '
      +(cal.enabled ? cal.color : 'var(--border)')
      +';background:'+(cal.enabled ? cal.bg : 'transparent')
      +';cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;color:'
      +(cal.enabled ? cal.textColor : 'var(--muted)')
      +';transition:all .15s;opacity:'+opacity+';'+strike+'">'
      +'<span style="width:8px;height:8px;border-radius:3px;background:'+cal.color+';flex-shrink:0"></span>'
      +esc(cal.label)
      +'<span style="font-weight:800;font-size:10px;opacity:.6">('
      +_allEvents.filter(function(e){return e.calId===cal.id;}).length
      +')</span></button>';
  });
  document.getElementById('calLegend').innerHTML=h;
}

function toggleCal(idx){
  CALENDARS[idx].enabled = !CALENDARS[idx].enabled;
  applyFilters();
  renderCalendarLegend();
  render();
}

// ── UTILS ──
function fmtT(d){return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showToast(m,t){var el=document.getElementById('toast');el.textContent=m;el.className='toast show '+(t||'');setTimeout(function(){el.className='toast';},3200);}
async function handleLogout(){await window._signOut(window._auth);window.location.href='index.html';}

window.navigateAgenda=navigateAgenda;window.goToday=goToday;window.setAgendaView=setAgendaView;
window.openEP=openEP;window.openEPById=openEPById;window.closeEP=closeEP;window.handleLogout=handleLogout;
window.toggleCal=toggleCal;
</script>
</body>
