<script>
/* === sales-data.js inlined === */
/**
 * sales-data.js — Data Store + Firebase + Utilitaires
 * Les données "a" (actuelles) viennent de Firestore en temps réel.
 * Les données "p" (projections) sont les références fixes.
 */

/* ═══════════════════════════════════════════════════════════
   PROJECTIONS FIXES — modifier ici pour changer les cibles
═══════════════════════════════════════════════════════════ */
const PROJECTIONS = {
  closing: {
    s1: { calls:20, lives:15, offres:10, closes:4, contracte:24000, collecte:2000 },
    s2: { calls:20, lives:15, offres:10, closes:4, contracte:24000, collecte:2000 },
    s3: { calls:20, lives:15, offres:10, closes:4, contracte:24000, collecte:2000 },
    s4: { calls:20, lives:15, offres:10, closes:4, contracte:24000, collecte:2000 },
    livesP:0.75, offresP:0.667, engP:0.5, cOffP:0.4, cCallP:0.2, cashLive:666.7,
  },
  setting: {
    s1: { leads:130, calls:375, decroches:45, propRdv:10, sets:5, presents:4, closes:4 },
    s2: { leads:130, calls:375, decroches:45, propRdv:10, sets:5, presents:4, closes:4 },
    s3: { leads:130, calls:375, decroches:45, propRdv:10, sets:5, presents:4, closes:4 },
    s4: { leads:130, calls:375, decroches:45, propRdv:10, sets:5, presents:4, closes:4 },
    decrochesP:0.12, engP:0.222, setP:0.5, showupP:0.8, cCallP:0.8,
  },
};

/* ═══════════════════════════════════════════════════════════
   DATA STORE
═══════════════════════════════════════════════════════════ */
const DB = {
  months: ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'],

  // Données brutes saisies (remplacées par Firestore)
  _raw: {
    closing: {
      s1: { calls:8,  lives:2, offres:1, closes:0, hc:0, fu:0, contracte:0,     collecte:0    },
      s2: { calls:8,  lives:4, offres:2, closes:2, hc:2, fu:0, contracte:12000, collecte:1000 },
      s3: { calls:9,  lives:6, offres:3, closes:1, hc:1, fu:0, contracte:5400,  collecte:400  },
      s4: { calls:9,  lives:7, offres:2, closes:0, hc:0, fu:0, contracte:1800,  collecte:200  },
    },
    setting: {
      s1: { leads:133, calls:231, decroches:56, propRdv:13, sets:9,  presents:2, closes:0 },
      s2: { leads:191, calls:324, decroches:54, propRdv:17, sets:11, presents:4, closes:2 },
      s3: { leads:127, calls:178, decroches:38, propRdv:16, sets:11, presents:4, closes:1 },
      s4: { leads:100, calls:150, decroches:28, propRdv:15, sets:10, presents:4, closes:0 },
    },
    deals: [
      { client:'Julie Berchoux',     email:'julieberchoux@icloud.com',         offre:'BP 12', type:'Closing', date:'24/01/2026', cHT:6000, coHT:500,  comm:500, bonus:0, notes:'Setting après self booking', ok:true  },
      { client:'Corinne Alaga',      email:'contact@lestabliersgourmands.com', offre:'BP 12', type:'Setting', date:'27/01/2026', cHT:null, coHT:null,  comm:125, bonus:0, notes:"Setting d'un close d'Elodie", ok:true  },
      { client:'Belinda Giangiulio', email:'lesdemoisellesduvrac@gmail.com',   offre:'BP 12', type:'Closing', date:'30/01/2026', cHT:6000, coHT:500,  comm:500, bonus:0, notes:'Setting no-booking',         ok:true  },
      { client:'Cecile Auneau',      email:'domcecile@gmail.com',              offre:'BP 12', type:'Closing', date:'09/02/2026', cHT:6000, coHT:500,  comm:500, bonus:0, notes:'Setting no-booking',         ok:true  },
      { client:'Justine Biton',      email:'lephildesidees@hotmail.com',       offre:'BP 12', type:'Closing', date:'09/02/2026', cHT:6000, coHT:500,  comm:500, bonus:0, notes:'Setting no-booking',         ok:true  },
    ],
  },

  // Calculé depuis _raw
  closing: null,
  setting: null,
  commissions: {
    'Janvier 2026': { contracte:12000, collecte:0,    totalComm:0,    statut:'Validé',     deals:[] },
    'Février 2026': { contracte:24000, collecte:2000, totalComm:2125, statut:'En attente', deals:[] },
    'Mars 2026':    { contracte:0,     collecte:0,    totalComm:1625, statut:'En attente', deals:[] },
  },
  team: {
    week: [
      { name:'Guillaume', role:'Closing + Setting', color:'#ef4444', contracte:33020, collecte:3342,  calls:23, lives:20, offres:14, closes:6, showup:0.87, txOffre:0.70,  txTransfoShow:0.30,  txTransfoOffre:0.429, caCall:1435.7 },
      { name:'Elodie',    role:'Closing',           color:'#60a5fa', contracte:22748, collecte:13629, calls:29, lives:24, offres:19, closes:7, showup:0.83, txOffre:0.792, txTransfoShow:0.292, txTransfoOffre:0.368, caCall:784.4  },
    ],
    month: [
      { name:'Guillaume', role:'Closing + Setting', color:'#ef4444', contracte:48469, collecte:4686, calls:56, lives:33, offres:17, closes:9, showup:0.589, txOffre:0.515, txTransfoShow:0.273, txTransfoOffre:0.529, caCall:721.3 },
      { name:'Elodie',    role:'Closing',           color:'#60a5fa', contracte:34069, collecte:3966, calls:46, lives:28, offres:13, closes:7, showup:0.609, txOffre:0.464, txTransfoShow:0.25,  txTransfoOffre:0.538, caCall:617.2 },
    ],
  },

  // Recalcule toutes les métriques depuis _raw
  compute() {
    const rc = DB._raw.closing;
    const rs = DB._raw.setting;
    const pc = PROJECTIONS.closing;
    const ps = PROJECTIONS.setting;

    const sumC  = k => ['s1','s2','s3','s4'].reduce((t,w) => t + (rc[w][k]||0), 0);
    const sumS  = k => ['s1','s2','s3','s4'].reduce((t,w) => t + (rs[w][k]||0), 0);
    const projC = k => ['s1','s2','s3','s4'].reduce((t,w) => t + (pc[w][k]||0), 0);
    const projS = k => ['s1','s2','s3','s4'].reduce((t,w) => t + (ps[w][k]||0), 0);

    const ca=sumC('calls'), la=sumC('lives'), oa=sumC('offres'), cla=sumC('closes');
    const cta=sumC('contracte'), cola=sumC('collecte');
    const cp=projC('calls'), lp=projC('lives'), op=projC('offres'), clp=projC('closes');
    const ctp=projC('contracte'), colp=projC('collecte');

    DB.closing = {
      mois: {
        calls:     {a:ca,  p:cp  },
        lives:     {a:la,  p:lp  },
        offres:    {a:oa,  p:op  },
        closes:    {a:cla, p:clp },
        hc:        {a:sumC('hc'), p:clp},
        fu:        {a:sumC('fu'), p:0  },
        contracte: {a:cta, p:ctp },
        collecte:  {a:cola,p:colp},
        livesP:  {a:ca>0  ? la/ca   : 0, p:pc.livesP  },
        offresP: {a:la>0  ? oa/la   : 0, p:pc.offresP },
        engP:    {a:oa>0  ? cla/oa  : 0, p:pc.engP    },
        cOffP:   {a:oa>0  ? cla/oa  : 0, p:pc.cOffP   },
        cCallP:  {a:ca>0  ? cla/ca  : 0, p:pc.cCallP  },
        cashLive:{a:la>0  ? cta/la  : 0, p:pc.cashLive},
        atteinte: ctp>0 ? cta/ctp : 0,
        delta:    Math.max(0, ctp-cta),
      },
      s1: DB._cw('s1'), s2: DB._cw('s2'), s3: DB._cw('s3'), s4: DB._cw('s4'),
    };

    const sca=sumS('calls'), da=sumS('decroches'), pa=sumS('propRdv');
    const sa=sumS('sets'), pra=sumS('presents'), sca2=sumS('closes');

    DB.setting = {
      mois: {
        leads:     {a:sumS('leads'),  p:projS('leads')    },
        calls:     {a:sca,            p:projS('calls')    },
        decroches: {a:da,             p:projS('decroches')},
        propRdv:   {a:pa,             p:projS('propRdv')  },
        sets:      {a:sa,             p:projS('sets')     },
        presents:  {a:pra,            p:projS('presents') },
        closes:    {a:sca2,           p:projS('closes')   },
        decrochesP:{a:sca>0?da/sca:0,  p:ps.decrochesP },
        engP:      {a:da>0 ?pa/da:0,    p:ps.engP       },
        setP:      {a:pa>0 ?sa/pa:0,    p:ps.setP       },
        showupP:   {a:sa>0 ?pra/sa:0,   p:ps.showupP    },
        cCallP:    {a:sca>0?sca2/sca:0, p:ps.cCallP     },
      },
      s1: DB._sw('s1'), s2: DB._sw('s2'), s3: DB._sw('s3'), s4: DB._sw('s4'),
    };

    // Sync deals dans commissions
    try {
      const cmk = (typeof localStorage !== 'undefined' && localStorage.getItem('sales_month')) || 'Février 2026';
      if (DB.commissions[cmk]) DB.commissions[cmk].deals = DB._raw.deals;
    } catch(e) {}
  },

  _cw(w) {
    const d=DB._raw.closing[w], p=PROJECTIONS.closing[w];
    return {
      calls:{a:d.calls||0,p:p.calls}, lives:{a:d.lives||0,p:p.lives},
      offres:{a:d.offres||0,p:p.offres}, closes:{a:d.closes||0,p:p.closes},
      hc:{a:d.hc||0,p:p.closes}, fu:{a:d.fu||0,p:0},
      contracte:{a:d.contracte||0,p:p.contracte}, collecte:{a:d.collecte||0,p:p.collecte},
    };
  },
  _sw(w) {
    const d=DB._raw.setting[w], p=PROJECTIONS.setting[w];
    return {
      leads:{a:d.leads||0,p:p.leads}, calls:{a:d.calls||0,p:p.calls},
      decroches:{a:d.decroches||0,p:p.decroches}, propRdv:{a:d.propRdv||0,p:p.propRdv},
      sets:{a:d.sets||0,p:p.sets}, presents:{a:d.presents||0,p:p.presents},
      closes:{a:d.closes||0,p:p.closes},
    };
  },
};

DB.compute();

/* ═══════════════════════════════════════════════════════════
   FIREBASE — couche temps réel
   Initialisé après que firebase SDK soit chargé + auth ready
═══════════════════════════════════════════════════════════ */
const Fire = {
  db:  null,
  uid: null,
  _unsubs: [],

  init(firestore, uid) {
    Fire.db  = firestore;
    Fire.uid = uid;
  },

  _key(label) {
    const p = label.split(' ');
    const m = DB.months.indexOf(p[0]);
    return `${p[1]}-${String(m+1).padStart(2,'0')}`;
  },

  // Écoute en temps réel les données d'un user pour un mois
  watchUser(userId, monthLabel, callback) {
    if (!Fire.db) return () => {};
    const ref = Fire.db
      .collection('saisies').doc(userId)
      .collection('mois').doc(Fire._key(monthLabel));
    const unsub = ref.onSnapshot(snap => callback(snap.exists ? snap.data() : null));
    Fire._unsubs.push(unsub);
    return unsub;
  },

  // Sauvegarde une semaine de closing
  async saveClosing(userId, monthLabel, week, data) {
    if (!Fire.db) throw new Error('Firebase non init');
    const ref = Fire.db.collection('saisies').doc(userId)
      .collection('mois').doc(Fire._key(monthLabel));
    await ref.set({ closing: { [week]: data } }, { merge: true });
  },

  // Sauvegarde une semaine de setting
  async saveSetting(userId, monthLabel, week, data) {
    if (!Fire.db) throw new Error('Firebase non init');
    const ref = Fire.db.collection('saisies').doc(userId)
      .collection('mois').doc(Fire._key(monthLabel));
    await ref.set({ setting: { [week]: data } }, { merge: true });
  },

  // Sauvegarde un deal (append)
  async saveDeal(userId, monthLabel, deal) {
    if (!Fire.db) throw new Error('Firebase non init');
    const ref = Fire.db.collection('saisies').doc(userId)
      .collection('mois').doc(Fire._key(monthLabel));
    const snap = await ref.get();
    const deals = snap.exists ? (snap.data().deals || []) : [];
    deals.push({ ...deal, _ts: Date.now() });
    await ref.set({ deals }, { merge: true });
  },

  // Applique un snapshot Firestore dans DB puis recalcule
  apply(data) {
    if (!data) return;
    if (data.closing) ['s1','s2','s3','s4'].forEach(w => {
      if (data.closing[w]) Object.assign(DB._raw.closing[w], data.closing[w]);
    });
    if (data.setting) ['s1','s2','s3','s4'].forEach(w => {
      if (data.setting[w]) Object.assign(DB._raw.setting[w], data.setting[w]);
    });
    if (data.deals) DB._raw.deals = data.deals;
    DB.compute();
    document.dispatchEvent(new CustomEvent('db:updated'));
  },

  stop() { Fire._unsubs.forEach(u => u()); Fire._unsubs = []; },
};

/* ═══════════════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════════════ */
const U = {
  euro:  v => v == null ? '—' : '€\u202f' + Number(v).toLocaleString('fr-FR'),
  pct:   v => v == null ? '—' : (v * 100).toFixed(1) + '%',
  num:   v => v == null ? '—' : Number(v).toLocaleString('fr-FR'),
  pp:  (a, p) => p > 0 ? Math.min((a / p) * 100, 200) : 0,
  ppv: (a, p) => p > 0 ? ((a / p) * 100).toFixed(0) + '%' : '—',
  cb:  (a, p) => { const r = p > 0 ? a / p : 0; return r >= 1 ? '#34d399' : r >= 0.65 ? '#f59e0b' : '#ef4444'; },
  g:   id => document.getElementById(id),
  getCurrentMonth: () => (typeof localStorage !== 'undefined' && localStorage.getItem('sales_month')) || 'Février 2026',
  getCurrentUser:  () => ({
    uid:  window._currentUserUid  || localStorage.getItem('ambitio_uid')  || 'guillaume',
    name: window._currentUserName || localStorage.getItem('ambitio_name') || 'Guillaume',
    role: window._currentRole     || localStorage.getItem('ambitio_role') || 'sales',
  }),

  progRow: (label, a, p, isEuro = false) => {
    const col = U.cb(a, p);
    return `<div class="pr">
      <div class="pr-l">${label}</div>
      <div class="pr-track"><div class="pr-fill" style="width:${Math.min(U.pp(a,p),100)}%;background:${col}"></div></div>
      <div class="pr-val">${isEuro ? `${U.euro(a)} / ${U.euro(p)}` : `${a} / ${p}`}</div>
      <div class="pr-pct" style="color:${col}">${U.ppv(a,p)}</div>
    </div>`;
  },

  kpiCard: ({ label, val, sub, rawA, proj, color='#ef4444', pct:fp }) => {
    const pc = fp!=null ? fp : (proj!=null ? U.pp(rawA??0, proj) : null);
    return `<div class="kpi" style="--kc:${color}">
      <div class="kpi-label">${label}</div>
      <div class="kpi-value">${val}</div>
      ${sub ? `<div class="kpi-sub">${sub}</div>` : ''}
      ${pc!=null ? `<div class="kpi-prog">
        <div class="kpi-prog-row"><span>Atteinte</span><span>${pc.toFixed(0)}%</span></div>
        <div class="kpi-prog-track"><div class="kpi-prog-fill" style="width:${Math.min(pc,100)}%;background:${color}"></div></div>
      </div>` : ''}
    </div>`;
  },

  funnelStep: (label, val, max, isFirst=false, isEuro=false) => {
    const ratio = max > 0 ? val / max : 0;
    return `<div class="fs">
      <div class="fs-label">${label}</div>
      <div class="fs-track"><div class="fs-fill" style="width:${Math.min(ratio*100,100)}%"></div></div>
      <div class="fs-val">${isEuro ? U.euro(val) : val}</div>
      <div class="fs-rate">${!isFirst ? U.pct(ratio) : ''}</div>
    </div>`;
  },

  weekCard: (label, mainVal, mainLabel, minis, isCurrent, dateRange) => `
    <div class="wc${isCurrent?' wc-active':''}">
      <div class="wc-label">${label}</div>
      ${dateRange ? `<div class="wc-dates">${dateRange}</div>` : ''}
      <div class="wc-main">${mainVal}</div>
      <div class="wc-sub">${mainLabel}</div>
      <div class="wc-grid">${minis.map(m=>`
        <div class="wc-mini">
          <div class="wc-mini-v"${m.color?` style="color:${m.color}"`:''} >${m.val}</div>
          <div class="wc-mini-l">${m.label}</div>
        </div>`).join('')}</div>
    </div>`,

  barChart: (labels, actuals, projs, unit='') => {
    const mx = Math.max(...actuals, ...projs, 1);
    return `<div class="chart-legend">
        <span class="cl-dot cl-real"></span>Réel
        <span class="cl-dot cl-proj" style="margin-left:14px"></span>Projection
      </div>
      <div class="chart-bars">
        ${labels.map((l,i)=>`<div class="chart-col">
          <div class="chart-pair">
            <div class="chart-bar bar-real" style="height:${(actuals[i]/mx*100).toFixed(1)}%" title="${actuals[i]}${unit}"></div>
            <div class="chart-bar bar-proj" style="height:${(projs[i]/mx*100).toFixed(1)}%" title="Proj:${projs[i]}${unit}"></div>
          </div>
          <div class="chart-lbl">${l}</div>
        </div>`).join('')}
      </div>`;
  },

  toast: (msg, type='success') => {
    let t = document.getElementById('_toast');
    if (!t) { t=document.createElement('div'); t.id='_toast'; document.body.appendChild(t); }
    const s = { success:'background:#1a2e1a;border:1px solid rgba(52,211,153,.3);color:#6ee7b7', error:'background:#2e1a1a;border:1px solid rgba(239,68,68,.3);color:#fca5a5', info:'background:#1a1a2e;border:1px solid rgba(96,165,250,.3);color:#93c5fd' };
    t.style.cssText = `position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(0);font-size:12px;font-weight:600;padding:9px 18px;border-radius:10px;z-index:9999;opacity:1;transition:all .28s;white-space:nowrap;font-family:var(--font-b);${s[type]||s.success}`;
    t.textContent = msg;
    clearTimeout(t._t);
    t._t = setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(20px)'; }, 2800);
  },
};


/* ═══════════════════════════════════════════════════════════
   SEMAINES RÉELLES — calcule les vraies dates lun→dim
═══════════════════════════════════════════════════════════ */
function getMonthWeeks(monthLabel) {
  // monthLabel = "Février 2026"
  const MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin',
                     'Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const parts = monthLabel.split(' ');
  const month = MONTHS_FR.indexOf(parts[0]); // 0-based
  const year  = parseInt(parts[1]);
  if (month === -1 || isNaN(year)) return [];

  const DAYS_FR = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const pad = n => String(n).padStart(2,'0');

  function fmt(d) {
    // "14/02"
    return pad(d.getDate()) + '/' + pad(d.getMonth()+1);
  }
  function fmtShort(d) {
    // "14 fév"
    const M = ['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'];
    return d.getDate() + ' ' + M[d.getMonth()];
  }

  // Premier lundi qui touche le mois (peut être dans le mois précédent)
  const firstOfMonth = new Date(year, month, 1);
  const dayOfWeek = firstOfMonth.getDay(); // 0=Sun,1=Mon...
  const daysToMonday = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  let monday = new Date(year, month, 1 + daysToMonday);

  const weeks = [];
  while (true) {
    const sunday = new Date(monday.getTime() + 6 * 86400000);
    // Inclure si la semaine chevauche le mois cible
    if (monday.getMonth() === month || sunday.getMonth() === month) {
      weeks.push({
        id:    's' + (weeks.length + 1),
        label: 'S' + (weeks.length + 1),
        start: monday,
        end:   sunday,
        range: fmt(monday) + ' → ' + fmt(sunday),       // "26/01 → 01/02"
        short: fmtShort(monday) + ' – ' + fmtShort(sunday), // "26 jan – 1 fév"
        tab:   fmt(monday) + '→' + fmt(sunday),
      });
    }
    monday = new Date(monday.getTime() + 7 * 86400000);
    if (monday.getMonth() !== month && monday.getMonth() !== (month === 0 ? 11 : month - 1)) {
      if (monday.getMonth() !== month) break;
    }
    if (monday.getFullYear() > year + 1) break;
    if (weeks.length >= 6) break;
  }
  return weeks;
}

window.DB=DB; window.U=U; window.Fire=Fire; window.PROJECTIONS=PROJECTIONS;
window.getMonthWeeks=getMonthWeeks;

/* === end sales-data.js === */
</script>

<script>
const MONTHS = DB.months;
let _cm = (() => {
  const s = (typeof localStorage !== 'undefined' && localStorage.getItem('sales_month')) || 'Février 2026';
  const p = s.split(' ');
  return { month: MONTHS.indexOf(p[0]), year: parseInt(p[1]) || 2026 };
})();
function cmk() { return MONTHS[_cm.month] + ' ' + _cm.year; }
function prevMonth() { _cm.month--; if (_cm.month < 0) { _cm.month = 11; _cm.year--; } _sm(); renderAll(); }
function nextMonth() { _cm.month++; if (_cm.month > 11) { _cm.month = 0; _cm.year++; } _sm(); renderAll(); }
function _sm() {
  if (typeof localStorage !== 'undefined') localStorage.setItem('sales_month', cmk());
  document.getElementById('month-lbl').textContent = cmk();
  document.getElementById('sub-month').textContent = cmk();
}

const PROJ_S = { calls:20, lives:15, offres:10, deposits:1, closes:4, hardClose:4, followUp:0, contracte:24000, collecte:2000 };

const MEMBERS_C = [
  {

      }

];

function emptyWeek()  { return {calls:0,lives:0,offres:0,deposits:0,closes:0,hardClose:0,followUp:0,contracte:0,collecte:0}; }
function emptyMonth() { return {s1:emptyWeek(),s2:emptyWeek(),s3:emptyWeek(),s4:emptyWeek(),s5:emptyWeek()}; }

function sumMonth(md) {
  // Si le mois a un _total (données historiques sans découpage hebdo), on l'utilise directement
  if (md._total) return { ...emptyWeek(), ...md._total };
  const t = emptyWeek();
  ['s1','s2','s3','s4','s5'].forEach(w => { const d = md[w]||{}; Object.keys(t).forEach(k => { t[k] += (d[k]||0); }); });
  return t;
}

function computeRatesC(d) {
  return {
    livesPct:     d.calls    > 0 ? d.lives               / d.calls     : 0,
    offresPct:    d.lives    > 0 ? d.offres              / d.lives     : 0,
    engOffresPct: d.offres   > 0 ? (d.deposits+d.closes) / d.offres    : 0,
    closeOffrPct: d.offres   > 0 ? d.closes              / d.offres    : 0,
    closeCallPct: d.calls    > 0 ? d.closes              / d.calls     : 0,
    closeLivePct: d.lives    > 0 ? d.closes              / d.lives     : 0,
    cashPerLive:  d.lives    > 0 ? d.collecte            / d.lives     : 0,
    collectePct:  d.contracte> 0 ? d.collecte            / d.contracte : 0,
  };
}

const RATE_DEFS_C = [
  { key:'livesPct',    label:'Lives / Calls',          proj:0.75,  isEuro:false },
  { key:'offresPct',   label:'Offres / Lives',          proj:0.667, isEuro:false },
  { key:'engOffresPct',label:'Engagement / Offres',     proj:0.5,   isEuro:false },
  { key:'closeOffrPct',label:'Close / Offres',          proj:0.4,   isEuro:false },

  { key:'cashPerLive', label:'Cash collecté / Live',    proj:133,   isEuro:true  },
  { key:'collectePct', label:'Collecté / Contracté',   proj:null,  isEuro:false },
];

const SAISIE_FIELDS = [
  { key:'calls',     label:'Calls passés',        bloc:'a', proj:PROJ_S.calls     },
  { key:'lives',     label:'Lives (appel live)',   bloc:'a', proj:PROJ_S.lives     },
  { key:'offres',    label:'Offres faites',        bloc:'a', proj:PROJ_S.offres    },
  { key:'deposits',  label:'Deposits',             bloc:'r', proj:PROJ_S.deposits  },
  { key:'closes',    label:'Closes',               bloc:'r', proj:PROJ_S.closes    },
  { key:'hardClose', label:'Hard closing',         bloc:'r', proj:PROJ_S.hardClose },
  { key:'followUp',  label:'Follow-up closing',    bloc:'r', proj:PROJ_S.followUp  },
  { key:'contracte', label:'Contracté (€)',        bloc:'r', proj:PROJ_S.contracte },
  { key:'collecte',  label:'Collecté (€)',         bloc:'r', proj:PROJ_S.collecte  },
];

function loadDataC(uid) {
  // Données hardcodées = source de vérité pour mois historiques
  const member = MEMBERS_C.find(m => m.uid === uid);
  const hardcoded = member && member.data[cmk()];
  if (hardcoded && hardcoded._total) return hardcoded; // mois historique → ignorer localStorage
  try { const v = localStorage.getItem('closing_'+uid+'_'+cmk()); return v ? JSON.parse(v) : null; } catch(e) { return null; }
}
function saveDataC(uid, md) {
  try {
    const key = 'closing_' + uid + '_' + cmk();
    localStorage.setItem(key, JSON.stringify(md));
    // Notifier les autres onglets (dashboard/projections) via storage event
    // Note: storage event ne se déclenche pas dans le même onglet, on dispatch manuellement
    document.dispatchEvent(new CustomEvent('closing:saved', { detail: { uid, month: cmk(), data: md } }));
  } catch(e) {}
}

let currentMember = null, currentWeek = 'mois';

function miniBar(a, p) {
  const pct = p > 0 ? Math.min(a/p*100, 100) : 0;
  const col = pct>=100 ? '#34d399' : pct>=65 ? '#f59e0b' : '#ef4444';
  return `<div style="display:flex;align-items:center;gap:6px;margin-top:4px">
    <div style="flex:1;height:3px;background:rgba(255,255,255,0.07);border-radius:99px;overflow:hidden">
      <div style="width:${pct}%;height:100%;background:${col};border-radius:99px"></div>
    </div>
    <span style="font-size:10px;font-family:var(--font-m);color:${col};min-width:30px">${p>0?pct.toFixed(0)+'%':'—'}</span>
  </div>`;
}
function pill(val, proj, isEuro) {
  const pct = proj ? Math.min(val/proj*100, 200) : 0;
  const col = pct>=100 ? '#34d399' : pct>=65 ? '#f59e0b' : '#ef4444';
  const v = isEuro ? U.euro(val) : (val*100).toFixed(1)+'%';
  return `<span style="font-weight:700;color:${proj?col:'var(--text)'};font-family:var(--font-m)">${v}</span>`;
}
function rateTableRows(r) {
  return RATE_DEFS_C.map(rd => {
    const val = r[rd.key]; const prj = rd.proj;
    const pct = prj ? Math.min(val/prj*100, 200) : 0;
    const col = pct>=100?'#34d399':pct>=65?'#f59e0b':'#ef4444';
    const vd = rd.isEuro ? U.euro(val) : (val*100).toFixed(1)+'%';
    const pd = prj ? (rd.isEuro ? U.euro(prj) : (prj*100).toFixed(1)+'%') : '—';
    return `<tr>
      <td style="font-weight:500;font-size:13px">${rd.label}</td>
      <td class="td-mono" style="font-size:14px;font-weight:700;color:${prj?col:'var(--text)'}">${vd}</td>
      <td class="td-mono" style="color:var(--muted)">${pd}</td>
      <td class="rate-bar-cell"><div style="display:flex;align-items:center;gap:8px">
        <div class="rate-bar-wrap" style="flex:1"><div class="rate-bar-fill" style="width:${Math.min(pct,100)}%;background:${prj?col:'rgba(255,255,255,0.2)'}"></div></div>
        <span style="font-size:11px;font-family:var(--font-m);color:${prj?col:'var(--muted)'};min-width:36px;text-align:right">${prj?pct.toFixed(0)+'%':'—'}</span>
      </div></td>
    </tr>`;
  }).join('');
}

/* ── LISTE ── */
function renderListe() {
  document.getElementById('members-grid').innerHTML = MEMBERS_C.map(m => {
    const hardcoded = m.data[cmk()];

    return `<div class="member-card" style="--mc:${m.color}" onclick="openFiche('${m.uid}')">

        <div class="mc-stat"><div class="mc-stat-v" style="color:#f59e0b">${t.offres}</div><div class="mc-stat-l">Offres</div></div>
        <div class="mc-stat"><div class="mc-stat-v" style="color:#34d399">${t.closes}</div><div class="mc-stat-l">Closes</div></div>
        <div class="mc-stat"><div class="mc-stat-v" style="color:var(--gold)">${U.euro(t.contracte)}</div><div class="mc-stat-l">Contracté</div></div>
        <div class="mc-stat"><div class="mc-stat-v" style="color:var(--gold)">${U.euro(t.collecte)}</div><div class="mc-stat-l">Collecté</div></div>
      </div>
    </div>`;
  }).join('');
}

/* ── FICHE ── */
function openFiche(uid) {
  currentMember = MEMBERS_C.find(m => m.uid === uid);
  currentWeek = 'mois';
  const hardcoded = currentMember.data[cmk()];
  if (hardcoded && hardcoded._total) {
    // Mois historique — données hardcodées, pas de localStorage
  } else {
    const saved = loadDataC(uid);
    if (saved) currentMember.data[cmk()] = saved;
    else if (!hardcoded) currentMember.data[cmk()] = emptyMonth();
  }
  document.getElementById('view-liste').style.display = 'none';
  document.getElementById('view-fiche').style.display = 'block';
  document.getElementById('fiche-av').textContent = currentMember.name[0];
  document.getElementById('fiche-av').style.background = `linear-gradient(135deg,${currentMember.color}88,${currentMember.color})`;
  document.getElementById('fiche-name').textContent = currentMember.name + (currentMember.surname ? ' '+currentMember.surname : '');
  document.getElementById('fiche-role').textContent = currentMember.role + ' · ' + cmk();
  renderFiche();
}
function backToListe() {
  document.getElementById('view-liste').style.display = 'block';
  document.getElementById('view-fiche').style.display = 'none';
  currentMember = null;
  renderListe();
}

/* ── TABS ── */
function buildWeekTabs(isHistorical) {
  const weeks = getMonthWeeks(cmk());
  const row = document.getElementById('week-tabs-row');
  if (!row) return;
  let html = `<div class="wtab${currentWeek==='mois'?' active':''}" onclick="setWeek('mois')">Mois complet</div>`;
  if (!isHistorical) {
    html += weeks.map(wk => `<div class="wtab${currentWeek===wk.id?' active':''}" onclick="setWeek('${wk.id}')" title="${wk.range}">
        <span style="font-weight:600">S${wk.id.replace('s','')}</span>
        <span style="font-size:10px;color:var(--muted);margin-left:4px;font-family:var(--font-m)">${wk.range}</span>
      </div>`).join('');
  } else {
    html += `<span style="font-size:11px;color:var(--muted);margin-left:8px;font-style:italic">Données mensuelles globales</span>`;
  }
  row.innerHTML = html;
}
function setWeek(w) { currentWeek = w; renderFiche(); }

function renderFiche() {
  const md = currentMember && currentMember.data[cmk()];
  const isHistorical = !!(md && md._total);
  if (isHistorical && currentWeek !== 'mois') currentWeek = 'mois';
  buildWeekTabs(isHistorical);
  if (currentWeek === 'mois') {
    document.getElementById('reporting-mois').style.display = 'block';
    document.getElementById('saisie-week').style.display = 'none';
    renderReportingMois();
  } else {
    document.getElementById('reporting-mois').style.display = 'none';
    document.getElementById('saisie-week').style.display = 'block';
    renderSaisieWeek();
  }
}

/* ── REPORTING MOIS ── */
function renderReportingMois() {
  const md = currentMember.data[cmk()] || emptyMonth();
  const tot = sumMonth(md);
  const nW = getMonthWeeks(cmk()).length || 4;
  const proj = Object.keys(PROJ_S).reduce((a,k) => { a[k] = PROJ_S[k]*nW; return a; }, {});
  const r = computeRatesC(tot);
  const allWeeks = getMonthWeeks(cmk());
  const color = currentMember.color;
  const isHistorical = !!(md._total);

  const sumKpis = [
    { label:'Calls',     val:tot.calls,    proj:proj.calls,    color:'#60a5fa', euro:false },
    { label:'Lives',     val:tot.lives,    proj:proj.lives,    color:'#a78bfa', euro:false },
    { label:'Closes',    val:tot.closes,   proj:proj.closes,   color:'#34d399', euro:false },
    { label:'Contracté', val:tot.contracte,proj:proj.contracte,color:color,     euro:true  },
  ];

  const weekSections = allWeeks.map((wk, i) => {
    const w = wk.id;
    const d = md[w] || emptyWeek();
    const hasData = d.calls > 0 || d.lives > 0;
    const wr = computeRatesC(d);

    const kpis = [
      { label:'Calls',     val:d.calls,    proj:PROJ_S.calls,    color:'#60a5fa', euro:false },
      { label:'Lives',     val:d.lives,    proj:PROJ_S.lives,    color:'#a78bfa', euro:false },
      { label:'Offres',    val:d.offres,   proj:PROJ_S.offres,   color:'#f59e0b', euro:false },
      { label:'Closes',    val:d.closes,   proj:PROJ_S.closes,   color:'#34d399', euro:false },
      { label:'Hard close',val:d.hardClose,proj:PROJ_S.hardClose,color:'#ef4444', euro:false },
      { label:'Follow-up', val:d.followUp, proj:PROJ_S.followUp, color:'#ef4444', euro:false },
      { label:'Contracté', val:d.contracte,proj:PROJ_S.contracte,color:color,     euro:true  },
      { label:'Collecté',  val:d.collecte, proj:PROJ_S.collecte, color:'var(--gold)',euro:true },
    ];
    const rateRows = [
      { label:'Lives / Calls',    v:wr.livesPct,    p:0.75,  euro:false },
      { label:'Offres / Lives',   v:wr.offresPct,   p:0.667, euro:false },
      { label:'Engagement offres',v:wr.engOffresPct,p:0.5,   euro:false },
      { label:'Close / Offres',   v:wr.closeOffrPct,p:0.4,   euro:false },
      { label:'Close / Calls',    v:wr.closeCallPct,p:null,  euro:false },
      { label:'Cash / Live',      v:wr.cashPerLive, p:133,   euro:true  },
    ];
    return `
    <div class="week-report-section${hasData?'':' week-empty'}">
      <div class="wrs-header" onclick="setWeek('${w}')">
        <div class="wrs-left">
          <span class="wrs-num">S${i+1}</span>
          <div><div class="wrs-range">${wk.range}</div><div class="wrs-short">${wk.short}</div></div>
        </div>
        <div class="wrs-summary">
          <div class="wrs-pill"><span class="wrs-pill-v">${d.calls}</span><span class="wrs-pill-l">calls</span></div>
          <div class="wrs-pill"><span class="wrs-pill-v" style="color:#a78bfa">${d.lives}</span><span class="wrs-pill-l">lives</span></div>
          <div class="wrs-pill"><span class="wrs-pill-v" style="color:#f59e0b">${d.offres}</span><span class="wrs-pill-l">offres</span></div>
          <div class="wrs-pill"><span class="wrs-pill-v" style="color:#34d399">${d.closes}</span><span class="wrs-pill-l">closes</span></div>
          <div class="wrs-pill"><span class="wrs-pill-v" style="color:var(--gold)">${U.euro(d.contracte)}</span><span class="wrs-pill-l">contracté</span></div>
          <div class="wrs-pill"><span class="wrs-pill-v" style="color:var(--gold)">${U.euro(d.collecte)}</span><span class="wrs-pill-l">collecté</span></div>
        </div>
        <div class="wrs-edit">✏️ Saisir</div>
      </div>
      ${hasData ? `
      <div class="wrs-body">
        <div class="wrs-kpis">
          ${kpis.map(k => `<div class="wrs-kpi">
            <div class="wrs-kpi-label">${k.label}</div>
            <div class="wrs-kpi-val" style="color:${k.color}">${k.euro?U.euro(k.val):k.val}</div>
            <div class="wrs-kpi-proj">/ ${k.euro?U.euro(k.proj):k.proj} proj</div>
            ${miniBar(k.val, k.proj)}
          </div>`).join('')}
        </div>
        <div class="wrs-rates">
          ${rateRows.map(row => `<div class="wrs-rate-row">
            <span class="wrs-rate-label">${row.label}</span>
            ${pill(row.v, row.p, row.euro)}
            <span class="wrs-rate-proj">${row.p?(row.euro?U.euro(row.p):(row.p*100).toFixed(0)+'%'):''}</span>
          </div>`).join('')}
        </div>
      </div>` : `<div class="wrs-no-data">Aucune donnée — <span onclick="setWeek('${w}')" style="color:var(--red3);cursor:pointer;text-decoration:underline">saisir les données</span></div>`}
    </div>`;
  }).join('');

  document.getElementById('reporting-mois').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px">
      ${sumKpis.map(k => {
        const pct = k.proj>0 ? k.val/k.proj*100 : 0;
        return `<div class="rep-card">
          <div class="rep-label">${k.label}</div>
          <div class="rep-value" style="color:${k.color}">${k.euro?U.euro(k.val):k.val}</div>
          <div class="rep-sub">/ ${k.euro?U.euro(k.proj):k.proj} proj</div>
          ${miniBar(k.val, k.proj)}
        </div>`;
      }).join('')}
    </div>
    <div class="card" style="margin-bottom:20px">
      <div class="card-header">
        <span class="card-title">Taux de conversion — Mois complet</span>
        <span style="font-size:11px;color:var(--muted)">${tot.calls} calls · ${tot.lives} lives · ${tot.offres} offres · ${tot.closes} closes</span>
      </div>
      <table class="rates-table">
        <thead><tr><th>Métrique</th><th>Réel</th><th>Projection</th><th class="rate-bar-cell">Atteinte</th></tr></thead>
        <tbody>${rateTableRows(r)}</tbody>
      </table>
    </div>
    ${isHistorical
      ? '<div style=\"padding:20px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--muted);font-size:13px;text-align:center\">Données mensuelles globales — découpage hebdomadaire non disponible</div>'
      : '<div style=\"font-size:13px;font-weight:600;color:var(--muted);margin-bottom:12px\">Détail par semaine</div><div class=\"week-reports\">' + weekSections + '</div>'
    }`;
}

/* ── SAISIE SEMAINE ── */
function renderSaisieWeek() {
  const md = currentMember.data[cmk()] || emptyMonth();
  const d = md[currentWeek] || emptyWeek();
  const allWeeks = getMonthWeeks(cmk());
  const wkMeta = allWeeks.find(w => w.id === currentWeek);

  const fieldHtml = f => {
    const v = d[f.key] !== undefined && d[f.key] !== 0 ? d[f.key] : '';
    const proj = f.proj || 0;
    const isEuro = f.key === 'contracte' || f.key === 'collecte';
    let cls = 'saisie-input';
    if (v !== '' && proj > 0) cls += v >= proj ? ' above' : ' filled';
    return `<div class="saisie-field">
      <label class="saisie-label">${f.label}<span class="proj-tag">Proj: ${isEuro?U.euro(proj):proj}</span></label>
      <input class="${cls}" type="number" id="f-${f.key}" value="${v}" placeholder="0" step="${isEuro?100:1}"/>
    </div>`;
  };

  document.getElementById('saisie-week').innerHTML = `
    <div class="saisie-grid">
      <div class="saisie-bloc">
        <div class="saisie-bloc-title">Activité
          <span style="font-size:10px;color:var(--muted2);font-family:var(--font-m)">${wkMeta?wkMeta.range:''} · ${cmk()}</span>
        </div>
        ${SAISIE_FIELDS.filter(f=>f.bloc==='a').map(fieldHtml).join('')}
      </div>
      <div class="saisie-bloc">
        <div class="saisie-bloc-title">Résultats</div>
        ${SAISIE_FIELDS.filter(f=>f.bloc==='r').map(fieldHtml).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">Taux calculés en temps réel</span></div>
      <div id="rates-live"></div>
    </div>`;

  SAISIE_FIELDS.forEach(f => {
    const el = document.getElementById('f-'+f.key);
    if (!el) return;
    el.oninput = () => {
      const v = parseFloat(el.value) || 0;
      el.className = 'saisie-input' + (f.proj>0 ? (v>=f.proj?' above':v>0?' filled':'') : (v>0?' filled':''));
      renderRatesLive(readForm());
      scheduleAutoSave();
    };
  });
  renderRatesLive(d);
}

function readForm() {
  const v = {};
  SAISIE_FIELDS.forEach(f => { const el = document.getElementById('f-'+f.key); v[f.key] = parseFloat(el?.value)||0; });
  return v;
}

function renderRatesLive(d) {
  const r = computeRatesC(d);
  const el = document.getElementById('rates-live');
  if (!el) return;
  el.innerHTML = `<table class="rates-table">
    <thead><tr><th>Taux</th><th>Valeur</th><th>Projection</th><th class="rate-bar-cell">Atteinte</th></tr></thead>
    <tbody>${rateTableRows(r)}</tbody>
  </table>`;
}

/* ── SAVE ── */
let _autoSaveTimer = null;
function scheduleAutoSave() {
  clearTimeout(_autoSaveTimer);
  const st = document.getElementById('save-status');
  if (st) { st.textContent = '...'; st.style.color = 'var(--muted)'; }
  _autoSaveTimer = setTimeout(() => saveCurrentWeek(true), 2000);
}

async function saveCurrentWeek(auto = false) {
  if (!currentMember || currentWeek === 'mois') return;
  const data = readForm();
  if (!currentMember.data[cmk()]) currentMember.data[cmk()] = emptyMonth();
  currentMember.data[cmk()][currentWeek] = { ...data };
  saveDataC(currentMember.uid, currentMember.data[cmk()]);

  const st = document.getElementById('save-status');
  if (st) { st.textContent = '⏳ Sauvegarde...'; st.style.color = 'var(--muted)'; }

  try {
    if (window.Fire && Fire.db) {
      await Fire.saveClosing(currentMember.uid, cmk(), currentWeek, data);
    }
    if (st) { st.textContent = '✅ ' + new Date().toLocaleTimeString('fr-FR'); st.style.color = '#34d399'; }
    if (!auto && U.toast) U.toast('✅ Données sauvegardées !');
  } catch(e) {
    if (st) { st.textContent = '⚠️ Local seulement'; st.style.color = '#f59e0b'; }
    if (!auto) U.toast && U.toast('⚠️ Firebase indisponible, sauvegarde locale', 'info');
  }
  renderFiche();
}

function renderAll() {
  if (currentMember) {
    const s = loadDataC(currentMember.uid);
    if (s) currentMember.data[cmk()] = s;
    renderFiche();
  } else { renderListe(); }
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('month-lbl').textContent = cmk();
  document.getElementById('sub-month').textContent = cmk();
  const nm = (typeof localStorage !== 'undefined' && localStorage.getItem('ambitio_name')) || 'Guillaume';
  document.getElementById('tb-nm').textContent = nm;
  document.getElementById('tb-av').textContent = nm[0].toUpperCase();
  MEMBERS_C.forEach(m => {
    const hardcoded = m.data[cmk()];
    if (hardcoded && hardcoded._total) return; // garder données historiques
    const s = loadDataC(m.uid);
    if (s) m.data[cmk()] = s;
  });
  document.addEventListener('db:updated', renderAll);
  renderListe();
});
</script>
</body>
</html>
