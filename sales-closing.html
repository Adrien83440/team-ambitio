<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ambitio — Closing</title>
<link rel="stylesheet" href="sales.css"/>
<script src="sales-data.js"></script>
<script src="nav.js"></script>
<script>(function(){var r=localStorage.getItem('ambitio_role');if(r==='coach')window.location.href='coaching.html';if(!r)window.location.href='login.html';})();</script>
</head>
<body>

<div class="topbar">
  <div class="tb-logo">S</div>
  <div class="tb-title">Ambitio <em>Sales</em></div>
  <div class="tb-sep"></div>
  <div class="tb-page">🎯 Closing</div>
  <div class="tb-right">
    <div class="tb-month">
      <button onclick="prevMonth()">&#9664;</button>
      <span id="month-lbl">Février 2026</span>
      <button onclick="nextMonth()">&#9654;</button>
    </div>
    <div class="tb-user">
      <div class="tb-av" id="tb-av">G</div>
      <div><div class="tb-nm" id="tb-nm">Guillaume</div></div>
    </div>
  </div>
</div>

<div class="page">

  <div class="page-header-row">
    <div>
      <div class="page-title">Closing — KPIs & Pipeline</div>
      <div class="page-sub">Projections vs Réel · <span id="sub-month">Février 2026</span></div>
    </div>
    <div class="tabs" id="week-tabs">
      <div class="tab active" onclick="setWeek('mois')">Mois</div>
      <div class="tab" onclick="setWeek('s1')">Sem 1</div>
      <div class="tab" onclick="setWeek('s2')">Sem 2</div>
      <div class="tab" onclick="setWeek('s3')">Sem 3</div>
      <div class="tab" onclick="setWeek('s4')">Sem 4</div>
    </div>
  </div>

  <!-- KPIs -->
  <div class="g4 mb" id="kpis"></div>

  <!-- Prog + Rates -->
  <div class="g21 mb">
    <div class="card">
      <div class="card-header"><span class="card-title">Actuel vs Projection</span></div>
      <div id="prog-bars"></div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">Taux de conversion</span></div>
      <div id="rates"></div>
    </div>
  </div>

  <!-- Week breakdown + Chart -->
  <div class="g2">
    <div class="card">
      <div class="card-header"><span class="card-title">Breakdown hebdomadaire</span></div>
      <div class="week-grid" id="week-cards"></div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">Évolution contracté S1→S4</span></div>
      <div id="chart"></div>
    </div>
  </div>

</div>

<script>
const MONTHS = DB.months;
let _cm = (() => { const s=localStorage.getItem('sales_month')||'Février 2026'; const p=s.split(' '); return{month:MONTHS.indexOf(p[0]),year:parseInt(p[1])||2026}; })();
function currentMonthKey() { return MONTHS[_cm.month]+' '+_cm.year; }
function prevMonth() { _cm.month--; if(_cm.month<0){_cm.month=11;_cm.year--;} _saveMonth(); renderAll(); }
function nextMonth() { _cm.month++; if(_cm.month>11){_cm.month=0;_cm.year++;} _saveMonth(); renderAll(); }
function _saveMonth() { localStorage.setItem('sales_month',currentMonthKey()); document.getElementById('month-lbl').textContent=currentMonthKey(); document.getElementById('sub-month').textContent=currentMonthKey(); }

let currentWeek = 'mois';

function setWeek(w) {
  currentWeek = w;
  document.querySelectorAll('#week-tabs .tab').forEach((t,i) =>
    t.classList.toggle('active', ['mois','s1','s2','s3','s4'][i] === w));
  renderAll();
}

function renderAll() {
  const d   = DB.closing[currentWeek] || DB.closing.mois;
  const isM = currentWeek === 'mois';

  // KPIs
  document.getElementById('kpis').innerHTML = [
    { label:'Calls',     val:d.calls.a,             sub:`Proj: ${d.calls.p}`,             rawA:d.calls.a,     proj:d.calls.p,     color:'#60a5fa' },
    { label:'Lives',     val:d.lives.a,             sub:`Proj: ${d.lives.p}`,             rawA:d.lives.a,     proj:d.lives.p,     color:'#a78bfa' },
    { label:'Closes',    val:d.closes.a,            sub:`Proj: ${d.closes.p}`,            rawA:d.closes.a,    proj:d.closes.p,    color:'#f59e0b' },
    { label:'Contracté', val:U.euro(d.contracte.a), sub:`Proj: ${U.euro(d.contracte.p)}`, rawA:d.contracte.a, proj:d.contracte.p, color:'#ef4444' },
  ].map(U.kpiCard).join('');

  // Progress bars
  if (isM) {
    document.getElementById('prog-bars').innerHTML = [
      { l:'Calls',           a:d.calls.a,     p:d.calls.p      },
      { l:'Lives',           a:d.lives.a,     p:d.lives.p      },
      { l:'Offres faites',   a:d.offres.a,    p:d.offres.p     },
      { l:'Closes total',    a:d.closes.a,    p:d.closes.p     },
      { l:'Hard close',      a:d.hc.a,        p:d.hc.p         },
      { l:'Follow-up close', a:d.fu.a,        p:d.fu.p         },
      { l:'Contracté (€)',   a:d.contracte.a, p:d.contracte.p, eu:true },
      { l:'Collecté (€)',    a:d.collecte.a,  p:d.collecte.p,  eu:true },
    ].map(r => U.progRow(r.l, r.a, r.p, r.eu)).join('');
  } else {
    document.getElementById('prog-bars').innerHTML = [
      { l:'Calls',  a:d.calls.a,  p:d.calls.p  },
      { l:'Lives',  a:d.lives.a,  p:d.lives.p  },
      { l:'Offres', a:d.offres.a, p:d.offres.p },
      { l:'Closes', a:d.closes.a, p:d.closes.p },
      { l:'Contracté (€)', a:d.contracte.a, p:d.contracte.p, eu:true },
    ].map(r => U.progRow(r.l, r.a, r.p, r.eu)).join('');
  }

  // Rates
  if (isM) {
    const m = DB.closing.mois;
    document.getElementById('rates').innerHTML = [
      { l:'Lives / Calls',      a:m.livesP.a,  p:m.livesP.p  },
      { l:'Offres / Lives',     a:m.offresP.a, p:m.offresP.p },
      { l:'Engagement offres',  a:m.engP.a,    p:m.engP.p    },
      { l:'Close / Offres',     a:m.cOffP.a,   p:m.cOffP.p   },
      { l:'Close / Calls',      a:m.cCallP.a,  p:m.cCallP.p  },
    ].map(r => U.progRow(r.l, r.a, r.p)).join('');
  } else {
    document.getElementById('rates').innerHTML = `<div style="text-align:center;padding:30px;color:var(--muted);font-size:12px">Taux détaillés disponibles en vue Mois</div>`;
  }

  // Week cards
  document.getElementById('week-cards').innerHTML = ['s1','s2','s3','s4'].map((w,i) => {
    const wd = DB.closing[w];
    return U.weekCard(`Semaine ${i+1}`, wd.closes.a, 'closes', [
      { val:wd.calls.a,              label:'Calls'      },
      { val:wd.lives.a,              label:'Lives'      },
      { val:wd.offres.a,             label:'Offres'     },
      { val:U.euro(wd.contracte.a),  label:'Contracté', color:'var(--gold)' },
    ], currentWeek === w);
  }).join('');

  // Chart
  document.getElementById('chart').innerHTML = U.barChart(
    ['S1','S2','S3','S4'],
    [DB.closing.s1.contracte.a, DB.closing.s2.contracte.a, DB.closing.s3.contracte.a, DB.closing.s4.contracte.a],
    [DB.closing.s1.contracte.p, DB.closing.s2.contracte.p, DB.closing.s3.contracte.p, DB.closing.s4.contracte.p],
    ' €'
  );
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('month-lbl').textContent = currentMonthKey();
  document.getElementById('sub-month').textContent = currentMonthKey();
  const nm = localStorage.getItem('ambitio_name') || 'Guillaume';
  document.getElementById('tb-nm').textContent = nm;
  document.getElementById('tb-av').textContent = nm[0].toUpperCase();
  renderAll();

  // Firebase : connecte et écoute les données en temps réel
  const _fbUser = U.getCurrentUser();
  if (window.firebase && window.firebase.firestore && !Fire.db) {
    Fire.init(window.firebase.firestore(), _fbUser.uid);
  }
  if (Fire.db) {
    Fire.watchUser(_fbUser.uid, currentMonthKey(), (data) => {
      if (data) { Fire.apply(data); renderAll(); }
    });
  }
  // Refresh auto si DB mis à jour (ex: changement depuis saisie)
  document.addEventListener('db:updated', renderAll);
});
</script>

</body>
</html>
