<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>Ambitio Team — Espace Coaching</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blue-dark:#0f1f5c;--blue-main:#1a3dce;--blue-light:#4f7ef8;--blue-ghost:#f0f4ff;
      --text:#1a1f36;--muted:#6b7280;--border:#e2e8f0;--bg:#f5f7ff;--radius:14px;
      --green:#10b981;--green-light:#d1fae5;--orange:#f59e0b;--orange-light:#fef3c7;
      --red:#ef4444;--red-light:#fee2e2;--purple:#6366f1;--purple-light:#eef2ff;--teal:#14b8a6;
    }
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}

    /* ── TOPBAR ── */
    .topbar{background:white;border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 8px rgba(15,31,92,.04)}
    .topbar-left{display:flex;align-items:center;gap:14px}
    .topbar-logo{width:38px;height:38px;background:linear-gradient(135deg,var(--blue-dark),var(--blue-main));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:white}
    .topbar-left h1{font-size:18px;font-weight:800}
    .topbar-left h1 span{color:var(--blue-main)}
    .topbar-sub{font-size:11px;color:var(--muted)}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .btn{padding:8px 16px;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:6px}
    .btn-primary{background:linear-gradient(135deg,var(--blue-main),var(--blue-light));color:white;box-shadow:0 3px 12px rgba(26,61,206,.25)}
    .btn-primary:hover{opacity:.9;transform:translateY(-1px)}
    .btn-outline{background:white;color:var(--text);border:1.5px solid var(--border)}
    .btn-outline:hover{border-color:var(--blue-main);background:var(--blue-ghost)}
    .btn-danger{background:#fef2f2;color:var(--red);border:1px solid #fecaca}
    .btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
    .btn-xs{padding:4px 8px;font-size:11px;border-radius:6px}
    .btn-green{background:linear-gradient(135deg,#10b981,#34d399);color:white}
    .user-badge{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--blue-ghost);border-radius:10px}
    .user-avatar{width:28px;height:28px;background:linear-gradient(135deg,var(--blue-light),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white}
    .user-badge-name{font-size:12px;font-weight:600}
    .user-badge-role{font-size:10px;color:var(--muted)}

    /* ── VIEW TABS (statut) ── */
    .status-tabs {
      display: flex; gap: 0; background: white;
      border-bottom: 2px solid var(--border);
      padding: 0 28px; overflow-x: auto;
    }
    .status-tab {
      display: flex; align-items: center; gap: 7px;
      padding: 12px 18px; border: none; background: none;
      font-family: inherit; font-size: 13px; font-weight: 600;
      color: var(--muted); cursor: pointer; position: relative;
      white-space: nowrap; transition: color .15s; border-bottom: 2px solid transparent;
      margin-bottom: -2px;
    }
    .status-tab:hover { color: var(--text); }
    .status-tab.active { color: var(--blue-main); border-bottom-color: var(--blue-main); }
    .status-tab .tab-count {
      font-size: 11px; font-weight: 700; padding: 2px 7px;
      border-radius: 20px; background: #f1f5f9; color: var(--muted);
      transition: all .15s;
    }
    .status-tab.active .tab-count { background: var(--blue-ghost); color: var(--blue-main); }
    .status-tab.tab-alert.active { color: var(--red); border-bottom-color: var(--red); }
    .status-tab.tab-alert.active .tab-count { background: var(--red-light); color: var(--red); }
    .status-tab.tab-warn.active { color: var(--orange); border-bottom-color: var(--orange); }
    .status-tab.tab-warn.active .tab-count { background: var(--orange-light); color: var(--orange); }
    .status-tab.tab-inactive.active { color: #64748b; border-bottom-color: #94a3b8; }
    .status-tab.tab-inactive.active .tab-count { background: #f1f5f9; color: #64748b; }
    .status-tab.tab-quota.active { color: var(--purple); border-bottom-color: var(--purple); }
    .status-tab.tab-quota.active .tab-count { background: var(--purple-light); color: var(--purple); }

    /* ── TOOLBAR ── */
    .toolbar{padding:14px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:white;border-bottom:1px solid var(--border)}
    .search-box{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;min-width:260px;transition:border-color .15s}
    .search-box:focus-within{border-color:var(--blue-main);background:white}
    .search-box input{border:none;background:transparent;font-family:inherit;font-size:13px;outline:none;width:100%;color:var(--text)}
    .filter-group{display:flex;align-items:center;gap:6px}
    .filter-btn{padding:6px 14px;border:1.5px solid var(--border);border-radius:20px;background:white;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s}
    .filter-btn:hover{border-color:var(--blue-light);color:var(--text)}
    .filter-btn.active{background:var(--blue-main);color:white;border-color:var(--blue-main)}
    .filter-select{padding:6px 12px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:12px;font-weight:600;color:var(--text);background:white;cursor:pointer;outline:none}
    .toolbar-stats{margin-left:auto;display:flex;gap:16px}
    .stat-pill{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--muted)}
    .stat-pill .num{font-size:16px;font-weight:800;color:var(--text)}
    .stat-pill.alert .num{color:var(--red)}
    .stat-pill.quota .num{color:var(--orange)}

    /* ── VIEWS ── */
    .view-tabs{display:flex;gap:4px;background:var(--bg);padding:3px;border-radius:10px;border:1px solid var(--border)}
    .view-tab{padding:6px 14px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .15s}
    .view-tab.active{background:white;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}

    /* ── MONTH NAV ── */
    .month-nav{display:flex;align-items:center;gap:8px;padding:10px 28px;background:white;border-bottom:1px solid var(--border)}
    .month-nav-btn{width:32px;height:32px;border:1.5px solid var(--border);border-radius:8px;background:white;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .month-nav-btn:hover{border-color:var(--blue-main);background:var(--blue-ghost)}
    .month-nav-label{font-size:14px;font-weight:700;min-width:160px;text-align:center;text-transform:capitalize}
    .month-nav-today{font-size:11px;font-weight:600;color:var(--blue-main);cursor:pointer;padding:4px 10px;border-radius:6px;background:var(--blue-ghost);border:none;font-family:inherit}

    /* ── KANBAN ── */
    .kanban{display:flex;gap:16px;padding:20px 28px;overflow-x:auto;min-height:calc(100vh - 240px);align-items:flex-start}
    .kanban-col{min-width:300px;max-width:340px;flex:1;background:white;border-radius:var(--radius);border:1px solid var(--border);display:flex;flex-direction:column;max-height:calc(100vh - 260px)}
    .kanban-col-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:white;border-radius:var(--radius) var(--radius) 0 0;z-index:2}
    .col-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
    .col-count{font-size:11px;font-weight:700;color:white;padding:2px 8px;border-radius:20px}
    .col-badge-green{background:var(--green)}
    .col-badge-orange{background:var(--orange)}
    .col-badge-purple{background:var(--purple)}
    .col-badge-teal{background:var(--teal)}
    .kanban-cards{padding:10px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:8px}

    /* ── CLIENT CARD ── */
    .client-card{background:white;border:1.5px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .15s;position:relative}
    .client-card:hover{border-color:var(--blue-light);box-shadow:0 4px 16px rgba(26,61,206,.08);transform:translateY(-1px)}
    .client-card.alert{border-left:4px solid var(--red)}
    .client-card.warning{border-left:4px solid var(--orange)}
    .cc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .cc-name{font-size:13px;font-weight:700;color:var(--text)}
    .cc-coach{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--purple-light);color:var(--purple)}
    .cc-activite{font-size:11px;color:var(--muted);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cc-progress{margin-bottom:6px}
    .cc-progress-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
    .cc-progress-label span:first-child{color:var(--muted);font-weight:600}
    .cc-progress-label span:last-child{font-weight:700}
    .cc-bar{height:6px;background:#f1f5f9;border-radius:99px;overflow:hidden}
    .cc-bar-fill{height:100%;border-radius:99px;transition:width .4s ease}
    .cc-bottom{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted)}
    .cc-date{display:flex;align-items:center;gap:4px}
    .cc-alert-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--red-light);color:var(--red)}
    .cc-warn-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--orange-light);color:var(--orange)}

    /* ── QUOTA BADGE ── */
    .cc-quota{display:flex;align-items:center;gap:4px;margin-top:6px;padding:4px 8px;border-radius:8px;font-size:11px;font-weight:700}
    .cc-quota.ok{background:var(--green-light);color:var(--green)}
    .cc-quota.partial{background:var(--orange-light);color:var(--orange)}
    .cc-quota.empty{background:var(--red-light);color:var(--red)}
    .cc-quota.done{background:#f1f5f9;color:var(--muted)}

    /* ── LIST VIEW ── */
    .list-view{padding:20px 28px;display:none}
    .list-view.active{display:block}
    .list-table{width:100%;border-collapse:collapse;background:white;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
    .list-table th{padding:10px 16px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;background:#f8faff;border-bottom:1px solid var(--border)}
    .list-table td{padding:10px 16px;border-bottom:1px solid #f1f5f9;font-size:12px}
    .list-table tr{cursor:pointer;transition:background .1s}
    .list-table tbody tr:hover{background:var(--blue-ghost)}
    .list-table .name-cell{font-weight:700}
    .progress-mini{width:60px;height:5px;background:#f1f5f9;border-radius:99px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:6px}
    .progress-mini-fill{height:100%;border-radius:99px}

    /* ── CLIENT DETAIL PANEL ── */
    .detail-overlay{position:fixed;inset:0;background:rgba(15,31,92,.35);backdrop-filter:blur(4px);z-index:200;display:none;justify-content:flex-end}
    .detail-overlay.show{display:flex}
    .detail-panel{width:680px;max-width:100vw;height:100vh;background:white;overflow-y:auto;box-shadow:-8px 0 40px rgba(15,31,92,.15);animation:slideIn .25s ease}
    @keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
    .dp-header{padding:24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:white;z-index:5}
    .dp-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .dp-close{width:36px;height:36px;border:1.5px solid var(--border);border-radius:10px;background:white;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .dp-close:hover{background:var(--red-light);border-color:var(--red);color:var(--red)}
    .dp-name{font-size:22px;font-weight:800}
    .dp-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
    .dp-badge{font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px}
    .dp-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
    .dp-info{padding:10px 14px;background:var(--bg);border-radius:10px}
    .dp-info-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:2px}
    .dp-info-val{font-size:13px;font-weight:600}
    .dp-progress-section{padding:16px 24px;border-bottom:1px solid var(--border)}
    .dp-progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .dp-progress-title{font-size:14px;font-weight:700}
    .dp-progress-count{font-size:20px;font-weight:800;color:var(--blue-main)}
    .dp-bar{height:10px;background:#f1f5f9;border-radius:99px;overflow:hidden}
    .dp-bar-fill{height:100%;border-radius:99px;transition:width .6s ease}
    .dp-alert-box{margin:12px 24px;padding:12px 16px;border-radius:10px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px}
    .dp-alert-box.red{background:var(--red-light);color:var(--red)}
    .dp-alert-box.orange{background:var(--orange-light);color:var(--orange)}
    .dp-alert-box.green{background:var(--green-light);color:var(--green)}

    /* ── QUOTA DETAIL ── */
    .dp-quota-section{margin:0 24px 0;padding:14px 16px;border-radius:12px;border:1.5px solid var(--border);background:white}
    .dp-quota-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .dp-quota-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
    .dp-quota-badge{font-size:18px;font-weight:800;padding:4px 14px;border-radius:10px}
    .dp-quota-badge.ok{background:var(--green-light);color:var(--green)}
    .dp-quota-badge.partial{background:var(--orange-light);color:var(--orange)}
    .dp-quota-badge.empty{background:var(--red-light);color:var(--red)}
    .dp-quota-badge.over{background:var(--purple-light);color:var(--purple)}
    .dp-quota-badge.done{background:#f1f5f9;color:var(--muted)}
    .dp-quota-bar{height:8px;background:#f1f5f9;border-radius:99px;overflow:hidden;margin:8px 0}
    .dp-quota-bar-fill{height:100%;border-radius:99px;transition:width .4s}
    .dp-quota-sub{font-size:11px;color:var(--muted)}
    .dp-quota-history{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px}
    .dp-quota-month{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;border:1px solid var(--border)}
    .dp-quota-month.ok{background:var(--green-light);color:var(--green);border-color:#86efac}
    .dp-quota-month.partial{background:var(--orange-light);color:var(--orange);border-color:#fcd34d}
    .dp-quota-month.empty{background:var(--red-light);color:var(--red);border-color:#fca5a5}

    /* ── SESSIONS LIST ── */
    .dp-sessions{padding:16px 24px}
    .dp-sessions-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .dp-sessions-title{font-size:14px;font-weight:700}
    .session-item{border:1.5px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;transition:border-color .15s}
    .session-item:hover{border-color:var(--blue-light)}
    .session-item.done{border-left:4px solid var(--green)}
    .session-item.planned{border-left:4px solid var(--border)}
    .si-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:white;transition:background .1s}
    .si-header:hover{background:#fafbff}
    .si-left{display:flex;align-items:center;gap:10px}
    .si-num{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
    .si-num.done{background:var(--green-light);color:var(--green)}
    .si-num.planned{background:#f1f5f9;color:var(--muted)}
    .si-info{display:flex;flex-direction:column}
    .si-title{font-size:12px;font-weight:700}
    .si-meta{font-size:11px;color:var(--muted);display:flex;gap:8px}
    .si-right{display:flex;align-items:center;gap:6px}
    .si-chevron{font-size:14px;color:var(--muted);transition:transform .2s}
    .session-item.open .si-chevron{transform:rotate(180deg)}
    .si-body{padding:0 16px 14px;display:none}
    .session-item.open .si-body{display:block}
    .si-resume{font-size:12px;line-height:1.7;color:var(--text);padding:12px;background:var(--bg);border-radius:10px;margin-bottom:8px;white-space:pre-wrap}
    .si-devoirs{font-size:12px;padding:10px 12px;background:#fefce8;border-radius:8px;border-left:3px solid var(--orange)}

    /* ── NEW SESSION FORM ── */
    .new-session-form{padding:16px;background:var(--blue-ghost);border-radius:12px;margin:10px 24px;display:none}
    .new-session-form.show{display:block}
    .nsf-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
    .nsf-field label{font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px}
    .nsf-field input,.nsf-field select,.nsf-field textarea{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;outline:none;background:white}
    .nsf-field textarea{min-height:100px;resize:vertical}
    .nsf-field input:focus,.nsf-field textarea:focus{border-color:var(--blue-main)}

    /* ── MODAL ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(15,31,92,.45);backdrop-filter:blur(4px);z-index:300;display:none;align-items:center;justify-content:center}
    .modal-overlay.show{display:flex}
    .modal{background:white;border-radius:18px;width:100%;max-width:520px;box-shadow:0 24px 60px rgba(15,31,92,.2);overflow:hidden}
    .modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .modal-head h3{font-size:16px;font-weight:700}
    .modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);padding:4px}
    .modal-body{padding:20px 24px;max-height:70vh;overflow-y:auto}
    .modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
    .mf{margin-bottom:14px}
    .mf label{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;display:block}
    .mf input,.mf select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;outline:none}
    .mf input:focus,.mf select:focus{border-color:var(--blue-main)}
    .mf-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

    /* ── TOAST ── */
    .toast{position:fixed;bottom:24px;right:24px;background:#1a1f36;color:white;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s}
    .toast.show{transform:translateY(0);opacity:1}
    .toast.success{background:var(--green)}
    .toast.error{background:var(--red)}

    /* ── DRIVE LINK ── */
    .si-drive-link{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:#e8f0fe;color:#1a73e8;border-radius:6px;font-size:11px;font-weight:600;text-decoration:none;margin-top:6px;transition:background .15s}
    .si-drive-link:hover{background:#d2e3fc}
    .drive-scan-bar{padding:12px 16px;background:linear-gradient(135deg,#1e40af,#3b82f6);border-radius:10px;margin:10px 24px;display:flex;align-items:center;gap:10px;color:white;font-size:12px;font-weight:600}
    .drive-scan-bar .btn-drive{background:rgba(255,255,255,.2);color:white;border:1.5px solid rgba(255,255,255,.3);border-radius:8px;padding:6px 14px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s}
    .drive-scan-bar .btn-drive:hover{background:rgba(255,255,255,.35)}
    .drive-scan-bar .btn-drive:disabled{opacity:.5;cursor:wait}
    .drive-scan-log{margin:0 24px;max-height:0;overflow:hidden;transition:max-height .3s;font-size:11px;background:#0f172a;color:rgba(255,255,255,.7);border-radius:0 0 10px 10px}
    .drive-scan-log.show{max-height:200px;padding:10px 14px;overflow-y:auto}
    .dsl-match{color:#34d399}

<script type="module">
  import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import{getFirestore,doc,setDoc,getDoc,collection,getDocs,deleteDoc,updateDoc}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  const app=initializeApp({
    apiKey:"AIzaSyDo30FASeWnhvx4mYWYungKOu4AMhyJz6o",
    authDomain:"ambitio-team.firebaseapp.com",
    projectId:"ambitio-team",
    storageBucket:"ambitio-team.firebasestorage.app",
    messagingSenderId:"1079366902268",
    appId:"1:1079366902268:web:b4ec1691dba54230339279"
  });
  const auth=getAuth(app),db=getFirestore(app);
  window._auth=auth;window._db=db;window._doc=doc;window._setDoc=setDoc;
  window._getDoc=getDoc;window._collection=collection;window._getDocs=getDocs;
  window._deleteDoc=deleteDoc;window._updateDoc=updateDoc;window._signOut=signOut;

  onAuthStateChanged(auth,async user=>{
    if(!user){window.location.href='index.html';return;}
    window._uid=user.uid;
    const uSnap=await getDoc(doc(db,'users',user.uid));
    const uData=uSnap.exists()?uSnap.data():{};
    const role=uData.role||'admin';
    if(!['coach','sales','admin'].includes(role)){
      document.body.innerHTML='<div style="padding:60px;text-align:center"><h2>⛔ Accès réservé</h2></div>';
      return;
    }
    window._role=role;
    window._userName=user.displayName||user.email.split('@')[0];
    document.getElementById('uName').textContent=window._userName;
    document.getElementById('uAvatar').textContent=window._userName.charAt(0).toUpperCase();
    document.getElementById('uRole').textContent=role==='admin'?'Administrateur':role==='coach'?'Coach':'Sales';
    window._firebaseReady=true;
    window.loadClients();
  });
</script>

<script>
// ── STATE ──
let _clients = [];
let _filtered = [];
let _currentView = 'kanban';
let _alertFilterOn = false;
let _quotaFilterOn = false;
let _activeFilterOn = true;
let _statusTab = 'actifs'; // actifs | retard | attention | quota | inactifs | tous

// ── NORMALISE COACH NAME ──
// Regroupe toutes les variantes vers un prénom canonique
function normalizeCoach(raw){
  if(!raw) return '';
  const s = raw.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if(/^mick|^micha|^mik/.test(s)) return 'Mickael';
  if(/^edou|^edw|^edo/.test(s)) return 'Edouard';
  if(/^emil/.test(s)) return 'Emily';
  if(/^adri/.test(s)) return 'Adrien';
  // fallback : capitalize first word
  const first = raw.trim().split(/[\s.]/)[0];
  return first.charAt(0).toUpperCase() + first.slice(1).toLowerCase();
}
const ALERT_DAYS = 21;
const WARN_DAYS = 14;

// Current viewed month
let _viewYear = new Date().getFullYear();
let _viewMonth = new Date().getMonth(); // 0-indexed

// ── QUOTA LOGIC ──
function getMonthlyQuota(programme){
  if(!programme) return 1;
  const p = programme.toLowerCase();
  if(p.includes('24c')) return 2;
  if(p.includes('12c')) return 1;
  if(p.includes('6c')) return 1;
  return 1;
}

function getSessionsInMonth(c, year, month){
  return (c.sessions||[]).filter(s=>{
    if(s.statut!=='fait' || !s.date) return false;
    const d = new Date(s.date);
    return d.getFullYear()===year && d.getMonth()===month;
  });
}

function getQuotaStatus(c, year, month){
  const done = c.nbCoachingsFaits||0;
  const total = c.nbCoachingsTotal||12;
  if(done >= total) return {status:'done', used:0, max:0, label:'Terminé'};
  
  const quota = getMonthlyQuota(c.programme);
  const sessions = getSessionsInMonth(c, year, month);
  const used = sessions.length;
  
  if(used >= quota) return {status:'ok', used, max:quota, label:`${used}/${quota}`};
  if(used > 0) return {status:'partial', used, max:quota, label:`${used}/${quota}`};
  return {status:'empty', used:0, max:quota, label:`0/${quota}`};
}

function getQuotaHistory(c){
  // Get last 6 months of quota history
  const months = [];
  const now = new Date();
  const entry = c.dateEntree ? new Date(c.dateEntree) : null;
  
  for(let i=5; i>=0; i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    // Skip months before client entry
    if(entry && d < new Date(entry.getFullYear(), entry.getMonth(), 1)) continue;
    const q = getQuotaStatus(c, d.getFullYear(), d.getMonth());
    months.push({
      year: d.getFullYear(),
      month: d.getMonth(),
      label: d.toLocaleDateString('fr-FR',{month:'short'}),
      ...q
    });
  }
  return months;
}

// ── MONTH NAV ──
function updateMonthLabel(){
  const d = new Date(_viewYear, _viewMonth, 1);
  document.getElementById('monthLabel').textContent = d.toLocaleDateString('fr-FR',{month:'long', year:'numeric'});
  updateQuotaStats();
}

function changeMonth(delta){
  _viewMonth += delta;
  if(_viewMonth > 11){_viewMonth=0;_viewYear++;}
  if(_viewMonth < 0){_viewMonth=11;_viewYear--;}
  updateMonthLabel();
  render();
}

function goToday(){
  _viewYear = new Date().getFullYear();
  _viewMonth = new Date().getMonth();
  updateMonthLabel();
  render();
}

function updateQuotaStats(){
  let ok=0, miss=0;
  _clients.forEach(c=>{
    if(c.statut === 'inactif') return; // exclure les inactifs
    const done = c.nbCoachingsFaits||0;
    const total = c.nbCoachingsTotal||12;
    if(done >= total) return;
    const q = getQuotaStatus(c, _viewYear, _viewMonth);
    if(q.status==='ok') ok++;
    else miss++;
  });
  document.getElementById('statQuotaOk').textContent = ok;
  document.getElementById('statQuotaMiss').textContent = miss;
}

// ── LOAD ──
window.loadClients = async function(){
  if(!window._uid)return;
  _clients = [];
  try{
    const snap = await window._getDocs(window._collection(window._db,'clients'));
    snap.forEach(d=>{
      const data = d.data();
      data._id = d.id;
      // Normalize all coach names in sessions
      if(data.sessions){
        data.sessions = data.sessions.map(s=>({...s, coach: normalizeCoach(s.coach)}));
      }
      // Auto-migrate legacy flat sessions → years structure
      if(!data.years){
        data.years = [{
          yearNum:1, label:'Année 1',
          startDate: data.dateEntree||'',
          notes: data.programme||'',
          sessions: data.sessions||[]
        }];
      }
      _clients.push(data);
    });
  }catch(e){console.warn('Load error:',e);}
  
  updateMonthLabel();
  applyFilters();
};

// ── FILTERS ──
function applyFilters(){
  const q = (document.getElementById('searchInput').value||'').toLowerCase();
  const prog = document.getElementById('filterProg').value;
  const coach = document.getElementById('filterCoach').value;

  // Compute all counts for tabs (before status-tab filter)
  const base = _clients.filter(c=>{
    if(q && !c.nom.toLowerCase().includes(q) && !(c.email||'').toLowerCase().includes(q) && !(c.activite||'').toLowerCase().includes(q)) return false;
    if(prog && c.programme !== prog) return false;
    if(coach){
      const hasCoach = (c.sessions||[]).some(s=>normalizeCoach(s.coach)===coach);
      if(!hasCoach) return false;
    }
    return true;
  });

  const actifs    = base.filter(c=>c.statut !== 'inactif');
  const inactifs  = base.filter(c=>c.statut === 'inactif');
  const retard    = actifs.filter(c=>getAlertStatus(c)==='alert');
  const attention = actifs.filter(c=>getAlertStatus(c)==='warning');
  const quotaMiss = actifs.filter(c=>{ const qs=getQuotaStatus(c,_viewYear,_viewMonth); return qs.status==='empty'||qs.status==='partial'; });

  // Update tab counts
  document.getElementById('tabCount-actifs').textContent    = actifs.length;
  document.getElementById('tabCount-retard').textContent    = retard.length;
  document.getElementById('tabCount-attention').textContent = attention.length;
  document.getElementById('tabCount-quota').textContent     = quotaMiss.length;
  document.getElementById('tabCount-inactifs').textContent  = inactifs.length;
  document.getElementById('tabCount-tous').textContent      = base.length;

  // Apply status tab filter
  switch(_statusTab){
    case 'actifs':    _filtered = actifs; break;
    case 'retard':    _filtered = retard; break;
    case 'attention': _filtered = attention; break;
    case 'quota':     _filtered = quotaMiss; break;
    case 'inactifs':  _filtered = inactifs; break;
    case 'tous':      _filtered = base; break;
    default:          _filtered = actifs;
  }

  document.getElementById('statTotal').textContent    = _filtered.length;
  document.getElementById('statSessions').textContent = _filtered.reduce((s,c)=>(c.sessions||[]).filter(s=>s.statut==='fait').length+s,0);
  document.getElementById('statInactive').textContent = inactifs.length;
  updateQuotaStats();
  render();
}

function setStatusTab(tab, btn){
  _statusTab = tab;
  document.querySelectorAll('.status-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function toggleActiveFilter(btn){
  _activeFilterOn = !_activeFilterOn;
  btn.classList.toggle('active', _activeFilterOn);
  btn.textContent = _activeFilterOn ? '✅ Actifs seulement' : '👥 Tous les clients';
  applyFilters();
}

function toggleAlertFilter(btn){
  _alertFilterOn = !_alertFilterOn;
  btn.classList.toggle('active', _alertFilterOn);
  applyFilters();
}

function toggleQuotaFilter(btn){
  _quotaFilterOn = !_quotaFilterOn;
  btn.classList.toggle('active', _quotaFilterOn);
  applyFilters();
}

// ── ALERT STATUS ──
function getAlertStatus(c){
  const done = c.nbCoachingsFaits||0;
  const total = c.nbCoachingsTotal||12;
  if(done >= total) return 'ok';
  if(!c.lastSessionDate) return 'alert';
  const last = new Date(c.lastSessionDate);
  const diff = (Date.now() - last.getTime()) / (1000*60*60*24);
  if(diff > ALERT_DAYS) return 'alert';
  if(diff > WARN_DAYS) return 'warning';
  return 'ok';
}

function getAlertText(c){
  const done = c.nbCoachingsFaits||0;
  const total = c.nbCoachingsTotal||12;
  if(done >= total) return '';
  if(!c.lastSessionDate) return 'Aucune séance';
  const last = new Date(c.lastSessionDate);
  const diff = Math.floor((Date.now() - last.getTime()) / (1000*60*60*24));
  if(diff > ALERT_DAYS) return `${diff}j sans coaching`;
  if(diff > WARN_DAYS) return `${diff}j depuis dernier`;
  return '';
}

// ── RENDER ──
function render(){
  if(_currentView === 'kanban') renderKanban();
  else renderList();
}

function renderKanban(){
  const progs = ['BP 12 Mois - 12C','BP 12 Mois - 24C','BP 6 Mois - 6C','Elite - 12 Mois - 24C'];
  const colors = ['col-badge-green','col-badge-orange','col-badge-purple','col-badge-teal'];
  const emojis = ['📗','📙','📕','⭐'];
  
  const kanban = document.getElementById('kanbanView');
  kanban.innerHTML = progs.map((prog,i)=>{
    const items = _filtered.filter(c=>c.programme===prog);
    return `<div class="kanban-col">
      <div class="kanban-col-head">
        <div class="col-title">${emojis[i]} ${prog}</div>
        <span class="col-count ${colors[i]}">${items.length}</span>
      </div>
      <div class="kanban-cards">${items.length?items.map(c=>renderCard(c)).join(''):'<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">Aucun client</div>'}</div>
    </div>`;
  }).join('');
}

function renderCard(c){
  const done = c.nbCoachingsFaits||0;
  const total = c.nbCoachingsTotal||12;
  const pct = Math.min(done/total*100,100);
  const alert = getAlertStatus(c);
  const alertText = getAlertText(c);
  const isInactive = c.statut === 'inactif';
  const barColor = isInactive ? '#94a3b8' : (pct>=100?'var(--green)':pct>=50?'var(--blue-main)':pct>=25?'var(--orange)':'var(--red)');
  const lastCoach = (c.sessions||[]).filter(s=>s.coach&&s.statut==='fait').pop();
  
  // Quota for viewed month
  const q = getQuotaStatus(c, _viewYear, _viewMonth);
  const quotaCls = isInactive ? 'done' : q.status;
  const quotaIcon = isInactive ? '⚫' : (q.status==='ok'?'✅':q.status==='partial'?'🟡':q.status==='empty'?'❌':'✔️');
  
  return `<div class="client-card ${isInactive ? 'inactive' : (alert==='alert'?'alert':alert==='warning'?'warning':'')}" onclick="openDetail('${c._id}')">
    <div class="cc-top">
      <div class="cc-name">${c.nom}</div>
      ${isInactive
        ? `<span class="cc-status-badge inactive">⚫ Inactif</span>`
        : (lastCoach?`<div class="cc-coach">${lastCoach.coach}</div>`:'')
      }
    </div>
    ${c.activite?`<div class="cc-activite">${c.activite}</div>`:''}
    <div class="cc-progress">
      <div class="cc-progress-label"><span>Programme</span><span>${done} / ${total}</span></div>
      <div class="cc-bar"><div class="cc-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
    </div>
    ${!isInactive ? `<div class="cc-quota ${quotaCls}">
      <span>${quotaIcon}</span>
      <span>Ce mois : ${q.label}</span>
      ${q.status==='done'?'<span style="margin-left:auto;font-size:10px">Programme terminé</span>':'<span style="margin-left:auto;font-size:10px">coaching/mois</span>'}
    </div>` : `<div class="cc-quota done" style="background:#f1f5f9;color:#64748b">
      <span>⚫</span><span>Contrat terminé — non renouvelé</span>
    </div>`}
    <div class="cc-bottom">
      <div class="cc-date">📅 ${c.lastSessionDate?formatDate(c.lastSessionDate):'—'}</div>
      ${!isInactive && alert==='alert'?`<div class="cc-alert-badge">🔴 ${alertText}</div>`:!isInactive && alert==='warning'?`<div class="cc-warn-badge">🟡 ${alertText}</div>`:''}
    </div>
  </div>`;
}

function renderList(){
  const body = document.getElementById('listBody');
  body.innerHTML = _filtered.map(c=>{
    const done=c.nbCoachingsFaits||0, total=c.nbCoachingsTotal||12;
    const pct=Math.min(done/total*100,100);
    const isInactive = c.statut === 'inactif';
    const barColor=isInactive?'#94a3b8':(pct>=100?'var(--green)':pct>=50?'var(--blue-main)':'var(--orange)');
    const alert=getAlertStatus(c);
    const q=getQuotaStatus(c,_viewYear,_viewMonth);
    const qIcon=q.status==='ok'?'✅':q.status==='partial'?'🟡':q.status==='empty'?'❌':'✔️';
    const qColor=q.status==='ok'?'var(--green)':q.status==='empty'?'var(--red)':q.status==='partial'?'var(--orange)':'var(--muted)';
    return `<tr class="${isInactive?'inactive-row':''}" onclick="openDetail('${c._id}')">
      <td class="name-cell">${c.nom} ${isInactive?'<span class="cc-status-badge inactive" style="vertical-align:middle">⚫ Inactif</span>':''}</td>
      <td>${c.programme}</td>
      <td>${done}/${total} <div class="progress-mini"><div class="progress-mini-fill" style="width:${pct}%;background:${barColor}"></div></div></td>
      <td>${isInactive?'<span style="color:#94a3b8;font-weight:600">— Inactif</span>':`<span style="color:${qColor};font-weight:700">${qIcon} ${q.label}</span>`}</td>
      <td>${c.lastSessionDate?formatDate(c.lastSessionDate):'—'}</td>
      <td>${isInactive?'<span style="color:#64748b;font-weight:700">⚫ Inactif</span>':alert==='alert'?'<span style="color:var(--red);font-weight:700">🔴 En retard</span>':alert==='warning'?'<span style="color:var(--orange);font-weight:700">🟡 Attention</span>':'<span style="color:var(--green);font-weight:700">✅ OK</span>'}</td>
    </tr>`;
  }).join('');
}

// ── VIEW SWITCH ──
function setView(v, btn){
  _currentView = v;
  document.querySelectorAll('.view-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('kanbanView').style.display = v==='kanban'?'flex':'none';
  document.getElementById('listView').classList.toggle('active', v==='list');
  render();
}

// ── DETAIL PANEL ──
function openDetail(id){
  const c = _clients.find(x=>x._id===id);
  if(!c) return;
  const done=c.nbCoachingsFaits||0, total=c.nbCoachingsTotal||12;
  const pct=Math.min(done/total*100,100);
  const barColor=pct>=100?'var(--green)':pct>=50?'var(--blue-main)':'var(--orange)';
  const alert=getAlertStatus(c);
  const alertText=getAlertText(c);
  const sessions=(c.sessions||[]).sort((a,b)=>a.numero-b.numero);
  
  // Quota
  const q = getQuotaStatus(c, _viewYear, _viewMonth);
  const qHistory = getQuotaHistory(c);
  const qBadgeCls = q.status==='ok'?'ok':q.status==='partial'?'partial':q.status==='empty'?'empty':q.status==='done'?'done':'ok';
  const qBarPct = q.max>0 ? Math.min(q.used/q.max*100,100) : 0;
  const qBarColor = q.status==='ok'?'var(--green)':q.status==='partial'?'var(--orange)':'var(--red)';
  
  const panel = document.getElementById('detailPanel');
  panel.innerHTML = `
    <div class="dp-header">
      <div class="dp-header-top">
        <div class="dp-name">🎓 ${c.nom}</div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-outline btn-sm" onclick="editClient('${id}')">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="deleteClient('${id}')">🗑</button>
          <button class="dp-close" onclick="closeDetail()">✕</button>
        </div>
      </div>
      <div class="dp-meta">
        <span class="dp-badge" style="background:var(--blue-ghost);color:var(--blue-main)">${c.programme}</span>
        ${c.activite?`<span class="dp-badge" style="background:#f0fdf4;color:var(--green)">${c.activite}</span>`:''}
        ${c.dateEntree?`<span class="dp-badge" style="background:#faf5ff;color:var(--purple)">Depuis ${formatDate(c.dateEntree)}</span>`:''}
      </div>
      <div class="dp-info-grid">
        <div class="dp-info"><div class="dp-info-label">Email</div><div class="dp-info-val">${c.email||'—'}</div></div>
        <div class="dp-info"><div class="dp-info-label">Téléphone</div><div class="dp-info-val">${c.tel||'—'}</div></div>
      </div>
      ${c.clientNotes?`<div style="margin:10px 0 0;padding:10px 14px;background:#fffbeb;border-radius:10px;border-left:3px solid var(--orange);font-size:12px;line-height:1.7;color:var(--text);white-space:pre-wrap"><span style="font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px">📌 Notes</span>${escHtml(c.clientNotes)}</div>`:''}
    </div>

    ${alert==='alert'?`<div class="dp-alert-box red">🔴 ${alertText} — Relancez ce client !</div>`:alert==='warning'?`<div class="dp-alert-box orange">🟡 ${alertText}</div>`:`<div class="dp-alert-box green">✅ Client à jour</div>`}

    <!-- STATUT ACTIF / INACTIF -->
    <div class="status-toggle-wrap">
      <div>
        <div class="status-toggle-label">${c.statut === 'inactif' ? '⚫ Client inactif' : '🟢 Client actif'}</div>
        <div class="status-toggle-sub">${c.statut === 'inactif' ? 'Contrat terminé — non renouvelé' : 'Contrat en cours'}</div>
      </div>
      <label class="toggle-switch" title="Changer le statut">
        <input type="checkbox" ${c.statut !== 'inactif' ? 'checked' : ''} onchange="toggleClientStatus('${id}', this.checked)"/>
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="drive-scan-bar" id="driveScanBar">
      <span>📁</span>
      <span id="driveScanLabel">${_driveToken?'Drive connecté — ':'Connectez Drive pour lier les résumés Gemini'}</span>
      ${_driveToken?
        `<button class="btn-drive" id="driveScanBtn-${id}" onclick="scanDriveForClient('${id}')">🔍 Chercher les résumés</button>`
        :`<button class="btn-drive" onclick="connectDriveThen('${id}')">🔗 Connecter Google Drive</button>`
      }
      <span id="driveScanStatus-${id}" style="margin-left:auto;font-size:11px;opacity:.8"></span>
    </div>
    <div class="drive-scan-log" id="driveScanLog-${id}"></div>

    <!-- QUOTA SECTION -->
    <div class="dp-quota-section" style="margin-top:12px">
      <div class="dp-quota-header">
        <div class="dp-quota-title">📊 Quota coaching du mois</div>
        <div class="dp-quota-badge ${qBadgeCls}">${q.status==='done'?'✔️ Terminé':q.label}</div>
      </div>
      ${q.status!=='done'?`
        <div class="dp-quota-bar"><div class="dp-quota-bar-fill" style="width:${qBarPct}%;background:${qBarColor}"></div></div>
        <div class="dp-quota-sub">
          ${q.used} coaching(s) fait(s) ce mois sur ${q.max} prévu(s)
          ${q.status==='ok'?' — ✅ Quota atteint !':q.status==='partial'?' — 🟡 Il reste des séances à planifier':' — ❌ Aucun coaching ce mois'}
        </div>
      `:`<div class="dp-quota-sub">Le programme est terminé (${done}/${total} séances faites)</div>`}
      <div class="dp-quota-history">
        <span style="font-size:10px;font-weight:700;color:var(--muted);padding:4px 0">Historique :</span>
        ${qHistory.map(m=>`<div class="dp-quota-month ${m.status}">${m.label} ${m.status==='ok'?'✅':m.status==='partial'?'🟡':'❌'} ${m.label!=='Terminé'?m.used+'/'+m.max:''}</div>`).join('')}
      </div>
    </div>

    <div class="dp-progress-section">
      <div class="dp-progress-header">
        <div class="dp-progress-title">📈 Avancement du programme</div>
        <div class="dp-progress-count">${done} / ${total}</div>
      </div>
      <div class="dp-bar"><div class="dp-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--muted)">
        <span>${pct>=100?'✅ Programme terminé':Math.round(pct)+'% complété'}</span>
        <span>${Math.max(total-done,0)} séance(s) restante(s)</span>
      </div>
    </div>

    <div class="dp-sessions">
      <div class="dp-sessions-head">
        <div class="dp-sessions-title">📅 Années de coaching</div>
        <button class="btn btn-primary btn-sm" onclick="openAddYearModal('${id}')">🔄 Renouveler</button>
      </div>

      <!-- PLAN D'ACTION -->
      <div class="dp-plan-section" style="margin: 0 0 16px">
        <div class="dp-plan-header">
          <div class="dp-plan-title">🎯 Plan d'action client
            ${c.planAction ? '<span class="dp-plan-badge">✅ Défini</span>' : '<span class="dp-plan-badge" style="background:#fef3c7;color:#92400e">À compléter</span>'}
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            ${c.planAction
              ? `<button class="dp-plan-edit-btn" onclick="togglePlanEdit('${id}')">✏️ Modifier</button>`
              : `<button class="dp-plan-edit-btn" onclick="togglePlanEdit('${id}')">+ Rédiger</button>`
            }
          </div>
        </div>
        <div class="dp-plan-body">
          <div id="planView-${id}">
            ${c.planAction
              ? `<div class="dp-plan-content">${escHtml(c.planAction)}</div>`
              : `<div class="dp-plan-empty">
                  <div class="dp-plan-empty-icon">🎯</div>
                  <div>Aucun plan d'action défini</div>
                  <div class="dp-plan-empty-sub">Rédigez le plan manuellement ou générez-le avec l'IA</div>
                  <button class="dp-plan-btn-ia">
                    ✨ Générer avec l'IA
                    <span class="soon-tag">Bientôt</span>
                  </button>
                </div>`
            }

const GAPI_CLIENT_ID = '1050138912851-3ffa6ol1cet9mjgg5fkp3ijdji0b7k4u.apps.googleusercontent.com';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.readonly';
let _driveToken = null;

// Connect Drive then scan for a specific client
function connectDriveThen(clientId){
  const client = google.accounts.oauth2.initTokenClient({
    client_id: GAPI_CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: (resp) => {
      if(resp.error){ showToast('Erreur Drive: '+resp.error,'error'); return; }
      _driveToken = resp.access_token;
      showToast('✅ Drive connecté !','success');
      // Re-render panel to show scan button
      openDetail(clientId);
      // Auto-scan
      setTimeout(()=>scanDriveForClient(clientId), 500);
    }
  });
  client.requestAccessToken();
}

// Drive API helper
async function driveApi(url){
  const res = await fetch(url, {headers:{'Authorization':'Bearer '+_driveToken}});
  if(!res.ok) return null;
  return res.json();
}

// Fetch doc text content (first 2000 chars for summary)
async function fetchDocText(docId){
  try{
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files/${docId}/export?mimeType=text/plain`,
      {headers:{'Authorization':'Bearer '+_driveToken}}
    );
    if(!res.ok) return '';
    return (await res.text()).substring(0, 2500);
  }catch(e){ return ''; }
}

// Extract summary from Gemini doc text
function extractSummary(text){
  if(!text) return '';
  const lines = text.split('\n').map(l=>l.trim()).filter(l=>l);
  let summary = '';
  let capture = false;
  for(const line of lines){
    if(/^(résumé|summary|vue d.ensemble|overview)/i.test(line)){ capture=true; continue; }
    if(/^(détails|details|transcription|étapes suivantes|next steps|action items)/i.test(line)){
      if(summary) break;
      capture=true; continue;
    }
    if(capture && line.length>5){
      summary += (summary?'\n':'')+line;
      if(summary.length>600) break;
    }
  }
  if(!summary) summary = lines.filter(l=>l.length>20).slice(0,4).join('\n');
  return summary.substring(0,800);
}

// Normalize name for matching
function normName(n){
  return (n||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ').trim();
}

// Scan Drive for a specific client
async function scanDriveForClient(clientId){
  const c = _clients.find(x=>x._id===clientId);
  if(!c || !_driveToken) return;

  const btn = document.getElementById('driveScanBtn-'+clientId);
  const status = document.getElementById('driveScanStatus-'+clientId);
  const logEl = document.getElementById('driveScanLog-'+clientId);
  if(btn){ btn.disabled=true; btn.textContent='⏳ Recherche...'; }
  logEl.classList.add('show');
  logEl.innerHTML = '';
  const log = (msg,cls='') => { logEl.innerHTML+=`<div class="${cls}">${msg}</div>`; logEl.scrollTop=logEl.scrollHeight; };

  // Build search terms from client name
  const nameParts = normName(c.nom).split(' ').filter(p=>p.length>2);
  log(`🔍 Recherche pour "${c.nom}" → mots-clés: ${nameParts.join(', ')}`);

  // Search Drive by client name parts
  let allDocs = [];
  for(const part of nameParts){
    const q = encodeURIComponent(`name contains '${part}' and mimeType='application/vnd.google-apps.document'`);
    const res = await driveApi(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,createdTime)&pageSize=50&orderBy=createdTime desc&supportsAllDrives=true&includeItemsFromAllDrives=true`);
    if(res && res.files){
      res.files.forEach(f=>{
        if(!allDocs.find(d=>d.id===f.id)) allDocs.push(f);
      });
    }
  }
  log(`📄 ${allDocs.length} document(s) trouvé(s) dans Drive`);

  // Filter: only coaching/rdv docs that match this client
  const matchedDocs = [];
  for(const doc of allDocs){
    const title = doc.name||'';
    // Must be a coaching or RDV doc
    if(!/coaching 1:1|rdv urgent|post inscription/i.test(title)) continue;
    // Skip group coaching
    if(/coaching gr/i.test(title)) continue;

    // Extract client name from title
    const withMatch = title.match(/with\s+(.+?)\s*-\s*\d{4}/i) || title.match(/with\s+(.+?)(?:\s*-|$)/i);
    if(!withMatch) continue;
    const driveClient = normName(withMatch[1]);

    // Check if this Drive doc matches our client
    const clientNorm = normName(c.nom);
    const clientParts = clientNorm.split(' ').filter(p=>p.length>2);
    const driveParts = driveClient.split(' ').filter(p=>p.length>2);

    let score = 0;
    for(const dp of driveParts){
      for(const cp of clientParts){
        if(cp===dp) score+=10;
        else if(cp.startsWith(dp)||dp.startsWith(cp)) score+=5;
        else if(cp.includes(dp)||dp.includes(cp)) score+=3;
      }
    }
    if(score < 5) continue;

    // Extract date
    const dateMatch = title.match(/(\d{4})\/(\d{2})\/(\d{2})/);
    const date = dateMatch ? `${dateMatch[1]}-${dateMatch[2]}-${dateMatch[3]}` : null;
    const type = /rdv urgent|post inscription/i.test(title) ? 'rdv72h' : 'coaching';

    matchedDocs.push({id:doc.id, title, date, type, url:`https://docs.google.com/document/d/${doc.id}/edit`});
    log(`✅ Match: "${title.substring(0,70)}..." (${date})`,'dsl-match');
  }

  if(matchedDocs.length===0){
    log('⚠️ Aucun document trouvé pour ce client','dsl-skip');
    if(btn){ btn.disabled=false; btn.textContent='🔍 Chercher les résumés'; }
    if(status) status.textContent='Aucun doc trouvé';
    return;
  }

  // Link docs to sessions (avoid duplicates)
  let linked=0, unlinked=0;
  let changed = false;
  const sessions = c.sessions||[];
  if(!c.driveDocs) c.driveDocs = [];

  for(const doc of matchedDocs){
    // Check if already linked (by URL)
    const alreadyInSession = sessions.some(s=>s.driveUrl===doc.url);
    const alreadyInUnlinked = c.driveDocs.some(d=>d.docUrl===doc.url);
    if(alreadyInSession || alreadyInUnlinked){
      log(`⏩ Déjà lié: ${doc.date}`,'dsl-skip');
      continue;
    }

    // Fetch summary
    log(`📝 Récupération résumé ${doc.date}...`);
    const text = await fetchDocText(doc.id);
    const summary = extractSummary(text);

    // Try to match to a session by date (±2 days)
    let matchedSession = null;
    if(doc.date){
      const dDate = new Date(doc.date);
      matchedSession = sessions.find(s=>{
        if(!s.date || s.driveUrl) return false; // skip already linked
        const sDate = new Date(s.date);
        return Math.abs(dDate-sDate) < 86400000*2;
      });
    }

    if(matchedSession){
      matchedSession.driveUrl = doc.url;
      matchedSession.driveTitle = doc.title;
      matchedSession.driveSummary = summary;
      if(!matchedSession.resume || matchedSession.resume.length<20){
        matchedSession.resume = summary;
      }
      linked++;
      changed = true;
      log(`🔗 Lié à session #${matchedSession.numero} (${matchedSession.date})`,'dsl-match');
    } else {
      // Store as unlinked
      c.driveDocs.push({
        date: doc.date,
        docUrl: doc.url,
        docTitle: doc.title,
        type: doc.type,
        summary: summary
      });
      unlinked++;
      changed = true;
      log(`📎 Pas de session correspondante → stocké comme non-lié (${doc.date})`,'dsl-skip');
    }
  }

  // Save
  if(changed){
    try{
      await window._setDoc(window._doc(window._db,'clients',clientId),c);
      log(`💾 Sauvegardé: ${linked} liés, ${unlinked} non-liés`,'dsl-match');
    }catch(e){
      log(`❌ Erreur sauvegarde: ${e.message}`,'dsl-err');
    }
  }

  if(btn){ btn.disabled=false; btn.textContent='🔍 Chercher les résumés'; }
  if(status) status.textContent=`✅ ${linked} liés · ${unlinked} non-liés`;

  // Refresh detail panel
  if(linked>0 || unlinked>0){
    showToast(`✅ ${linked} résumé(s) lié(s), ${unlinked} doc(s) trouvé(s)`,'success');
    setTimeout(()=>openDetail(clientId), 300);
  }
}

  }catch(e){showToast('Erreur: '+e.message,'error');}
}
function syncYearStats(c){
  var done=0,dates=[];
  (c.years||[]).forEach(function(y){
    (y.sessions||[]).forEach(function(s){if(s.statut==='fait'){done++;if(s.date)dates.push(s.date);}});
  });
  c.nbCoachingsFaits=done;
  c.lastSessionDate=dates.length?dates.sort().pop():'';
}
async function markYrDone(clientId,yi,sn){
  var c=_clients.find(function(x){return x._id===clientId;});
  if(!c||!c.years||!c.years[yi])return;
  var s=(c.years[yi].sessions||[]).find(function(x){return x.numero===sn;});
  if(!s)return;
  var k='y'+yi+'s'+sn;
  var date=(document.getElementById('qsd-'+k)||{}).value||'';
  var coach=normalizeCoach((document.getElementById('qsc-'+k)||{}).value||'');
  if(!date||!coach){showToast('Date et coach requis','error');return;}
  s.date=date;s.coach=coach;s.statut='fait';
  s.visioUrl=((document.getElementById('qsv-'+k)||{}).value||'').trim();
  s.driveUrl=((document.getElementById('qsg-'+k)||{}).value||'').trim();
  s.resume=((document.getElementById('qsr-'+k)||{}).value||'').trim();
  s.devoirs=((document.getElementById('qsdv-'+k)||{}).value||'').trim();
  s.notes=((document.getElementById('qsn-'+k)||{}).value||'').trim();
  syncYearStats(c);
  try{
    await window._setDoc(window._doc(window._db,'clients',clientId),c);
    showToast('Séance validée !','success');applyFilters();openDetail(clientId);
  }catch(e){showToast('Erreur: '+e.message,'error');}
}
async function unmarkYrDone(clientId,yi,sn){
  var c=_clients.find(function(x){return x._id===clientId;});
  if(!c||!c.years||!c.years[yi])return;
  var s=(c.years[yi].sessions||[]).find(function(x){return x.numero===sn;});
  if(!s)return;
  if(!confirm('Marquer comme non faite ?'))return;
  s.statut='planifie';
  syncYearStats(c);
  try{
    await window._setDoc(window._doc(window._db,'clients',clientId),c);
    showToast('Séance annulée','success');applyFilters();openDetail(clientId);
  }catch(e){showToast('Erreur: '+e.message,'error');}
}
function toggleYrEdit(clientId,yi,sn){
  var k='y'+yi+'s'+sn;
  var f=document.getElementById('sedit-'+k);
  if(f)f.classList.toggle('show');
}
async function saveYrEdit(clientId,yi,sn){
  var c=_clients.find(function(x){return x._id===clientId;});
  if(!c||!c.years||!c.years[yi])return;
  var s=(c.years[yi].sessions||[]).find(function(x){return x.numero===sn;});
  if(!s)return;
  var k='y'+yi+'s'+sn;
  var g=function(id){return (document.getElementById(id)||{}).value||'';};
  s.date=g('sed-'+k);s.coach=normalizeCoach(g('sec-'+k));
  s.visioUrl=g('sev-'+k).trim();s.driveUrl=g('seg-'+k).trim();
  s.resume=g('ser-'+k).trim();s.devoirs=g('sedv-'+k).trim();s.notes=g('sen-'+k).trim();
  syncYearStats(c);
  try{
    await window._setDoc(window._doc(window._db,'clients',clientId),c);
    showToast('Séance mise à jour !','success');applyFilters();openDetail(clientId);
  }catch(e){showToast('Erreur: '+e.message,'error');}
}

// renderYearTabs — pure string concat, zero template literals
function renderYearTabs(c,id){
  var years=c.years||[];
  var COACHES=['Mickael','Edouard','Emily','Adrien'];
  var h='';

  // ── Tabs bar ──
  h+='<div class="year-tabs-bar">';
  if(years.length===0){
    h+='<span style="font-size:12px;color:var(--muted);padding:8px 0">Aucune année — cliquez sur Renouveler</span>';
  } else {
    for(var yi=0;yi<years.length;yi++){
      var y=years[yi];
      var yd=(y.sessions||[]).filter(function(s){return s.statut==='fait';}).length;
      var yt=(y.sessions||[]).length;
      var act=yi===years.length-1;
      h+='<button class="year-tab-btn'+(act?' active':'')+'" id="yt-'+id+'-'+yi+'"';
      h+=' onclick="switchYearTab(\''+id+'\','+yi+')">';
      h+=escHtml(y.label||('Année '+(yi+1)));
      h+='<span class="year-tab-count">'+yd+'/'+yt+'</span></button>';
    }
  }
  h+='</div>';

  // ── Year panels ──
  for(var yi=0;yi<years.length;yi++){
    var y=years[yi];
    var act=yi===years.length-1;
    var yd=(y.sessions||[]).filter(function(s){return s.statut==='fait';}).length;
    var yt=(y.sessions||[]).length;
    var pct=yt>0?Math.round(yd/yt*100):0;
    var barC=pct>=100?'var(--green)':pct>=50?'var(--blue-main)':pct>=25?'var(--orange)':'var(--red)';
    var sess=(y.sessions||[]).slice().sort(function(a,b){return a.numero-b.numero;});

    h+='<div class="year-panel'+(act?'':' year-panel-hidden')+'" id="yp-'+id+'-'+yi+'">';

    // Year header
    h+='<div class="year-header-row">';
    h+='<div><div style="font-size:13px;font-weight:800">'+escHtml(y.label||('Année '+(yi+1)))+'</div>';
    if(y.startDate)h+='<div style="font-size:11px;color:var(--muted)">Depuis '+formatDate(y.startDate)+(y.notes?' · '+escHtml(y.notes):'')+'</div>';
    h+='</div><div style="display:flex;align-items:center;gap:10px">';
    h+='<span style="font-size:11px;font-weight:700;color:var(--muted)">'+yd+'/'+yt+' · '+pct+'%</span>';
    h+='<div class="year-prog-bar"><div class="year-prog-fill" style="width:'+pct+'%;background:'+barC+'"></div></div>';
    h+='</div></div>';

    // Add session button + form
    h+='<div style="display:flex;justify-content:flex-end;margin-bottom:10px">';
    h+='<button class="btn btn-primary btn-sm" onclick="toggleNsfYear('+yi+')">+ Séance</button></div>';
    h+='<div class="new-session-form" id="nsfy-'+yi+'" style="margin-bottom:12px">';
    h+='<div style="font-size:11px;font-weight:700;color:var(--blue-main);margin-bottom:8px;text-transform:uppercase">➕ Nouvelle séance</div>';
    h+='<div class="nsf-row"><div class="nsf-field"><label>Date *</label><input type="date" id="nsfy-date-'+yi+'"/></div>';
    h+='<div class="nsf-field"><label>Coach *</label><input id="nsfy-coach-'+yi+'" placeholder="Emily, Mickael..."/></div></div>';
    h+='<div class="nsf-field" style="margin-bottom:8px"><label>Résumé</label><textarea id="nsfy-resume-'+yi+'" rows="2"></textarea></div>';
    h+='<div class="nsf-field" style="margin-bottom:8px"><label>Devoirs</label><textarea id="nsfy-devoirs-'+yi+'" rows="2"></textarea></div>';
    h+='<div style="display:flex;gap:8px;justify-content:flex-end">';
    h+='<button class="btn btn-outline btn-sm" onclick="toggleNsfYear('+yi+')">Annuler</button>';
    h+='<button class="btn btn-green btn-sm" onclick="addSessToYear(\''+id+'\','+yi+')">💾 Enregistrer</button></div></div>';

    // Sessions
    for(var si=0;si<sess.length;si++){
      var s=sess[si];
      var done=s.statut==='fait';
      var is72=s.numero===0||s.type==='rdv72h';
      var k='y'+yi+'s'+s.numero;
      var numL=is72?'72H':'#'+s.numero;
      var numC=done?'done':(is72?'rdv72h':'planifie');

      h+='<div class="session-item '+(done?'done':'planifie')+'" id="sess-'+k+'">';
      h+='<div class="si-header" onclick="toggleSession(this)">';
      h+='<div class="si-left"><div class="si-num '+numC+'">'+numL+'</div>';
      h+='<div class="si-info"><div class="si-title">'+escHtml(s.titre||'')+'</div>';
      h+='<div class="si-meta">';
      h+=s.date?'<span>📅 '+formatDate(s.date)+'</span>':'<span style="color:#94a3b8;font-style:italic">📅 À planifier</span>';
      h+=s.coach?'<span>👤 '+escHtml(s.coach)+'</span>':'<span style="color:#94a3b8;font-style:italic">👤 À assigner</span>';
      if(s.visioUrl||s.driveUrl)h+='<span style="color:var(--blue-main)">🔗</span>';
      if(s.notes)h+='<span style="color:var(--orange)">📝</span>';
      h+='</div></div></div>';

      h+='<div class="si-right">';
      if(done){
        h+='<button class="btn btn-danger btn-xs" style="font-size:10px;padding:3px 7px" onclick="event.stopPropagation();unmarkYrDone(\''+id+'\','+yi+','+s.numero+')">↩</button>';
        h+='<span style="color:var(--green);font-size:11px;font-weight:700">✅ Fait</span>';
      } else {
        h+='<button class="btn btn-outline btn-xs" onclick="event.stopPropagation();markYrDone(\''+id+'\','+yi+','+s.numero+')">✓ Fait</button>';
      }
      h+='<span class="si-chevron">▼</span></div></div>';

      // Body
      h+='<div class="si-body">';
      if(done){
        if(s.visioUrl||s.driveUrl||s.resumeUrl){
          h+='<div class="si-links">';
          if(s.visioUrl)h+='<a class="si-link-pill visio" href="'+s.visioUrl+'" target="_blank">🎥 Visio ↗</a>';
          if(s.driveUrl||s.resumeUrl)h+='<a class="si-link-pill gdoc" href="'+(s.driveUrl||s.resumeUrl)+'" target="_blank">📄 Doc ↗</a>';
          h+='</div>';
        }
        if(s.resume||s.driveSummary)h+='<div class="si-resume">'+escHtml(s.resume||s.driveSummary||'')+'</div>';
        if(s.devoirs)h+='<div class="si-devoirs"><b>📝 Devoirs :</b><br>'+escHtml(s.devoirs)+'</div>';
        if(s.notes)h+='<div class="si-notes"><div class="si-notes-label">📌 Notes</div>'+escHtml(s.notes)+'</div>';
        h+='<button class="si-edit-btn" onclick="toggleYrEdit(\''+id+'\','+yi+','+s.numero+')">✏️ Modifier</button>';
        h+='<div class="si-edit-form" id="sedit-'+k+'">';
        h+='<div class="si-edit-row">';
        h+='<div class="si-edit-field"><label>Date</label><input type="date" id="sed-'+k+'" value="'+(s.date||'')+'"/></div>';
        h+='<div class="si-edit-field"><label>Coach</label><select id="sec-'+k+'">';
        for(var ci=0;ci<COACHES.length;ci++)h+='<option'+(s.coach===COACHES[ci]?' selected':'')+'>'+COACHES[ci]+'</option>';
        h+='</select></div></div>';
        h+='<div class="si-edit-row">';
        h+='<div class="si-edit-field"><label>🎥 Visio</label><input type="url" id="sev-'+k+'" value="'+(s.visioUrl||'')+'"/></div>';
        h+='<div class="si-edit-field"><label>📄 Google Doc</label><input type="url" id="seg-'+k+'" value="'+(s.driveUrl||s.resumeUrl||'')+'"/></div>';
        h+='</div>';
        h+='<div class="si-edit-field" style="margin-bottom:8px"><label>Résumé</label><textarea id="ser-'+k+'">'+escHtml(s.resume||'')+'</textarea></div>';
        h+='<div class="si-edit-field" style="margin-bottom:8px"><label>Devoirs</label><textarea id="sedv-'+k+'" rows="2">'+escHtml(s.devoirs||'')+'</textarea></div>';
        h+='<div class="si-edit-field" style="margin-bottom:4px"><label>Notes</label><textarea id="sen-'+k+'" rows="2">'+escHtml(s.notes||'')+'</textarea></div>';
        h+='<div class="si-edit-save-row">';
        h+='<button class="si-edit-btn" onclick="toggleYrEdit(\''+id+'\','+yi+','+s.numero+')">Annuler</button>';
        h+='<button class="btn btn-primary btn-sm" onclick="saveYrEdit(\''+id+'\','+yi+','+s.numero+')">💾 Sauvegarder</button></div></div>';
      } else {
        h+='<div style="padding:8px 0 4px">';
        h+='<div class="si-edit-row" style="margin-bottom:8px">';
        h+='<div class="si-edit-field"><label>Date</label><input type="date" id="qsd-'+k+'"/></div>';
        h+='<div class="si-edit-field"><label>Coach</label><select id="qsc-'+k+'"><option value="">Choisir...</option>';
        for(var ci=0;ci<COACHES.length;ci++)h+='<option>'+COACHES[ci]+'</option>';
        h+='</select></div></div>';
        h+='<div class="si-edit-row" style="margin-bottom:8px">';
        h+='<div class="si-edit-field"><label>🎥 Visio</label><input type="url" id="qsv-'+k+'" placeholder="https://meet..."/></div>';
        h+='<div class="si-edit-field"><label>📄 Google Doc</label><input type="url" id="qsg-'+k+'" placeholder="https://docs..."/></div>';
        h+='</div>';
        h+='<div class="si-edit-field" style="margin-bottom:8px"><label>Résumé</label><textarea id="qsr-'+k+'" rows="2"></textarea></div>';
        h+='<div class="si-edit-field" style="margin-bottom:8px"><label>Devoirs</label><textarea id="qsdv-'+k+'" rows="2"></textarea></div>';
        h+='<div class="si-edit-field" style="margin-bottom:8px"><label>Notes</label><textarea id="qsn-'+k+'" rows="2"></textarea></div>';
        h+='<div style="display:flex;gap:8px;justify-content:flex-end">';
        h+='<button class="btn btn-green btn-xs" onclick="markYrDone(\''+id+'\','+yi+','+s.numero+')">✅ Valider</button></div></div>';
      }
      h+='</div></div>'; // si-body, session-item
    }
    h+='</div>'; // year-panel
  }
  return h;
}

// ── EDIT CLIENT ──
function editClient(id){
  const c = _clients.find(x=>x._id===id);
  if(!c) return;

  document.getElementById('ec-id').value       = id;
  document.getElementById('ec-nom').value      = c.nom       || '';
  document.getElementById('ec-email').value    = c.email     || '';
  document.getElementById('ec-tel').value      = c.tel       || '';
  document.getElementById('ec-activite').value = c.activite  || '';
  document.getElementById('ec-date').value     = c.dateEntree|| '';
  document.getElementById('ec-notes').value    = c.clientNotes || '';

  const sel = document.getElementById('ec-programme');
  sel.value = c.programme || 'BP 12 Mois - 12C';

  document.getElementById('editClientModal').classList.add('show');
}

function closeEditClientModal(){
  document.getElementById('editClientModal').classList.remove('show');
}

async function saveEditClient(){
  const id  = document.getElementById('ec-id').value;
  const nom = document.getElementById('ec-nom').value.trim();
  if(!nom){ showToast('Nom requis','error'); return; }

  const c = _clients.find(x=>x._id===id);
  if(!c) return;

  // Update only info fields — preserve sessions, plan, etc.
  c.nom          = nom;
  c.email        = document.getElementById('ec-email').value.trim();
  c.tel          = document.getElementById('ec-tel').value.trim();
  c.activite     = document.getElementById('ec-activite').value.trim();
  c.programme    = document.getElementById('ec-programme').value;
  c.dateEntree   = document.getElementById('ec-date').value;
  c.clientNotes  = document.getElementById('ec-notes').value.trim();

  // Update nbCoachingsTotal if programme changed
  const nbMatch = c.programme.match(/(\d+)C/);
  if(nbMatch) c.nbCoachingsTotal = parseInt(nbMatch[1]);

  try{
    await window._setDoc(window._doc(window._db,'clients',id), c);
    closeEditClientModal();
    applyFilters();
    openDetail(id);
    showToast('✅ Informations mises à jour !','success');
  }catch(e){ showToast('Erreur: '+e.message,'error'); }
}

window.editClient=editClient;
