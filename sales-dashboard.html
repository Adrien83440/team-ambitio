/* === sales-data.js inlined === */
/**
 * sales-data.js — Data Store + Firebase + Utilitaires
 * Les données "a" (actuelles) viennent de Firestore en temps réel.
 * Les données "p" (projections) sont les références fixes.
 */

/* ═══════════════════════════════════════════════════════════
   PROJECTIONS FIXES — modifier ici pour changer les cibles
═══════════════════════════════════════════════════════════ */
const PROJECTIONS = {
  closing: {
    s1: { calls:20, lives:15, offres:10, closes:4, contracte:24000, collecte:2000 },
    s2: { calls:20, lives:15, offres:10, closes:4, contracte:24000, collecte:2000 },
    s3: { calls:20, lives:15, offres:10, closes:4, contracte:24000, collecte:2000 },
    s4: { calls:20, lives:15, offres:10, closes:4, contracte:24000, collecte:2000 },
    livesP:0.75, offresP:0.667, engP:0.5, cOffP:0.4, cCallP:0.2, cashLive:666.7,
  },
  setting: {
    s1: { leads:130, calls:375, decroches:45, propRdv:10, sets:5, presents:4, closes:4 },
    s2: { leads:130, calls:375, decroches:45, propRdv:10, sets:5, presents:4, closes:4 },
    s3: { leads:130, calls:375, decroches:45, propRdv:10, sets:5, presents:4, closes:4 },
    s4: { leads:130, calls:375, decroches:45, propRdv:10, sets:5, presents:4, closes:4 },
    decrochesP:0.12, engP:0.222, setP:0.5, showupP:0.8, cCallP:0.8,
  },
};

/* ═══════════════════════════════════════════════════════════
   DATA STORE
═══════════════════════════════════════════════════════════ */
const DB = {
  months: ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'],

  // Données brutes saisies (remplacées par Firestore)
  _raw: {
    closing: {
      s1: { calls:8,  lives:2, offres:1, closes:0, hc:0, fu:0, contracte:0,     collecte:0    },
      s2: { calls:8,  lives:4, offres:2, closes:2, hc:2, fu:0, contracte:12000, collecte:1000 },
      s3: { calls:9,  lives:6, offres:3, closes:1, hc:1, fu:0, contracte:5400,  collecte:400  },
      s4: { calls:9,  lives:7, offres:2, closes:0, hc:0, fu:0, contracte:1800,  collecte:200  },
    },
    setting: {
      s1: { leads:133, calls:231, decroches:56, propRdv:13, sets:9,  presents:2, closes:0 },
      s2: { leads:191, calls:324, decroches:54, propRdv:17, sets:11, presents:4, closes:2 },
      s3: { leads:127, calls:178, decroches:38, propRdv:16, sets:11, presents:4, closes:1 },
      s4: { leads:100, calls:150, decroches:28, propRdv:15, sets:10, presents:4, closes:0 },
    },
    deals: [
      { client:'Julie Berchoux',     email:'julieberchoux@icloud.com',         offre:'BP 12', type:'Closing', date:'24/01/2026', cHT:6000, coHT:500,  comm:500, bonus:0, notes:'Setting après self booking', ok:true  },
      { client:'Corinne Alaga',      email:'contact@lestabliersgourmands.com', offre:'BP 12', type:'Setting', date:'27/01/2026', cHT:null, coHT:null,  comm:125, bonus:0, notes:"Setting d'un close d'Elodie", ok:true  },
      { client:'Belinda Giangiulio', email:'lesdemoisellesduvrac@gmail.com',   offre:'BP 12', type:'Closing', date:'30/01/2026', cHT:6000, coHT:500,  comm:500, bonus:0, notes:'Setting no-booking',         ok:true  },
      { client:'Cecile Auneau',      email:'domcecile@gmail.com',              offre:'BP 12', type:'Closing', date:'09/02/2026', cHT:6000, coHT:500,  comm:500, bonus:0, notes:'Setting no-booking',         ok:true  },
      { client:'Justine Biton',      email:'lephildesidees@hotmail.com',       offre:'BP 12', type:'Closing', date:'09/02/2026', cHT:6000, coHT:500,  comm:500, bonus:0, notes:'Setting no-booking',         ok:true  },
    ],
  },

  // Calculé depuis _raw
  closing: null,
  setting: null,
  commissions: {
    'Janvier 2026': { contracte:12000, collecte:0,    totalComm:0,    statut:'Validé',     deals:[] },
    'Février 2026': { contracte:24000, collecte:2000, totalComm:2125, statut:'En attente', deals:[] },
    'Mars 2026':    { contracte:0,     collecte:0,    totalComm:1625, statut:'En attente', deals:[] },
  },
  team: {
    week: [
      { name:'Guillaume', role:'Closing + Setting', color:'#ef4444', contracte:33020, collecte:3342,  calls:23, lives:20, offres:14, closes:6, showup:0.87, txOffre:0.70,  txTransfoShow:0.30,  txTransfoOffre:0.429, caCall:1435.7 },
      { name:'Elodie',    role:'Closing',           color:'#60a5fa', contracte:22748, collecte:13629, calls:29, lives:24, offres:19, closes:7, showup:0.83, txOffre:0.792, txTransfoShow:0.292, txTransfoOffre:0.368, caCall:784.4  },
    ],
    month: [
      { name:'Guillaume', role:'Closing + Setting', color:'#ef4444', contracte:48469, collecte:4686, calls:56, lives:33, offres:17, closes:9, showup:0.589, txOffre:0.515, txTransfoShow:0.273, txTransfoOffre:0.529, caCall:721.3 },
      { name:'Elodie',    role:'Closing',           color:'#60a5fa', contracte:34069, collecte:3966, calls:46, lives:28, offres:13, closes:7, showup:0.609, txOffre:0.464, txTransfoShow:0.25,  txTransfoOffre:0.538, caCall:617.2 },
    ],
  },

  // Recalcule toutes les métriques depuis _raw
  compute() {
    const rc = DB._raw.closing;
    const rs = DB._raw.setting;
    const pc = PROJECTIONS.closing;
    const ps = PROJECTIONS.setting;

    const sumC  = k => ['s1','s2','s3','s4'].reduce((t,w) => t + (rc[w][k]||0), 0);
    const sumS  = k => ['s1','s2','s3','s4'].reduce((t,w) => t + (rs[w][k]||0), 0);
    const projC = k => ['s1','s2','s3','s4'].reduce((t,w) => t + (pc[w][k]||0), 0);
    const projS = k => ['s1','s2','s3','s4'].reduce((t,w) => t + (ps[w][k]||0), 0);

    const ca=sumC('calls'), la=sumC('lives'), oa=sumC('offres'), cla=sumC('closes');
    const cta=sumC('contracte'), cola=sumC('collecte');
    const cp=projC('calls'), lp=projC('lives'), op=projC('offres'), clp=projC('closes');
    const ctp=projC('contracte'), colp=projC('collecte');

    DB.closing = {
      mois: {
        calls:     {a:ca,  p:cp  },
        lives:     {a:la,  p:lp  },
        offres:    {a:oa,  p:op  },
        closes:    {a:cla, p:clp },
        hc:        {a:sumC('hc'), p:clp},
        fu:        {a:sumC('fu'), p:0  },
        contracte: {a:cta, p:ctp },
        collecte:  {a:cola,p:colp},
        livesP:  {a:ca>0  ? la/ca   : 0, p:pc.livesP  },
        offresP: {a:la>0  ? oa/la   : 0, p:pc.offresP },
        engP:    {a:oa>0  ? cla/oa  : 0, p:pc.engP    },
        cOffP:   {a:oa>0  ? cla/oa  : 0, p:pc.cOffP   },
        cCallP:  {a:ca>0  ? cla/ca  : 0, p:pc.cCallP  },
        cashLive:{a:la>0  ? cta/la  : 0, p:pc.cashLive},
        atteinte: ctp>0 ? cta/ctp : 0,
        delta:    Math.max(0, ctp-cta),
      },
      s1: DB._cw('s1'), s2: DB._cw('s2'), s3: DB._cw('s3'), s4: DB._cw('s4'),
    };

    const sca=sumS('calls'), da=sumS('decroches'), pa=sumS('propRdv');
    const sa=sumS('sets'), pra=sumS('presents'), sca2=sumS('closes');

    DB.setting = {
      mois: {
        leads:     {a:sumS('leads'),  p:projS('leads')    },
        calls:     {a:sca,            p:projS('calls')    },
        decroches: {a:da,             p:projS('decroches')},
        propRdv:   {a:pa,             p:projS('propRdv')  },
        sets:      {a:sa,             p:projS('sets')     },
        presents:  {a:pra,            p:projS('presents') },
        closes:    {a:sca2,           p:projS('closes')   },
        decrochesP:{a:sca>0?da/sca:0,  p:ps.decrochesP },
        engP:      {a:da>0 ?pa/da:0,    p:ps.engP       },
        setP:      {a:pa>0 ?sa/pa:0,    p:ps.setP       },
        showupP:   {a:sa>0 ?pra/sa:0,   p:ps.showupP    },
        cCallP:    {a:sca>0?sca2/sca:0, p:ps.cCallP     },
      },
      s1: DB._sw('s1'), s2: DB._sw('s2'), s3: DB._sw('s3'), s4: DB._sw('s4'),
    };

    // Sync deals dans commissions
    try {
      const cmk = (typeof localStorage !== 'undefined' && localStorage.getItem('sales_month')) || 'Février 2026';
      if (DB.commissions[cmk]) DB.commissions[cmk].deals = DB._raw.deals;
    } catch(e) {}
  },

  _cw(w) {
    const d=DB._raw.closing[w], p=PROJECTIONS.closing[w];
    return {
      calls:{a:d.calls||0,p:p.calls}, lives:{a:d.lives||0,p:p.lives},
      offres:{a:d.offres||0,p:p.offres}, closes:{a:d.closes||0,p:p.closes},
      hc:{a:d.hc||0,p:p.closes}, fu:{a:d.fu||0,p:0},
      contracte:{a:d.contracte||0,p:p.contracte}, collecte:{a:d.collecte||0,p:p.collecte},
    };
  },
  _sw(w) {
    const d=DB._raw.setting[w], p=PROJECTIONS.setting[w];
    return {
      leads:{a:d.leads||0,p:p.leads}, calls:{a:d.calls||0,p:p.calls},
      decroches:{a:d.decroches||0,p:p.decroches}, propRdv:{a:d.propRdv||0,p:p.propRdv},
      sets:{a:d.sets||0,p:p.sets}, presents:{a:d.presents||0,p:p.presents},
      closes:{a:d.closes||0,p:p.closes},
    };
  },
};

DB.compute();

/* ═══════════════════════════════════════════════════════════
   FIREBASE — couche temps réel
   Initialisé après que firebase SDK soit chargé + auth ready
═══════════════════════════════════════════════════════════ */
const Fire = {
  db:  null,
  uid: null,
  _unsubs: [],

  init(firestore, uid) {
    Fire.db  = firestore;
    Fire.uid = uid;
  },

  _key(label) {
    const p = label.split(' ');
    const m = DB.months.indexOf(p[0]);
    return `${p[1]}-${String(m+1).padStart(2,'0')}`;
  },

  // Écoute en temps réel les données d'un user pour un mois
  watchUser(userId, monthLabel, callback) {
    if (!Fire.db) return () => {};
    const ref = Fire.db
      .collection('saisies').doc(userId)
      .collection('mois').doc(Fire._key(monthLabel));
    const unsub = ref.onSnapshot(snap => callback(snap.exists ? snap.data() : null));
    Fire._unsubs.push(unsub);
    return unsub;
  },

  // Sauvegarde une semaine de closing
  async saveClosing(userId, monthLabel, week, data) {
    if (!Fire.db) throw new Error('Firebase non init');
    const ref = Fire.db.collection('saisies').doc(userId)
      .collection('mois').doc(Fire._key(monthLabel));
    await ref.set({ closing: { [week]: data } }, { merge: true });
  },

  // Sauvegarde une semaine de setting
  async saveSetting(userId, monthLabel, week, data) {
    if (!Fire.db) throw new Error('Firebase non init');
    const ref = Fire.db.collection('saisies').doc(userId)
      .collection('mois').doc(Fire._key(monthLabel));
    await ref.set({ setting: { [week]: data } }, { merge: true });
  },

  // Sauvegarde un deal (append)
  async saveDeal(userId, monthLabel, deal) {
    if (!Fire.db) throw new Error('Firebase non init');
    const ref = Fire.db.collection('saisies').doc(userId)
      .collection('mois').doc(Fire._key(monthLabel));
    const snap = await ref.get();
    const deals = snap.exists ? (snap.data().deals || []) : [];
    deals.push({ ...deal, _ts: Date.now() });
    await ref.set({ deals }, { merge: true });
  },

  // Applique un snapshot Firestore dans DB puis recalcule
  apply(data) {
    if (!data) return;
    if (data.closing) ['s1','s2','s3','s4'].forEach(w => {
      if (data.closing[w]) Object.assign(DB._raw.closing[w], data.closing[w]);
    });
    if (data.setting) ['s1','s2','s3','s4'].forEach(w => {
      if (data.setting[w]) Object.assign(DB._raw.setting[w], data.setting[w]);
    });
    if (data.deals) DB._raw.deals = data.deals;
    DB.compute();
    document.dispatchEvent(new CustomEvent('db:updated'));
  },

  stop() { Fire._unsubs.forEach(u => u()); Fire._unsubs = []; },
};

/* ═══════════════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════════════ */
const U = {
  euro:  v => v == null ? '—' : '€\u202f' + Number(v).toLocaleString('fr-FR'),
  pct:   v => v == null ? '—' : (v * 100).toFixed(1) + '%',
  num:   v => v == null ? '—' : Number(v).toLocaleString('fr-FR'),
  pp:  (a, p) => p > 0 ? Math.min((a / p) * 100, 200) : 0,
  ppv: (a, p) => p > 0 ? ((a / p) * 100).toFixed(0) + '%' : '—',
  cb:  (a, p) => { const r = p > 0 ? a / p : 0; return r >= 1 ? '#34d399' : r >= 0.65 ? '#f59e0b' : '#ef4444'; },
  g:   id => document.getElementById(id),
  getCurrentMonth: () => (typeof localStorage !== 'undefined' && localStorage.getItem('sales_month')) || 'Février 2026',
  getCurrentUser:  () => ({
    uid:  window._currentUserUid  || localStorage.getItem('ambitio_uid')  || 'guillaume',
    name: window._currentUserName || localStorage.getItem('ambitio_name') || 'Guillaume',
    role: window._currentRole     || localStorage.getItem('ambitio_role') || 'sales',
  }),

  progRow: (label, a, p, isEuro = false) => {
    const col = U.cb(a, p);
    return `<div class="pr">
      <div class="pr-l">${label}</div>
      <div class="pr-track"><div class="pr-fill" style="width:${Math.min(U.pp(a,p),100)}%;background:${col}"></div></div>
      <div class="pr-val">${isEuro ? `${U.euro(a)} / ${U.euro(p)}` : `${a} / ${p}`}</div>
      <div class="pr-pct" style="color:${col}">${U.ppv(a,p)}</div>
    </div>`;
  },

  kpiCard: ({ label, val, sub, rawA, proj, color='#ef4444', pct:fp }) => {
    const pc = fp!=null ? fp : (proj!=null ? U.pp(rawA??0, proj) : null);
    return `<div class="kpi" style="--kc:${color}">
      <div class="kpi-label">${label}</div>
      <div class="kpi-value">${val}</div>
      ${sub ? `<div class="kpi-sub">${sub}</div>` : ''}
      ${pc!=null ? `<div class="kpi-prog">
        <div class="kpi-prog-row"><span>Atteinte</span><span>${pc.toFixed(0)}%</span></div>
        <div class="kpi-prog-track"><div class="kpi-prog-fill" style="width:${Math.min(pc,100)}%;background:${color}"></div></div>
      </div>` : ''}
    </div>`;
  },

  funnelStep: (label, val, max, isFirst=false, isEuro=false) => {
    const ratio = max > 0 ? val / max : 0;
    return `<div class="fs">
      <div class="fs-label">${label}</div>
      <div class="fs-track"><div class="fs-fill" style="width:${Math.min(ratio*100,100)}%"></div></div>
      <div class="fs-val">${isEuro ? U.euro(val) : val}</div>
      <div class="fs-rate">${!isFirst ? U.pct(ratio) : ''}</div>
    </div>`;
  },

  weekCard: (label, mainVal, mainLabel, minis, isCurrent, dateRange) => `
    <div class="wc${isCurrent?' wc-active':''}">
      <div class="wc-label">${label}</div>
      ${dateRange ? `<div class="wc-dates">${dateRange}</div>` : ''}
      <div class="wc-main">${mainVal}</div>
      <div class="wc-sub">${mainLabel}</div>
      <div class="wc-grid">${minis.map(m=>`
        <div class="wc-mini">
          <div class="wc-mini-v"${m.color?` style="color:${m.color}"`:''} >${m.val}</div>
          <div class="wc-mini-l">${m.label}</div>
        </div>`).join('')}</div>
    </div>`,

  barChart: (labels, actuals, projs, unit='') => {
    const mx = Math.max(...actuals, ...projs, 1);
    return `<div class="chart-legend">
        <span class="cl-dot cl-real"></span>Réel
        <span class="cl-dot cl-proj" style="margin-left:14px"></span>Projection
      </div>
      <div class="chart-bars">
        ${labels.map((l,i)=>`<div class="chart-col">
          <div class="chart-pair">
            <div class="chart-bar bar-real" style="height:${(actuals[i]/mx*100).toFixed(1)}%" title="${actuals[i]}${unit}"></div>
            <div class="chart-bar bar-proj" style="height:${(projs[i]/mx*100).toFixed(1)}%" title="Proj:${projs[i]}${unit}"></div>
          </div>
          <div class="chart-lbl">${l}</div>
        </div>`).join('')}
      </div>`;
  },

  toast: (msg, type='success') => {
    let t = document.getElementById('_toast');
    if (!t) { t=document.createElement('div'); t.id='_toast'; document.body.appendChild(t); }
    const s = { success:'background:#1a2e1a;border:1px solid rgba(52,211,153,.3);color:#6ee7b7', error:'background:#2e1a1a;border:1px solid rgba(239,68,68,.3);color:#fca5a5', info:'background:#1a1a2e;border:1px solid rgba(96,165,250,.3);color:#93c5fd' };
    t.style.cssText = `position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(0);font-size:12px;font-weight:600;padding:9px 18px;border-radius:10px;z-index:9999;opacity:1;transition:all .28s;white-space:nowrap;font-family:var(--font-b);${s[type]||s.success}`;
    t.textContent = msg;
    clearTimeout(t._t);
    t._t = setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(20px)'; }, 2800);
  },
};


/* ═══════════════════════════════════════════════════════════
   SEMAINES RÉELLES — calcule les vraies dates lun→dim
═══════════════════════════════════════════════════════════ */
function getMonthWeeks(monthLabel) {
  // monthLabel = "Février 2026"
  const MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin',
                     'Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const parts = monthLabel.split(' ');
  const month = MONTHS_FR.indexOf(parts[0]); // 0-based
  const year  = parseInt(parts[1]);
  if (month === -1 || isNaN(year)) return [];

  const DAYS_FR = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const pad = n => String(n).padStart(2,'0');

  function fmt(d) {
    // "14/02"
    return pad(d.getDate()) + '/' + pad(d.getMonth()+1);
  }
  function fmtShort(d) {
    // "14 fév"
    const M = ['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'];
    return d.getDate() + ' ' + M[d.getMonth()];
  }

  // Premier lundi qui touche le mois (peut être dans le mois précédent)
  const firstOfMonth = new Date(year, month, 1);
  const dayOfWeek = firstOfMonth.getDay(); // 0=Sun,1=Mon...
  const daysToMonday = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  let monday = new Date(year, month, 1 + daysToMonday);

  const weeks = [];
  while (true) {
    const sunday = new Date(monday.getTime() + 6 * 86400000);
    // Inclure si la semaine chevauche le mois cible
    if (monday.getMonth() === month || sunday.getMonth() === month) {
      weeks.push({
        id:    's' + (weeks.length + 1),
        label: 'S' + (weeks.length + 1),
        start: monday,
        end:   sunday,
        range: fmt(monday) + ' → ' + fmt(sunday),       // "26/01 → 01/02"
        short: fmtShort(monday) + ' – ' + fmtShort(sunday), // "26 jan – 1 fév"
        tab:   fmt(monday) + '→' + fmt(sunday),
      });
    }
    monday = new Date(monday.getTime() + 7 * 86400000);
    if (monday.getMonth() !== month && monday.getMonth() !== (month === 0 ? 11 : month - 1)) {
      if (monday.getMonth() !== month) break;
    }
    if (monday.getFullYear() > year + 1) break;
    if (weeks.length >= 6) break;
  }
  return weeks;
}

window.DB=DB; window.U=U; window.Fire=Fire; window.PROJECTIONS=PROJECTIONS;
window.getMonthWeeks=getMonthWeeks;

.yr-kpi::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--kc,var(--red2)); }
.yr-kpi-label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
.yr-kpi-val { font-size:28px; font-weight:800; font-family:var(--font-d); color:var(--text); line-height:1.1; }
.yr-kpi-sub { font-size:11px; color:var(--muted); margin-top:4px; }

.yr-row { display:grid; grid-template-columns:1fr 1fr; gap:13px; margin-bottom:18px; }
.yr-row-3 { display:grid; grid-template-columns:2fr 1fr; gap:13px; margin-bottom:18px; }

.yr-card { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius2); padding:20px; }
.yr-card-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.yr-card-title { font-size:14px; font-weight:700; color:var(--text); }
.yr-card-badge { font-size:10px; font-weight:700; color:var(--muted); background:var(--bg4); padding:4px 10px; border-radius:20px; border:1px solid var(--border); }

/* Month grid for drill-down */
.month-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:6px; margin-bottom:18px; }
.month-btn { padding:8px 4px; border:1px solid var(--border); border-radius:8px; background:var(--bg2); color:var(--muted); font-size:11px; font-weight:600; text-align:center; cursor:pointer; transition:all .15s; font-family:var(--font-b); }
.month-btn:hover { background:var(--bg4); color:var(--text); border-color:var(--border2); }
.month-btn.active { background:rgba(239,68,68,.12); color:var(--red2); border-color:rgba(239,68,68,.3); }
.month-btn.has-data { color:var(--text); }
.month-btn.has-data::after { content:''; display:block; width:4px; height:4px; border-radius:50%; background:var(--green); margin:3px auto 0; }

/* Chart area */
.yr-chart { position:relative; height:220px; display:flex; align-items:flex-end; gap:4px; padding:0 4px 24px; }
.yr-chart-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; position:relative; }
.yr-chart-bar { width:100%; border-radius:4px 4px 0 0; min-height:2px; transition:height .4s cubic-bezier(.4,0,.2,1); cursor:pointer; position:relative; }
.yr-chart-bar:hover { filter:brightness(1.3); }
.yr-chart-bar.bar-ct { background:linear-gradient(180deg,#ef4444,#991b1b); }
.yr-chart-bar.bar-co { background:linear-gradient(180deg,#34d399,#065f46); }
.yr-chart-lbl { position:absolute; bottom:0; font-size:9px; color:var(--muted); font-weight:600; white-space:nowrap; }
.yr-chart-tooltip { position:absolute; bottom:100%; left:50%; transform:translateX(-50%); background:var(--bg); border:1px solid var(--border2); padding:6px 10px; border-radius:8px; font-size:11px; color:var(--text); white-space:nowrap; pointer-events:none; opacity:0; transition:opacity .15s; z-index:10; }
.yr-chart-col:hover .yr-chart-tooltip { opacity:1; }

.chart-legend-row { display:flex; gap:16px; justify-content:center; margin-bottom:12px; }
.chart-legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--muted); font-weight:600; }
.chart-legend-dot { width:10px; height:10px; border-radius:3px; }

/* Member table */
.yr-table { width:100%; border-collapse:collapse; }
.yr-table th { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; padding:8px 10px; text-align:left; border-bottom:1px solid var(--border); }
.yr-table td { font-size:13px; font-weight:600; color:var(--text); padding:10px; border-bottom:1px solid rgba(255,255,255,.03); font-family:var(--font-m); }
.yr-table td:first-child { font-family:var(--font-b); }
.yr-table tr:last-child td { border-bottom:none; }
.yr-table .tr-total td { color:var(--gold); font-weight:800; border-top:1px solid var(--border2); }
.member-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:8px; vertical-align:middle; }

/* Funnel horizontal */
.yr-funnel { display:flex; flex-direction:column; gap:8px; }
.yr-funnel-row { display:flex; align-items:center; gap:10px; }
.yr-funnel-label { width:80px; font-size:11px; font-weight:700; color:var(--muted); text-align:right; flex-shrink:0; }
.yr-funnel-track { flex:1; height:28px; background:var(--bg); border-radius:6px; overflow:hidden; position:relative; }
.yr-funnel-fill { height:100%; border-radius:6px; background:linear-gradient(90deg,#991b1b,#ef4444); display:flex; align-items:center; padding-left:10px; font-size:11px; font-weight:700; color:white; min-width:fit-content; transition:width .5s cubic-bezier(.4,0,.2,1); }
.yr-funnel-val { font-size:12px; font-weight:700; color:var(--text); font-family:var(--font-m); width:60px; text-align:right; flex-shrink:0; }
.yr-funnel-rate { font-size:11px; color:var(--muted); width:50px; flex-shrink:0; }

/* Drill-down overlay */
.drill-panel { display:none; }
.drill-panel.show { display:block; }
.drill-back { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700; color:var(--red3); cursor:pointer; margin-bottom:14px; padding:6px 14px; border-radius:8px; background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.2); transition:all .15s; }
.drill-back:hover { background:rgba(239,68,68,.14); }

@media(max-width:1100px) {
  .yr-grid { grid-template-columns:repeat(2,1fr); }
  .yr-row, .yr-row-3 { grid-template-columns:1fr; }
  .month-grid { grid-template-columns:repeat(4,1fr); }
}
@media(max-width:600px) {
  .yr-grid { grid-template-columns:1fr; }
  .month-grid { grid-template-columns:repeat(3,1fr); }
}

<script>
/* ═══════════════════════════════════════════════════════════
   DASHBOARD SYNTHÈSE ANNUELLE
═══════════════════════════════════════════════════════════ */

const MONTHS_FR = DB.months;
let _year = 2026;
let _drillMonth = null; // null = vue année, sinon "Février 2026"

function yearLabel() { return String(_year); }
function prevYear() { _year--; _drillMonth = null; refreshYear(); }
function nextYear() { _year++; _drillMonth = null; refreshYear(); }

/* ── Charger TOUTES les données de l'année depuis Firestore ── */
async function loadYearData() {
  const db = (typeof Fire !== 'undefined' && Fire.db) ? Fire.db : null;
  const results = {}; // { "Janvier 2026": { guillaume: {...}, elodie: {...} } }

  for (let m = 0; m < 12; m++) {
    const monthKey = MONTHS_FR[m] + ' ' + _year;
    const fsKey = `${_year}-${String(m+1).padStart(2,'0')}`;
    results[monthKey] = {};

    for (const uid of SYNC_UIDS) {
      let data = null;

      // Firestore
      if (db) {
        try {
          const ref = db.collection('saisies').doc(uid).collection('mois').doc(fsKey);
          const snap = await ref.get();
          if (snap.exists) {
            const raw = snap.data();
            data = { closing: null, setting: null };
            if (raw.closing_total) data.closing = raw.closing_total;
            else if (raw.closing) {
              const t = {};
              ['calls','lives','offres','closes','hardClose','followUp','contracte','collecte'].forEach(k => t[k] = 0);
              ['s1','s2','s3','s4','s5'].forEach(w => {
                if (raw.closing[w]) Object.keys(t).forEach(k => t[k] += (raw.closing[w][k] || 0));
              });
              data.closing = t;
            }
            if (raw.setting_total) data.setting = raw.setting_total;
            else if (raw.setting) {
              const t = {};
              ['leads','calls','decroches','propRdv','sets','presents','closes','collecte'].forEach(k => t[k] = 0);
              ['s1','s2','s3','s4','s5'].forEach(w => {
                if (raw.setting[w]) Object.keys(t).forEach(k => t[k] += (raw.setting[w][k] || 0));
              });
              data.setting = t;
            }
          }
        } catch(e) { console.warn('[year] Firestore err', uid, monthKey, e.message); }
      }

      // Fallback localStorage
      if (!data) {
        let cls = null, set = null;
        try { const v = localStorage.getItem(`closing_${uid}_${monthKey}`); cls = v ? JSON.parse(v) : null; } catch(e){}
        try { const v = localStorage.getItem(`setting_${uid}_${monthKey}`); set = v ? JSON.parse(v) : null; } catch(e){}
        if (cls || set) {
          data = { closing: null, setting: null };
          if (cls) {
            if (cls._total) data.closing = cls._total;
            else {
              const t = {};
              ['calls','lives','offres','closes','hardClose','followUp','contracte','collecte'].forEach(k => t[k] = 0);
              ['s1','s2','s3','s4','s5'].forEach(w => {
                if (cls[w]) Object.keys(t).forEach(k => t[k] += (cls[w][k] || 0));
              });
              data.closing = t;
            }
          }
          if (set) {
            if (set._total) data.setting = set._total;
            else {
              const t = {};
              ['leads','calls','decroches','propRdv','sets','presents','closes','collecte'].forEach(k => t[k] = 0);
              ['s1','s2','s3','s4','s5'].forEach(w => {
                if (set[w]) Object.keys(t).forEach(k => t[k] += (set[w][k] || 0));
              });
              data.setting = t;
            }
          }
        }
      }

      results[monthKey][uid] = data;
    }
  }
  return results;
}

/* ── Agréger les données par année ── */
function aggregateYear(yearData) {
  const totals = { calls:0, lives:0, offres:0, closes:0, contracte:0, collecte:0, sets:0, presents:0, settingCalls:0, settingCloses:0 };
  const perMonth = {};
  const perMember = {};

  SYNC_UIDS.forEach(uid => { perMember[uid] = { ...totals }; });

  for (let m = 0; m < 12; m++) {
    const mk = MONTHS_FR[m] + ' ' + _year;
    const mData = yearData[mk] || {};
    const mt = { calls:0, lives:0, offres:0, closes:0, contracte:0, collecte:0, sets:0, presents:0, settingCalls:0, settingCloses:0, hasData:false };

    SYNC_UIDS.forEach(uid => {
      const d = mData[uid];
      if (!d) return;
      if (d.closing) {
        mt.hasData = true;
        ['calls','lives','offres','closes','contracte','collecte'].forEach(k => {
          const v = d.closing[k] || 0;
          mt[k] += v;
          totals[k] += v;
          perMember[uid][k] += v;
        });
      }
      if (d.setting) {
        mt.hasData = true;
        mt.sets += (d.setting.sets || 0); totals.sets += (d.setting.sets || 0); perMember[uid].sets += (d.setting.sets || 0);
        mt.presents += (d.setting.presents || 0); totals.presents += (d.setting.presents || 0); perMember[uid].presents += (d.setting.presents || 0);
        mt.settingCalls += (d.setting.calls || 0); totals.settingCalls += (d.setting.calls || 0); perMember[uid].settingCalls += (d.setting.calls || 0);
        mt.settingCloses += (d.setting.closes || 0); totals.settingCloses += (d.setting.closes || 0); perMember[uid].settingCloses += (d.setting.closes || 0);
      }
    });
    perMonth[mk] = mt;
  }
  return { totals, perMonth, perMember };
}

/* ── RENDER ── */
let _yearData = null;
let _agg = null;

async function refreshYear() {
  document.getElementById('year-lbl').textContent = yearLabel();
  _yearData = await loadYearData();
  _agg = aggregateYear(_yearData);
  renderYear();
}

function renderYear() {
  if (!_agg) return;
  const { totals, perMonth, perMember } = _agg;
  const T = totals;

  // Month grid
  const monthBtns = MONTHS_FR.map((m, i) => {
    const mk = m + ' ' + _year;
    const md = perMonth[mk];
    const hasData = md && md.hasData;
    const isActive = _drillMonth === mk;
    const short = m.slice(0, 3);
    return `<div class="month-btn${isActive ? ' active' : ''}${hasData ? ' has-data' : ''}" onclick="drillMonth('${mk}')">${short}</div>`;
  }).join('');
  document.getElementById('month-grid').innerHTML = monthBtns;

  // Drill or year view
  document.getElementById('year-view').style.display = _drillMonth ? 'none' : '';
  document.getElementById('drill-panel').className = _drillMonth ? 'drill-panel show' : 'drill-panel';

  if (_drillMonth) {
    renderDrill(_drillMonth);
    return;
  }

  // KPIs
  document.getElementById('yr-kpis').innerHTML = [
    { label:'Contracté', val:U.euro(T.contracte), sub:`${T.closes} closes`, color:'#ef4444' },
    { label:'Collecté', val:U.euro(T.collecte), sub:T.contracte > 0 ? `${(T.collecte/T.contracte*100).toFixed(0)}% du contracté` : '', color:'#34d399' },
    { label:'Calls Closing', val:U.num(T.calls), sub:`${T.lives} lives · ${T.offres} offres`, color:'#f59e0b' },
    { label:'Setting', val:`${T.sets} sets`, sub:`${T.presents} présents · ${T.settingCalls} calls`, color:'#60a5fa' },
  ].map(k => `<div class="yr-kpi" style="--kc:${k.color}"><div class="yr-kpi-label">${k.label}</div><div class="yr-kpi-val">${k.val}</div><div class="yr-kpi-sub">${k.sub}</div></div>`).join('');

  // Chart — Contracté & Collecté par mois
  document.getElementById('chart-title').textContent = `Contracté & Collecté — ${_year}`;
  const chartMonths = [];
  MONTHS_FR.forEach((m, i) => {
    const mk = m + ' ' + _year;
    const md = perMonth[mk];
    if (md && md.hasData) chartMonths.push({ label: m.slice(0, 3), ct: md.contracte, co: md.collecte, mk });
  });
  const maxChart = Math.max(...chartMonths.map(c => c.ct), 1);
  document.getElementById('yr-chart').innerHTML = chartMonths.map(c => {
    const hCt = (c.ct / maxChart * 180).toFixed(0);
    const hCo = (c.co / maxChart * 180).toFixed(0);
    return `<div class="yr-chart-col" onclick="drillMonth('${c.mk}')">
      <div class="yr-chart-tooltip">${c.label}: ${U.euro(c.ct)} ct · ${U.euro(c.co)} co</div>
      <div style="display:flex;align-items:flex-end;gap:2px;height:190px;width:100%">
        <div class="yr-chart-bar bar-ct" style="height:${hCt}px;flex:1"></div>
        <div class="yr-chart-bar bar-co" style="height:${hCo}px;flex:1"></div>
      </div>
      <div class="yr-chart-lbl">${c.label}</div>
    </div>`;
  }).join('');

  // Funnel
  const maxF = Math.max(T.calls, 1);
  const funnelData = [
    { label:'Calls', val:T.calls, rate:'' },
    { label:'Lives', val:T.lives, rate:T.calls > 0 ? U.pct(T.lives/T.calls) : '' },
    { label:'Offres', val:T.offres, rate:T.lives > 0 ? U.pct(T.offres/T.lives) : '' },
    { label:'Closes', val:T.closes, rate:T.offres > 0 ? U.pct(T.closes/T.offres) : '' },
    { label:'Contracté', val:U.euro(T.contracte), rate:'' },
    { label:'Collecté', val:U.euro(T.collecte), rate:T.contracte > 0 ? U.pct(T.collecte/T.contracte) : '' },
  ];
  const funnelVals = [T.calls, T.lives, T.offres, T.closes, T.contracte/1000, T.collecte/1000];
  const maxFV = Math.max(...funnelVals, 1);
  document.getElementById('yr-funnel').innerHTML = funnelData.map((f, i) => {
    const w = (funnelVals[i] / maxFV * 100).toFixed(0);
    return `<div class="yr-funnel-row">
      <div class="yr-funnel-label">${f.label}</div>
      <div class="yr-funnel-track"><div class="yr-funnel-fill" style="width:${Math.max(w, 3)}%"></div></div>
      <div class="yr-funnel-val">${f.val}</div>
      <div class="yr-funnel-rate">${f.rate}</div>
    </div>`;
  }).join('');

  // Team table
  const members = SYNC_MEMBERS.map(m => {
    const d = perMember[m.uid] || {};
    return { ...m, ...d, showup: d.calls > 0 ? (d.lives/d.calls) : 0, txClose: d.offres > 0 ? (d.closes/d.offres) : 0 };
  });
  const tTotal = members.reduce((t, m) => {
    ['calls','lives','offres','closes','contracte','collecte','sets','presents'].forEach(k => t[k] = (t[k]||0) + (m[k]||0));
    return t;
  }, {});

  document.getElementById('yr-team').innerHTML = `<table class="yr-table">
    <thead><tr><th>Membre</th><th>Calls</th><th>Lives</th><th>Offres</th><th>Closes</th><th>Contracté</th><th>Collecté</th><th>Show-up</th></tr></thead>
    <tbody>
      ${members.map(m => `<tr>
        <td><span class="member-dot" style="background:${m.color}"></span>${m.name}</td>
        <td>${m.calls}</td><td>${m.lives}</td><td>${m.offres}</td><td>${m.closes}</td>
        <td>${U.euro(m.contracte)}</td><td>${U.euro(m.collecte)}</td>
        <td>${U.pct(m.showup)}</td>
      </tr>`).join('')}
      <tr class="tr-total">
        <td>Total</td>
        <td>${tTotal.calls||0}</td><td>${tTotal.lives||0}</td><td>${tTotal.offres||0}</td><td>${tTotal.closes||0}</td>
        <td>${U.euro(tTotal.contracte||0)}</td><td>${U.euro(tTotal.collecte||0)}</td>
        <td>${tTotal.calls > 0 ? U.pct(tTotal.lives/tTotal.calls) : '—'}</td>
      </tr>
    </tbody>
  </table>`;

  // Months detail table
  const monthsWithData = MONTHS_FR.filter((m, i) => {
    const mk = m + ' ' + _year;
    return perMonth[mk] && perMonth[mk].hasData;
  });
  document.getElementById('yr-months-table').innerHTML = `<table class="yr-table">
    <thead><tr><th>Mois</th><th>Calls</th><th>Closes</th><th>Contracté</th><th>Collecté</th></tr></thead>
    <tbody>
      ${monthsWithData.map(m => {
        const mk = m + ' ' + _year;
        const d = perMonth[mk];
        return `<tr style="cursor:pointer" onclick="drillMonth('${mk}')">
          <td style="color:var(--red3)">${m}</td>
          <td>${d.calls}</td><td>${d.closes}</td>
          <td>${U.euro(d.contracte)}</td><td>${U.euro(d.collecte)}</td>
        </tr>`;
      }).join('')}
      <tr class="tr-total">
        <td>Total ${_year}</td>
        <td>${T.calls}</td><td>${T.closes}</td>
        <td>${U.euro(T.contracte)}</td><td>${U.euro(T.collecte)}</td>
      </tr>
    </tbody>
  </table>`;
}

/* ── DRILL-DOWN MOIS ── */
function drillMonth(mk) {
  _drillMonth = (_drillMonth === mk) ? null : mk;
  renderYear();
}
function closeDrill() {
  _drillMonth = null;
  renderYear();
}

function renderDrill(mk) {
  document.getElementById('drill-year').textContent = _year;
  const mData = _yearData[mk] || {};

  // Agréger les 2 membres pour ce mois
  const T = { calls:0, lives:0, offres:0, closes:0, contracte:0, collecte:0, sets:0, presents:0 };
  const members = [];
  SYNC_MEMBERS.forEach(m => {
    const d = mData[m.uid];
    const entry = { ...m, calls:0, lives:0, offres:0, closes:0, contracte:0, collecte:0, sets:0, presents:0 };
    if (d && d.closing) {
      ['calls','lives','offres','closes','contracte','collecte'].forEach(k => { entry[k] = d.closing[k] || 0; T[k] += entry[k]; });
    }
    if (d && d.setting) {
      entry.sets = d.setting.sets || 0; T.sets += entry.sets;
      entry.presents = d.setting.presents || 0; T.presents += entry.presents;
    }
    members.push(entry);
  });

  // KPIs drill
  document.getElementById('drill-kpis').innerHTML = [
    { label:'Contracté', val:U.euro(T.contracte), sub:`${T.closes} closes`, color:'#ef4444' },
    { label:'Collecté', val:U.euro(T.collecte), sub:T.contracte > 0 ? `${(T.collecte/T.contracte*100).toFixed(0)}%` : '', color:'#34d399' },
    { label:'Calls', val:U.num(T.calls), sub:`${T.lives} lives`, color:'#f59e0b' },
    { label:'Setting', val:`${T.sets} sets`, sub:`${T.presents} présents`, color:'#60a5fa' },
  ].map(k => `<div class="yr-kpi" style="--kc:${k.color}"><div class="yr-kpi-label">${k.label}</div><div class="yr-kpi-val">${k.val}</div><div class="yr-kpi-sub">${k.sub}</div></div>`).join('');

  document.getElementById('drill-funnel-title').textContent = `Funnel — ${mk}`;
  const funnelVals = [T.calls, T.lives, T.offres, T.closes];
  const maxFV = Math.max(...funnelVals, 1);
  document.getElementById('drill-funnel').innerHTML = [
    { label:'Calls', val:T.calls, rate:'' },
    { label:'Lives', val:T.lives, rate:T.calls > 0 ? U.pct(T.lives/T.calls) : '' },
    { label:'Offres', val:T.offres, rate:T.lives > 0 ? U.pct(T.offres/T.lives) : '' },
    { label:'Closes', val:T.closes, rate:T.offres > 0 ? U.pct(T.closes/T.offres) : '' },
  ].map((f, i) => `<div class="yr-funnel-row">
    <div class="yr-funnel-label">${f.label}</div>
    <div class="yr-funnel-track"><div class="yr-funnel-fill" style="width:${Math.max(funnelVals[i]/maxFV*100, 3)}%"></div></div>
    <div class="yr-funnel-val">${f.val}</div>
    <div class="yr-funnel-rate">${f.rate}</div>
  </div>`).join('');

  // Team drill
  document.getElementById('drill-team').innerHTML = `<table class="yr-table">
    <thead><tr><th>Membre</th><th>Calls</th><th>Closes</th><th>Contracté</th><th>Collecté</th><th>Sets</th><th>Show-up</th></tr></thead>
    <tbody>
      ${members.map(m => `<tr>
        <td><span class="member-dot" style="background:${m.color}"></span>${m.name}</td>
        <td>${m.calls}</td><td>${m.closes}</td>
        <td>${U.euro(m.contracte)}</td><td>${U.euro(m.collecte)}</td>
        <td>${m.sets}</td>
        <td>${m.calls > 0 ? U.pct(m.lives/m.calls) : '—'}</td>
      </tr>`).join('')}
      <tr class="tr-total">
        <td>Total</td>
        <td>${T.calls}</td><td>${T.closes}</td>
        <td>${U.euro(T.contracte)}</td><td>${U.euro(T.collecte)}</td>
        <td>${T.sets}</td>
        <td>${T.calls > 0 ? U.pct(T.lives/T.calls) : '—'}</td>
      </tr>
    </tbody>
  </table>`;
}

/* ── INIT ── */
document.addEventListener('DOMContentLoaded', async function() {
  const nm = localStorage.getItem('ambitio_name') || 'Guillaume';
  document.getElementById('tb-nm').textContent = nm;
  document.getElementById('tb-av').textContent = nm[0].toUpperCase();

  // Firebase init
  const _fbUser = U.getCurrentUser();
  if (window.firebase && window.firebase.firestore && !Fire.db) {
    Fire.init(window.firebase.firestore(), _fbUser.uid);
  }

  await refreshYear();
});
</script>
