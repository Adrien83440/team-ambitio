  // Données brutes saisies (remplacées par Firestore)

    },
    deals: [

      { client:'Corinne Alaga',      email:'contact@lestabliersgourmands.com', offre:'BP 12', type:'Setting', date:'27/01/2026', cHT:null, coHT:null,  comm:125, bonus:0, notes:"Setting d'un close d'Elodie", ok:true  },
      { client:'Belinda Giangiulio', email:'lesdemoisellesduvrac@gmail.com',   offre:'BP 12', type:'Closing', date:'30/01/2026', cHT:6000, coHT:500,  comm:500, bonus:0, notes:'Setting no-booking',         ok:true  },
      { client:'Cecile Auneau',      email:'domcecile@gmail.com',              offre:'BP 12', type:'Closing', date:'09/02/2026', cHT:6000, coHT:500,  comm:500, bonus:0, notes:'Setting no-booking',         ok:true  },

  // Calculé depuis _raw

  setting: null,

  team: {

      { name:'Elodie',    role:'Closing',           color:'#60a5fa', contracte:22748, collecte:13629, calls:29, lives:24, offres:19, closes:7, showup:0.83, txOffre:0.792, txTransfoShow:0.292, txTransfoOffre:0.368, caCall:784.4  },
    ],
    month: [
      { name:'Guillaume', role:'Closing + Setting', color:'#ef4444', contracte:48469, collecte:4686, calls:56, lives:33, offres:17, closes:9, showup:0.589, txOffre:0.515, txTransfoShow:0.273, txTransfoOffre:0.529, caCall:721.3 },
      { name:'Elodie',    role:'Closing',           color:'#60a5fa', contracte:34069, collecte:3966, calls:46, lives:28, offres:13, closes:7, showup:0.609, txOffre:0.464, txTransfoShow:0.25,  txTransfoOffre:0.538, caCall:617.2 },

  // Recalcule toutes les métriques depuis _raw
  compute() {
    const rc = DB._raw.closing;
    const rs = DB._raw.setting;
    const pc = PROJECTIONS.closing;
    const ps = PROJECTIONS.setting;

    const sumC  = k => ['s1','s2','s3','s4'].reduce((t,w) => t + (rc[w][k]||0), 0);
    const sumS  = k => ['s1','s2','s3','s4'].reduce((t,w) => t + (rs[w][k]||0), 0);
    const projC = k => ['s1','s2','s3','s4'].reduce((t,w) => t + (pc[w][k]||0), 0);
    const projS = k => ['s1','s2','s3','s4'].reduce((t,w) => t + (ps[w][k]||0), 0);

    const ca=sumC('calls'), la=sumC('lives'), oa=sumC('offres'), cla=sumC('closes');
    const cta=sumC('contracte'), cola=sumC('collecte');
    const cp=projC('calls'), lp=projC('lives'), op=projC('offres'), clp=projC('closes');

    DB.closing = {
      mois: {
        calls:     {a:ca,  p:cp  },
        lives:     {a:la,  p:lp  },
        offres:    {a:oa,  p:op  },
        closes:    {a:cla, p:clp },
        hc:        {a:sumC('hc'), p:clp},
        fu:        {a:sumC('fu'), p:0  },
        contracte: {a:cta, p:ctp },
        collecte:  {a:cola,p:colp},

        offresP: {a:la>0  ? oa/la   : 0, p:pc.offresP },
        engP:    {a:oa>0  ? cla/oa  : 0, p:pc.engP    },
        cOffP:   {a:oa>0  ? cla/oa  : 0, p:pc.cOffP   },
        cCallP:  {a:ca>0  ? cla/ca  : 0, p:pc.cCallP  },
        cashLive:{a:la>0  ? cta/la  : 0, p:pc.cashLive},
        atteinte: ctp>0 ? cta/ctp : 0,
        delta:    Math.max(0, ctp-cta),
      },
      s1: DB._cw('s1'), s2: DB._cw('s2'), s3: DB._cw('s3'), s4: DB._cw('s4'),
    };

    const sca=sumS('calls'), da=sumS('decroches'), pa=sumS('propRdv');
    const sa=sumS('sets'), pra=sumS('presents'), sca2=sumS('closes');

    DB.setting = {
      mois: {
        leads:     {a:sumS('leads'),  p:projS('leads')    },
        calls:     {a:sca,            p:projS('calls')    },
        decroches: {a:da,             p:projS('decroches')},
        propRdv:   {a:pa,             p:projS('propRdv')  },
        sets:      {a:sa,             p:projS('sets')     },
        presents:  {a:pra,            p:projS('presents') },
        closes:    {a:sca2,           p:projS('closes')   },
        decrochesP:{a:sca>0?da/sca:0,  p:ps.decrochesP },
        engP:      {a:da>0 ?pa/da:0,    p:ps.engP       },
        setP:      {a:pa>0 ?sa/pa:0,    p:ps.setP       },
        showupP:   {a:sa>0 ?pra/sa:0,   p:ps.showupP    },
        cCallP:    {a:sca>0?sca2/sca:0, p:ps.cCallP     },
      },
      s1: DB._sw('s1'), s2: DB._sw('s2'), s3: DB._sw('s3'), s4: DB._sw('s4'),
    };

    // Sync deals dans commissions
    try {
      const cmk = (typeof localStorage !== 'undefined' && localStorage.getItem('sales_month')) || 'Février 2026';
      if (DB.commissions[cmk]) DB.commissions[cmk].deals = DB._raw.deals;
    } catch(e) {}
  },

  _cw(w) {
    const d=DB._raw.closing[w], p=PROJECTIONS.closing[w];
    return {
      calls:{a:d.calls||0,p:p.calls}, lives:{a:d.lives||0,p:p.lives},
      offres:{a:d.offres||0,p:p.offres}, closes:{a:d.closes||0,p:p.closes},
      hc:{a:d.hc||0,p:p.closes}, fu:{a:d.fu||0,p:0},
      contracte:{a:d.contracte||0,p:p.contracte}, collecte:{a:d.collecte||0,p:p.collecte},
    };
  },
  _sw(w) {
    const d=DB._raw.setting[w], p=PROJECTIONS.setting[w];
    return {
      leads:{a:d.leads||0,p:p.leads}, calls:{a:d.calls||0,p:p.calls},
      decroches:{a:d.decroches||0,p:p.decroches}, propRdv:{a:d.propRdv||0,p:p.propRdv},
      sets:{a:d.sets||0,p:p.sets}, presents:{a:d.presents||0,p:p.presents},
      closes:{a:d.closes||0,p:p.closes},
    };
  },
};

DB.compute();

/* ═══════════════════════════════════════════════════════════
   FIREBASE — couche temps réel
   Initialisé après que firebase SDK soit chargé + auth ready
═══════════════════════════════════════════════════════════ */
const Fire = {
  db:  null,
  uid: null,
  _unsubs: [],

  init(firestore, uid) {
    Fire.db  = firestore;
    Fire.uid = uid;
  },

  _key(label) {
    const p = label.split(' ');
    const m = DB.months.indexOf(p[0]);
    return `${p[1]}-${String(m+1).padStart(2,'0')}`;
  },

  // Écoute en temps réel les données d'un user pour un mois
  watchUser(userId, monthLabel, callback) {
    if (!Fire.db) return () => {};
    const ref = Fire.db
      .collection('saisies').doc(userId)
      .collection('mois').doc(Fire._key(monthLabel));
    const unsub = ref.onSnapshot(snap => callback(snap.exists ? snap.data() : null));
    Fire._unsubs.push(unsub);
    return unsub;
  },

  // Sauvegarde une semaine de closing
  async saveClosing(userId, monthLabel, week, data) {
    if (!Fire.db) throw new Error('Firebase non init');
    const ref = Fire.db.collection('saisies').doc(userId)
      .collection('mois').doc(Fire._key(monthLabel));
    await ref.set({ closing: { [week]: data } }, { merge: true });
  },

  // Sauvegarde une semaine de setting
  async saveSetting(userId, monthLabel, week, data) {
    if (!Fire.db) throw new Error('Firebase non init');
    const ref = Fire.db.collection('saisies').doc(userId)
      .collection('mois').doc(Fire._key(monthLabel));
    await ref.set({ setting: { [week]: data } }, { merge: true });
  },

  // Sauvegarde un deal (append)
  async saveDeal(userId, monthLabel, deal) {
    if (!Fire.db) throw new Error('Firebase non init');
    const ref = Fire.db.collection('saisies').doc(userId)
      .collection('mois').doc(Fire._key(monthLabel));
    const snap = await ref.get();
    const deals = snap.exists ? (snap.data().deals || []) : [];
    deals.push({ ...deal, _ts: Date.now() });
    await ref.set({ deals }, { merge: true });
  },

  // Applique un snapshot Firestore dans DB puis recalcule
  apply(data) {
    if (!data) return;
    if (data.closing) ['s1','s2','s3','s4'].forEach(w => {
      if (data.closing[w]) Object.assign(DB._raw.closing[w], data.closing[w]);
    });
    if (data.setting) ['s1','s2','s3','s4'].forEach(w => {
      if (data.setting[w]) Object.assign(DB._raw.setting[w], data.setting[w]);
    });
    if (data.deals) DB._raw.deals = data.deals;
    DB.compute();
    document.dispatchEvent(new CustomEvent('db:updated'));
  },

  stop() { Fire._unsubs.forEach(u => u()); Fire._unsubs = []; },
};

/* ═══════════════════════════════════════════════════════════

═══════════════════════════════════════════════════════════ */
const U = {
  euro:  v => v == null ? '—' : '€\u202f' + Number(v).toLocaleString('fr-FR'),
  pct:   v => v == null ? '—' : (v * 100).toFixed(1) + '%',
  num:   v => v == null ? '—' : Number(v).toLocaleString('fr-FR'),
  pp:  (a, p) => p > 0 ? Math.min((a / p) * 100, 200) : 0,
  ppv: (a, p) => p > 0 ? ((a / p) * 100).toFixed(0) + '%' : '—',
  cb:  (a, p) => { const r = p > 0 ? a / p : 0; return r >= 1 ? '#34d399' : r >= 0.65 ? '#f59e0b' : '#ef4444'; },
  g:   id => document.getElementById(id),
  getCurrentMonth: () => (typeof localStorage !== 'undefined' && localStorage.getItem('sales_month')) || 'Février 2026',
  getCurrentUser:  () => ({
    uid:  window._currentUserUid  || localStorage.getItem('ambitio_uid')  || 'guillaume',
    name: window._currentUserName || localStorage.getItem('ambitio_name') || 'Guillaume',
    role: window._currentRole     || localStorage.getItem('ambitio_role') || 'sales',
  }),

  progRow: (label, a, p, isEuro = false) => {
    const col = U.cb(a, p);
    return `<div class="pr">
      <div class="pr-l">${label}</div>
      <div class="pr-track"><div class="pr-fill" style="width:${Math.min(U.pp(a,p),100)}%;background:${col}"></div></div>
      <div class="pr-val">${isEuro ? `${U.euro(a)} / ${U.euro(p)}` : `${a} / ${p}`}</div>
      <div class="pr-pct" style="color:${col}">${U.ppv(a,p)}</div>
    </div>`;
  },

  kpiCard: ({ label, val, sub, rawA, proj, color='#ef4444', pct:fp }) => {
    const pc = fp!=null ? fp : (proj!=null ? U.pp(rawA??0, proj) : null);
    return `<div class="kpi" style="--kc:${color}">
      <div class="kpi-label">${label}</div>
      <div class="kpi-value">${val}</div>
      ${sub ? `<div class="kpi-sub">${sub}</div>` : ''}
      ${pc!=null ? `<div class="kpi-prog">
        <div class="kpi-prog-row"><span>Atteinte</span><span>${pc.toFixed(0)}%</span></div>
        <div class="kpi-prog-track"><div class="kpi-prog-fill" style="width:${Math.min(pc,100)}%;background:${color}"></div></div>
      </div>` : ''}
    </div>`;
  },

  funnelStep: (label, val, max, isFirst=false, isEuro=false) => {
    const ratio = max > 0 ? val / max : 0;
    return `<div class="fs">
      <div class="fs-label">${label}</div>
      <div class="fs-track"><div class="fs-fill" style="width:${Math.min(ratio*100,100)}%"></div></div>
      <div class="fs-val">${isEuro ? U.euro(val) : val}</div>
      <div class="fs-rate">${!isFirst ? U.pct(ratio) : ''}</div>
    </div>`;
  },

  weekCard: (label, mainVal, mainLabel, minis, isCurrent, dateRange) => `
    <div class="wc${isCurrent?' wc-active':''}">
      <div class="wc-label">${label}</div>
      ${dateRange ? `<div class="wc-dates">${dateRange}</div>` : ''}
      <div class="wc-main">${mainVal}</div>
      <div class="wc-sub">${mainLabel}</div>
      <div class="wc-grid">${minis.map(m=>`
        <div class="wc-mini">
          <div class="wc-mini-v"${m.color?` style="color:${m.color}"`:''} >${m.val}</div>
          <div class="wc-mini-l">${m.label}</div>
        </div>`).join('')}</div>
    </div>`,

  barChart: (labels, actuals, projs, unit='') => {
    const mx = Math.max(...actuals, ...projs, 1);
    return `<div class="chart-legend">
        <span class="cl-dot cl-real"></span>Réel
        <span class="cl-dot cl-proj" style="margin-left:14px"></span>Projection
      </div>
      <div class="chart-bars">
        ${labels.map((l,i)=>`<div class="chart-col">
          <div class="chart-pair">
            <div class="chart-bar bar-real" style="height:${(actuals[i]/mx*100).toFixed(1)}%" title="${actuals[i]}${unit}"></div>
            <div class="chart-bar bar-proj" style="height:${(projs[i]/mx*100).toFixed(1)}%" title="Proj:${projs[i]}${unit}"></div>
          </div>
          <div class="chart-lbl">${l}</div>
        </div>`).join('')}
      </div>`;
  },

  toast: (msg, type='success') => {
    let t = document.getElementById('_toast');
    if (!t) { t=document.createElement('div'); t.id='_toast'; document.body.appendChild(t); }
    const s = { success:'background:#1a2e1a;border:1px solid rgba(52,211,153,.3);color:#6ee7b7', error:'background:#2e1a1a;border:1px solid rgba(239,68,68,.3);color:#fca5a5', info:'background:#1a1a2e;border:1px solid rgba(96,165,250,.3);color:#93c5fd' };
    t.style.cssText = `position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(0);font-size:12px;font-weight:600;padding:9px 18px;border-radius:10px;z-index:9999;opacity:1;transition:all .28s;white-space:nowrap;font-family:var(--font-b);${s[type]||s.success}`;
    t.textContent = msg;
    clearTimeout(t._t);
    t._t = setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(20px)'; }, 2800);
  },
};


/* ═══════════════════════════════════════════════════════════
   SEMAINES RÉELLES — calcule les vraies dates lun→dim
═══════════════════════════════════════════════════════════ */
function getMonthWeeks(monthLabel) {
  // monthLabel = "Février 2026"
  const MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin',
                     'Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const parts = monthLabel.split(' ');
  const month = MONTHS_FR.indexOf(parts[0]); // 0-based
  const year  = parseInt(parts[1]);
  if (month === -1 || isNaN(year)) return [];

  const DAYS_FR = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const pad = n => String(n).padStart(2,'0');

  function fmt(d) {
    // "14/02"
    return pad(d.getDate()) + '/' + pad(d.getMonth()+1);
  }
  function fmtShort(d) {
    // "14 fév"
    const M = ['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'];
    return d.getDate() + ' ' + M[d.getMonth()];
  }

  // Premier lundi qui touche le mois (peut être dans le mois précédent)
  const firstOfMonth = new Date(year, month, 1);
  const dayOfWeek = firstOfMonth.getDay(); // 0=Sun,1=Mon...
  const daysToMonday = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  let monday = new Date(year, month, 1 + daysToMonday);

  const weeks = [];
  while (true) {
    const sunday = new Date(monday.getTime() + 6 * 86400000);
    // Inclure si la semaine chevauche le mois cible
    if (monday.getMonth() === month || sunday.getMonth() === month) {
      weeks.push({
        id:    's' + (weeks.length + 1),
        label: 'S' + (weeks.length + 1),
        start: monday,
        end:   sunday,
        range: fmt(monday) + ' → ' + fmt(sunday),       // "26/01 → 01/02"
        short: fmtShort(monday) + ' – ' + fmtShort(sunday), // "26 jan – 1 fév"
        tab:   fmt(monday) + '→' + fmt(sunday),
      });
    }
    monday = new Date(monday.getTime() + 7 * 86400000);
    if (monday.getMonth() !== month && monday.getMonth() !== (month === 0 ? 11 : month - 1)) {
      if (monday.getMonth() !== month) break;
    }
    if (monday.getFullYear() > year + 1) break;
    if (weeks.length >= 6) break;
  }
  return weeks;
}

window.DB=DB; window.U=U; window.Fire=Fire; window.PROJECTIONS=PROJECTIONS;
window.getMonthWeeks=getMonthWeeks;

/**
 * sync-bridge.js — Bridge de synchronisation localStorage → DB
 * Lit les données saisies dans Closing, Setting, Commissions
 * et les injecte dans DB._raw pour que Dashboard et Projections soient live.
 * 
 * Clés localStorage utilisées :
 *   closing_{uid}_{monthKey}   → {s1..s5: {calls,lives,offres,closes,hardClose,followUp,contracte,collecte}}
 *   setting_{uid}_{monthKey}   → {s1..s5: {leads,calls,decroches,propRdv,sets,presents,closes,collecte}}
 *   comm_deals_{uid}_{monthKey}→ [{client,offre,type,subtype,contracteHT,collecteHT,comm,bonus,ok,...}]
 */

const SYNC_UIDS = ['guillaume', 'elodie'];
const SYNC_MEMBERS = [
  { uid:'guillaume', name:'Guillaume', role:'Closing + Setting', color:'#ef4444' },
  { uid:'elodie',    name:'Élodie',    role:'Closing',           color:'#60a5fa' },
];

function syncBridge_loadMonth(monthKey) {
  // ── 1. Agréger closing (tous membres)
  const closingAgg = { s1:{}, s2:{}, s3:{}, s4:{}, s5:{} };
  const closingPerMember = {};
  
  SYNC_UIDS.forEach(uid => {
    let raw = null;
    try { const v = localStorage.getItem(`closing_${uid}_${monthKey}`); raw = v ? JSON.parse(v) : null; } catch(e){}
    closingPerMember[uid] = raw;
    
    if (raw) {
      ['s1','s2','s3','s4','s5'].forEach(w => {
        const d = raw[w] || {};
        const a = closingAgg[w];
        ['calls','lives','offres','closes','hardClose','followUp','contracte','collecte'].forEach(k => {
          a[k] = (a[k]||0) + (d[k]||0);
        });
        // hc/fu aliases
        a.hc = (a.hc||0) + (d.hardClose||0);
        a.fu = (a.fu||0) + (d.followUp||0);
      });
    }
  });

  // ── 2. Agréger setting (tous membres)
  const settingAgg = { s1:{}, s2:{}, s3:{}, s4:{}, s5:{} };
  const settingPerMember = {};
  
  SYNC_UIDS.forEach(uid => {
    let raw = null;
    try { const v = localStorage.getItem(`setting_${uid}_${monthKey}`); raw = v ? JSON.parse(v) : null; } catch(e){}
    settingPerMember[uid] = raw;
    
    if (raw) {
      ['s1','s2','s3','s4','s5'].forEach(w => {
        const d = raw[w] || {};
        const a = settingAgg[w];
        ['leads','calls','decroches','propRdv','sets','presents','closes','collecte'].forEach(k => {
          a[k] = (a[k]||0) + (d[k]||0);
        });
      });
    }
  });

  // ── 3. Agréger commissions (tous membres) — COMM_RULES inline
  const COMM_RULES = {
    closing: {
      'BP 6':  { mensualise:250,  pif:300  },
      'BP 12': { mensualise:500,  pif:600  },
      'Elite': { mensualise:800,  pif:900  },
      'Titan': { mensualise:1200, pif:1500 },
    },
    setting: {
      'BP 6':  { noBooking:100,  selfBooking:50  },
      'BP 12': { noBooking:250,  selfBooking:125 },
      'Elite': { noBooking:300,  selfBooking:150 },
      'Titan': { noBooking:500,  selfBooking:250 },
    },
  };
  
  function calcDealComm(deal) {
    if (!deal.ok) return 0;
    const t = (deal.type||'').toLowerCase();
    const rules = COMM_RULES[t];
    if (!rules) return deal.comm || 0;
    const offre = deal.offre || 'BP 12';
    const r = rules[offre] || rules['BP 12'];
    if (!r) return deal.comm || 0;
    const sub = (deal.subtype||'').toLowerCase().replace(/[^a-z]/g,'');
    if (t === 'closing') {
      return sub.includes('pif') ? r.pif : r.mensualise;
    } else {
      return sub.includes('self') ? r.selfBooking : r.noBooking;
    }
  }

  let totalComm = 0, totalContracte = 0, totalCollecte = 0;
  const allDeals = [];
  const commPerMember = {};
  
  SYNC_UIDS.forEach(uid => {
    let deals = null;
    try { const v = localStorage.getItem(`comm_deals_${uid}_${monthKey}`); deals = v ? JSON.parse(v) : null; } catch(e){}
    
    // Fallback: use historical data from MEMBERS_COMM if available
    if (!deals && typeof MEMBERS_COMM !== 'undefined') {
      const m = MEMBERS_COMM.find(m => m.uid === uid);
      if (m && m.data && m.data[monthKey]) deals = m.data[monthKey];
    }
    
    if (deals && Array.isArray(deals)) {
      const comm = deals.reduce((t,d) => t + calcDealComm(d), 0);
      const contracte = deals.filter(d=>d.ok).reduce((t,d) => t + (d.contracteHT||d.cHT||0), 0);
      const collecte  = deals.filter(d=>d.ok).reduce((t,d) => t + (d.collecteHT||d.coHT||0), 0);
      commPerMember[uid] = { comm, contracte, collecte, deals };
      totalComm      += comm;
      totalContracte += contracte;
      totalCollecte  += collecte;
      allDeals.push(...deals);
    } else {
      commPerMember[uid] = { comm:0, contracte:0, collecte:0, deals:[] };
    }
  });

  // ── 4. Injecter dans DB._raw (4 semaines = s1..s4, s5 ignoré ou fusionné)
  // DB._raw.closing attend s1..s4 avec: calls, lives, offres, closes, hc, fu, contracte, collecte
  // On mappe s5 → s4 si s5 a des données
  ['s1','s2','s3','s4'].forEach(w => {
    const ca = closingAgg[w] || {};
    DB._raw.closing[w] = {
      calls:     ca.calls     || 0,
      lives:     ca.lives     || 0,
      offres:    ca.offres    || 0,
      closes:    ca.closes    || 0,
      hc:        ca.hc        || ca.hardClose || 0,
      fu:        ca.fu        || ca.followUp  || 0,
      contracte: ca.contracte || 0,
      collecte:  ca.collecte  || 0,
    };
    const sa = settingAgg[w] || {};
    DB._raw.setting[w] = {
      leads:     sa.leads     || 0,
      calls:     sa.calls     || 0,
      decroches: sa.decroches || 0,
      propRdv:   sa.propRdv   || 0,
      sets:      sa.sets      || 0,
      presents:  sa.presents  || 0,
      closes:    sa.closes    || 0,
    };
  });
  
  // Fusionner s5 dans s4 si présent
  ['closing','setting'].forEach(type => {
    const s5 = (type === 'closing' ? closingAgg : settingAgg).s5 || {};
    if (Object.values(s5).some(v => v > 0)) {
      const r = DB._raw[type];
      Object.keys(r.s4).forEach(k => { r.s4[k] = (r.s4[k]||0) + (s5[k]||0); });
    }
  });

  // ── 5. Mettre à jour DB.commissions
  DB.commissions[monthKey] = {
    totalComm,
    contracte: totalContracte,
    collecte:  totalCollecte,
    statut:    'En attente',
    deals:     allDeals,
    perMember: commPerMember,
  };

  // ── 6. Mettre à jour DB.team depuis les données par membre
  const teamWeek  = [];
  const teamMonth = [];
  
  SYNC_MEMBERS.forEach(m => {
    const cr = closingPerMember[m.uid];
    const sr = settingPerMember[m.uid];
    const comm = commPerMember[m.uid] || {};
    
    function sumC(k) {
      if (!cr) return 0;
      return ['s1','s2','s3','s4','s5'].reduce((t,w) => t + ((cr[w]||{})[k]||0), 0);
    }
    function sumS(k) {
      if (!sr) return 0;
      return ['s1','s2','s3','s4','s5'].reduce((t,w) => t + ((sr[w]||{})[k]||0), 0);
    }
    
    const calls     = sumC('calls');
    const lives     = sumC('lives');
    const offres    = sumC('offres');
    const closes    = sumC('closes');
    const contracte = sumC('contracte');
    const collecte  = sumC('collecte');
    const presents  = sumS('presents');
    const sets      = sumS('sets');
    
    const entry = {
      name:       m.name,
      role:       m.role,
      color:      m.color,
      uid:        m.uid,
      contracte,
      collecte,
      calls,
      lives,
      offres,
      closes,
      presents,
      sets,
      showup:         lives > 0 ? lives / Math.max(calls, 1) : 0,
      txOffre:        lives > 0 ? offres / lives : 0,
      txTransfoShow:  lives > 0 ? closes / lives : 0,
      txTransfoOffre: offres > 0 ? closes / offres : 0,
      caCall:         calls > 0  ? contracte / calls : 0,
      comm:           comm.comm || 0,
    };
    
    teamMonth.push(entry);
    // "Cette semaine" = S la plus récente avec données
    const lastW = ['s4','s3','s2','s1'].find(w => {
      const d = (cr||{})[w] || {};
      return Object.values(d).some(v => v > 0);
    });
    if (lastW) {
      const wd = (cr||{})[lastW] || {};
      const ws = (sr||{})[lastW] || {};
      teamWeek.push({
        ...entry,
        calls:      wd.calls     || 0,
        lives:      wd.lives     || 0,
        offres:     wd.offres    || 0,
        closes:     wd.closes    || 0,
        contracte:  wd.contracte || 0,
        collecte:   wd.collecte  || 0,
        presents:   ws.presents  || 0,
        sets:       ws.sets      || 0,
        showup:     (wd.lives||0) > 0 ? (wd.lives||0) / Math.max(wd.calls||1,1) : 0,
        txOffre:    (wd.lives||0) > 0 ? (wd.offres||0) / (wd.lives||1) : 0,
        txTransfoShow:  (wd.lives||0)  > 0 ? (wd.closes||0) / (wd.lives||1) : 0,
        txTransfoOffre: (wd.offres||0) > 0 ? (wd.closes||0) / (wd.offres||1) : 0,
        caCall:     (wd.calls||0) > 0 ? (wd.contracte||0) / (wd.calls||1) : 0,
      });
    } else {
      teamWeek.push({...entry, calls:0,lives:0,offres:0,closes:0,contracte:0,collecte:0,presents:0,sets:0,showup:0,txOffre:0,txTransfoShow:0,txTransfoOffre:0,caCall:0});
    }
  });

  if (teamWeek.length)  DB.team.week  = teamWeek;
  if (teamMonth.length) DB.team.month = teamMonth;

  // ── 7. Recalculer DB
  DB.compute();
  document.dispatchEvent(new CustomEvent('db:updated'));
}

// Écoute les changements localStorage cross-tab
window.addEventListener('storage', function(e) {
  const k = e.key || '';
  if (k.startsWith('closing_') || k.startsWith('setting_') || k.startsWith('comm_deals_')) {
    const monthKey = (typeof currentMonthKey === 'function') ? currentMonthKey() : 
                     localStorage.getItem('sales_month') || 'Février 2026';
    syncBridge_loadMonth(monthKey);
    if (typeof renderAll === 'function') renderAll();
  }
});

window.syncBridge_loadMonth = syncBridge_loadMonth;

/* === end sync-bridge === */
</script>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-logo">S</div>
  <div class="tb-title">Ambitio <em>Sales</em></div>
  <div class="tb-sep"></div>
  <div class="tb-page">◈ Dashboard</div>
  <div class="tb-right">
    <div class="tb-month">
      <button onclick="prevMonth()">&#9664;</button>
      <span id="month-lbl">Février 2026</span>
      <button onclick="nextMonth()">&#9654;</button>
    </div>
    <div class="tb-user">
      <div class="tb-av" id="tb-av">G</div>
      <div><div class="tb-nm" id="tb-nm">Guillaume</div></div>
    </div>
  </div>
</div>

<div class="page">

  <!-- ALERTS -->
  <div id="alerts"></div>

  <!-- KPI ROW -->
  <div class="g4 mb" id="kpis"></div>

  <!-- ROW 2: Funnel + Side cards -->
  <div class="g21 mb">
    <div class="card">
      <div class="card-header">
        <span class="card-title">Funnel Closing — Mois</span>
        <a class="card-action" href="sales-closing.html">Détails →</a>
      </div>
      <div class="funnel" id="funnel"></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:13px">
      <div class="card" style="flex:1">
        <div class="card-header"><span class="card-title">Commissions dues</span></div>
        <div id="comm-card"></div>
      </div>
      <div class="card" style="flex:1">
        <div class="card-header"><span class="card-title">Objectif mensuel</span></div>
        <div id="obj-card"></div>
      </div>
    </div>
  </div>

  <!-- ROW 3: Setting + Equipe -->
  <div class="g2">
    <div class="card">
      <div class="card-header">
        <span class="card-title">Setting — Résumé</span>
        <a class="card-action" href="sales-setting.html">Détails →</a>
      </div>
      <div id="setting-mini"></div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">Équipe — Cette semaine</span>
        <a class="card-action" href="sales-equipe.html">Équipe →</a>
      </div>
      <div id="team-mini"></div>
    </div>
  </div>

</div>

<script>
const MONTHS = DB.months;
let _cm = (() => {
  const saved = localStorage.getItem('sales_month') || 'Février 2026';
  const parts = saved.split(' ');
  return { month: MONTHS.indexOf(parts[0]), year: parseInt(parts[1]) || 2026 };
})();
function currentMonthKey() { return MONTHS[_cm.month] + ' ' + _cm.year; }
function prevMonth() { _cm.month--; if(_cm.month<0){_cm.month=11;_cm.year--;} _saveMonth(); syncBridge_loadMonth(currentMonthKey()); renderAll(); }
function nextMonth() { _cm.month++; if(_cm.month>11){_cm.month=0;_cm.year++;} _saveMonth(); syncBridge_loadMonth(currentMonthKey()); renderAll(); }
function _saveMonth() { localStorage.setItem('sales_month', currentMonthKey()); document.getElementById('month-lbl').textContent = currentMonthKey(); }

function renderAll() {
  const c = DB.closing.mois;
  const s = DB.setting.mois;
  const cm = DB.commissions[currentMonthKey()] || { totalComm:0, contracte:0, collecte:0, statut:'—', deals:[] };

  // Alerts
  const alerts = [];
  if (c.atteinte < 0.2) alerts.push({ type:'crit', icon:'🚨', title:'Objectif closing critique', text:`${U.pct(c.atteinte)} atteint — ${U.euro(c.delta)} de delta à combler ce mois.` });
  if (s.showupP.a < 0.5) alerts.push({ type:'warn', icon:'⚠️', title:'Taux de show-up faible', text:`Show-up à ${U.pct(s.showupP.a)} vs ${U.pct(s.showupP.p)} projeté. Requalifier les RDVs.` });
  document.getElementById('alerts').innerHTML = alerts.map(a => `
    <div class="alert-panel ${a.type}">
      <div class="alert-icon">${a.icon}</div>
      <div><div class="alert-title">${a.title}</div><div class="alert-text">${a.text}</div></div>
    </div>`).join('');

  // KPIs
  document.getElementById('kpis').innerHTML = [
    { label:'Contracté',     val:U.euro(c.contracte.a), sub:`/ ${U.euro(c.contracte.p)}`,    rawA:c.contracte.a, proj:c.contracte.p, color:'#ef4444' },
    { label:'Closes',        val:c.closes.a,            sub:`/ ${c.closes.p} projetés`,       rawA:c.closes.a,    proj:c.closes.p,    color:'#f59e0b' },
    { label:'Calls Setting', val:U.num(s.calls.a),      sub:`/ ${U.num(s.calls.p)} projetés`, rawA:s.calls.a,     proj:s.calls.p,     color:'#60a5fa' },
    { label:'Commissions',   val:U.euro(cm.totalComm),  sub:'Ce mois',                        pct:100,            color:'#34d399'     },
  ].map(U.kpiCard).join('');

  // Funnel
  document.getElementById('funnel').innerHTML = [
    U.funnelStep('Calls',    c.calls.a,    c.calls.p,    true),
    U.funnelStep('Lives',    c.lives.a,    c.calls.a),
    U.funnelStep('Offres',   c.offres.a,   c.lives.a),
    U.funnelStep('Closes',   c.closes.a,   c.offres.a),
    U.funnelStep('Collecté', c.collecte.a, c.contracte.a, false, true),
  ].join('');

  // Commissions mini
  document.getElementById('comm-card').innerHTML = `
    <div style="font-size:26px;font-weight:800;font-family:var(--font-d);color:var(--gold);margin-bottom:10px">${U.euro(cm.totalComm)}</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:3px">Contracté: <b style="color:var(--text)">${U.euro(cm.contracte)}</b></div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px">Collecté: <b style="color:var(--text)">${U.euro(cm.collecte)}</b></div>
    <div class="status-badge ${cm.statut === 'Validé' ? 'status-paid' : 'status-pending'}">
      ${cm.statut === 'Validé' ? '✅ Validé' : '⏳ ' + cm.statut}
    </div>`;

  // Objectif
  const at = c.atteinte * 100;
  const col = at >= 80 ? 'var(--green)' : at >= 50 ? 'var(--gold)' : 'var(--red2)';
  document.getElementById('obj-card').innerHTML = `
    <div style="display:flex;align-items:center;gap:14px">
      <div style="font-size:32px;font-weight:800;font-family:var(--font-d);color:${col}">${at.toFixed(0)}%</div>
      <div style="flex:1">
        <div style="height:6px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;margin-bottom:5px">
          <div style="height:100%;width:${Math.min(at,100)}%;background:linear-gradient(90deg,#991b1b,#ef4444);border-radius:99px"></div>
        </div>
        <div style="font-size:10px;color:var(--muted)">Delta: <b style="color:var(--red2)">${U.euro(c.delta)}</b></div>
      </div>
    </div>`;

  // Setting mini
  document.getElementById('setting-mini').innerHTML = [
    { l:'Calls passés',  a:s.calls.a,    p:s.calls.p    },
    { l:'Sets obtenus',  a:s.sets.a,     p:s.sets.p     },
    { l:'Show-up',       a:s.presents.a, p:s.presents.p },
    { l:'Closes',        a:s.closes.a,   p:s.closes.p   },
  ].map(r => U.progRow(r.l, r.a, r.p)).join('');

  // Team mini
  document.getElementById('team-mini').innerHTML = `
    <table class="data-table">
      <thead><tr><th>Commercial</th><th>Closes</th><th>Contracté</th><th>Show-up</th></tr></thead>
      <tbody>
        ${DB.team.week.map(m => `
          <tr>
            <td><div class="member-cell">
              <div class="member-av" style="background:linear-gradient(135deg,${m.color}88,${m.color})">${m.name[0]}</div>
              <div class="member-name">${m.name}</div>
            </div></td>
            <td class="td-mono ${m.closes>=5?'td-ok':'td-warn'}">${m.closes}</td>
            <td class="td-mono">${U.euro(m.contracte)}</td>
            <td class="td-mono ${m.showup>=0.7?'td-ok':'td-warn'}">${U.pct(m.showup)}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('month-lbl').textContent = currentMonthKey();
  const nm = localStorage.getItem('ambitio_name') || 'Guillaume';
  document.getElementById('tb-nm').textContent = nm;
  document.getElementById('tb-av').textContent = nm[0].toUpperCase();

  // ── Sync live data from Closing/Setting/Commissions localStorage ──
  syncBridge_loadMonth(currentMonthKey());
  renderAll();

  // Refresh quand DB est mis à jour
  document.addEventListener('db:updated', renderAll);

  // Firebase (optionnel, si dispo)
  const _fbUser = U.getCurrentUser();
  if (window.firebase && window.firebase.firestore && !Fire.db) {
    Fire.init(window.firebase.firestore(), _fbUser.uid);
  }
  if (Fire.db) {
    Fire.watchUser(_fbUser.uid, currentMonthKey(), (data) => {
      if (data) { Fire.apply(data); renderAll(); }
    });
  }
});

</script>
