<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>Ambitio Corp — Espace Équipe</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --dark:#0a0e1a;--dark2:#111827;--dark3:#1a2035;
      --accent:#3b82f6;--accent2:#60a5fa;--accent-glow:rgba(59,130,246,.15);
      --gold:#f59e0b;--gold-light:#fef3c7;
      --text:#f1f5f9;--muted:#94a3b8;--border:rgba(255,255,255,.08);
      --green:#10b981;--red:#ef4444;
    }
    html,body{height:100%;overflow:hidden}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--dark);color:var(--text);display:flex;align-items:center;justify-content:center}

    /* ── BACKGROUND ── */
    .bg{position:fixed;inset:0;z-index:0;overflow:hidden}
    .bg::before{content:'';position:absolute;top:-50%;right:-30%;width:800px;height:800px;background:radial-gradient(circle,rgba(59,130,246,.08) 0%,transparent 70%);border-radius:50%}
    .bg::after{content:'';position:absolute;bottom:-40%;left:-20%;width:600px;height:600px;background:radial-gradient(circle,rgba(245,158,11,.05) 0%,transparent 70%);border-radius:50%}
    .grid-pattern{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:60px 60px;z-index:0}

    /* ── CONTAINER ── */
    .container{position:relative;z-index:1;width:100%;max-width:460px;padding:20px}

    /* ── LOGO ── */
    .logo-section{text-align:center;margin-bottom:36px;animation:fadeDown .6s ease both}
    @keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
    .logo-mark{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;background:linear-gradient(135deg,var(--accent),#1d4ed8);border-radius:16px;font-size:24px;font-weight:800;color:white;margin-bottom:16px;box-shadow:0 8px 32px rgba(59,130,246,.3);position:relative}
    .logo-mark::after{content:'';position:absolute;inset:-3px;border-radius:19px;border:1.5px solid rgba(59,130,246,.3);animation:pulse 3s ease infinite}
    @keyframes pulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:0;transform:scale(1.15)}}
    .logo-title{font-size:26px;font-weight:800;letter-spacing:-.5px;color:white}
    .logo-title span{color:var(--accent2)}
    .logo-sub{font-size:13px;color:var(--muted);margin-top:6px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:8px}
    .logo-sub::before,.logo-sub::after{content:'';width:24px;height:1px;background:var(--border)}
    .logo-badge{display:inline-flex;align-items:center;gap:5px;margin-top:12px;padding:5px 14px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);border-radius:20px;font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.3px}

    /* ── CARD ── */
    .card{background:var(--dark2);border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.4);animation:fadeUp .6s ease .15s both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .card-header{padding:28px 32px 0;text-align:center}
    .card-header h2{font-size:18px;font-weight:700;color:white;margin-bottom:4px}
    .card-header p{font-size:13px;color:var(--muted)}
    .card-body{padding:24px 32px 28px}

    /* ── FORM ── */
    .field{margin-bottom:16px}
    .field label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
    .field-wrap{display:flex;align-items:center;gap:10px;padding:0 16px;background:var(--dark3);border:1.5px solid var(--border);border-radius:12px;transition:all .2s;height:48px}
    .field-wrap:focus-within{border-color:var(--accent);background:rgba(59,130,246,.05);box-shadow:0 0 0 3px var(--accent-glow)}
    .field-icon{font-size:16px;flex-shrink:0;opacity:.5}
    .field-wrap input{flex:1;border:none;background:transparent;font-family:inherit;font-size:14px;color:white;outline:none;height:100%}
    .field-wrap input::placeholder{color:rgba(148,163,184,.5)}
    .field-wrap input:-webkit-autofill{-webkit-box-shadow:0 0 0 50px var(--dark3) inset;-webkit-text-fill-color:white}

    .btn-login{width:100%;padding:14px;border:none;border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;background:linear-gradient(135deg,var(--accent),#2563eb);color:white;box-shadow:0 4px 20px rgba(59,130,246,.3);margin-top:4px;letter-spacing:.3px}
    .btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(59,130,246,.4)}
    .btn-login:active{transform:translateY(0)}
    .btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none}

    .forgot{text-align:center;margin-top:14px}
    .forgot a{font-size:12px;color:var(--muted);text-decoration:none;font-weight:500;transition:color .15s;cursor:pointer}
    .forgot a:hover{color:var(--accent2)}

    .error-msg{padding:10px 14px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:10px;font-size:12px;color:var(--red);font-weight:600;margin-bottom:14px;display:none;text-align:center}
    .error-msg.show{display:block;animation:shake .4s ease}
    .success-msg{padding:10px 14px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:10px;font-size:12px;color:var(--green);font-weight:600;margin-bottom:14px;display:none;text-align:center}
    .success-msg.show{display:block}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}

    /* ── CONNECTED STATE ── */
    .connected{display:none;text-align:center;padding:32px}
    .connected.show{display:block}
    .connected-icon{width:64px;height:64px;background:linear-gradient(135deg,var(--green),#059669);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:16px;box-shadow:0 8px 32px rgba(16,185,129,.3)}
    .connected h2{font-size:20px;font-weight:800;margin-bottom:4px}
    .connected .role-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;margin:6px 0 6px}
    .role-admin{background:rgba(245,158,11,.15);color:var(--gold);border:1px solid rgba(245,158,11,.2)}
    .role-coach{background:rgba(59,130,246,.15);color:var(--accent2);border:1px solid rgba(59,130,246,.2)}
    .role-sales{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.2)}
    .connected p{font-size:13px;color:var(--muted);margin-bottom:24px}
    .go-btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:linear-gradient(135deg,var(--accent),#2563eb);color:white;border:none;border-radius:12px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(59,130,246,.3);text-decoration:none}
    .go-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(59,130,246,.4)}
    .logout-link{display:block;margin-top:16px;font-size:12px;color:var(--muted);text-decoration:none;cursor:pointer;font-weight:500;background:none;border:none;font-family:inherit}
    .logout-link:hover{color:var(--red)}

    /* ── FOOTER ── */
    .footer{text-align:center;margin-top:24px;font-size:11px;color:rgba(148,163,184,.4);animation:fadeUp .6s ease .3s both}
    .footer a{color:rgba(148,163,184,.5);text-decoration:none}
    .footer a:hover{color:var(--accent2)}

    /* ── RESPONSIVE ── */
    @media(max-width:480px){
      .container{padding:16px}
      .card-body,.card-header{padding-left:20px;padding-right:20px}
      .logo-title{font-size:22px}
      .connected{padding:24px 20px}
    }
  </style>
</head>
<body>

<div class="bg"></div>
<div class="grid-pattern"></div>

<div class="container">
  <!-- LOGO -->
  <div class="logo-section">
    <div class="logo-mark">A</div>
    <div class="logo-title">Ambitio <span>Corp</span></div>
    <div class="logo-sub">Espace Équipe</div>
    <div class="logo-badge">🔒 Accès réservé aux collaborateurs</div>
  </div>

  <!-- CARD -->
  <div class="card">
    <!-- LOGIN FORM -->
    <div id="authSection">
      <div class="card-header">
        <h2>Connexion</h2>
        <p>Accédez à votre espace coaching & gestion</p>
      </div>
      <div class="card-body">
        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>
        <div class="field">
          <label>Adresse email</label>
          <div class="field-wrap">
            <span class="field-icon">✉️</span>
            <input type="email" id="inputEmail" placeholder="prenom@ambitiocorp.com" autocomplete="email"/>
          </div>
        </div>
        <div class="field">
          <label>Mot de passe</label>
          <div class="field-wrap">
            <span class="field-icon">🔑</span>
            <input type="password" id="inputPassword" placeholder="••••••••" autocomplete="current-password"/>
          </div>
        </div>
        <button class="btn-login" id="loginBtn" onclick="handleLogin()">Se connecter →</button>
        <div class="forgot"><a onclick="handleReset()">Mot de passe oublié ?</a></div>
      </div>
    </div>

    <!-- CONNECTED STATE -->
    <div class="connected" id="connectedSection">
      <div class="connected-icon">✓</div>
      <h2 id="welcomeName">Bienvenue !</h2>
      <div class="role-badge" id="roleBadge"></div>
      <p id="welcomeEmail">Vous êtes connecté</p>
      <a class="go-btn" id="goBtn" href="coaching.html">🎓 Accéder à mon espace →</a>
      <button class="logout-link" onclick="handleLogout()">Se déconnecter</button>
    </div>
  </div>

  <div class="footer">
    © 2025 Ambitio Corp — SARL · Propulsé par <a href="https://alteore.com" target="_blank">ALTEORE</a>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import{getAuth,onAuthStateChanged,signInWithEmailAndPassword,sendPasswordResetEmail,signOut}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import{getFirestore,doc,getDoc}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  const app=initializeApp({
    apiKey:"AIzaSyDo30FASeWnhvx4mYWYungKOu4AMhyJz6o",
    authDomain:"ambitio-team.firebaseapp.com",
    projectId:"ambitio-team",
    storageBucket:"ambitio-team.firebasestorage.app",
    messagingSenderId:"1079366902268",
    appId:"1:1079366902268:web:b4ec1691dba54230339279"
  });
  const auth=getAuth(app),db=getFirestore(app);
  window._auth=auth;window._db=db;window._signOut=signOut;
  window._signIn=signInWithEmailAndPassword;
  window._sendReset=sendPasswordResetEmail;
  window._doc=doc;window._getDoc=getDoc;

  onAuthStateChanged(auth,async user=>{
    if(user){
      try{
        const snap=await getDoc(doc(db,'users',user.uid));
        const data=snap.exists()?snap.data():{};
        const role=data.role||'';
        if(!['coach','sales','admin'].includes(role)){
          document.getElementById('errorMsg').textContent="⛔ Votre compte n'a pas accès à l'espace équipe.";
          document.getElementById('errorMsg').classList.add('show');
          await signOut(auth);
          return;
        }
        window.showConnected(user,role);
      }catch(e){
        console.error(e);
        // Firestore error: use role from localStorage if available, else show error
        const cachedRole=localStorage.getItem('ambitio_role');
        if(cachedRole&&['coach','sales','admin'].includes(cachedRole)){
          window.showConnected(user,cachedRole);
        } else {
          console.error('Impossible de lire le rôle Firestore:',e);
          window.showConnected(user,'admin'); // fallback admin pour éviter blocage
        }
      }
    }
  });
</script>

<script>
  window.showConnected=function(user,role){
    document.getElementById('authSection').style.display='none';
    document.getElementById('connectedSection').classList.add('show');
    const name=user.displayName||user.email.split('@')[0];
    const labels={admin:['👑 Administrateur','role-admin'],coach:['🎓 Coach','role-coach'],sales:['📈 Commercial','role-sales']};
    const [label,cls]=labels[role]||['Équipe','role-coach'];
    document.getElementById('welcomeName').textContent='Bienvenue, '+name+' !';
    document.getElementById('roleBadge').textContent=label;
    document.getElementById('roleBadge').className='role-badge '+cls;
    document.getElementById('welcomeEmail').textContent=user.email;
    // Save role for nav.js
    localStorage.setItem('ambitio_role',role);
    localStorage.setItem('ambitio_name',name);
    localStorage.setItem('ambitio_email',user.email);
    // Redirect button based on role
    const dest={coach:'coaching.html',sales:'sales.html',admin:'coaching.html'};
    const goBtn=document.getElementById('goBtn');
    if(goBtn) goBtn.href=dest[role]||'coaching.html';
  };

  window.handleLogin=async function(){
    const email=document.getElementById('inputEmail').value.trim();
    const pwd=document.getElementById('inputPassword').value;
    if(!email||!pwd){showError('Remplissez tous les champs');return;}
    const btn=document.getElementById('loginBtn');
    btn.disabled=true;btn.textContent='⏳ Connexion...';
    try{
      await window._signIn(window._auth,email,pwd);
    }catch(e){
      const msgs={'auth/user-not-found':'Aucun compte avec cet email','auth/wrong-password':'Mot de passe incorrect','auth/too-many-requests':'Trop de tentatives, réessayez plus tard','auth/invalid-email':'Email invalide','auth/invalid-credential':'Identifiants incorrects'};
      showError(msgs[e.code]||'Identifiants incorrects');
      btn.disabled=false;btn.textContent='Se connecter →';
    }
  };

  window.handleReset=async function(){
    const email=document.getElementById('inputEmail').value.trim();
    if(!email){showError('Entrez votre email d\'abord');return;}
    try{
      await window._sendReset(window._auth,email);
      const el=document.getElementById('successMsg');
      el.textContent='✅ Email de réinitialisation envoyé !';
      el.classList.add('show');
      setTimeout(()=>el.classList.remove('show'),5000);
    }catch(e){showError('Vérifiez votre adresse email');}
  };

  window.handleLogout=async function(){
    await window._signOut(window._auth);
    window.location.reload();
  };

  function showError(msg){
    const el=document.getElementById('errorMsg');
    el.textContent=msg;el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),5000);
  }

  document.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&document.getElementById('authSection').style.display!=='none') window.handleLogin();
  });
</script>

</body>
</html>
