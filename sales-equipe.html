<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ambitio — Équipe</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="nav.js" defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#080b14; --bg2:#0d1220; --bg3:#111827;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --text:#f1f5f9; --muted:rgba(255,255,255,0.4); --muted2:rgba(255,255,255,0.2);
  --red:#ef4444; --blue:#60a5fa; --gold:#f59e0b;
  --green:#34d399; --purple:#a78bfa; --orange:#fb923c;
  --radius:14px;
  --fh:'Syne',sans-serif; --fm:'DM Mono',monospace; --fb:'Inter',sans-serif;
}

body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:14px;line-height:1.5;min-height:100vh}

/* ── LAYOUT ── */
.page{max-width:1300px;margin:0 auto;padding:28px 24px 80px}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:28px;flex-wrap:wrap}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-icon{width:44px;height:44px;background:linear-gradient(135deg,#a78bfa,#7c3aed);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 16px rgba(167,139,250,0.3)}
.topbar-title{font-family:var(--fh);font-size:22px;font-weight:800}
.topbar-sub{font-size:12px;color:var(--muted);margin-top:1px}

/* ── MAIN TABS ── */
.main-tabs{display:flex;gap:6px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:5px;margin-bottom:28px;width:fit-content;flex-wrap:wrap}
.main-tab{padding:8px 18px;border-radius:8px;font-family:var(--fh);font-size:13px;font-weight:700;cursor:pointer;color:var(--muted);transition:all .15s;white-space:nowrap;border:none;background:none}
.main-tab:hover{color:var(--text)}
.main-tab.active{background:rgba(255,255,255,0.08);color:var(--text);border:1px solid var(--border2)}

/* ── SECTIONS ── */
.section{display:none}
.section.active{display:block}

/* ════════════════════════════════════════════
   SECTION — ESPACES SALARIÉS
════════════════════════════════════════════ */
.member-selector{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.member-btn{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .15s;font-family:var(--fb)}
.member-btn:hover{border-color:var(--border2)}
.member-btn.active{border-color:var(--mb-color,var(--purple));background:rgba(167,139,250,0.06)}
.member-btn-av{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:14px;font-weight:800;color:white;flex-shrink:0}
.member-btn-name{font-size:13px;font-weight:700}
.member-btn-role{font-size:10px;color:var(--muted)}

/* Espace membre */
.espace{display:none}
.espace.active{display:block}
.espace-header{display:flex;align-items:center;gap:18px;padding:24px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;position:relative;overflow:hidden}
.espace-header::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:var(--eh-color,rgba(167,139,250,0.08));filter:blur(50px);pointer-events:none}
.espace-av{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:28px;font-weight:800;color:white;flex-shrink:0;border:2px solid rgba(255,255,255,0.1)}
.espace-info{}
.espace-name{font-family:var(--fh);font-size:20px;font-weight:800}
.espace-role{font-size:12px;color:var(--muted);margin-top:3px}
.espace-badges{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid}

/* Espace tabs */
.espace-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px}
.espace-tab{padding:9px 16px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
.espace-tab:hover{color:var(--text)}
.espace-tab.active{color:var(--text);border-bottom-color:var(--et-color,var(--purple))}

/* Sub panel */
.sub-panel{display:none}
.sub-panel.active{display:block}

/* Infos grille */
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:20px}
.info-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.info-card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:12px}
.info-field{margin-bottom:10px}
.info-field label{display:block;font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.info-field .val{font-size:13px;font-weight:500}
.info-field .val a{color:var(--blue);text-decoration:none}
.info-field .val a:hover{text-decoration:underline}

/* Documents */
.docs-list{display:flex;flex-direction:column;gap:8px}
.doc-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;transition:border-color .15s}
.doc-row:hover{border-color:var(--border2)}
.doc-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.doc-info{flex:1;min-width:0}
.doc-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-meta{font-size:11px;color:var(--muted);margin-top:1px}
.doc-actions{display:flex;gap:6px}

/* Messages / feed */
.feed{display:flex;flex-direction:column;gap:12px}
.msg-bubble{display:flex;gap:12px;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-av{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:13px;font-weight:800;color:white;flex-shrink:0;margin-top:2px}
.msg-content{}
.msg-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.msg-author{font-size:12px;font-weight:700}
.msg-time{font-size:10px;color:var(--muted2)}
.msg-role-tag{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:700}
.msg-text{font-size:13px;color:rgba(255,255,255,.85);line-height:1.6;background:var(--bg2);border:1px solid var(--border);border-radius:0 10px 10px 10px;padding:10px 14px;max-width:540px}
.msg-text.head-msg{background:rgba(167,139,250,0.06);border-color:rgba(167,139,250,0.2)}

/* Compose */
.compose-box{margin-top:16px;display:flex;gap:10px;align-items:flex-end}
.compose-input{flex:1;padding:10px 14px;background:rgba(255,255,255,0.04);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--fb);font-size:13px;outline:none;resize:vertical;min-height:44px;max-height:120px;transition:border-color .15s}
.compose-input:focus{border-color:var(--purple)}
.compose-input::placeholder{color:var(--muted2)}

/* ════════════════════════════════════════════
   SECTION — CALL BREAKDOWN
════════════════════════════════════════════ */
.cb-member-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.cb-member-tab{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);transition:all .15s}
.cb-member-tab:hover{color:var(--text)}
.cb-member-tab.active{color:var(--text);border-color:var(--cbt-color,var(--red));background:rgba(239,68,68,0.06)}
.cb-member-tab .dot{width:8px;height:8px;border-radius:50%}

.cb-panel{display:none}
.cb-panel.active{display:block}

/* Call session cards */
.calls-grid{display:flex;flex-direction:column;gap:12px}
.call-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .15s}
.call-card:hover{border-color:var(--border2)}
.call-card-head{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer}
.call-card-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.call-card-info{flex:1}
.call-card-title{font-size:14px;font-weight:700}
.call-card-meta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.call-card-badge{padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700}
.call-card-chevron{font-size:12px;color:var(--muted2);transition:transform .2s}
.call-card.open .call-card-chevron{transform:rotate(90deg)}
.call-card-body{display:none;padding:0 20px 18px;border-top:1px solid var(--border)}
.call-card.open .call-card-body{display:block}

/* Score grid */
.score-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin:14px 0}
.score-item{background:var(--bg3);border-radius:10px;padding:10px 12px;text-align:center}
.score-label{font-size:10px;color:var(--muted);margin-bottom:4px}
.score-val{font-family:var(--fm);font-size:18px;font-weight:500}
.score-star{font-size:10px;margin-top:2px}

/* Debrief notes */
.debrief-block{margin-top:14px}
.debrief-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:8px}
.debrief-content{font-size:13px;color:rgba(255,255,255,.8);line-height:1.7;background:var(--bg3);border-radius:10px;padding:12px 14px;border-left:3px solid var(--purple)}
.debrief-edit{width:100%;padding:10px 12px;background:rgba(255,255,255,0.04);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--fb);font-size:13px;resize:vertical;min-height:80px;outline:none;margin-top:8px}
.debrief-edit:focus{border-color:var(--purple)}

/* Add call form */
.add-call-form{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px;display:none}
.add-call-form.open{display:block}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
@media(max-width:640px){.form-grid-3{grid-template-columns:1fr}}
.score-inputs{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:12px}

/* ════════════════════════════════════════════
   SECTION — MORNING MEETING
════════════════════════════════════════════ */
.mm-layout{display:grid;grid-template-columns:260px 1fr;gap:20px}
@media(max-width:900px){.mm-layout{grid-template-columns:1fr}}

/* Sidebar meetings */
.mm-sidebar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.mm-sidebar-head{padding:16px 18px;border-bottom:1px solid var(--border);font-family:var(--fh);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.mm-list{padding:8px}
.mm-item{padding:10px 12px;border-radius:10px;cursor:pointer;transition:background .15s;margin-bottom:4px}
.mm-item:hover{background:rgba(255,255,255,0.04)}
.mm-item.active{background:rgba(96,165,250,0.08);border:1px solid rgba(96,165,250,0.15)}
.mm-item-date{font-family:var(--fh);font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.mm-item-day{font-size:10px;color:var(--muted);margin-top:2px}
.mm-item-preview{font-size:10px;color:var(--muted2);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mm-day-label{padding:6px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted2)}

/* MM main */
.mm-main{}
.mm-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
.mm-card-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.mm-card-title{font-family:var(--fh);font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.mm-card-body{padding:16px 20px}

/* Meeting link */
.meet-link-box{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(96,165,250,0.06);border:1px solid rgba(96,165,250,0.2);border-radius:10px;margin-bottom:16px}
.meet-link-icon{font-size:22px;flex-shrink:0}
.meet-link-text{flex:1;min-width:0}
.meet-link-label{font-size:11px;color:var(--muted);margin-bottom:2px}
.meet-link-url{font-size:12px;font-family:var(--fm);color:var(--blue);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meet-link-url a{color:var(--blue);text-decoration:none}
.meet-link-url a:hover{text-decoration:underline}
.btn-copy{padding:6px 12px;background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.2);border-radius:8px;color:var(--blue);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;flex-shrink:0}
.btn-copy:hover{background:rgba(96,165,250,0.18)}

/* Agenda items */
.agenda-list{display:flex;flex-direction:column;gap:6px}
.agenda-item{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;border-radius:8px;background:var(--bg3);border-left:3px solid var(--ag-color,var(--blue))}
.agenda-bullet{flex-shrink:0;margin-top:2px;font-size:14px}
.agenda-text{font-size:13px;line-height:1.5}
.agenda-item.done .agenda-text{text-decoration:line-through;color:var(--muted)}

/* Questions section */
.questions-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.question-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px}
.q-av{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white;flex-shrink:0;margin-top:2px}
.q-body{flex:1}
.q-author{font-size:11px;font-weight:700;margin-bottom:3px}
.q-text{font-size:12px;color:rgba(255,255,255,.8);line-height:1.5}
.q-answer{font-size:12px;color:var(--green);margin-top:6px;padding-top:6px;border-top:1px solid var(--border);display:flex;gap:6px}
.q-answer::before{content:'↳';flex-shrink:0}
.q-actions{display:flex;gap:6px;margin-top:6px}
.q-time{font-size:10px;color:var(--muted2);margin-top:2px}

/* Summary */
.summary-block{font-size:13px;line-height:1.8;color:rgba(255,255,255,.85);white-space:pre-wrap}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:none;border-radius:9px;font-family:var(--fb);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--purple);color:white}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-blue{background:var(--blue);color:#0a0e1a}
.btn-blue:hover{opacity:.9}
.btn-ghost{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{background:rgba(255,255,255,.1);color:var(--text)}
.btn-green{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.2);color:var(--green)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-icon{width:32px;height:32px;padding:0;display:inline-flex;align-items:center;justify-content:center}

/* Shared */
.sep{height:1px;background:var(--border);margin:16px 0}
.tag{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;border:1px solid}
.empty-state{padding:32px;text-align:center;color:var(--muted2);font-size:13px}
.empty-icon{font-size:32px;margin-bottom:8px}

textarea,input[type=text],input[type=url],input[type=date],select{
  background:rgba(255,255,255,.04);border:1.5px solid var(--border);
  border-radius:9px;color:var(--text);font-family:var(--fb);font-size:13px;
  outline:none;transition:border-color .15s;width:100%;padding:9px 12px;
}
textarea:focus,input[type=text]:focus,input[type=url]:focus,input[type=date]:focus,select:focus{border-color:var(--purple)}
textarea::placeholder,input::placeholder{color:var(--muted2)}
select option{background:#1a1a2e}
label.flabel{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.fgroup{display:flex;flex-direction:column;gap:4px}

/* ── Visio Settings Panel ── */
.visio-panel{background:var(--bg2);border:1px solid rgba(96,165,250,.25);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.visio-panel-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.visio-panel-head:hover{background:rgba(255,255,255,.02)}
.visio-panel-body{padding:18px;display:none}
.visio-panel-body.open{display:block}
.radio-group{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.radio-opt{display:flex;align-items:center;gap:6px;padding:7px 12px;background:var(--bg3);border:1.5px solid var(--border);border-radius:9px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.radio-opt:hover{border-color:var(--border2)}
.radio-opt.selected{border-color:var(--blue);background:rgba(96,165,250,.08);color:var(--blue)}
.radio-opt input{display:none}

/* ── CALENDAR ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
@media(max-width:700px){.cal-grid{grid-template-columns:repeat(3,1fr)}}
.cal-day{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;min-height:80px;position:relative;transition:border-color .15s}
.cal-day.has-meeting{border-color:rgba(96,165,250,0.3);cursor:pointer}
.cal-day.has-meeting:hover{border-color:rgba(96,165,250,0.6);background:rgba(96,165,250,.04)}
.cal-day.today{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.04)}
.cal-day.selected{border-color:var(--purple)!important;background:rgba(167,139,250,.06)!important}
.cal-day-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.cal-day-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
.cal-day-num{font-family:var(--fh);font-size:18px;font-weight:800;line-height:1}
.cal-day.today .cal-day-num{color:var(--gold)}
.cal-meeting-pill{padding:4px 8px;border-radius:6px;font-size:11px;font-weight:700;margin-top:4px;cursor:pointer;transition:opacity .15s}
.cal-meeting-pill:hover{opacity:.8}
.cal-meeting-pill.terminé{background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.cal-meeting-pill.avenir{background:rgba(96,165,250,.1);color:var(--blue);border:1px solid rgba(96,165,250,.2)}
.cal-add-btn{position:absolute;bottom:6px;right:6px;width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.06);border:1px dashed rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted2);cursor:pointer;transition:all .15s}
.cal-add-btn:hover{background:rgba(167,139,250,.15);border-color:var(--purple);color:var(--purple)}
</style>
</head>
<body>
<script>
/* ════════════════════════════════════════════════════════════
   DATA STORE — persistance localStorage
════════════════════════════════════════════════════════════ */
function lsGet(k, def) {
  try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; }
}
function lsSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

/* ── Members ── */
const MEMBERS = [
  { uid:'guillaume', name:'Guillaume', surname:'Bilcke', role:'Closer + Setter', color:'#ef4444',
    email:'guillaume@ambitiocorp.com', phone:'+33 6 00 00 00 00',
    contrat:'Closing & Setting Full Cycle', dateDebut:'Septembre 2025', statut:'Actif',
    linkedin:'https://linkedin.com/in/guillaumebilcke',
  },
  { uid:'elodie', name:'Élodie', surname:'', role:'Closer + Setter', color:'#60a5fa',
    email:'elodie@ambitiocorp.com', phone:'',
    contrat:'Closing & Setting Full Cycle', dateDebut:'Juillet 2025', statut:'Actif',

function saveProfile(uid) {
  const data = {
    name:     document.getElementById('pf-name-' + uid)?.value.trim() || '',
    surname:  document.getElementById('pf-surname-' + uid)?.value.trim() || '',
    email:    document.getElementById('pf-email-' + uid)?.value.trim() || '',
    phone:    document.getElementById('pf-phone-' + uid)?.value.trim() || '',
    linkedin: document.getElementById('pf-linkedin-' + uid)?.value.trim() || '',
    role:     document.getElementById('pf-role-' + uid)?.value.trim() || '',
    contrat:  document.getElementById('pf-contrat-' + uid)?.value.trim() || '',
    dateDebut:document.getElementById('pf-debut-' + uid)?.value.trim() || '',
    statut:   document.getElementById('pf-statut-' + uid)?.value || 'Actif',
    objectif: document.getElementById('pf-objectif-' + uid)?.value.trim() || '',
    bio:      document.getElementById('pf-bio-' + uid)?.value.trim() || '',
  };
  lsSet('equipe_profile_' + uid, data);
  lsSet('equipe_notes_' + uid, document.getElementById('pf-notes-' + uid)?.value || '');
  // Update in-memory MEMBERS for header refresh
  const m = MEMBERS.find(m => m.uid === uid);
  if (m) Object.assign(m, data);
  // Refresh header only
  const hdr = document.querySelector(`#espace-${uid} .espace-name`);
  if (hdr) hdr.textContent = data.name + ' ' + data.surname;
  toast('✅ Profil sauvegardé');
}

function saveNotes(uid) {
  const val = document.getElementById('notes-' + uid)?.value || '';

  toast('✅ Notes sauvegardées');
}

/* ── Docs ── */
function renderDocsList(uid) {
  const docs = getMemberDocs(uid);
  if (!docs.length) return `<div class="empty-state"><div class="empty-icon">📁</div>Aucun document partagé pour l'instant</div>`;
  return docs.map((d, i) => `
    <div class="doc-row">
      <div class="doc-icon" style="background:rgba(255,255,255,.05)">${d.type}</div>
      <div class="doc-info">
        <div class="doc-name">${d.name}</div>
        <div class="doc-meta">${d.desc||''} ${d.date ? '· Ajouté le ' + d.date : ''}</div>
      </div>
      <div class="doc-actions">
        ${d.url ? `<a href="${d.url}" target="_blank"><button class="btn btn-ghost btn-sm">Ouvrir →</button></a>` : ''}
        <button class="btn btn-ghost btn-sm btn-icon" onclick="deleteDoc('${uid}',${i})" style="color:var(--muted2)">✕</button>
      </div>
    </div>`).join('');
}

function openAddDoc(uid) { document.getElementById('add-doc-form-' + uid).style.display = 'block'; }
function closeAddDoc(uid) { document.getElementById('add-doc-form-' + uid).style.display = 'none'; }

function addDoc(uid) {
  const name = document.getElementById('doc-name-' + uid)?.value.trim();
  if (!name) return;
  const docs = getMemberDocs(uid);
  docs.push({
    name,
    url:  document.getElementById('doc-url-' + uid)?.value.trim(),
    type: document.getElementById('doc-type-' + uid)?.value || '📄',
    desc: document.getElementById('doc-desc-' + uid)?.value.trim(),
    date: new Date().toLocaleDateString('fr-FR'),
  });
  setMemberDocs(uid, docs);
  closeAddDoc(uid);
  document.getElementById('docs-list-' + uid).innerHTML = renderDocsList(uid);
  toast('📎 Document ajouté');
}

function deleteDoc(uid, i) {
  const docs = getMemberDocs(uid);
  docs.splice(i, 1);
  setMemberDocs(uid, docs);
  document.getElementById('docs-list-' + uid).innerHTML = renderDocsList(uid);
}

/* ── Messages ── */
function renderFeed(uid) {
  const msgs = getMemberMsgs(uid);
  if (!msgs.length) return `<div class="empty-state"><div class="empty-icon">💬</div>Aucun message pour l'instant</div>`;
  return msgs.map(msg => {
    const isHead = msg.from === 'head';
    const av = isHead ? 'A' : uid[0].toUpperCase();
    const color = isHead ? '#a78bfa' : MEMBERS.find(m => m.uid === uid)?.color || '#60a5fa';
    return `<div class="msg-bubble">
      <div class="msg-av" style="background:${color}88;border:1.5px solid ${color}33">${av}</div>
      <div class="msg-content">
        <div class="msg-header">
          <span class="msg-author">${isHead ? 'Head of Sales' : MEMBERS.find(m=>m.uid===uid)?.name}</span>
          <span class="msg-role-tag" style="background:${isHead?'rgba(167,139,250,.1)':'rgba(255,255,255,.05)'};color:${isHead?'var(--purple)':'var(--muted)'}">${isHead?'👑 Admin':'👤'}</span>
          <span class="msg-time">${new Date(msg.ts).toLocaleDateString('fr-FR')} à ${new Date(msg.ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</span>
        </div>
        <div class="msg-text ${isHead?'head-msg':''}">${msg.text}</div>
      </div>
    </div>`;
  }).join('');
}

function sendMsg(uid) {
  const input = document.getElementById('compose-' + uid);
  const text = input?.value.trim();
  if (!text) return;
  const msgs = getMemberMsgs(uid);
  msgs.push({ from: 'head', text, ts: Date.now() });
  setMemberMsgs(uid, msgs);
  input.value = '';
  document.getElementById('feed-' + uid).innerHTML = renderFeed(uid);
  toast('✅ Message envoyé');
}

      <div class="fgroup" style="margin-bottom:10px"><label class="flabel">Points forts</label><textarea id="cc-forts-${m.uid}" placeholder="Ce qui a bien marché..." rows="2"></textarea></div>
      <div class="fgroup" style="margin-bottom:10px"><label class="flabel">Axes d'amélioration</label><textarea id="cc-axes-${m.uid}" placeholder="Ce à quoi travailler..." rows="2"></textarea></div>
      <div class="fgroup" style="margin-bottom:12px"><label class="flabel">Note du Head of Sales</label><textarea id="cc-note-${m.uid}" placeholder="Commentaire et directive..." rows="2"></textarea></div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-ghost btn-sm" onclick="closeAddCall('${m.uid}')">Annuler</button>
        <button class="btn btn-primary btn-sm" onclick="addCall('${m.uid}')">✓ Enregistrer</button>
      </div>
    </div>

    <!-- Calls list -->
    <div class="calls-grid" id="calls-grid-${m.uid}">
      ${renderCallCards(m.uid, calls)}
    </div>
  `;
}

function renderCallCards(uid, calls) {
  if (!calls.length) return `<div class="empty-state"><div class="empty-icon">📞</div>Aucun appel enregistré pour l'instant</div>`;
  return calls.slice().reverse().map((c, ri) => {
    const i = calls.length - 1 - ri;
    const avgScore = c.scores ? Object.values(c.scores).reduce((a,b)=>a+(+b||0),0) / Object.keys(c.scores).length : null;
    const scoreColor = avgScore >= 4.5 ? 'var(--green)' : avgScore >= 3.5 ? 'var(--gold)' : avgScore >= 2.5 ? 'var(--orange)' : 'var(--red)';
    const typeColor = c.type === 'Closing' ? '#ef4444' : c.type === 'Setting' ? '#60a5fa' : '#a78bfa';
    return `
    <div class="call-card" id="cc-card-${uid}-${i}">
      <div class="call-card-head" onclick="toggleCall('${uid}',${i})">
        <div class="call-card-icon" style="background:${typeColor}18;color:${typeColor}">📞</div>
        <div class="call-card-info">
          <div class="call-card-title">${c.client}</div>
          <div class="call-card-meta">
            <span>${new Date(c.date).toLocaleDateString('fr-FR')}</span>
            <span>·</span><span>${c.duree || '—'}</span>
            <span class="call-card-badge" style="background:${typeColor}18;color:${typeColor}">${c.type}</span>
            <span class="call-card-badge" style="background:${c.statut==='Débriefé'?'rgba(52,211,153,.1)':'rgba(245,158,11,.1)'};color:${c.statut==='Débriefé'?'var(--green)':'var(--gold)'}">${c.statut}</span>
          </div>
        </div>
        ${avgScore ? `<div style="font-family:var(--fm);font-size:18px;font-weight:500;color:${scoreColor};flex-shrink:0">${avgScore.toFixed(1)}<span style="font-size:11px;color:var(--muted)">/5</span></div>` : ''}
        <span class="call-card-chevron">▶</span>
      </div>
      <div class="call-card-body">
        ${c.lien ? `<div style="margin-top:12px"><a href="${c.lien}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;color:var(--blue);font-size:12px">▶ Voir l'enregistrement</a></div>` : ''}
        ${c.scores && Object.keys(c.scores).length ? `
          <div class="score-grid">
            ${Object.entries(c.scores).map(([k,v]) => `
              <div class="score-item">
                <div class="score-label">${k.charAt(0).toUpperCase()+k.slice(1)}</div>
                <div class="score-val" style="color:${+v>=4.5?'var(--green)':+v>=3.5?'var(--gold)':'var(--orange)'}">${v||'—'}</div>
                <div class="score-star">${'⭐'.repeat(+v||0)}</div>
              </div>`).join('')}
          </div>` : ''}
        ${c.points_forts ? `<div class="debrief-block"><div class="debrief-title" style="color:var(--green)">✅ Points forts</div><div class="debrief-content" style="border-left-color:var(--green)">${c.points_forts}</div></div>` : ''}
        ${c.axes_amelioration ? `<div class="debrief-block" style="margin-top:10px"><div class="debrief-title" style="color:var(--orange)">🔧 Axes d'amélioration</div><div class="debrief-content" style="border-left-color:var(--orange)">${c.axes_amelioration}</div></div>` : ''}
        ${c.note_head ? `<div class="debrief-block" style="margin-top:10px"><div class="debrief-title" style="color:var(--purple)">👑 Note du Head of Sales</div><div class="debrief-content" style="border-left-color:var(--purple)">${c.note_head}</div></div>` : ''}
        <div class="debrief-block" style="margin-top:14px;border-top:1px solid var(--border);padding-top:14px">
          <div class="debrief-title" style="margin-bottom:12px">✏️ Éditer le débrief</div>
          
          <!-- Scores éditables -->
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-bottom:8px">Scores /5</div>
          <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px" id="stars-grid-${uid}-${i}">
            ${renderStarsGrid(uid, i, c.scores)}
          </div>
          
          <textarea class="debrief-edit" id="edit-forts-${uid}-${i}" placeholder="Points forts...">${c.points_forts||''}</textarea>
          <textarea class="debrief-edit" id="edit-axes-${uid}-${i}" placeholder="Axes d'amélioration..." style="margin-top:6px">${c.axes_amelioration||''}</textarea>
          <textarea class="debrief-edit" id="edit-note-${uid}-${i}" placeholder="Note du Head of Sales..." style="margin-top:6px">${c.note_head||''}</textarea>
          <div style="display:flex;gap:8px;margin-top:10px;justify-content:space-between;align-items:center">
            <select id="edit-statut-${uid}-${i}" style="width:auto;min-width:140px">
              <option ${c.statut==='En attente'?'selected':''}>En attente</option>

function toggleCall(uid, i) {
  const card = document.getElementById(`cc-card-${uid}-${i}`);
  if (card) card.classList.toggle('open');
}

function openAddCall(uid) { document.getElementById('add-call-form-' + uid).classList.add('open'); }
function closeAddCall(uid) { document.getElementById('add-call-form-' + uid).classList.remove('open'); }

function addCall(uid) {
  const client = document.getElementById('cc-client-' + uid)?.value.trim();
  if (!client) return;
  const scores = {};
  ['ouverture','decouverte','pitch','objections','closing'].forEach(s => {
    const v = document.getElementById(`cc-${s}-${uid}`)?.value;
    if (v) scores[s] = +v;
  });
  const calls = getCallBreakdowns(uid);
  calls.push({
    id: 'c' + Date.now(), client,
    date: document.getElementById('cc-date-' + uid)?.value || new Date().toISOString().split('T')[0],
    duree: document.getElementById('cc-duree-' + uid)?.value,
    type: document.getElementById('cc-type-' + uid)?.value || 'Closing',
    lien: document.getElementById('cc-lien-' + uid)?.value,
    scores,
    points_forts:       document.getElementById('cc-forts-' + uid)?.value || '',
    axes_amelioration:  document.getElementById('cc-axes-' + uid)?.value || '',
    note_head:          document.getElementById('cc-note-' + uid)?.value || '',
    statut: 'En attente',
  });
  setCallBreakdowns(uid, calls);
  closeAddCall(uid);
  renderCbPanel(MEMBERS.find(m => m.uid === uid));
  toast('✅ Appel enregistré');
}

// ── Render star grid (pure function, no nested template literals) ──
function renderStarsGrid(uid, i, scores) {
  const keys = ['ouverture','decouverte','pitch','objections','closing'];
  let html = '';
  keys.forEach(function(key) {
    const val = (scores && scores[key]) ? +scores[key] : 0;
    let stars = '';
    for (let n = 1; n <= 5; n++) {
      const filled = val >= n;
      stars += '<span class="star ' + (filled ? 'on' : '') + '" '
        + 'onclick="setStar(\'' + uid + '\',' + i + ',\'' + key + '\',' + n + ')" '
        + 'style="cursor:pointer;font-size:20px;line-height:1.2;user-select:none;transition:transform .1s" '
        + 'onmouseover="this.style.transform=\'scale(1.2)\'" '
        + 'onmouseout="this.style.transform=\'scale(1)\'">'
        + (filled ? '⭐' : '☆') + '</span>';
    }
    html += '<div style="text-align:center">'
      + '<div style="font-size:10px;color:rgba(255,255,255,.4);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.4px">' + key.charAt(0).toUpperCase() + key.slice(1) + '</div>'
      + '<div class="star-rating" id="stars-' + uid + '-' + i + '-' + key + '" style="display:flex;justify-content:center;gap:1px">' + stars + '</div>'
      + '<input type="hidden" id="score-' + uid + '-' + i + '-' + key + '" value="' + val + '"/>'
      + '</div>';
  });
  return html;
}

// Interactive star click
function setStar(uid, i, scoreKey, val) {
  const hiddenInput = document.getElementById('score-' + uid + '-' + i + '-' + scoreKey);
  if (hiddenInput) hiddenInput.value = val;
  const container = document.getElementById('stars-' + uid + '-' + i + '-' + scoreKey);
  if (!container) return;
  container.querySelectorAll('.star').forEach(function(star, idx) {
    const on = idx < val;
    star.textContent = on ? '⭐' : '☆';
    star.classList.toggle('on', on);
  });
  // Auto-save on star change
  scheduleAutoSave(uid, i);
}

// Auto-save debounce per call
const _autoSaveTimers = {};
function scheduleAutoSave(uid, i) {
  const key = uid + '-' + i;
  clearTimeout(_autoSaveTimers[key]);
  _autoSaveTimers[key] = setTimeout(function() { saveCall(uid, i, true); }, 900);
}

function saveCall(uid, i, silent) {
  const calls = getCallBreakdowns(uid);
  if (!calls[i]) return;
  calls[i].points_forts      = document.getElementById('edit-forts-' + uid + '-' + i)?.value || '';
  calls[i].axes_amelioration = document.getElementById('edit-axes-' + uid + '-' + i)?.value || '';
  calls[i].note_head         = document.getElementById('edit-note-' + uid + '-' + i)?.value || '';
  calls[i].statut            = document.getElementById('edit-statut-' + uid + '-' + i)?.value || 'En attente';
  // Collect scores from hidden inputs
  const scores = {};
  ['ouverture','decouverte','pitch','objections','closing'].forEach(function(s) {
    const el = document.getElementById('score-' + uid + '-' + i + '-' + s);
    if (el && el.value && +el.value > 0) scores[s] = +el.value;
  });
  if (Object.keys(scores).length) calls[i].scores = scores;
  setCallBreakdowns(uid, calls);
  // Update statut badge in header
  const c = calls[i];
  const card = document.getElementById('cc-card-' + uid + '-' + i);
  if (card) {
    card.querySelectorAll('.call-card-badge').forEach(function(b) {
      if (b.textContent === 'Débriefé' || b.textContent === 'En attente') {
        b.textContent = c.statut;
        b.style.background = c.statut === 'Débriefé' ? 'rgba(52,211,153,.1)' : 'rgba(245,158,11,.1)';
        b.style.color = c.statut === 'Débriefé' ? 'var(--green)' : 'var(--gold)';
      }
    });
    // Update avg score display
    if (c.scores && Object.keys(c.scores).length) {
      const vals = Object.values(c.scores).map(Number);
      const avg = vals.reduce(function(a,b){return a+b;},0) / vals.length;
      const avgEl = card.querySelector('.score-avg-display');
      if (avgEl) avgEl.textContent = avg.toFixed(1);
    }
  }
  if (!silent) toast('✅ Débrief sauvegardé');
  else showAutoSaveDot(uid, i);
}

function showAutoSaveDot(uid, i) {
  const btn = document.querySelector('#cc-card-' + uid + '-' + i + ' .save-indicator');
  if (!btn) return;
  btn.textContent = '✓ Sauvegardé';
  btn.style.opacity = '1';
  setTimeout(function() { btn.style.opacity = '0'; }, 2000);
}

function deleteCall(uid, i) {
  const calls = getCallBreakdowns(uid);
  calls.splice(i, 1);
  setCallBreakdowns(uid, calls);
  renderCbPanel(MEMBERS.find(m => m.uid === uid));
}

// Calendar state
let calWeekOffset = 0; // 0 = current week

function getWeekStart(offset) {
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
  monday.setHours(0,0,0,0);
  return monday;
}

function calPrevWeek() { calWeekOffset--; renderCalendar(); }
function calNextWeek() { calWeekOffset++; renderCalendar(); }
function calGoToday()  { calWeekOffset = 0; renderCalendar(); }

function renderMeeting() {
  const meetings = getMeetings();
  // Auto-select most recent past or next upcoming
  if (!currentMeeting) {
    const today = new Date().toISOString().split('T')[0];
    const past = meetings.filter(m => m.date <= today).sort((a,b)=>b.date.localeCompare(a.date));
    currentMeeting = (past[0] || meetings[0])?.id || null;
  }
  renderCalendar();
  renderMeetingDetail();
  setTimeout(updateVisioPanelPreview, 50);
}

function renderCalendar() {
  const meetings = getMeetings();
  const weekStart = getWeekStart(calWeekOffset);
  
  // Build 7 days
  const DAYS_FR = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  const today = new Date(); today.setHours(0,0,0,0);
  
  // Week label
  const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);
  const fmt = d => d.toLocaleDateString('fr-FR', {day:'numeric', month:'long'});
  document.getElementById('cal-week-label').textContent = `${fmt(weekStart)} — ${fmt(weekEnd)} ${weekStart.getFullYear()}`;
  
  let html = '<div class="cal-grid">';
  for (let d = 0; d < 7; d++) {
    const day = new Date(weekStart); day.setDate(weekStart.getDate() + d);
    const dateStr = day.toISOString().split('T')[0];
    const isToday = day.getTime() === today.getTime();
    const dayMeetings = meetings.filter(m => m.date === dateStr);
    const hasMeeting = dayMeetings.length > 0;
    const isSelected = dayMeetings.some(m => m.id === currentMeeting);
    const isMmDay = d === 0 || d === 2 || d === 4; // Lun, Mer, Ven
    
    html += `<div class="cal-day ${hasMeeting?'has-meeting':''} ${isToday?'today':''} ${isSelected?'selected':''}" ${hasMeeting?`onclick="selectMeeting('${dayMeetings[0].id}')"`:''}">
      <div class="cal-day-header">
        <div class="cal-day-name">${DAYS_FR[d]}</div>
        <div class="cal-day-num" ${isToday?'style="color:var(--gold)"':''}>${day.getDate()}</div>
      </div>
      ${dayMeetings.map(m => `<div class="cal-meeting-pill ${m.statut==='À venir'?'avenir':'terminé'}" onclick="event.stopPropagation();selectMeeting('${m.id}')">
        ☀️ ${m.heure}
      </div>`).join('')}
      ${isMmDay && !hasMeeting ? `<div class="cal-add-btn" onclick="openAddMeetingDate('${dateStr}','${DAYS_FR[d]}')" title="Créer meeting">+</div>` : ''}
    </div>`;
  }
  html += '</div>';
  document.getElementById('cal-week-grid').innerHTML = html;
}

function getWeekLabel(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const diffWeeks = Math.round((now - d) / (7 * 86400000));
  if (diffWeeks <= 0) return 'Cette semaine & à venir';
  if (diffWeeks === 1) return 'Semaine passée';
  return `Il y a ${diffWeeks} semaines`;
}

function formatDate(dateStr) {
  return new Date(dateStr).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
}

  currentMeeting = id;

          <textarea rows="6" id="resume-ta-${meeting.id}" style="margin-bottom:8px">${meeting.resume||''}</textarea>
          <div style="display:flex;gap:8px;justify-content:flex-end">
            <button class="btn btn-ghost btn-sm" onclick="toggleResumeEdit('${meeting.id}')">Annuler</button>
            <button class="btn btn-primary btn-sm" onclick="saveResume('${meeting.id}')">💾 Sauvegarder</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderQuestions(meeting) {
  if (!meeting.questions.length) return `<div class="empty-state" style="padding:16px;text-align:center;color:var(--muted2);font-size:12px">Aucune question pour l'instant — pose la tienne ↑</div>`;
  return meeting.questions.map((q, i) => {
    const member = MEMBERS.find(m => m.uid === q.uid) || { name: 'Head of Sales', color: '#a78bfa' };
    return `
    <div class="question-item">
      <div class="q-av" style="background:${member.color}88">${member.name[0]}</div>
      <div class="q-body">
        <div class="q-author">${member.name} <span style="font-size:10px;color:var(--muted);font-weight:400">${new Date(q.ts).toLocaleDateString('fr-FR')}</span></div>
        <div class="q-text">${q.text}</div>
        ${q.reponse ? `<div class="q-answer">${q.reponse}</div>` : `
          <div class="q-actions">
            <input type="text" id="rep-${meeting.id}-${i}" placeholder="Répondre..." style="font-size:11px;padding:5px 9px;flex:1"/>
            <button class="btn btn-ghost btn-sm" onclick="answerQuestion('${meeting.id}',${i})">Répondre</button>
          </div>`}
      </div>
    </div>`;
  }).join('');
}

function openAddQuestion(id) { document.getElementById('add-q-form-' + id).style.display = 'block'; }
function closeAddQuestion(id) { document.getElementById('add-q-form-' + id).style.display = 'none'; }

function addQuestion(meetingId) {
  const text = document.getElementById('q-text-' + meetingId)?.value.trim();
  if (!text) return;
  const who = document.getElementById('q-who-' + meetingId)?.value || 'equipe';
  const meetings = getMeetings();
  const m = meetings.find(m => m.id === meetingId);
  if (!m) return;
  m.questions.push({ uid: who, text, reponse: '', ts: Date.now() });
  setMeetings(meetings);
  closeAddQuestion(meetingId);
  document.getElementById('q-list-' + meetingId).innerHTML = renderQuestions(m);
  toast('✅ Question ajoutée');
}

function answerQuestion(meetingId, qi) {
  const rep = document.getElementById(`rep-${meetingId}-${qi}`)?.value.trim();
  if (!rep) return;
  const meetings = getMeetings();
  const m = meetings.find(m => m.id === meetingId);
  if (!m) return;
  m.questions[qi].reponse = rep;
  setMeetings(meetings);
  document.getElementById('q-list-' + meetingId).innerHTML = renderQuestions(m);
  toast('✅ Réponse ajoutée');
}

function toggleAgendaEdit(meetingId) {
  const editDiv = document.getElementById('agenda-edit-' + meetingId);
  const viewDiv = document.getElementById('agenda-view-' + meetingId);
  const btn = document.getElementById('agenda-edit-btn-' + meetingId);
  const isEditing = editDiv.style.display !== 'none';
  editDiv.style.display = isEditing ? 'none' : 'block';
  if (btn) btn.textContent = isEditing ? '✏️ Modifier' : '✕ Fermer';
}

function deleteSujet(meetingId, si) {
  const row = document.getElementById(`sujet-row-${meetingId}-${si}`);
  if (row) row.style.opacity = '0.3';
  // Mark as deleted with data attr
  const inp = document.getElementById(`sujet-inp-${meetingId}-${si}`);
  if (inp) inp.dataset.deleted = '1';
}

function saveAgenda(meetingId) {
  const meetings = getMeetings();
  const m = meetings.find(m => m.id === meetingId);
  if (!m) return;
  // Collect non-deleted existing sujets
  const newSujets = [];
  let si = 0;
  while (document.getElementById(`sujet-inp-${meetingId}-${si}`)) {
    const inp = document.getElementById(`sujet-inp-${meetingId}-${si}`);
    if (inp && !inp.dataset.deleted && inp.value.trim()) {
      newSujets.push(inp.value.trim());
    }
    si++;
  }
  // Add new one if filled
  const newInput = document.getElementById('new-sujet-' + meetingId);
  if (newInput?.value.trim()) { newSujets.push(newInput.value.trim()); newInput.value=''; }
  m.sujets = newSujets;
  setMeetings(meetings);
  // Refresh view and close edit
  const viewDiv = document.getElementById('agenda-view-' + meetingId);
  if (viewDiv) viewDiv.innerHTML = m.sujets.map((s, i) => `
    <div class="agenda-item" style="--ag-color:${i===0?'var(--blue)':i===1?'var(--purple)':'var(--border2)'}">
      <div class="agenda-bullet" style="color:${i===0?'var(--blue)':i===1?'var(--purple)':'var(--muted)'}">◆</div>
      <div class="agenda-text">${s}</div>
    </div>`).join('') || '<div style="color:var(--muted2);font-size:13px;padding:8px 0">Aucun sujet défini</div>';
  toggleAgendaEdit(meetingId);
  toast('✅ Ordre du jour sauvegardé');
}

function addSujet(meetingId) {
  const input = document.getElementById('new-sujet-' + meetingId);
  const text = input?.value.trim();
  if (!text) return;
  // Just add a new row in the edit list
  const list = document.getElementById('sujets-edit-list-' + meetingId);
  if (list) {
    const si = list.querySelectorAll('.sujet-edit-row').length;
    const row = document.createElement('div');
    row.className = 'sujet-edit-row';
    row.id = `sujet-row-${meetingId}-${si}`;
    row.style.cssText = 'display:flex;gap:6px;margin-bottom:6px;align-items:center';
    row.innerHTML = `<span style="color:var(--muted);font-size:12px;width:16px;flex-shrink:0">${si+1}.</span>
      <input type="text" id="sujet-inp-${meetingId}-${si}" value="${text}" style="flex:1"/>
      <button class="btn btn-ghost btn-sm btn-icon" onclick="deleteSujet('${meetingId}',${si})" style="color:var(--muted2);flex-shrink:0">✕</button>`;
    list.appendChild(row);
    input.value = '';
  }
}

function toggleResumeEdit(id) {
  const view = document.getElementById('resume-view-' + id);
  const edit = document.getElementById('resume-edit-' + id);
  const showEdit = edit.style.display === 'none';
  view.style.display = showEdit ? 'none' : 'block';
  edit.style.display = showEdit ? 'block' : 'none';
}

function saveResume(meetingId) {
  const ta = document.getElementById('resume-ta-' + meetingId);
  const meetings = getMeetings();
  const m = meetings.find(m => m.id === meetingId);
  if (!m) return;
  m.resume = ta?.value || '';
  setMeetings(meetings);
  toggleResumeEdit(meetingId);
  document.getElementById('resume-view-' + meetingId).innerHTML = m.resume
    ? `<div class="summary-block">${m.resume}</div>`
    : `<div class="empty-state" style="padding:16px"><div class="empty-icon">📝</div>Résumé à rédiger après le meeting</div>`;
  toast('✅ Résumé sauvegardé');
}

function setMeetingStatut(id, statut) {
  const meetings = getMeetings();
  const m = meetings.find(m => m.id === id);
  if (m) { m.statut = statut; setMeetings(meetings); renderCalendar(); renderMeetingDetail(); }
}

function openAddMeeting() {
  document.getElementById('nm-date').value = '';
  document.getElementById('add-meeting-modal').style.display = 'flex';
}
function openAddMeetingDate(dateStr, dayName) {
  document.getElementById('nm-date').value = dateStr;
  const jourMap = {'Lun':'Lundi','Mar':'Mardi','Mer':'Mercredi','Jeu':'Jeudi','Ven':'Vendredi','Sam':'Samedi','Dim':'Dimanche'};
  const sel = document.getElementById('nm-jour');
  const mapped = jourMap[dayName] || 'Lundi';
  for (let i=0;i<sel.options.length;i++) { if(sel.options[i].value===mapped){sel.selectedIndex=i;break;} }
  document.getElementById('add-meeting-modal').style.display = 'flex';
}
function closeAddMeeting() {
  document.getElementById('add-meeting-modal').style.display = 'none';
}
function saveNewMeeting() {
  const date = document.getElementById('nm-date')?.value;
  const jour = document.getElementById('nm-jour')?.value;
  const sujet1 = document.getElementById('nm-sujet')?.value.trim();
  if (!date) return;
  const meetings = getMeetings();
  const newM = {
    id: 'm' + Date.now(), date, jourSemaine: jour, heure: '09h00',
    lien_meet: MEETING_LINK,
    sujets: sujet1 ? [sujet1] : [],
    questions: [], resume: '', statut: 'À venir',
  };
  meetings.push(newM);
  setMeetings(meetings);
  currentMeeting = newM.id;
  closeAddMeeting();
  renderCalendar();
  renderMeetingDetail();
  toast('✅ Meeting créé');
}

function openEditMeeting(id) { toast('ℹ️ Modifiez l\'ordre du jour via le bouton ✏️ Modifier, et le résumé via Éditer'); }

/* ── Visio link management ── */
let _visioScope = 'all_future';

function toggleVisioPanel() {
  const body = document.getElementById('visio-panel-body');
  const chev = document.getElementById('visio-chevron');
  const isOpen = body.classList.toggle('open');
  chev.textContent = isOpen ? '▲' : '▼';
  // Pre-fill with current link from selected meeting
  if (isOpen) {
    const meetings = getMeetings();
    const m = meetings.find(m => m.id === currentMeeting);
    const lien = m?.lien_meet || lsGet('visio_default_link', '') || '';
    document.getElementById('visio-new-lien').value = lien;
  }
}

function setVisioScope(scope) {
  _visioScope = scope;
  document.querySelectorAll('.radio-opt').forEach(el => {
    el.classList.toggle('selected', el.getAttribute('onclick').includes(`'${scope}'`));
  });
  const rangeDiv = document.getElementById('visio-range-inputs');
  if (rangeDiv) rangeDiv.style.display = scope === 'date_range' ? 'block' : 'none';
}

function applyVisioLink() {
  const newLien = document.getElementById('visio-new-lien')?.value.trim();
  if (!newLien) { toast('⚠️ Entrez un lien de réunion'); return; }
  const meetings = getMeetings();
  const today = new Date().toISOString().split('T')[0];
  let count = 0;

  if (_visioScope === 'all_future') {
    meetings.forEach(m => { if (m.date >= today) { m.lien_meet = newLien; count++; } });
  } else if (_visioScope === 'date_range') {
    const from = document.getElementById('visio-date-from')?.value;
    const to   = document.getElementById('visio-date-to')?.value;
    if (!from || !to) { toast('⚠️ Définissez la plage de dates'); return; }
    meetings.forEach(m => { if (m.date >= from && m.date <= to) { m.lien_meet = newLien; count++; } });
  } else if (_visioScope === 'selected') {
    const m = meetings.find(m => m.id === currentMeeting);
    if (m) { m.lien_meet = newLien; count = 1; }
  }

  // Also save as default for new meetings
  if (_visioScope === 'all_future') lsSet('visio_default_link', newLien);
  setMeetings(meetings);
  toggleVisioPanel();
  renderCalendar();
  renderMeetingDetail();
  toast(`✅ Lien mis à jour sur ${count} meeting${count > 1 ? 's' : ''}`);
}

function updateVisioPanelPreview() {
  const meetings = getMeetings();
  const m = meetings.find(m => m.id === currentMeeting);
  const lien = m?.lien_meet || '';
  const el = document.getElementById('visio-lien-preview');
  if (el) el.textContent = lien.length > 50 ? lien.slice(0, 50) + '…' : (lien || 'Non défini');
}

function copyLink(url) {
  navigator.clipboard?.writeText(url).then(() => toast('📋 Lien copié !'));
}

/* ════════════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════════════ */
function toast(msg) {
  let t = document.getElementById('_toast');
  if (!t) { t = document.createElement('div'); t.id = '_toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a2035;border:1px solid rgba(255,255,255,.15);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;transition:opacity .3s';
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}

document.addEventListener('DOMContentLoaded', () => {
  const nm = localStorage.getItem('ambitio_name') || 'Admin';
  document.getElementById('tb-nm').textContent = nm;
  document.getElementById('tb-av').textContent = nm[0].toUpperCase();
  // Load saved profiles into MEMBERS
  MEMBERS.forEach(m => {
    const saved = lsGet('equipe_profile_' + m.uid, null);
    if (saved) Object.assign(m, saved);
  });
  setMainTab('espaces');
});

        </div>

          <button class="btn btn-ghost btn-sm" onclick="toggleVisioPanel()">Annuler</button>
          <button class="btn btn-blue btn-sm" onclick="applyVisioLink()">✓ Appliquer le lien</button>

    <!-- Calendar header -->
