/* ═══════════════════════════════════════════════════════════

const DB = {
  months: ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'],

  // Données brutes saisies (remplacées par Firestore)
  _raw: {

      s2: { calls:8,  lives:4, offres:2, closes:2, hc:2, fu:0, contracte:12000, collecte:1000 },
      s3: { calls:9,  lives:6, offres:3, closes:1, hc:1, fu:0, contracte:5400,  collecte:400  },
      s4: { calls:9,  lives:7, offres:2, closes:0, hc:0, fu:0, contracte:1800,  collecte:200  },
    },
    setting: {

      s2: { leads:191, calls:324, decroches:54, propRdv:17, sets:11, presents:4, closes:2 },
      s3: { leads:127, calls:178, decroches:38, propRdv:16, sets:11, presents:4, closes:1 },
      s4: { leads:100, calls:150, decroches:28, propRdv:15, sets:10, presents:4, closes:0 },
    },
    deals: [
      { client:'Julie Berchoux',     email:'julieberchoux@icloud.com',         offre:'BP 12', type:'Closing', date:'24/01/2026', cHT:6000, coHT:500,  comm:500, bonus:0, notes:'Setting après self booking', ok:true  },
      { client:'Corinne Alaga',      email:'contact@lestabliersgourmands.com', offre:'BP 12', type:'Setting', date:'27/01/2026', cHT:null, coHT:null,  comm:125, bonus:0, notes:"Setting d'un close d'Elodie", ok:true  },
      { client:'Belinda Giangiulio', email:'lesdemoisellesduvrac@gmail.com',   offre:'BP 12', type:'Closing', date:'30/01/2026', cHT:6000, coHT:500,  comm:500, bonus:0, notes:'Setting no-booking',         ok:true  },
      { client:'Cecile Auneau',      email:'domcecile@gmail.com',              offre:'BP 12', type:'Closing', date:'09/02/2026', cHT:6000, coHT:500,  comm:500, bonus:0, notes:'Setting no-booking',         ok:true  },
      { client:'Justine Biton',      email:'lephildesidees@hotmail.com',       offre:'BP 12', type:'Closing', date:'09/02/2026', cHT:6000, coHT:500,  comm:500, bonus:0, notes:'Setting no-booking',         ok:true  },
    ],
  },

  // Calculé depuis _raw
  closing: null,
  setting: null,
  commissions: {
    'Janvier 2026': { contracte:12000, collecte:0,    totalComm:0,    statut:'Validé',     deals:[] },
    'Février 2026': { contracte:24000, collecte:2000, totalComm:2125, statut:'En attente', deals:[] },
    'Mars 2026':    { contracte:0,     collecte:0,    totalComm:1625, statut:'En attente', deals:[] },
  },
  team: {
    week: [
      { name:'Guillaume', role:'Closing + Setting', color:'#ef4444', contracte:33020, collecte:3342,  calls:23, lives:20, offres:14, closes:6, showup:0.87, txOffre:0.70,  txTransfoShow:0.30,  txTransfoOffre:0.429, caCall:1435.7 },
      { name:'Elodie',    role:'Closing',           color:'#60a5fa', contracte:22748, collecte:13629, calls:29, lives:24, offres:19, closes:7, showup:0.83, txOffre:0.792, txTransfoShow:0.292, txTransfoOffre:0.368, caCall:784.4  },
    ],
    month: [
      { name:'Guillaume', role:'Closing + Setting', color:'#ef4444', contracte:48469, collecte:4686, calls:56, lives:33, offres:17, closes:9, showup:0.589, txOffre:0.515, txTransfoShow:0.273, txTransfoOffre:0.529, caCall:721.3 },
      { name:'Elodie',    role:'Closing',           color:'#60a5fa', contracte:34069, collecte:3966, calls:46, lives:28, offres:13, closes:7, showup:0.609, txOffre:0.464, txTransfoShow:0.25,  txTransfoOffre:0.538, caCall:617.2 },
    ],
  },

  // Recalcule toutes les métriques depuis _raw
  compute() {
    const rc = DB._raw.closing;
    const rs = DB._raw.setting;
    const pc = PROJECTIONS.closing;
    const ps = PROJECTIONS.setting;

    const sumC  = k => ['s1','s2','s3','s4'].reduce((t,w) => t + (rc[w][k]||0), 0);
    const sumS  = k => ['s1','s2','s3','s4'].reduce((t,w) => t + (rs[w][k]||0), 0);
    const projC = k => ['s1','s2','s3','s4'].reduce((t,w) => t + (pc[w][k]||0), 0);
    const projS = k => ['s1','s2','s3','s4'].reduce((t,w) => t + (ps[w][k]||0), 0);

    const ca=sumC('calls'), la=sumC('lives'), oa=sumC('offres'), cla=sumC('closes');
    const cta=sumC('contracte'), cola=sumC('collecte');
    const cp=projC('calls'), lp=projC('lives'), op=projC('offres'), clp=projC('closes');
    const ctp=projC('contracte'), colp=projC('collecte');

    DB.closing = {
      mois: {
        calls:     {a:ca,  p:cp  },
        lives:     {a:la,  p:lp  },
        offres:    {a:oa,  p:op  },
        closes:    {a:cla, p:clp },
        hc:        {a:sumC('hc'), p:clp},
        fu:        {a:sumC('fu'), p:0  },
        contracte: {a:cta, p:ctp },
        collecte:  {a:cola,p:colp},
        livesP:  {a:ca>0  ? la/ca   : 0, p:pc.livesP  },
        offresP: {a:la>0  ? oa/la   : 0, p:pc.offresP },
        engP:    {a:oa>0  ? cla/oa  : 0, p:pc.engP    },
        cOffP:   {a:oa>0  ? cla/oa  : 0, p:pc.cOffP   },
        cCallP:  {a:ca>0  ? cla/ca  : 0, p:pc.cCallP  },
        cashLive:{a:la>0  ? cta/la  : 0, p:pc.cashLive},
        atteinte: ctp>0 ? cta/ctp : 0,
        delta:    Math.max(0, ctp-cta),
      },
      s1: DB._cw('s1'), s2: DB._cw('s2'), s3: DB._cw('s3'), s4: DB._cw('s4'),
    };

    const sca=sumS('calls'), da=sumS('decroches'), pa=sumS('propRdv');
    const sa=sumS('sets'), pra=sumS('presents'), sca2=sumS('closes');

    DB.setting = {
      mois: {
        leads:     {a:sumS('leads'),  p:projS('leads')    },
        calls:     {a:sca,            p:projS('calls')    },
        decroches: {a:da,             p:projS('decroches')},
        propRdv:   {a:pa,             p:projS('propRdv')  },
        sets:      {a:sa,             p:projS('sets')     },
        presents:  {a:pra,            p:projS('presents') },
        closes:    {a:sca2,           p:projS('closes')   },
        decrochesP:{a:sca>0?da/sca:0,  p:ps.decrochesP },
        engP:      {a:da>0 ?pa/da:0,    p:ps.engP       },
        setP:      {a:pa>0 ?sa/pa:0,    p:ps.setP       },
        showupP:   {a:sa>0 ?pra/sa:0,   p:ps.showupP    },
        cCallP:    {a:sca>0?sca2/sca:0, p:ps.cCallP     },
      },
      s1: DB._sw('s1'), s2: DB._sw('s2'), s3: DB._sw('s3'), s4: DB._sw('s4'),
    };

    // Sync deals dans commissions
    try {
      const cmk = (typeof localStorage !== 'undefined' && localStorage.getItem('sales_month')) || 'Février 2026';
      if (DB.commissions[cmk]) DB.commissions[cmk].deals = DB._raw.deals;
    } catch(e) {}
  },

  _cw(w) {
    const d=DB._raw.closing[w], p=PROJECTIONS.closing[w];
    return {
      calls:{a:d.calls||0,p:p.calls}, lives:{a:d.lives||0,p:p.lives},
      offres:{a:d.offres||0,p:p.offres}, closes:{a:d.closes||0,p:p.closes},
      hc:{a:d.hc||0,p:p.closes}, fu:{a:d.fu||0,p:0},
      contracte:{a:d.contracte||0,p:p.contracte}, collecte:{a:d.collecte||0,p:p.collecte},
    };
  },
  _sw(w) {
    const d=DB._raw.setting[w], p=PROJECTIONS.setting[w];
    return {
      leads:{a:d.leads||0,p:p.leads}, calls:{a:d.calls||0,p:p.calls},
      decroches:{a:d.decroches||0,p:p.decroches}, propRdv:{a:d.propRdv||0,p:p.propRdv},
      sets:{a:d.sets||0,p:p.sets}, presents:{a:d.presents||0,p:p.presents},
      closes:{a:d.closes||0,p:p.closes},
    };
  },
};

DB.compute();

/* ═══════════════════════════════════════════════════════════
   FIREBASE — couche temps réel
   Initialisé après que firebase SDK soit chargé + auth ready
═══════════════════════════════════════════════════════════ */
const Fire = {
  db:  null,
  uid: null,
  _unsubs: [],

  init(firestore, uid) {
    Fire.db  = firestore;
    Fire.uid = uid;
  },

  _key(label) {
    const p = label.split(' ');
    const m = DB.months.indexOf(p[0]);
    return `${p[1]}-${String(m+1).padStart(2,'0')}`;
  },

  // Écoute en temps réel les données d'un user pour un mois
  watchUser(userId, monthLabel, callback) {
    if (!Fire.db) return () => {};
    const ref = Fire.db
      .collection('saisies').doc(userId)
      .collection('mois').doc(Fire._key(monthLabel));
    const unsub = ref.onSnapshot(snap => callback(snap.exists ? snap.data() : null));
    Fire._unsubs.push(unsub);
    return unsub;
  },

  // Sauvegarde une semaine de closing
  async saveClosing(userId, monthLabel, week, data) {
    if (!Fire.db) throw new Error('Firebase non init');
    const ref = Fire.db.collection('saisies').doc(userId)
      .collection('mois').doc(Fire._key(monthLabel));
    await ref.set({ closing: { [week]: data } }, { merge: true });
  },

  // Sauvegarde une semaine de setting
  async saveSetting(userId, monthLabel, week, data) {
    if (!Fire.db) throw new Error('Firebase non init');
    const ref = Fire.db.collection('saisies').doc(userId)
      .collection('mois').doc(Fire._key(monthLabel));
    await ref.set({ setting: { [week]: data } }, { merge: true });
  },

  // Sauvegarde un deal (append)
  async saveDeal(userId, monthLabel, deal) {
    if (!Fire.db) throw new Error('Firebase non init');
    const ref = Fire.db.collection('saisies').doc(userId)
      .collection('mois').doc(Fire._key(monthLabel));
    const snap = await ref.get();
    const deals = snap.exists ? (snap.data().deals || []) : [];
    deals.push({ ...deal, _ts: Date.now() });
    await ref.set({ deals }, { merge: true });
  },

  // Applique un snapshot Firestore dans DB puis recalcule
  apply(data) {
    if (!data) return;
    if (data.closing) ['s1','s2','s3','s4'].forEach(w => {
      if (data.closing[w]) Object.assign(DB._raw.closing[w], data.closing[w]);
    });
    if (data.setting) ['s1','s2','s3','s4'].forEach(w => {
      if (data.setting[w]) Object.assign(DB._raw.setting[w], data.setting[w]);
    });
    if (data.deals) DB._raw.deals = data.deals;
    DB.compute();
    document.dispatchEvent(new CustomEvent('db:updated'));
  },

  stop() { Fire._unsubs.forEach(u => u()); Fire._unsubs = []; },
};

/* ═══════════════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════════════ */
const U = {
  euro:  v => v == null ? '—' : '€\u202f' + Number(v).toLocaleString('fr-FR'),
  pct:   v => v == null ? '—' : (v * 100).toFixed(1) + '%',
  num:   v => v == null ? '—' : Number(v).toLocaleString('fr-FR'),
  pp:  (a, p) => p > 0 ? Math.min((a / p) * 100, 200) : 0,
  ppv: (a, p) => p > 0 ? ((a / p) * 100).toFixed(0) + '%' : '—',
  cb:  (a, p) => { const r = p > 0 ? a / p : 0; return r >= 1 ? '#34d399' : r >= 0.65 ? '#f59e0b' : '#ef4444'; },
  g:   id => document.getElementById(id),
  getCurrentMonth: () => (typeof localStorage !== 'undefined' && localStorage.getItem('sales_month')) || 'Février 2026',
  getCurrentUser:  () => ({
    uid:  window._currentUserUid  || localStorage.getItem('ambitio_uid')  || 'guillaume',
    name: window._currentUserName || localStorage.getItem('ambitio_name') || 'Guillaume',
    role: window._currentRole     || localStorage.getItem('ambitio_role') || 'sales',
  }),

  progRow: (label, a, p, isEuro = false) => {
    const col = U.cb(a, p);
    return `<div class="pr">
      <div class="pr-l">${label}</div>
      <div class="pr-track"><div class="pr-fill" style="width:${Math.min(U.pp(a,p),100)}%;background:${col}"></div></div>
      <div class="pr-val">${isEuro ? `${U.euro(a)} / ${U.euro(p)}` : `${a} / ${p}`}</div>
      <div class="pr-pct" style="color:${col}">${U.ppv(a,p)}</div>
    </div>`;
  },

  kpiCard: ({ label, val, sub, rawA, proj, color='#ef4444', pct:fp }) => {
    const pc = fp!=null ? fp : (proj!=null ? U.pp(rawA??0, proj) : null);
    return `<div class="kpi" style="--kc:${color}">
      <div class="kpi-label">${label}</div>
      <div class="kpi-value">${val}</div>
      ${sub ? `<div class="kpi-sub">${sub}</div>` : ''}
      ${pc!=null ? `<div class="kpi-prog">
        <div class="kpi-prog-row"><span>Atteinte</span><span>${pc.toFixed(0)}%</span></div>
        <div class="kpi-prog-track"><div class="kpi-prog-fill" style="width:${Math.min(pc,100)}%;background:${color}"></div></div>
      </div>` : ''}
    </div>`;
  },

  funnelStep: (label, val, max, isFirst=false, isEuro=false) => {
    const ratio = max > 0 ? val / max : 0;
    return `<div class="fs">
      <div class="fs-label">${label}</div>
      <div class="fs-track"><div class="fs-fill" style="width:${Math.min(ratio*100,100)}%"></div></div>
      <div class="fs-val">${isEuro ? U.euro(val) : val}</div>
      <div class="fs-rate">${!isFirst ? U.pct(ratio) : ''}</div>
    </div>`;
  },

  weekCard: (label, mainVal, mainLabel, minis, isCurrent, dateRange) => `
    <div class="wc${isCurrent?' wc-active':''}">
      <div class="wc-label">${label}</div>
      ${dateRange ? `<div class="wc-dates">${dateRange}</div>` : ''}
      <div class="wc-main">${mainVal}</div>
      <div class="wc-sub">${mainLabel}</div>
      <div class="wc-grid">${minis.map(m=>`
        <div class="wc-mini">
          <div class="wc-mini-v"${m.color?` style="color:${m.color}"`:''} >${m.val}</div>
          <div class="wc-mini-l">${m.label}</div>
        </div>`).join('')}</div>
    </div>`,

  barChart: (labels, actuals, projs, unit='') => {
    const mx = Math.max(...actuals, ...projs, 1);
    return `<div class="chart-legend">
        <span class="cl-dot cl-real"></span>Réel
        <span class="cl-dot cl-proj" style="margin-left:14px"></span>Projection
      </div>
      <div class="chart-bars">
        ${labels.map((l,i)=>`<div class="chart-col">
          <div class="chart-pair">
            <div class="chart-bar bar-real" style="height:${(actuals[i]/mx*100).toFixed(1)}%" title="${actuals[i]}${unit}"></div>
            <div class="chart-bar bar-proj" style="height:${(projs[i]/mx*100).toFixed(1)}%" title="Proj:${projs[i]}${unit}"></div>
          </div>
          <div class="chart-lbl">${l}</div>
        </div>`).join('')}
      </div>`;
  },

  toast: (msg, type='success') => {
    let t = document.getElementById('_toast');
    if (!t) { t=document.createElement('div'); t.id='_toast'; document.body.appendChild(t); }
    const s = { success:'background:#1a2e1a;border:1px solid rgba(52,211,153,.3);color:#6ee7b7', error:'background:#2e1a1a;border:1px solid rgba(239,68,68,.3);color:#fca5a5', info:'background:#1a1a2e;border:1px solid rgba(96,165,250,.3);color:#93c5fd' };
    t.style.cssText = `position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(0);font-size:12px;font-weight:600;padding:9px 18px;border-radius:10px;z-index:9999;opacity:1;transition:all .28s;white-space:nowrap;font-family:var(--font-b);${s[type]||s.success}`;
    t.textContent = msg;
    clearTimeout(t._t);
    t._t = setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(20px)'; }, 2800);
  },
};


/* ═══════════════════════════════════════════════════════════
   SEMAINES RÉELLES — calcule les vraies dates lun→dim
═══════════════════════════════════════════════════════════ */
function getMonthWeeks(monthLabel) {
  // monthLabel = "Février 2026"
  const MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin',
                     'Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const parts = monthLabel.split(' ');
  const month = MONTHS_FR.indexOf(parts[0]); // 0-based
  const year  = parseInt(parts[1]);
  if (month === -1 || isNaN(year)) return [];

  const DAYS_FR = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const pad = n => String(n).padStart(2,'0');

  function fmt(d) {
    // "14/02"
    return pad(d.getDate()) + '/' + pad(d.getMonth()+1);
  }
  function fmtShort(d) {
    // "14 fév"
    const M = ['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'];
    return d.getDate() + ' ' + M[d.getMonth()];
  }

  // Premier lundi qui touche le mois (peut être dans le mois précédent)
  const firstOfMonth = new Date(year, month, 1);
  const dayOfWeek = firstOfMonth.getDay(); // 0=Sun,1=Mon...
  const daysToMonday = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  let monday = new Date(year, month, 1 + daysToMonday);

  const weeks = [];
  while (true) {
    const sunday = new Date(monday.getTime() + 6 * 86400000);
    // Inclure si la semaine chevauche le mois cible
    if (monday.getMonth() === month || sunday.getMonth() === month) {
      weeks.push({
        id:    's' + (weeks.length + 1),
        label: 'S' + (weeks.length + 1),
        start: monday,
        end:   sunday,
        range: fmt(monday) + ' → ' + fmt(sunday),       // "26/01 → 01/02"
        short: fmtShort(monday) + ' – ' + fmtShort(sunday), // "26 jan – 1 fév"
        tab:   fmt(monday) + '→' + fmt(sunday),
      });
    }
    monday = new Date(monday.getTime() + 7 * 86400000);
    if (monday.getMonth() !== month && monday.getMonth() !== (month === 0 ? 11 : month - 1)) {
      if (monday.getMonth() !== month) break;
    }
    if (monday.getFullYear() > year + 1) break;
    if (weeks.length >= 6) break;
  }
  return weeks;
}

window.DB=DB; window.U=U; window.Fire=Fire; window.PROJECTIONS=PROJECTIONS;
window.getMonthWeeks=getMonthWeeks;

/**
 * sync-bridge.js — Bridge de synchronisation localStorage → DB
 * VERSION 2 — Robuste, source unique de vérité
 *
 * Lit les données saisies dans Closing, Setting, Commissions (par uid + mois)
 * et les injecte dans DB._raw + DB.commissions + DB.team pour que
 * Dashboard, Projections et Équipe soient toujours synchronisés.
 *
 * Clés localStorage :
 *   closing_{uid}_{monthKey}    → { s1..s5: {calls,lives,offres,closes,hardClose,followUp,contracte,collecte} }
 *   setting_{uid}_{monthKey}    → { s1..s5: {leads,calls,decroches,propRdv,sets,presents,closes} }
 *   comm_deals_{uid}_{monthKey} → [{client,offre,type,subtype,contracteHT,collecteHT,comm,bonus,ok,...}]
 *   comm_statut_{monthKey}      → 'Validé' | 'En attente' | 'Partiel'
 *
 * monthKey = "Février 2026" (identique à sales_month)
 */

const SYNC_UIDS = ['guillaume', 'elodie'];
const SYNC_MEMBERS = [
  { uid: 'guillaume', name: 'Guillaume', role: 'Closing + Setting', color: '#ef4444' },
  { uid: 'elodie',    name: 'Élodie',    role: 'Closing',           color: '#60a5fa' },
];

/* ──────────────────────────────────────────────────────────
   RÈGLES DE COMMISSION (miroir de sales-commissions.html)
────────────────────────────────────────────────────────── */
const _COMM_RULES = {
  closing: {
    'BP 6':  { mensualise: 250,  pif: 300  },
    'BP 12': { mensualise: 500,  pif: 600  },
    'Elite': { mensualise: 800,  pif: 900  },
    'Titan': { mensualise: 1200, pif: 1500 },
  },
  setting: {
    'BP 6':  { noBooking: 100, selfBooking: 50  },
    'BP 12': { noBooking: 250, selfBooking: 125 },
    'Elite': { noBooking: 300, selfBooking: 150 },
    'Titan': { noBooking: 500, selfBooking: 250 },
  },
};

function _calcDealComm(deal) {
  if (!deal.ok) return 0;
  // If comm already set manually, use it
  const t = (deal.type || '').toLowerCase();
  const rules = _COMM_RULES[t];
  if (!rules) return deal.comm || 0;
  const offre = deal.offre || 'BP 12';
  const r = rules[offre] || rules['BP 12'];
  if (!r) return deal.comm || 0;
  const sub = (deal.subtype || '').toLowerCase().replace(/[^a-z]/g, '');
  if (t === 'closing') {
    return sub.includes('pif') ? r.pif : r.mensualise;
  } else {
    return sub.includes('self') ? r.selfBooking : r.noBooking;
  }
}

/* ──────────────────────────────────────────────────────────
   FONCTION PRINCIPALE
────────────────────────────────────────────────────────── */
function syncBridge_loadMonth(monthKey) {
  if (!monthKey) monthKey = (typeof localStorage !== 'undefined' && localStorage.getItem('sales_month')) || 'Février 2026';
  if (typeof DB === 'undefined') return; // DB pas encore chargé

  /* ── 1. Agréger closing et setting par semaine (tous membres) ── */
  const closingAgg = { s1: {}, s2: {}, s3: {}, s4: {}, s5: {} };
  const settingAgg = { s1: {}, s2: {}, s3: {}, s4: {}, s5: {} };
  const closingPerMember = {};
  const settingPerMember = {};

  SYNC_UIDS.forEach(uid => {
    /* ── Closing ── */
    let cr = null;
    try {
      const v = localStorage.getItem(`closing_${uid}_${monthKey}`);
      cr = v ? JSON.parse(v) : null;
    } catch (e) {}
    closingPerMember[uid] = cr;

    if (cr) {
      ['s1', 's2', 's3', 's4', 's5'].forEach(w => {
        const d = cr[w] || {};
        const a = closingAgg[w];
        ['calls', 'lives', 'offres', 'closes', 'hardClose', 'followUp', 'contracte', 'collecte'].forEach(k => {
          a[k] = (a[k] || 0) + (d[k] || 0);
        });
        // Alias hc/fu
        a.hc = (a.hc || 0) + (d.hardClose || d.hc || 0);
        a.fu = (a.fu || 0) + (d.followUp  || d.fu  || 0);
      });
    }

    /* ── Setting ── */
    let sr = null;
    try {
      const v = localStorage.getItem(`setting_${uid}_${monthKey}`);
      sr = v ? JSON.parse(v) : null;
    } catch (e) {}
    settingPerMember[uid] = sr;

    if (sr) {
      ['s1', 's2', 's3', 's4', 's5'].forEach(w => {
        const d = sr[w] || {};
        const a = settingAgg[w];
        ['leads', 'calls', 'decroches', 'propRdv', 'sets', 'presents', 'closes'].forEach(k => {
          a[k] = (a[k] || 0) + (d[k] || 0);
        });
      });
    }
  });

  /* ── Détecter si des données localStorage existent pour ce mois ── */
  const hasClosingData = SYNC_UIDS.some(uid => closingPerMember[uid] !== null);
  const hasSettingData = SYNC_UIDS.some(uid => settingPerMember[uid] !== null);

  /* ── 2. Injecter dans DB._raw seulement si des données existent ── */
  if (hasClosingData) {
    ['s1', 's2', 's3', 's4'].forEach(w => {
      const ca = closingAgg[w] || {};
      DB._raw.closing[w] = {
        calls:     ca.calls     || 0,
        lives:     ca.lives     || 0,
        offres:    ca.offres    || 0,
        closes:    ca.closes    || 0,
        hc:        ca.hc        || 0,
        fu:        ca.fu        || 0,
        contracte: ca.contracte || 0,
        collecte:  ca.collecte  || 0,
      };
    });
    // Fusionner s5 dans s4
    const s5c = closingAgg.s5 || {};
    if (Object.values(s5c).some(v => v > 0)) {
      Object.keys(DB._raw.closing.s4).forEach(k => {
        DB._raw.closing.s4[k] = (DB._raw.closing.s4[k] || 0) + (s5c[k] || 0);
      });
    }
  }

  if (hasSettingData) {
    ['s1', 's2', 's3', 's4'].forEach(w => {
      const sa = settingAgg[w] || {};
      DB._raw.setting[w] = {
        leads:     sa.leads     || 0,
        calls:     sa.calls     || 0,
        decroches: sa.decroches || 0,
        propRdv:   sa.propRdv   || 0,
        sets:      sa.sets      || 0,
        presents:  sa.presents  || 0,
        closes:    sa.closes    || 0,
      };
    });
    // Fusionner s5 dans s4
    const s5s = settingAgg.s5 || {};
    if (Object.values(s5s).some(v => v > 0)) {
      Object.keys(DB._raw.setting.s4).forEach(k => {
        DB._raw.setting.s4[k] = (DB._raw.setting.s4[k] || 0) + (s5s[k] || 0);
      });
    }
  }

  /* ── 3. Agréger les deals de commissions ── */
  let totalComm      = 0;
  let totalContracte = 0;
  let totalCollecte  = 0;
  const allDeals     = [];
  const commPerMember = {};
  let hasDealsData = false;

  SYNC_UIDS.forEach(uid => {
    let deals = null;
    try {
      const v = localStorage.getItem(`comm_deals_${uid}_${monthKey}`);
      deals = v ? JSON.parse(v) : null;
    } catch (e) {}

    if (deals && Array.isArray(deals) && deals.length > 0) {
      hasDealsData = true;
      const comm      = deals.reduce((t, d) => t + _calcDealComm(d), 0);
      const contracte = deals.filter(d => d.ok).reduce((t, d) => t + (d.contracteHT || d.cHT || 0), 0);
      const collecte  = deals.filter(d => d.ok).reduce((t, d) => t + (d.collecteHT  || d.coHT || 0), 0);
      commPerMember[uid] = { comm, contracte, collecte, deals };
      totalComm      += comm;
      totalContracte += contracte;
      totalCollecte  += collecte;
      allDeals.push(...deals);
    } else {
      commPerMember[uid] = { comm: 0, contracte: 0, collecte: 0, deals: [] };
    }
  });

  /* ── 4. Statut commission (persisté séparément) ── */
  let statut = 'En attente';
  try {
    const savedStatut = localStorage.getItem(`comm_statut_${monthKey}`);
    if (savedStatut) statut = savedStatut;
  } catch (e) {}

  /* ── 5. Mettre à jour DB.commissions ── */
  // Toujours créer l'entrée pour ce mois
  if (hasDealsData || hasClosingData) {
    DB.commissions[monthKey] = {
      totalComm,
      contracte: totalContracte || (hasClosingData ? DB._raw.closing.s1.contracte + DB._raw.closing.s2.contracte + DB._raw.closing.s3.contracte + DB._raw.closing.s4.contracte : 0),
      collecte:  totalCollecte,
      statut,
      deals:     allDeals,
      perMember: commPerMember,
    };
  } else if (!DB.commissions[monthKey]) {
    // Créer une entrée vide pour éviter les erreurs
    DB.commissions[monthKey] = {
      totalComm: 0, contracte: 0, collecte: 0,
      statut: 'En attente', deals: [], perMember: {},
    };
  }

  /* ── 6. Mettre à jour DB.team par membre ── */
  const teamWeek  = [];
  const teamMonth = [];

  SYNC_MEMBERS.forEach(m => {
    const cr   = closingPerMember[m.uid];
    const sr   = settingPerMember[m.uid];
    const comm = commPerMember[m.uid] || { comm: 0, contracte: 0, collecte: 0 };

    function sumCk(k) {
      if (!cr) return 0;
      return ['s1', 's2', 's3', 's4', 's5'].reduce((t, w) => t + ((cr[w] || {})[k] || 0), 0);
    }
    function sumSk(k) {
      if (!sr) return 0;
      return ['s1', 's2', 's3', 's4', 's5'].reduce((t, w) => t + ((sr[w] || {})[k] || 0), 0);
    }

    const calls     = sumCk('calls');
    const lives     = sumCk('lives');
    const offres    = sumCk('offres');
    const closes    = sumCk('closes');
    const contracte = sumCk('contracte');
    const collecte  = sumCk('collecte');
    const sets      = sumSk('sets');
    const presents  = sumSk('presents');

    const entry = {
      name:            m.name,
      role:            m.role,
      color:           m.color,
      uid:             m.uid,
      contracte,
      collecte,
      calls,
      lives,
      offres,
      closes,
      sets,
      presents,
      showup:          calls  > 0 ? lives  / calls  : 0,
      txOffre:         lives  > 0 ? offres / lives  : 0,
      txTransfoShow:   lives  > 0 ? closes / lives  : 0,
      txTransfoOffre:  offres > 0 ? closes / offres : 0,
      caCall:          calls  > 0 ? contracte / calls : 0,
      comm:            comm.comm || 0,
    };

    teamMonth.push(entry);

    // Semaine la plus récente avec données
    const lastW = ['s4', 's3', 's2', 's1'].find(w => {
      const d = (cr || {})[w] || {};
      return Object.values(d).some(v => v > 0);
    });

    if (lastW) {
      const wd = (cr || {})[lastW] || {};
      const ws = (sr || {})[lastW] || {};
      const wc = wd.calls || 0;
      const wl = wd.lives || 0;
      const wo = wd.offres || 0;
      const wcl = wd.closes || 0;
      const wct = wd.contracte || 0;
      teamWeek.push({
        ...entry,
        calls:          wc,
        lives:          wl,
        offres:         wo,
        closes:         wcl,
        contracte:      wct,
        collecte:       wd.collecte  || 0,
        sets:           ws.sets      || 0,
        presents:       ws.presents  || 0,
        showup:         wc  > 0 ? wl  / wc  : 0,
        txOffre:        wl  > 0 ? wo  / wl  : 0,
        txTransfoShow:  wl  > 0 ? wcl / wl  : 0,
        txTransfoOffre: wo  > 0 ? wcl / wo  : 0,
        caCall:         wc  > 0 ? wct / wc  : 0,
      });
    } else {
      teamWeek.push({
        ...entry,
        calls: 0, lives: 0, offres: 0, closes: 0, contracte: 0, collecte: 0,
        sets: 0, presents: 0,
        showup: 0, txOffre: 0, txTransfoShow: 0, txTransfoOffre: 0, caCall: 0,
      });
    }
  });

  if (teamWeek.length)  DB.team.week  = teamWeek;
  if (teamMonth.length) DB.team.month = teamMonth;

  /* ── 7. Recalculer toutes les métriques ── */
  DB.compute();

  /* ── 8. Notifier tous les modules ── */
  document.dispatchEvent(new CustomEvent('db:updated', { detail: { monthKey } }));
}

/* ──────────────────────────────────────────────────────────
   ÉCOUTE DES CHANGEMENTS CROSS-ONGLETS
────────────────────────────────────────────────────────── */
window.addEventListener('storage', function (e) {
  const k = e.key || '';
  if (k.startsWith('closing_') || k.startsWith('setting_') || k.startsWith('comm_deals_') || k.startsWith('comm_statut_')) {
    const monthKey = (typeof currentMonthKey === 'function')
      ? currentMonthKey()
      : localStorage.getItem('sales_month') || 'Février 2026';
    syncBridge_loadMonth(monthKey);
    if (typeof renderAll === 'function') renderAll();
  }
});

/* ──────────────────────────────────────────────────────────
   HELPER : sauvegarder le statut commission
────────────────────────────────────────────────────────── */
function syncBridge_saveCommStatut(monthKey, statut) {
  try {
    localStorage.setItem(`comm_statut_${monthKey}`, statut);
    // Mettre à jour en mémoire
    if (typeof DB !== 'undefined' && DB.commissions[monthKey]) {
      DB.commissions[monthKey].statut = statut;
    }
    document.dispatchEvent(new CustomEvent('db:updated', { detail: { monthKey } }));
  } catch (e) {}
}

/* ──────────────────────────────────────────────────────────
   HELPER : obtenir les données d'un membre pour un mois
────────────────────────────────────────────────────────── */
function syncBridge_getMemberData(uid, monthKey) {
  let closing = null, setting = null, deals = null;
  try { const v = localStorage.getItem(`closing_${uid}_${monthKey}`);    closing = v ? JSON.parse(v) : null; } catch (e) {}
  try { const v = localStorage.getItem(`setting_${uid}_${monthKey}`);    setting = v ? JSON.parse(v) : null; } catch (e) {}
  try { const v = localStorage.getItem(`comm_deals_${uid}_${monthKey}`); deals   = v ? JSON.parse(v) : null; } catch (e) {}
  return { closing, setting, deals };
}

/* ──────────────────────────────────────────────────────────
   EXPORT GLOBAL
────────────────────────────────────────────────────────── */
window.syncBridge_loadMonth   = syncBridge_loadMonth;
window.syncBridge_saveCommStatut = syncBridge_saveCommStatut;
window.syncBridge_getMemberData  = syncBridge_getMemberData;
window.SYNC_UIDS    = SYNC_UIDS;
window.SYNC_MEMBERS = SYNC_MEMBERS;

/* === end sync-bridge === */
</script>

function saveProfile(uid) {
  const data = {
    name:     document.getElementById('pf-name-' + uid)?.value.trim() || '',
    surname:  document.getElementById('pf-surname-' + uid)?.value.trim() || '',
    email:    document.getElementById('pf-email-' + uid)?.value.trim() || '',
    phone:    document.getElementById('pf-phone-' + uid)?.value.trim() || '',
    linkedin: document.getElementById('pf-linkedin-' + uid)?.value.trim() || '',
    role:     document.getElementById('pf-role-' + uid)?.value.trim() || '',
    contrat:  document.getElementById('pf-contrat-' + uid)?.value.trim() || '',
    dateDebut:document.getElementById('pf-debut-' + uid)?.value.trim() || '',
    statut:   document.getElementById('pf-statut-' + uid)?.value || 'Actif',
    objectif: document.getElementById('pf-objectif-' + uid)?.value.trim() || '',
    bio:      document.getElementById('pf-bio-' + uid)?.value.trim() || '',
  };
  lsSet('equipe_profile_' + uid, data);
  lsSet('equipe_notes_' + uid, document.getElementById('pf-notes-' + uid)?.value || '');
  // Update in-memory MEMBERS for header refresh
  const m = MEMBERS.find(m => m.uid === uid);
  if (m) Object.assign(m, data);
  // Refresh header only
  const hdr = document.querySelector(`#espace-${uid} .espace-name`);
  if (hdr) hdr.textContent = data.name + ' ' + data.surname;
  toast('✅ Profil sauvegardé');
}

function saveNotes(uid) {
  const val = document.getElementById('notes-' + uid)?.value || '';
  lsSet('equipe_notes_' + uid, val);
  toast('✅ Notes sauvegardées');
}

/* ── Docs ── */
function renderDocsList(uid) {
  const docs = getMemberDocs(uid);
  if (!docs.length) return `<div class="empty-state"><div class="empty-icon">📁</div>Aucun document partagé pour l'instant</div>`;
  return docs.map((d, i) => `
    <div class="doc-row">
      <div class="doc-icon" style="background:rgba(255,255,255,.05)">${d.type}</div>
      <div class="doc-info">
        <div class="doc-name">${d.name}</div>
        <div class="doc-meta">${d.desc||''} ${d.date ? '· Ajouté le ' + d.date : ''}</div>
      </div>
      <div class="doc-actions">
        ${d.url ? `<a href="${d.url}" target="_blank"><button class="btn btn-ghost btn-sm">Ouvrir →</button></a>` : ''}
        <button class="btn btn-ghost btn-sm btn-icon" onclick="deleteDoc('${uid}',${i})" style="color:var(--muted2)">✕</button>
      </div>
    </div>`).join('');
}

function openAddDoc(uid) { document.getElementById('add-doc-form-' + uid).style.display = 'block'; }
function closeAddDoc(uid) { document.getElementById('add-doc-form-' + uid).style.display = 'none'; }

function addDoc(uid) {
  const name = document.getElementById('doc-name-' + uid)?.value.trim();
  if (!name) return;
  const docs = getMemberDocs(uid);
  docs.push({
    name,
    url:  document.getElementById('doc-url-' + uid)?.value.trim(),
    type: document.getElementById('doc-type-' + uid)?.value || '📄',
    desc: document.getElementById('doc-desc-' + uid)?.value.trim(),
    date: new Date().toLocaleDateString('fr-FR'),
  });
  setMemberDocs(uid, docs);
  closeAddDoc(uid);
  document.getElementById('docs-list-' + uid).innerHTML = renderDocsList(uid);
  toast('📎 Document ajouté');
}

function deleteDoc(uid, i) {
  const docs = getMemberDocs(uid);
  docs.splice(i, 1);
  setMemberDocs(uid, docs);
  document.getElementById('docs-list-' + uid).innerHTML = renderDocsList(uid);
}

/* ── Messages ── */
function renderFeed(uid) {
  const msgs = getMemberMsgs(uid);
  if (!msgs.length) return `<div class="empty-state"><div class="empty-icon">💬</div>Aucun message pour l'instant</div>`;
  return msgs.map(msg => {
    const isHead = msg.from === 'head';
    const av = isHead ? 'A' : uid[0].toUpperCase();
    const color = isHead ? '#a78bfa' : MEMBERS.find(m => m.uid === uid)?.color || '#60a5fa';
    return `<div class="msg-bubble">
      <div class="msg-av" style="background:${color}88;border:1.5px solid ${color}33">${av}</div>
      <div class="msg-content">
        <div class="msg-header">
          <span class="msg-author">${isHead ? 'Head of Sales' : MEMBERS.find(m=>m.uid===uid)?.name}</span>
          <span class="msg-role-tag" style="background:${isHead?'rgba(167,139,250,.1)':'rgba(255,255,255,.05)'};color:${isHead?'var(--purple)':'var(--muted)'}">${isHead?'👑 Admin':'👤'}</span>
          <span class="msg-time">${new Date(msg.ts).toLocaleDateString('fr-FR')} à ${new Date(msg.ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</span>
        </div>
        <div class="msg-text ${isHead?'head-msg':''}">${msg.text}</div>
      </div>
    </div>`;
  }).join('');
}

function sendMsg(uid) {
  const input = document.getElementById('compose-' + uid);
  const text = input?.value.trim();
  if (!text) return;
  const msgs = getMemberMsgs(uid);
  msgs.push({ from: 'head', text, ts: Date.now() });
  setMemberMsgs(uid, msgs);
  input.value = '';
  document.getElementById('feed-' + uid).innerHTML = renderFeed(uid);
  toast('✅ Message envoyé');
}

function renderCallCards(uid, calls) {
  if (!calls.length) return `<div class="empty-state"><div class="empty-icon">📞</div>Aucun appel enregistré pour l'instant</div>`;
  return calls.slice().reverse().map((c, ri) => {
    const i = calls.length - 1 - ri;
    const avgScore = c.scores ? Object.values(c.scores).reduce((a,b)=>a+(+b||0),0) / Object.keys(c.scores).length : null;
    const scoreColor = avgScore >= 4.5 ? 'var(--green)' : avgScore >= 3.5 ? 'var(--gold)' : avgScore >= 2.5 ? 'var(--orange)' : 'var(--red)';
    const typeColor = c.type === 'Closing' ? '#ef4444' : c.type === 'Setting' ? '#60a5fa' : '#a78bfa';
    return `
    <div class="call-card" id="cc-card-${uid}-${i}">
      <div class="call-card-head" onclick="toggleCall('${uid}',${i})">
        <div class="call-card-icon" style="background:${typeColor}18;color:${typeColor}">📞</div>
        <div class="call-card-info">
          <div class="call-card-title">${c.client}</div>
          <div class="call-card-meta">
            <span>${new Date(c.date).toLocaleDateString('fr-FR')}</span>
            <span>·</span><span>${c.duree || '—'}</span>
            <span class="call-card-badge" style="background:${typeColor}18;color:${typeColor}">${c.type}</span>
            <span class="call-card-badge" style="background:${c.statut==='Débriefé'?'rgba(52,211,153,.1)':'rgba(245,158,11,.1)'};color:${c.statut==='Débriefé'?'var(--green)':'var(--gold)'}">${c.statut}</span>
          </div>
        </div>
        <div id="avg-display-${uid}-${i}" style="font-family:var(--fm);font-size:18px;font-weight:500;color:${scoreColor};flex-shrink:0;min-width:44px;text-align:right">${avgScore ? avgScore.toFixed(1) + '<span style="font-size:11px;color:rgba(255,255,255,.4)">/5</span>' : ''}</div>
        <span class="call-card-chevron">▶</span>
      </div>
      <div class="call-card-body">
        ${c.lien ? `<div style="margin-top:12px"><a href="${c.lien}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;color:var(--blue);font-size:12px">▶ Voir l'enregistrement</a></div>` : ''}
        <div class="score-grid" id="score-grid-view-${uid}-${i}">
          ${renderScoreGrid(uid, i, c.scores)}
        </div>
        ${c.points_forts ? `<div class="debrief-block"><div class="debrief-title" style="color:var(--green)">✅ Points forts</div><div class="debrief-content" style="border-left-color:var(--green)">${c.points_forts}</div></div>` : ''}
        ${c.axes_amelioration ? `<div class="debrief-block" style="margin-top:10px"><div class="debrief-title" style="color:var(--orange)">🔧 Axes d'amélioration</div><div class="debrief-content" style="border-left-color:var(--orange)">${c.axes_amelioration}</div></div>` : ''}
        ${c.note_head ? `<div class="debrief-block" style="margin-top:10px"><div class="debrief-title" style="color:var(--purple)">👑 Note du Head of Sales</div><div class="debrief-content" style="border-left-color:var(--purple)">${c.note_head}</div></div>` : ''}
        <div class="debrief-block" style="margin-top:14px;border-top:1px solid var(--border);padding-top:14px">
          <div class="debrief-title" style="margin-bottom:12px">✏️ Éditer le débrief</div>
          
          <!-- Scores éditables -->
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-bottom:8px">Scores /5</div>
          <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px" id="stars-grid-${uid}-${i}">
            ${renderStarsGrid(uid, i, c.scores)}
          </div>
          
          <textarea class="debrief-edit" id="edit-forts-${uid}-${i}" placeholder="Points forts..." oninput="scheduleAutoSave('${uid}',${i})">${c.points_forts||''}</textarea>
          <textarea class="debrief-edit" id="edit-axes-${uid}-${i}" placeholder="Axes d'amélioration..." style="margin-top:6px" oninput="scheduleAutoSave('${uid}',${i})">${c.axes_amelioration||''}</textarea>
          <textarea class="debrief-edit" id="edit-note-${uid}-${i}" placeholder="Note du Head of Sales..." style="margin-top:6px" oninput="scheduleAutoSave('${uid}',${i})">${c.note_head||''}</textarea>
          <div style="display:flex;gap:8px;margin-top:10px;justify-content:space-between;align-items:center">
            <select id="edit-statut-${uid}-${i}" style="width:auto;min-width:140px">
              <option ${c.statut==='En attente'?'selected':''}>En attente</option>

              <span class="save-indicator" style="font-size:11px;color:var(--green);opacity:0;transition:opacity .4s;white-space:nowrap">✓ Sauvegardé</span>

  }).join('');

function toggleCall(uid, i) {
  const card = document.getElementById(`cc-card-${uid}-${i}`);
  if (card) card.classList.toggle('open');
}

function openAddCall(uid) { document.getElementById('add-call-form-' + uid).classList.add('open'); }
function closeAddCall(uid) { document.getElementById('add-call-form-' + uid).classList.remove('open'); }

function addCall(uid) {
  const client = document.getElementById('cc-client-' + uid)?.value.trim();
  if (!client) return;
  const scores = {};
  ['ouverture','decouverte','pitch','objections','closing'].forEach(s => {
    const v = document.getElementById(`cc-${s}-${uid}`)?.value;
    if (v) scores[s] = +v;
  });
  const calls = getCallBreakdowns(uid);
  calls.push({
    id: 'c' + Date.now(), client,
    date: document.getElementById('cc-date-' + uid)?.value || new Date().toISOString().split('T')[0],
    duree: document.getElementById('cc-duree-' + uid)?.value,
    type: document.getElementById('cc-type-' + uid)?.value || 'Closing',
    lien: document.getElementById('cc-lien-' + uid)?.value,
    scores,
    points_forts:       document.getElementById('cc-forts-' + uid)?.value || '',
    axes_amelioration:  document.getElementById('cc-axes-' + uid)?.value || '',
    note_head:          document.getElementById('cc-note-' + uid)?.value || '',
    statut: 'En attente',
  });
  setCallBreakdowns(uid, calls);
  closeAddCall(uid);
  renderCbPanel(MEMBERS.find(m => m.uid === uid));
  toast('✅ Appel enregistré');
}

// ── Render read-only score grid (top of card) ──
function renderScoreGrid(uid, i, scores) {
  if (!scores || !Object.keys(scores).length) return '';
  const keys = ['ouverture','decouverte','pitch','objections','closing'];
  return keys.map(function(k) {
    const v = scores[k] ? +scores[k] : 0;
    if (!v) return '';
    const col = v >= 4.5 ? 'var(--green)' : v >= 3.5 ? 'var(--gold)' : 'var(--orange)';
    return '<div class="score-item">'
      + '<div class="score-label">' + k.charAt(0).toUpperCase() + k.slice(1) + '</div>'
      + '<div class="score-val" id="sv-' + uid + '-' + i + '-' + k + '" style="color:' + col + '">' + v + '</div>'
      + '<div class="score-star">' + '⭐'.repeat(v) + '</div>'
      + '</div>';
  }).join('');
}

// ── Render star grid (pure function, no nested template literals) ──
function renderStarsGrid(uid, i, scores) {
  const keys = ['ouverture','decouverte','pitch','objections','closing'];
  let html = '';
  keys.forEach(function(key) {
    const val = (scores && scores[key]) ? +scores[key] : 0;
    let stars = '';
    for (let n = 1; n <= 5; n++) {
      const filled = val >= n;
      stars += '<span class="star ' + (filled ? 'on' : '') + '" '
        + 'onclick="setStar(\'' + uid + '\',' + i + ',\'' + key + '\',' + n + ')" '
        + 'style="cursor:pointer;font-size:20px;line-height:1.2;user-select:none;transition:transform .1s" '
        + 'onmouseover="this.style.transform=\'scale(1.2)\'" '
        + 'onmouseout="this.style.transform=\'scale(1)\'">'
        + (filled ? '⭐' : '☆') + '</span>';
    }
    html += '<div style="text-align:center">'
      + '<div style="font-size:10px;color:rgba(255,255,255,.4);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.4px">' + key.charAt(0).toUpperCase() + key.slice(1) + '</div>'
      + '<div class="star-rating" id="stars-' + uid + '-' + i + '-' + key + '" style="display:flex;justify-content:center;gap:1px">' + stars + '</div>'
      + '<input type="hidden" id="score-' + uid + '-' + i + '-' + key + '" value="' + val + '"/>'
      + '</div>';
  });
  return html;
}

// Interactive star click
function setStar(uid, i, scoreKey, val) {
  // 1. Update hidden input
  const hiddenInput = document.getElementById('score-' + uid + '-' + i + '-' + scoreKey);
  if (hiddenInput) hiddenInput.value = val;

  // 2. Update interactive stars
  const container = document.getElementById('stars-' + uid + '-' + i + '-' + scoreKey);
  if (container) {
    container.querySelectorAll('.star').forEach(function(star, idx) {
      const on = idx < val;
      star.textContent = on ? '⭐' : '☆';
      star.classList.toggle('on', on);
    });
  }

  // 3. Live-update the read-only score value at top
  const readVal = document.getElementById('sv-' + uid + '-' + i + '-' + scoreKey);
  if (readVal) {
    const col = val >= 4.5 ? 'var(--green)' : val >= 3.5 ? 'var(--gold)' : 'var(--orange)';
    readVal.textContent = val;
    readVal.style.color = col;
  }

  // 4. Live-update the avg score in card header
  const keys = ['ouverture','decouverte','pitch','objections','closing'];
  const scores = {};
  keys.forEach(function(k) {
    const el = document.getElementById('score-' + uid + '-' + i + '-' + k);
    if (el && +el.value > 0) scores[k] = +el.value;
  });
  if (Object.keys(scores).length) {
    const avg = Object.values(scores).reduce(function(a,b){return a+b;},0) / Object.keys(scores).length;
    const avgEl = document.getElementById('avg-display-' + uid + '-' + i);
    if (avgEl) {
      const col = avg >= 4.5 ? 'var(--green)' : avg >= 3.5 ? 'var(--gold)' : avg >= 2.5 ? 'var(--orange)' : 'var(--red)';
      avgEl.style.color = col;
      avgEl.innerHTML = avg.toFixed(1) + '<span style="font-size:11px;color:rgba(255,255,255,.4)">/5</span>';
    }
  }

  // 5. Auto-save
  scheduleAutoSave(uid, i);
}

// Auto-save debounce per call
const _autoSaveTimers = {};
function scheduleAutoSave(uid, i) {
  const key = uid + '-' + i;
  clearTimeout(_autoSaveTimers[key]);
  _autoSaveTimers[key] = setTimeout(function() { saveCall(uid, i, true); }, 900);
}

function saveCall(uid, i, silent) {
  const calls = getCallBreakdowns(uid);
  if (!calls[i]) return;
  calls[i].points_forts      = document.getElementById('edit-forts-' + uid + '-' + i)?.value || '';
  calls[i].axes_amelioration = document.getElementById('edit-axes-' + uid + '-' + i)?.value || '';
  calls[i].note_head         = document.getElementById('edit-note-' + uid + '-' + i)?.value || '';
  calls[i].statut            = document.getElementById('edit-statut-' + uid + '-' + i)?.value || 'En attente';
  // Collect scores from hidden inputs
  const scores = {};
  ['ouverture','decouverte','pitch','objections','closing'].forEach(function(s) {
    const el = document.getElementById('score-' + uid + '-' + i + '-' + s);
    if (el && el.value && +el.value > 0) scores[s] = +el.value;
  });
  if (Object.keys(scores).length) calls[i].scores = scores;
  setCallBreakdowns(uid, calls);
  // Update statut badge in header
  const c = calls[i];
  const card = document.getElementById('cc-card-' + uid + '-' + i);
  if (card) {
    card.querySelectorAll('.call-card-badge').forEach(function(b) {
      if (b.textContent === 'Débriefé' || b.textContent === 'En attente') {
        b.textContent = c.statut;
        b.style.background = c.statut === 'Débriefé' ? 'rgba(52,211,153,.1)' : 'rgba(245,158,11,.1)';
        b.style.color = c.statut === 'Débriefé' ? 'var(--green)' : 'var(--gold)';
      }
    });
    // Update avg score display
    if (c.scores && Object.keys(c.scores).length) {
      const vals = Object.values(c.scores).map(Number);
      const avg = vals.reduce(function(a,b){return a+b;},0) / vals.length;
      const avgEl = card.querySelector('.score-avg-display');
      if (avgEl) avgEl.textContent = avg.toFixed(1);
    }
  }
  // Refresh read-only score grid
  const gridEl = document.getElementById('score-grid-view-' + uid + '-' + i);
  if (gridEl && c.scores) gridEl.innerHTML = renderScoreGrid(uid, i, c.scores);
  if (!silent) toast('✅ Débrief sauvegardé');
  else showAutoSaveDot(uid, i);
}

function showAutoSaveDot(uid, i) {
  const card = document.getElementById('cc-card-' + uid + '-' + i);
  if (!card) return;
  const indicator = card.querySelector('.save-indicator');
  if (!indicator) return;
  indicator.textContent = '✓ Sauvegardé automatiquement';
  indicator.style.opacity = '1';
  clearTimeout(indicator._timer);
  indicator._timer = setTimeout(function() { indicator.style.opacity = '0'; }, 2500);
}

function deleteCall(uid, i) {
  const calls = getCallBreakdowns(uid);
  calls.splice(i, 1);
  setCallBreakdowns(uid, calls);
  renderCbPanel(MEMBERS.find(m => m.uid === uid));
}

// Calendar state
let calWeekOffset = 0; // 0 = current week

function getWeekStart(offset) {
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
  monday.setHours(0,0,0,0);
  return monday;
}

function calPrevWeek() { calWeekOffset--; renderCalendar(); }
function calNextWeek() { calWeekOffset++; renderCalendar(); }
function calGoToday()  { calWeekOffset = 0; renderCalendar(); }

function renderMeeting() {
  const meetings = getMeetings();
  // Auto-select most recent past or next upcoming
  if (!currentMeeting) {
    const today = new Date().toISOString().split('T')[0];
    const past = meetings.filter(m => m.date <= today).sort((a,b)=>b.date.localeCompare(a.date));
    currentMeeting = (past[0] || meetings[0])?.id || null;
  }
  renderCalendar();
  renderMeetingDetail();
  setTimeout(updateVisioPanelPreview, 50);
}

function renderCalendar() {
  const meetings = getMeetings();
  const weekStart = getWeekStart(calWeekOffset);
  
  // Build 7 days
  const DAYS_FR = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  const today = new Date(); today.setHours(0,0,0,0);
  
  // Week label
  const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);
  const fmt = d => d.toLocaleDateString('fr-FR', {day:'numeric', month:'long'});
  document.getElementById('cal-week-label').textContent = `${fmt(weekStart)} — ${fmt(weekEnd)} ${weekStart.getFullYear()}`;
  
  let html = '<div class="cal-grid">';
  for (let d = 0; d < 7; d++) {
    const day = new Date(weekStart); day.setDate(weekStart.getDate() + d);
    const dateStr = day.toISOString().split('T')[0];
    const isToday = day.getTime() === today.getTime();
    const dayMeetings = meetings.filter(m => m.date === dateStr);
    const hasMeeting = dayMeetings.length > 0;
    const isSelected = dayMeetings.some(m => m.id === currentMeeting);
    const isMmDay = d === 0 || d === 2 || d === 4; // Lun, Mer, Ven
    
    html += `<div class="cal-day ${hasMeeting?'has-meeting':''} ${isToday?'today':''} ${isSelected?'selected':''}" ${hasMeeting?`onclick="selectMeeting('${dayMeetings[0].id}')"`:''}">
      <div class="cal-day-header">
        <div class="cal-day-name">${DAYS_FR[d]}</div>
        <div class="cal-day-num" ${isToday?'style="color:var(--gold)"':''}>${day.getDate()}</div>
      </div>
      ${dayMeetings.map(m => `<div class="cal-meeting-pill ${m.statut==='À venir'?'avenir':'terminé'}" onclick="event.stopPropagation();selectMeeting('${m.id}')">
        ☀️ ${m.heure}
      </div>`).join('')}
      ${isMmDay && !hasMeeting ? `<div class="cal-add-btn" onclick="openAddMeetingDate('${dateStr}','${DAYS_FR[d]}')" title="Créer meeting">+</div>` : ''}
    </div>`;
  }
  html += '</div>';
  document.getElementById('cal-week-grid').innerHTML = html;
}

function getWeekLabel(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const diffWeeks = Math.round((now - d) / (7 * 86400000));
  if (diffWeeks <= 0) return 'Cette semaine & à venir';
  if (diffWeeks === 1) return 'Semaine passée';
  return `Il y a ${diffWeeks} semaines`;
}

function formatDate(dateStr) {
  return new Date(dateStr).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
}

function renderQuestions(meeting) {
  if (!meeting.questions.length) return `<div class="empty-state" style="padding:16px;text-align:center;color:var(--muted2);font-size:12px">Aucune question pour l'instant — pose la tienne ↑</div>`;
  return meeting.questions.map((q, i) => {
    const member = MEMBERS.find(m => m.uid === q.uid) || { name: 'Head of Sales', color: '#a78bfa' };
    return `
    <div class="question-item">
      <div class="q-av" style="background:${member.color}88">${member.name[0]}</div>
      <div class="q-body">
        <div class="q-author">${member.name} <span style="font-size:10px;color:var(--muted);font-weight:400">${new Date(q.ts).toLocaleDateString('fr-FR')}</span></div>
        <div class="q-text">${q.text}</div>
        ${q.reponse ? `<div class="q-answer">${q.reponse}</div>` : `
          <div class="q-actions">
            <input type="text" id="rep-${meeting.id}-${i}" placeholder="Répondre..." style="font-size:11px;padding:5px 9px;flex:1"/>
            <button class="btn btn-ghost btn-sm" onclick="answerQuestion('${meeting.id}',${i})">Répondre</button>
          </div>`}
      </div>
    </div>`;
  }).join('');
}

function openAddQuestion(id) { document.getElementById('add-q-form-' + id).style.display = 'block'; }
function closeAddQuestion(id) { document.getElementById('add-q-form-' + id).style.display = 'none'; }

function addQuestion(meetingId) {
  const text = document.getElementById('q-text-' + meetingId)?.value.trim();
  if (!text) return;
  const who = document.getElementById('q-who-' + meetingId)?.value || 'equipe';
  const meetings = getMeetings();
  const m = meetings.find(m => m.id === meetingId);
  if (!m) return;
  m.questions.push({ uid: who, text, reponse: '', ts: Date.now() });
  setMeetings(meetings);
  closeAddQuestion(meetingId);
  document.getElementById('q-list-' + meetingId).innerHTML = renderQuestions(m);
  toast('✅ Question ajoutée');
}

function answerQuestion(meetingId, qi) {
  const rep = document.getElementById(`rep-${meetingId}-${qi}`)?.value.trim();
  if (!rep) return;
  const meetings = getMeetings();
  const m = meetings.find(m => m.id === meetingId);
  if (!m) return;
  m.questions[qi].reponse = rep;
  setMeetings(meetings);
  document.getElementById('q-list-' + meetingId).innerHTML = renderQuestions(m);
  toast('✅ Réponse ajoutée');
}

function toggleAgendaEdit(meetingId) {
  const editDiv = document.getElementById('agenda-edit-' + meetingId);
  const viewDiv = document.getElementById('agenda-view-' + meetingId);
  const btn = document.getElementById('agenda-edit-btn-' + meetingId);
  const isEditing = editDiv.style.display !== 'none';
  editDiv.style.display = isEditing ? 'none' : 'block';
  if (btn) btn.textContent = isEditing ? '✏️ Modifier' : '✕ Fermer';
}

function deleteSujet(meetingId, si) {
  const row = document.getElementById(`sujet-row-${meetingId}-${si}`);
  if (row) row.style.opacity = '0.3';
  // Mark as deleted with data attr
  const inp = document.getElementById(`sujet-inp-${meetingId}-${si}`);
  if (inp) inp.dataset.deleted = '1';
}

function saveAgenda(meetingId) {
  if (!_requireAdmin('saveAgenda')) return;
  const meetings = getMeetings();
  const m = meetings.find(m => m.id === meetingId);
  if (!m) return;
  // Collect non-deleted existing sujets
  const newSujets = [];
  let si = 0;
  while (document.getElementById(`sujet-inp-${meetingId}-${si}`)) {
    const inp = document.getElementById(`sujet-inp-${meetingId}-${si}`);
    if (inp && !inp.dataset.deleted && inp.value.trim()) {
      newSujets.push(inp.value.trim());
    }
    si++;
  }
  // Add new one if filled
  const newInput = document.getElementById('new-sujet-' + meetingId);
  if (newInput?.value.trim()) { newSujets.push(newInput.value.trim()); newInput.value=''; }
  m.sujets = newSujets;
  setMeetings(meetings);
  // Refresh view and close edit
  const viewDiv = document.getElementById('agenda-view-' + meetingId);
  if (viewDiv) viewDiv.innerHTML = m.sujets.map((s, i) => `
    <div class="agenda-item" style="--ag-color:${i===0?'var(--blue)':i===1?'var(--purple)':'var(--border2)'}">
      <div class="agenda-bullet" style="color:${i===0?'var(--blue)':i===1?'var(--purple)':'var(--muted)'}">◆</div>
      <div class="agenda-text">${s}</div>
    </div>`).join('') || '<div style="color:var(--muted2);font-size:13px;padding:8px 0">Aucun sujet défini</div>';
  toggleAgendaEdit(meetingId);
  toast('✅ Ordre du jour sauvegardé');
}

function addSujet(meetingId) {
  const input = document.getElementById('new-sujet-' + meetingId);
  const text = input?.value.trim();
  if (!text) return;
  // Just add a new row in the edit list
  const list = document.getElementById('sujets-edit-list-' + meetingId);
  if (list) {
    const si = list.querySelectorAll('.sujet-edit-row').length;
    const row = document.createElement('div');
    row.className = 'sujet-edit-row';
    row.id = `sujet-row-${meetingId}-${si}`;
    row.style.cssText = 'display:flex;gap:6px;margin-bottom:6px;align-items:center';
    row.innerHTML = `<span style="color:var(--muted);font-size:12px;width:16px;flex-shrink:0">${si+1}.</span>
      <input type="text" id="sujet-inp-${meetingId}-${si}" value="${text}" style="flex:1"/>
      <button class="btn btn-ghost btn-sm btn-icon" onclick="deleteSujet('${meetingId}',${si})" style="color:var(--muted2);flex-shrink:0">✕</button>`;
    list.appendChild(row);
    input.value = '';
  }
}

function toggleResumeEdit(id) {
  const view = document.getElementById('resume-view-' + id);
  const edit = document.getElementById('resume-edit-' + id);
  const showEdit = edit.style.display === 'none';
  view.style.display = showEdit ? 'none' : 'block';
  edit.style.display = showEdit ? 'block' : 'none';
}

function saveResume(meetingId) {
  if (!_requireAdmin('saveResume')) return;
  const ta = document.getElementById('resume-ta-' + meetingId);
  const meetings = getMeetings();
  const m = meetings.find(m => m.id === meetingId);
  if (!m) return;
  m.resume = ta?.value || '';
  setMeetings(meetings);
  toggleResumeEdit(meetingId);
  document.getElementById('resume-view-' + meetingId).innerHTML = m.resume
    ? `<div class="summary-block">${m.resume}</div>`
    : `<div class="empty-state" style="padding:16px"><div class="empty-icon">📝</div>Résumé à rédiger après le meeting</div>`;
  toast('✅ Résumé sauvegardé');
}

function setMeetingStatut(id, statut) {
  if (!_requireAdmin('setStatut')) return;
  const meetings = getMeetings();
  const m = meetings.find(m => m.id === id);
  if (m) { m.statut = statut; setMeetings(meetings); renderCalendar(); renderMeetingDetail(); }
}


/* ── Guard admin actions ── */
function _requireAdmin(action) {
  const r = localStorage.getItem('ambitio_role') || 'sales';
  if (r !== 'admin') {
    toast('⛔ Action réservée au manager');
    return false;
  }
  return true;
}

function openAddMeeting() {
  if (!_requireAdmin('addMeeting')) return;
  document.getElementById('nm-date').value = '';
  document.getElementById('add-meeting-modal').style.display = 'flex';
}
function openAddMeetingDate(dateStr, dayName) {
  document.getElementById('nm-date').value = dateStr;
  const jourMap = {'Lun':'Lundi','Mar':'Mardi','Mer':'Mercredi','Jeu':'Jeudi','Ven':'Vendredi','Sam':'Samedi','Dim':'Dimanche'};
  const sel = document.getElementById('nm-jour');
  const mapped = jourMap[dayName] || 'Lundi';
  for (let i=0;i<sel.options.length;i++) { if(sel.options[i].value===mapped){sel.selectedIndex=i;break;} }
  document.getElementById('add-meeting-modal').style.display = 'flex';
}
function closeAddMeeting() {
  document.getElementById('add-meeting-modal').style.display = 'none';
}
function saveNewMeeting() {
  const date = document.getElementById('nm-date')?.value;
  const jour = document.getElementById('nm-jour')?.value;
  const sujet1 = document.getElementById('nm-sujet')?.value.trim();
  if (!date) return;
  const meetings = getMeetings();
  const newM = {
    id: 'm' + Date.now(), date, jourSemaine: jour, heure: '09h00',
    lien_meet: MEETING_LINK,
    sujets: sujet1 ? [sujet1] : [],
    questions: [], resume: '', statut: 'À venir',
  };
  meetings.push(newM);
  setMeetings(meetings);
  currentMeeting = newM.id;
  closeAddMeeting();
  renderCalendar();
  renderMeetingDetail();
  toast('✅ Meeting créé');
}

function openEditMeeting(id) { toast('ℹ️ Modifiez l\'ordre du jour via le bouton ✏️ Modifier, et le résumé via Éditer'); }

/* ── Visio link management ── */
let _visioScope = 'all_future';

function toggleVisioPanel() {
  const body = document.getElementById('visio-panel-body');
  const chev = document.getElementById('visio-chevron');
  const isOpen = body.classList.toggle('open');
  chev.textContent = isOpen ? '▲' : '▼';
  // Pre-fill with current link from selected meeting
  if (isOpen) {
    const meetings = getMeetings();
    const m = meetings.find(m => m.id === currentMeeting);
    const lien = m?.lien_meet || lsGet('visio_default_link', '') || '';
    document.getElementById('visio-new-lien').value = lien;
  }
}

function setVisioScope(scope) {
  _visioScope = scope;
  document.querySelectorAll('.radio-opt').forEach(el => {
    el.classList.toggle('selected', el.getAttribute('onclick').includes(`'${scope}'`));
  });
  const rangeDiv = document.getElementById('visio-range-inputs');
  if (rangeDiv) rangeDiv.style.display = scope === 'date_range' ? 'block' : 'none';
}

function applyVisioLink() {
  if (!_requireAdmin('applyVisio')) return;
  const newLien = document.getElementById('visio-new-lien')?.value.trim();
  if (!newLien) { toast('⚠️ Entrez un lien de réunion'); return; }
  const meetings = getMeetings();
  const today = new Date().toISOString().split('T')[0];
  let count = 0;

  if (_visioScope === 'all_future') {
    meetings.forEach(m => { if (m.date >= today) { m.lien_meet = newLien; count++; } });
  } else if (_visioScope === 'date_range') {
    const from = document.getElementById('visio-date-from')?.value;
    const to   = document.getElementById('visio-date-to')?.value;
    if (!from || !to) { toast('⚠️ Définissez la plage de dates'); return; }
    meetings.forEach(m => { if (m.date >= from && m.date <= to) { m.lien_meet = newLien; count++; } });
  } else if (_visioScope === 'selected') {
    const m = meetings.find(m => m.id === currentMeeting);
    if (m) { m.lien_meet = newLien; count = 1; }
  }

  // Also save as default for new meetings
  if (_visioScope === 'all_future') lsSet('visio_default_link', newLien);
  setMeetings(meetings);
  toggleVisioPanel();
  renderCalendar();
  renderMeetingDetail();
  toast(`✅ Lien mis à jour sur ${count} meeting${count > 1 ? 's' : ''}`);
}

function updateVisioPanelPreview() {
  const meetings = getMeetings();
  const m = meetings.find(m => m.id === currentMeeting);
  const lien = m?.lien_meet || '';
  const el = document.getElementById('visio-lien-preview');
  if (el) el.textContent = lien.length > 50 ? lien.slice(0, 50) + '…' : (lien || 'Non défini');
}

function copyLink(url) {
  navigator.clipboard?.writeText(url).then(() => toast('📋 Lien copié !'));
}

/* ════════════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════════════ */
function toast(msg) {
  let t = document.getElementById('_toast');
  if (!t) { t = document.createElement('div'); t.id = '_toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a2035;border:1px solid rgba(255,255,255,.15);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;transition:opacity .3s';
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}

/* ════════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  const nm = localStorage.getItem('ambitio_name') || 'Admin';
  document.getElementById('tb-nm').textContent = nm;
  document.getElementById('tb-av').textContent = nm[0].toUpperCase();
  // Load saved profiles into MEMBERS
  MEMBERS.forEach(m => {
    const saved = lsGet('equipe_profile_' + m.uid, null);
    if (saved) Object.assign(m, saved);
  });
  const savedTab = lsGet('equipe_active_tab', 'espaces');

  // ── Sync live performance data from Closing/Setting localStorage ──
  const _equipeMonthKey = localStorage.getItem('sales_month') || 'Février 2026';
  if (typeof syncBridge_loadMonth === 'function') {
    syncBridge_loadMonth(_equipeMonthKey);
  }

  // ── Restrictions rôle : masquer les éléments admin pour le rôle "sales" ──
  const _role = localStorage.getItem('ambitio_role') || 'sales';
  if (_role !== 'admin') {
    // Masquer le panel de gestion du lien visio
    const visioPanel = document.getElementById('visio-settings-panel');
    if (visioPanel) visioPanel.style.display = 'none';
    // Masquer le bouton "+ Nouveau meeting"
    const btnAddMeeting = document.getElementById('btn-add-meeting');
    if (btnAddMeeting) btnAddMeeting.style.display = 'none';
  }

  setMainTab(savedTab);

  // Refresh si données modifiées dans un autre onglet
  window.addEventListener('storage', function(e) {
    const k = e.key || '';
    if (k.startsWith('closing_') || k.startsWith('setting_') || k.startsWith('comm_deals_')) {
      if (typeof syncBridge_loadMonth === 'function') {
        syncBridge_loadMonth(localStorage.getItem('sales_month') || 'Février 2026');
      }
    }
  });
});
</script>

<div class="page">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-icon">👥</div>
      <div>
        <div class="topbar-title">Équipe</div>
        <div class="topbar-sub">Espaces personnels · Call Breakdown · Morning Meeting</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,.08);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700" id="tb-av">A</div>
      <span style="font-size:13px;font-weight:600" id="tb-nm">Admin</span>
    </div>
  </div>

  <!-- MAIN TABS -->
  <div class="main-tabs">
    <button class="main-tab active" data-tab="espaces" onclick="setMainTab('espaces')">👤 Espaces salariés</button>
    <button class="main-tab" data-tab="breakdown" onclick="setMainTab('breakdown')">📞 Call Breakdown</button>
    <button class="main-tab" data-tab="meeting" onclick="setMainTab('meeting')">☀️ Morning Meeting</button>
  </div>

  <!-- SECTION ESPACES -->
  <div class="section active" id="sec-espaces">
    <div class="member-selector" id="member-selector"></div>
    <div id="espace-guillaume" class="espace"></div>
    <div id="espace-elodie" class="espace"></div>
  </div>

  <!-- SECTION CALL BREAKDOWN -->
  <div class="section" id="sec-breakdown">
    <div class="cb-member-tabs" id="cb-member-tabs"></div>
    <div id="cb-guillaume" class="cb-panel"></div>
    <div id="cb-elodie" class="cb-panel"></div>
  </div>

  <!-- SECTION MORNING MEETING -->
  <div class="section" id="sec-meeting">
    <!-- Visio settings collapsible panel -->
    <div class="visio-panel" id="visio-settings-panel">
      <div class="visio-panel-head" onclick="toggleVisioPanel()">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:18px">📹</span>
          <div>
            <div style="font-family:var(--fh);font-size:13px;font-weight:700">Gestion du lien de réunion</div>
            <div style="font-size:11px;color:var(--muted);margin-top:1px" id="visio-current-preview">Lien actuel : <span id="visio-lien-preview" style="color:var(--blue);font-family:var(--fm);font-size:11px"></span></div>
          </div>
        </div>
        <span id="visio-chevron" style="color:var(--muted);font-size:12px">▼</span>
      </div>
      <div class="visio-panel-body" id="visio-panel-body">
        <div class="fgroup" style="margin-bottom:14px">
          <label class="flabel">Nouveau lien de réunion</label>
          <input type="url" id="visio-new-lien" placeholder="https://us06web.zoom.us/j/... ou https://meet.google.com/..."/>
        </div>
        <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Appliquer à</div>
        <div class="radio-group" id="visio-scope-group">
          <label class="radio-opt selected" onclick="setVisioScope('all_future')"><input type="radio" name="vscope" value="all_future" checked/>🔄 Tous les meetings futurs</label>
          <label class="radio-opt" onclick="setVisioScope('date_range')"><input type="radio" name="vscope" value="date_range"/>📅 Plage de dates</label>
          <label class="radio-opt" onclick="setVisioScope('selected')"><input type="radio" name="vscope" value="selected"/>📌 Meeting sélectionné uniquement</label>
        </div>
        <div id="visio-range-inputs" style="display:none;margin-top:10px">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div class="fgroup"><label class="flabel">Du</label><input type="date" id="visio-date-from"/></div>
            <div class="fgroup"><label class="flabel">Au</label><input type="date" id="visio-date-to"/></div>
          </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:14px;justify-content:flex-end">
          <button class="btn btn-ghost btn-sm" onclick="toggleVisioPanel()">Annuler</button>
          <button class="btn btn-blue btn-sm" onclick="applyVisioLink()">✓ Appliquer le lien</button>
        </div>
      </div>
    </div>

    <!-- Calendar header -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn btn-ghost btn-sm" onclick="calPrevWeek()">◀ Semaine préc.</button>
        <div id="cal-week-label" style="font-family:var(--fh);font-size:15px;font-weight:700;min-width:200px;text-align:center"></div>
        <button class="btn btn-ghost btn-sm" onclick="calNextWeek()">Semaine suiv. ▶</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-ghost btn-sm" onclick="calGoToday()">Aujourd'hui</button>
        ${isAdmin ? `<button class="btn btn-primary btn-sm" id="btn-add-meeting" onclick="openAddMeeting()">+ Nouveau meeting</button>` : ''}
      </div>
    </div>
    <!-- Weekly calendar grid -->
    <div id="cal-week-grid" style="margin-bottom:24px"></div>
    <!-- Meeting detail -->
    <div id="mm-main"></div>
  </div>

</div>

<!-- MODAL NOUVEAU MEETING -->
<div id="add-meeting-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1100;align-items:center;justify-content:center;backdrop-filter:blur(4px)">
  <div style="background:#0f1422;border:1px solid var(--border2);border-radius:20px;padding:28px;width:100%;max-width:420px;margin:20px">
    <div style="font-family:var(--fh);font-size:16px;font-weight:800;margin-bottom:20px">📅 Nouveau Morning Meeting</div>
    <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:20px">
      <div class="fgroup"><label class="flabel">Date</label><input type="date" id="nm-date"/></div>
      <div class="fgroup"><label class="flabel">Jour</label>
        <select id="nm-jour"><option>Lundi</option><option>Mercredi</option><option>Vendredi</option></select>
      </div>
      <div class="fgroup"><label class="flabel">Premier sujet</label><input type="text" id="nm-sujet" placeholder="Ex: Lancement semaine S10"/></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeAddMeeting()">Annuler</button>
      <button class="btn btn-primary" onclick="saveNewMeeting()">Créer</button>
    </div>
  </div>
</div>

</body>
</html>
