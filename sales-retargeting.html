<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ambitio — Retargeting Webinaires</title>
<link rel="stylesheet" href="sales.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap');
:root{
  --bg:#0a0c14;--surface:#111420;--surface2:#161928;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8eaf2;--text-muted:rgba(232,234,242,0.45);--text-dim:rgba(232,234,242,0.22);
  --accent:#f97316;--accent-glow:rgba(249,115,22,0.14);--accent-border:rgba(249,115,22,0.3);
  --green:#10b981;--green-bg:rgba(16,185,129,0.1);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.1);
  --yellow:#f59e0b;--yellow-bg:rgba(245,158,11,0.1);
  --blue:#3b82f6;--blue-bg:rgba(59,130,246,0.1);
  --purple:#8b5cf6;--purple-bg:rgba(139,92,246,0.1);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;}
.rt-page{padding:28px 28px 60px;max-width:1600px;}
.rt-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:16px;flex-wrap:wrap;}
.rt-header-left h1{font-size:22px;font-weight:800;color:white;display:flex;align-items:center;gap:10px;letter-spacing:-0.5px;}
.rt-header-left h1 .hicon{width:38px;height:38px;background:var(--accent-glow);border:1px solid var(--accent-border);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.rt-header-left p{font-size:13px;color:var(--text-muted);margin-top:4px;margin-left:48px;}
.rt-header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.rt-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px;}
.rt-stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden;}
.rt-stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--sc,var(--accent));opacity:.7;}
.rt-stat-val{font-size:24px;font-weight:800;color:white;font-family:'Space Grotesk',sans-serif;line-height:1;}
.rt-stat-label{font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:5px;}
.rt-toolbar{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.rt-sw{position:relative;flex:1;min-width:200px;}
.rt-sw .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:13px;pointer-events:none;}
.rt-search{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:white;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:500;padding:9px 12px 9px 34px;outline:none;transition:border-color .15s;}
.rt-search:focus{border-color:var(--accent);}
.rt-search::placeholder{color:var(--text-dim);}
.rt-sel{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;padding:9px 12px;outline:none;cursor:pointer;}
.rt-sel option{background:#1a1a2e;}
.rt-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;border:none;white-space:nowrap;}
.btn-ghost{background:var(--surface2);border:1.5px solid var(--border);color:var(--text-muted);}
.btn-ghost:hover{border-color:var(--border2);color:white;}
.btn-accent{background:var(--accent);color:white;}
.btn-accent:hover{opacity:.9;}
.rt-div{width:1px;height:28px;background:var(--border);flex-shrink:0;}
.rt-tag-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.rt-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);user-select:none;}
.rt-chip:hover{border-color:var(--border2);color:white;}
.rt-chip.active{border-color:var(--cc,var(--accent));background:var(--cb,var(--accent-glow));color:var(--cc,var(--accent));}
.rt-chip .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
.rt-tw{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.scroll-x{overflow-x:auto;}
.scroll-x::-webkit-scrollbar{height:4px;}
.scroll-x::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}
.rt-table{width:100%;border-collapse:collapse;min-width:940px;}
.rt-table thead th{background:var(--surface2);padding:11px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-dim);border-bottom:1px solid var(--border);white-space:nowrap;}
th.srt{cursor:pointer;}
th.srt:hover{color:var(--text-muted);}
.rt-table tbody tr{border-bottom:1px solid var(--border);transition:background .12s;}
.rt-table tbody tr:last-child{border-bottom:none;}
.rt-table tbody tr:hover{background:rgba(255,255,255,.022);}
.rt-table tbody tr.ctact{background:rgba(249,115,22,.04);}
.rt-table tbody tr.ctact:hover{background:rgba(249,115,22,.07);}
.rt-table td{padding:10px 14px;font-size:13px;vertical-align:middle;}
.td-name{font-weight:700;color:white;font-size:13px;}
.td-email{font-size:11px;color:var(--text-muted);margin-top:2px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.td-phone{font-size:12px;color:var(--text-muted);white-space:nowrap;}
.tpill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;margin:2px 2px 2px 0;white-space:nowrap;}
.wd{font-size:12px;color:var(--text-muted);white-space:nowrap;}
.note-txt{font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;cursor:pointer;padding:2px 0;}
.note-txt:empty::before{content:'Ajouter une note\2026';color:var(--text-dim);font-style:italic;}
.note-txt:hover{color:white;}
.tgl-c{display:flex;align-items:center;justify-content:center;}
.tgl-c input{display:none;}
.tgl-c label{width:42px;height:23px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:12px;cursor:pointer;position:relative;transition:all .2s;display:block;}
.tgl-c label::after{content:'';position:absolute;left:3px;top:50%;transform:translateY(-50%);width:15px;height:15px;border-radius:50%;background:rgba(255,255,255,.25);transition:all .2s;}
.tgl-c input:checked+label{background:var(--accent);border-color:var(--accent);}
.tgl-c input:checked+label::after{left:calc(100% - 18px);background:white;}
.st-wrap{position:relative;}
.st-btn{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:all .15s;white-space:nowrap;font-family:'Plus Jakarta Sans',sans-serif;}
.st-btn .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.st-btn .caret{font-size:8px;opacity:.5;margin-left:1px;}
.s-none{background:rgba(255,255,255,.05);color:var(--text-muted);border-color:var(--border);}
.s-appele{background:var(--blue-bg);color:var(--blue);border-color:rgba(59,130,246,.25);}
.s-decroche{background:var(--yellow-bg);color:var(--yellow);border-color:rgba(245,158,11,.25);}
.s-parle{background:var(--purple-bg);color:var(--purple);border-color:rgba(139,92,246,.25);}
.s-rdv{background:var(--green-bg);color:var(--green);border-color:rgba(16,185,129,.25);}
.s-pas-int{background:var(--red-bg);color:var(--red);border-color:rgba(239,68,68,.25);}
.s-rappeler{background:var(--accent-glow);color:var(--accent);border-color:var(--accent-border);}
.st-dd{position:absolute;top:calc(100% + 6px);left:0;background:#1a1d2e;border:1px solid var(--border2);border-radius:12px;padding:6px;z-index:200;min-width:170px;box-shadow:0 16px 40px rgba(0,0,0,.5);display:none;}
.st-dd.open{display:block;}
.sd-opt{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:background .1s;color:var(--text);flex-wrap:wrap;}
.sd-opt:hover{background:rgba(255,255,255,.06);}
.sd-opt .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.rdr-row{width:100%;display:flex;align-items:center;gap:6px;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);}
.rdr-input{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:white;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;padding:4px 8px;outline:none;width:130px;}
.rdr-input:focus{border-color:var(--accent);}
.rdr-input::-webkit-calendar-picker-indicator{filter:invert(.5);}
.rd-disp{font-size:10px;color:var(--accent);margin-top:3px;display:none;}
.rd-disp.show{display:block;}
.rt-pag{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-top:1px solid var(--border);background:var(--surface2);border-radius:0 0 16px 16px;flex-wrap:wrap;gap:10px;}
.pag-info{font-size:12px;color:var(--text-muted);font-weight:600;}
.pag-btns{display:flex;gap:4px;align-items:center;}
.pag-btn{width:32px;height:32px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--text-muted);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.pag-btn:hover:not(:disabled){border-color:var(--border2);color:white;}
.pag-btn.active{background:var(--accent);border-color:var(--accent);color:white;}
.pag-btn:disabled{opacity:.3;cursor:not-allowed;}
.pag-dots{color:var(--text-dim);padding:0 4px;font-size:12px;line-height:32px;}
.rt-import-area{background:var(--surface);border:2px dashed var(--border2);border-radius:16px;padding:56px 32px;text-align:center;transition:all .2s;cursor:pointer;margin-bottom:24px;}
.rt-import-area.hidden{display:none;}
.rt-import-area:hover,.rt-import-area.dov{border-color:var(--accent);background:var(--accent-glow);}
.imp-icon{font-size:44px;margin-bottom:14px;}
.imp-title{font-size:17px;font-weight:800;color:white;margin-bottom:8px;}
.imp-sub{font-size:13px;color:var(--text-muted);}
.rt-empty{text-align:center;padding:60px 24px;display:none;}
.rt-empty-icon{font-size:48px;margin-bottom:16px;opacity:.4;}
.rt-empty-title{font-size:15px;font-weight:700;color:var(--text-muted);margin-bottom:6px;}
.rt-empty-sub{font-size:13px;color:var(--text-dim);}
.nm-bd{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);animation:fadeIn .15s;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.nm-modal{background:#13162a;border:1px solid var(--border2);border-radius:16px;padding:24px;width:100%;max-width:400px;margin:20px;animation:slideUp .2s cubic-bezier(.4,0,.2,1);}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.nm-modal h3{font-size:15px;font-weight:800;color:white;margin-bottom:3px;}
.nm-modal p{font-size:12px;color:var(--text-muted);margin-bottom:14px;}
.nm-modal textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border2);border-radius:10px;color:white;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;padding:10px 14px;resize:vertical;outline:none;min-height:100px;transition:border-color .15s;}
.nm-modal textarea:focus{border-color:var(--accent);}
.nm-acts{display:flex;gap:8px;margin-top:14px;}
.rt-toast{position:fixed;bottom:24px;right:24px;background:#1a2e1a;border:1px solid rgba(16,185,129,.3);color:#6ee7b7;font-size:13px;font-weight:600;padding:10px 18px;border-radius:10px;z-index:2000;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;white-space:nowrap;}
.rt-toast.show{opacity:1;transform:translateY(0);}
#importFileInput{display:none;}
</style>
</head>
<body>
<script src="nav.js"><\/script>

    <div class="rt-div"></div>

    <select class="rt-sel" id="fCo"><option value="">Tous</option><option value="1">&#9989; &#192; contacter</option><option value="0">&#9940; Inactif</option></select>
    <select class="rt-sel" id="fPr"><option value="">Toute pr&#233;sence</option><option value="present">&#10004; Pr&#233;sents</option><option value="absent">&#10007; Absents</option><option value="replay">&#9654; Replay vu</option><option value="client">&#11088; Clients</option></select>
    <div class="rt-div"></div>
    <select class="rt-sel" id="pgSz"><option value="50">50 / page</option><option value="100">100 / page</option><option value="200">200 / page</option></select>
  </div>

</div>
<div id="tblWrap" style="display:none">
  <div class="rt-tw">
    <div class="scroll-x">
      <table class="rt-table">
        <thead>
          <tr>
            <th style="width:36px"><input type="checkbox" id="chkAll" style="accent-color:var(--accent)"/></th>

  </div>
  <div class="rt-empty" id="rtEmpty"><div class="rt-empty-icon">&#128269;</div><div class="rt-empty-title">Aucun r&#233;sultat</div><div class="rt-empty-sub">Modifiez vos filtres</div></div>
</div>
</div>
<div class="rt-toast" id="rtToast"></div>
<script>
const SC={
  none:{label:'\u2014 Aucun',cls:'s-none',dc:'rgba(255,255,255,0.22)'},
  appele:{label:'\u260E Appel\u00e9',cls:'s-appele',dc:'#3b82f6'},
  decroche:{label:'\u2702 D\u00e9croch\u00e9',cls:'s-decroche',dc:'#f59e0b'},
  parle:{label:'\u{1F4AC} Parl\u00e9',cls:'s-parle',dc:'#8b5cf6'},
  rdv:{label:'\u{1F4C5} RDV pris',cls:'s-rdv',dc:'#10b981'},
  'pas-int':{label:'\u{1F6AB} Pas int\u00e9ress\u00e9',cls:'s-pas-int',dc:'#ef4444'},
  rappeler:{label:'\u{1F501} \u00c0 rappeler',cls:'s-rappeler',dc:'#f97316'},
};
const TC={
  '[webinar] pr\u00e9sent':{color:'#10b981',bg:'rgba(16,185,129,0.12)',label:'Pr\u00e9sent'},
  '[webinar] pr\u00e9sent: +30min':{color:'#10b981',bg:'rgba(16,185,129,0.12)',label:'+30min'},
  '[webinar] pr\u00e9sent: +1h':{color:'#059669',bg:'rgba(5,150,105,0.14)',label:'+1h'},
  '[webinar] pr\u00e9sent: +1h30':{color:'#059669',bg:'rgba(5,150,105,0.14)',label:'+1h30'},
  '[webinar] pr\u00e9sent: +2h':{color:'#047857',bg:'rgba(4,120,87,0.14)',label:'+2h'},
  '[webinar] absent':{color:'#ef4444',bg:'rgba(239,68,68,0.1)',label:'Absent'},
  '[webinar] registered':{color:'#6b7280',bg:'rgba(107,114,128,0.1)',label:'Inscrit'},
  '[webinar] Quitte : Avant 1h':{color:'#f59e0b',bg:'rgba(245,158,11,0.1)',label:'Parti <1h'},
  '[webinar] replay: visionn\u00e9':{color:'#8b5cf6',bg:'rgba(139,92,246,0.1)',label:'Replay'},
  '[Client]':{color:'#f97316',bg:'rgba(249,115,22,0.12)',label:'\u2b50 Client'},
  '[everwebinar] registered':{color:'#3b82f6',bg:'rgba(59,130,246,0.1)',label:'EW Inscrit'},
  '[everwebinar_wednesday] registered':{color:'#60a5fa',bg:'rgba(96,165,250,0.1)',label:'EW Wed'},
  '[skool] Leads':{color:'#ec4899',bg:'rgba(236,72,153,0.1)',label:'Skool'},
  '[vente] business phenix':{color:'#fb923c',bg:'rgba(251,146,60,0.1)',label:'Vente BP'},
  '[acflix] lead':{color:'#06b6d4',bg:'rgba(6,182,212,0.1)',label:'Acflix'},
  'LEADS VSL [YF]':{color:'#a78bfa',bg:'rgba(167,139,250,0.1)',label:'VSL Lead'},
  'HEBDO LIVE [YES]':{color:'#34d399',bg:'rgba(52,211,153,0.1)',label:'Hebdo Live'},
  'Newsletter Active 2026':{color:'#60a5fa',bg:'rgba(96,165,250,0.1)',label:'Newsletter'},
  '[EBOOK]8cles':{color:'#c084fc',bg:'rgba(192,132,252,0.1)',label:'Ebook'},
};
const SK='ambitio_rt_state_v3',CK='ambitio_rt_contacts_v3';
let ALL=[],FILT=[],STATE={},CUR=1,PSZ=50,SF=null,SD=1,ATF=null,ODDID=null;
function ss(){try{localStorage.setItem(SK,JSON.stringify(STATE));}catch(e){}}
function ls(){try{const s=localStorage.getItem(SK);if(s)STATE=JSON.parse(s);}catch(e){}}
function pCSV(txt){
  const lines=txt.split('\n');if(!lines.length)return[];
  const hdrs=pLine(lines[0]);const rows=[];
  for(let i=1;i<lines.length;i++){const l=lines[i].trim();if(!l)continue;const v=pLine(l);const o={};hdrs.forEach((h,idx)=>{o[h.replace(/^\uFEFF/,'').trim()]=(v[idx]||'').trim();});rows.push(o);}
  return rows;
}
function pLine(line){const r=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(c===','&&!inQ){r.push(cur);cur='';}else cur+=c;}r.push(cur);return r;}
function pRows(rows){return rows.map((r,i)=>({id:r['ID']||String(i),name:[r['Pr\u00e9nom'],r['Nom']].filter(Boolean).join(' ').trim()||'\u2014',email:r['E-mail']||'',phone:r['Num\u00e9ro de t\u00e9l\u00e9phone']||r['*WhatsApp']||'',tags:(r['Tags']||'').split(',').map(t=>t.trim()).filter(Boolean),webinarDate:r['*webinar_date']||r['* webinar_date_ew']||'',createdAt:r['Date de cr\u00e9ation']||'',}));}
function initSt(cs){cs.forEach(c=>{if(!STATE[c.id])STATE[c.id]={toContact:false,status:'none',rappelDate:'',note:''};});}
function applyF(){
  const q=document.getElementById('rtSrch').value.toLowerCase();
  const fs=document.getElementById('fSt').value;
  const fc=document.getElementById('fCo').value;
  const fp=document.getElementById('fPr').value;
  FILT=ALL.filter(c=>{
    const st=STATE[c.id]||{};
    if(q&&!(c.name+c.email+c.phone).toLowerCase().includes(q))return false;
    if(fs&&(st.status||'none')!==fs)return false;
    if(fc!==''){if(fc==='1'&&!st.toContact)return false;if(fc==='0'&&st.toContact)return false;}
    if(fp==='present'&&!c.tags.some(t=>t.startsWith('[webinar] pr\u00e9sent')))return false;
    if(fp==='absent'&&!c.tags.includes('[webinar] absent'))return false;
    if(fp==='replay'&&!c.tags.includes('[webinar] replay: visionn\u00e9'))return false;
    if(fp==='client'&&!c.tags.includes('[Client]'))return false;
    if(ATF&&!c.tags.includes(ATF))return false;
    return true;
  });
  if(SF){FILT.sort((a,b)=>{const av=SF==='name'?a.name:(a.webinarDate||'');const bv=SF==='name'?b.name:(b.webinarDate||'');return av.localeCompare(bv)*SD;});}
  CUR=1;renderT();updStats();
}
function renderT(){
  const body=document.getElementById('rtBody');
  const empty=document.getElementById('rtEmpty');
  const tw=document.getElementById('tblWrap');
  if(!FILT.length){body.innerHTML='';tw.style.display='block';empty.style.display='block';renderPag();return;}
  empty.style.display='none';tw.style.display='block';
  const start=(CUR-1)*PSZ;
  body.innerHTML=FILT.slice(start,start+PSZ).map(rHTML).join('');
  renderPag();attachEv();
}
function rHTML(c){
  const st=STATE[c.id]||{};
  const sc=SC[st.status||'none'];
  const pills=c.tags.slice(0,4).map(t=>{const cfg=TC[t]||{color:'#6b7280',bg:'rgba(107,114,128,0.1)',label:t.replace(/[\[\]\*]/g,'').trim()};return '<span class="tpill" style="background:'+cfg.bg+';color:'+cfg.color+';border:1px solid '+cfg.color+'30">'+cfg.label+'</span>';}).join('');
  let ds='&#8212;';
  if(c.webinarDate){try{ds=new Date(c.webinarDate+'T00:00:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});}catch(e){ds=c.webinarDate;}}
  const rdShow=st.status==='rappeler'&&st.rappelDate?'show':'';
  const rdTxt=st.rappelDate?'&#128197; '+fmtD(st.rappelDate):'';
  return '<tr class="'+(st.toContact?'ctact':'')+'" data-id="'+c.id+'">'
    +'<td><input type="checkbox" class="rck" data-id="'+c.id+'" style="accent-color:var(--accent)"/></td>'
    +'<td><div class="td-name">'+esc(c.name)+'</div><div class="td-email" title="'+esc(c.email)+'">'+esc(c.email)+'</div></td>'
    +'<td><div class="td-phone">'+fmtP(c.phone)+'</div></td>'
    +'<td>'+pills+'</td>'
    +'<td><div class="wd">'+ds+'</div></td>'
    +'<td><div class="tgl-c"><input type="checkbox" id="tc_'+c.id+'" '+(st.toContact?'checked':'')+'"/><label for="tc_'+c.id+'"></label></div></td>'
    +'<td><div class="st-wrap">'
    +'<button class="st-btn '+sc.cls+' sdt" data-id="'+c.id+'"><span class="dot" style="background:'+sc.dc+'"></span>'+sc.label+'<span class="caret">&#9660;</span></button>'
    +'<div class="st-dd" id="sd_'+c.id+'">'
    +Object.entries(SC).map(([k,v])=>'<div class="sd-opt" data-id="'+c.id+'" data-s="'+k+'"><span class="dot" style="background:'+v.dc+'"></span><span>'+v.label+'</span>'+(k==='rappeler'?'<div class="rdr-row"><input type="date" class="rdr-input" data-id="'+c.id+'" value="'+(st.rappelDate||'')+'"/></div>':'')+'</div>').join('')
    +'</div>'
    +'<div class="rd-disp '+rdShow+'" id="rd_'+c.id+'">'+rdTxt+'</div>'
    +'</div></td>'
    +'<td><div class="note-txt" data-id="'+c.id+'" title="'+esc(st.note||'')+'">'+esc(st.note||'')+'</div></td>'
    +'</tr>';
}
function attachEv(){
  document.querySelectorAll('.tgl-c input').forEach(inp=>{inp.addEventListener('change',function(){const id=this.id.replace('tc_','');ens(id);STATE[id].toContact=this.checked;const row=this.closest('tr');if(this.checked)row.classList.add('ctact');else row.classList.remove('ctact');ss();updStats();});});
  document.querySelectorAll('.sdt').forEach(btn=>{btn.addEventListener('click',function(e){e.stopPropagation();const id=this.dataset.id;const dd=document.getElementById('sd_'+id);if(ODDID&&ODDID!==id){const p=document.getElementById('sd_'+ODDID);if(p)p.classList.remove('open');}const io=dd.classList.toggle('open');ODDID=io?id:null;});});
  document.querySelectorAll('.sd-opt').forEach(opt=>{opt.addEventListener('click',function(e){if(e.target.closest('.rdr-row'))return;const id=this.dataset.id;const s=this.dataset.s;ens(id);STATE[id].status=s;ss();rfBtn(id);const dd=document.getElementById('sd_'+id);if(dd)dd.classList.remove('open');ODDID=null;updStats();toast('Statut mis \u00e0 jour');});});
  document.querySelectorAll('.rdr-input').forEach(inp=>{inp.addEventListener('change',function(e){e.stopPropagation();const id=this.dataset.id;ens(id);STATE[id].rappelDate=this.value;ss();const rd=document.getElementById('rd_'+id);if(rd){rd.innerHTML=this.value?'\u{1F4C5} '+fmtD(this.value):'';rd.classList.toggle('show',!!this.value);}});inp.addEventListener('click',e=>e.stopPropagation());});
  document.querySelectorAll('.note-txt').forEach(el=>{el.addEventListener('click',()=>openNM(el.dataset.id));});
}
document.addEventListener('click',function(e){if(!e.target.closest('.st-wrap')&&ODDID){const dd=document.getElementById('sd_'+ODDID);if(dd)dd.classList.remove('open');ODDID=null;}});
function rfBtn(id){const st=STATE[id]||{};const sc=SC[st.status||'none'];const btn=document.querySelector('.sdt[data-id="'+id+'"]');if(!btn)return;btn.className='st-btn '+sc.cls+' sdt';btn.dataset.id=id;btn.innerHTML='<span class="dot" style="background:'+sc.dc+'"></span>'+sc.label+'<span class="caret">&#9660;</span>';const rd=document.getElementById('rd_'+id);if(rd){if(st.status==='rappeler'&&st.rappelDate){rd.innerHTML='\u{1F4C5} '+fmtD(st.rappelDate);rd.classList.add('show');}else rd.classList.remove('show');}}
function openNM(id){const c=ALL.find(x=>x.id===id);if(!c)return;const st=STATE[id]||{};const bd=document.createElement('div');bd.className='nm-bd';bd.innerHTML='<div class="nm-modal"><h3>Note \u2014 '+esc(c.name)+'</h3><p>'+esc(c.email||c.phone||'')+'</p><textarea id="nmTA" placeholder="Commentaire, observation, historique\u2026">'+esc(st.note||'')+'</textarea><div class="nm-acts"><button class="rt-btn btn-ghost" id="nmCan">Annuler</button><button class="rt-btn btn-accent" id="nmSv">\u{1F4BE} Sauvegarder</button></div></div>';document.body.appendChild(bd);bd.querySelector('#nmCan').onclick=()=>bd.remove();bd.onclick=e=>{if(e.target===bd)bd.remove();};bd.querySelector('#nmSv').onclick=()=>{const v=bd.querySelector('#nmTA').value;ens(id);STATE[id].note=v;ss();const el=document.querySelector('.note-txt[data-id="'+id+'"]');if(el){el.textContent=v;el.title=v;}bd.remove();toast('Note enregistr\u00e9e');};setTimeout(()=>bd.querySelector('#nmTA').focus(),80);}
function updStats(){const v=Object.values(STATE);document.getElementById('stTotal').textContent=ALL.length.toLocaleString('fr-FR');document.getElementById('stToC').textContent=v.filter(s=>s.toContact).length.toLocaleString('fr-FR');document.getElementById('stRdv').textContent=v.filter(s=>s.status==='rdv').length;document.getElementById('stRapp').textContent=v.filter(s=>s.status==='rappeler').length;document.getElementById('stPasI').textContent=v.filter(s=>s.status==='pas-int').length;document.getElementById('stPres').textContent=ALL.filter(c=>c.tags.some(t=>t.startsWith('[webinar] pr\u00e9sent'))).length.toLocaleString('fr-FR');}
function renderPag(){const total=FILT.length;const pages=Math.ceil(total/PSZ)||1;const s=Math.min((CUR-1)*PSZ+1,total);const e=Math.min(CUR*PSZ,total);document.getElementById('pagInfo').textContent=total>0?(s+'\u2013'+e+' sur '+total.toLocaleString('fr-FR')+' contacts'):'Aucun r\u00e9sultat';const pb=document.getElementById('pagBtns');pb.innerHTML='';const mk=(lbl,pg,dis)=>{const b=document.createElement('button');b.className='pag-btn'+(pg===CUR?' active':'');b.innerHTML=lbl;b.disabled=!!dis;if(!dis)b.onclick=()=>{CUR=pg;renderT();window.scrollTo({top:0,behavior:'smooth'});};return b;};pb.appendChild(mk('\u2039',CUR-1,CUR===1));pRange(CUR,pages).forEach(p=>{if(p==='...'){const s2=document.createElement('span');s2.className='pag-dots';s2.textContent='\u2026';pb.appendChild(s2);}else pb.appendChild(mk(p,p,false));});pb.appendChild(mk('\u203a',CUR+1,CUR===pages));}
function pRange(c,t){if(t<=7)return Array.from({length:t},(_,i)=>i+1);if(c<=4)return[1,2,3,4,5,'...',t];if(c>=t-3)return[1,'...',t-4,t-3,t-2,t-1,t];return[1,'...',c-1,c,c+1,'...',t];}
function buildChips(){const cnt={};ALL.forEach(c=>c.tags.forEach(t=>{if(TC[t])cnt[t]=(cnt[t]||0)+1;}));const w=document.getElementById('tagFilters');w.innerHTML='';const ac=mkChip('Tous ('+ALL.length.toLocaleString('fr-FR')+')',null,'#aaa','rgba(255,255,255,0.05)');ac.classList.add('active');ac.onclick=()=>{ATF=null;w.querySelectorAll('.rt-chip').forEach(c=>c.classList.remove('active'));ac.classList.add('active');applyF();};w.appendChild(ac);Object.entries(cnt).sort((a,b)=>b[1]-a[1]).forEach(([tag,count])=>{const cfg=TC[tag];const ch=mkChip(cfg.label+' '+count,tag,cfg.color,cfg.bg);ch.onclick=()=>{ATF=tag;w.querySelectorAll('.rt-chip').forEach(c=>c.classList.remove('active'));ch.classList.add('active');applyF();};w.appendChild(ch);});}
function mkChip(lbl,tag,color,bg){const d=document.createElement('div');d.className='rt-chip';d.style.setProperty('--cc',color);d.style.setProperty('--cb',bg);d.dataset.tag=tag||'';d.innerHTML='<span class="dot"></span>'+lbl;return d;}
function loadData(cs){ALL=cs;ls();initSt(cs);document.getElementById('impArea').classList.add('hidden');document.getElementById('rtStats').style.display='grid';document.getElementById('tbWrap').style.display='block';document.getElementById('btnExport').style.display='inline-flex';document.getElementById('btnReset').style.display='inline-flex';document.getElementById('rtSub').textContent=cs.length.toLocaleString('fr-FR')+' contacts import\u00e9s';buildChips();applyF();}
function handleFile(file){if(!file||!file.name.endsWith('.csv')){toast('\u26a0 Fichier CSV requis',true);return;}const r=new FileReader();r.onload=e=>{const cs=pRows(pCSV(e.target.result));if(!cs.length){toast('\u26a0 Fichier vide',true);return;}try{localStorage.setItem(CK,JSON.stringify(cs));}catch(err){}loadData(cs);toast('\u2705 '+cs.length.toLocaleString('fr-FR')+' contacts charg\u00e9s\u00a0!');};r.readAsText(file,'utf-8');}
document.getElementById('btnImport').onclick=()=>document.getElementById('importFileInput').click();
document.getElementById('importFileInput').onchange=function(){if(this.files[0])handleFile(this.files[0]);this.value='';};
const ia=document.getElementById('impArea');
ia.onclick=()=>document.getElementById('importFileInput').click();
ia.ondragover=e=>{e.preventDefault();ia.classList.add('dov');};
ia.ondragleave=()=>ia.classList.remove('dov');
ia.ondrop=e=>{e.preventDefault();ia.classList.remove('dov');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);};
let sT;document.getElementById('rtSrch').oninput=()=>{clearTimeout(sT);sT=setTimeout(applyF,200);};
document.getElementById('fSt').onchange=applyF;
document.getElementById('fCo').onchange=applyF;
document.getElementById('fPr').onchange=applyF;
document.getElementById('pgSz').onchange=function(){PSZ=parseInt(this.value);CUR=1;renderT();};
document.querySelectorAll('th.srt').forEach(th=>{th.onclick=function(){const f=this.dataset.sort;if(SF===f)SD*=-1;else{SF=f;SD=1;}applyF();};});
document.getElementById('chkAll').onchange=function(){document.querySelectorAll('.rck').forEach(c=>c.checked=this.checked);};
document.getElementById('btnReset').onclick=()=>{if(!confirm('R\u00e9initialiser toutes les donn\u00e9es\u00a0? Action irr\u00e9versible.'))return;localStorage.removeItem(SK);localStorage.removeItem(CK);STATE={};ALL=[];FILT=[];['rtStats','tbWrap','tblWrap'].forEach(id=>document.getElementById(id).style.display='none');document.getElementById('rtEmpty').style.display='none';document.getElementById('impArea').classList.remove('hidden');document.getElementById('btnExport').style.display='none';document.getElementById('btnReset').style.display='none';document.getElementById('rtSub').textContent='Importez votre fichier CSV pour commencer';document.getElementById('tagFilters').innerHTML='';};
document.getElementById('btnExport').onclick=()=>{const ex=FILT.length?FILT:ALL;const rows=[['Nom','Email','T\u00e9l\u00e9phone','Date webinaire','Tags','\u00c0 contacter','Statut','Date rappel','Note']];ex.forEach(c=>{const st=STATE[c.id]||{};rows.push([c.name,c.email,c.phone,c.webinarDate,c.tags.join(' | '),st.toContact?'Oui':'Non',SC[st.status||'none']?.label||'',st.rappelDate||'',st.note||'']);});const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));a.download='retargeting_'+new Date().toISOString().slice(0,10)+'.csv';a.click();toast('Export t\u00e9l\u00e9charg\u00e9\u00a0!');};
function ens(id){if(!STATE[id])STATE[id]={toContact:false,status:'none',rappelDate:'',note:''};}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtP(p){if(!p)return'\u2014';const d=p.replace(/\D/g,'');if(d.startsWith('33')&&d.length===11)return'0'+d.slice(2).replace(/(\d{2})(?=\d)/g,'$1 ');return p.slice(0,15)||'\u2014';}
function fmtD(d){try{return new Date(d+'T00:00:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});}catch(e){return d;}}
function toast(msg,err=false){const t=document.getElementById('rtToast');t.textContent=msg;t.style.background=err?'#2e1a1a':'#1a2e1a';t.style.borderColor=err?'rgba(239,68,68,.3)':'rgba(16,185,129,.3)';t.style.color=err?'#fca5a5':'#6ee7b7';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
(function(){try{const s=localStorage.getItem(CK);if(s){const c=JSON.parse(s);if(c&&c.length){loadData(c);return;}}}catch(e){}})();
<\/script>
