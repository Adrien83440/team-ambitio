<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ambitio — Retargeting</title>
<link rel="stylesheet" href="sales.css"/>
<style>
/* ══════════════════════════════════════════
   RETARGETING MODULE — Styles
══════════════════════════════════════════ */

.rt-container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px 26px 60px;
}

/* ── Stats Bar ── */
.rt-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}
.rt-stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.rt-stat-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--muted);
}
.rt-stat-value {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
  font-family: var(--font-m);
}
.rt-stat-value.accent-red { color: var(--red2); }
.rt-stat-value.accent-green { color: var(--green); }
.rt-stat-value.accent-blue { color: var(--blue); }
.rt-stat-value.accent-gold { color: var(--gold); }

/* ── Toolbar ── */
.rt-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.rt-search {
  flex: 1;
  min-width: 220px;
  padding: 10px 14px 10px 36px;
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-b);
  font-size: 13px;
  font-weight: 500;
  outline: none;
  transition: border-color 0.15s;
}
.rt-search:focus { border-color: var(--red2); }
.rt-search-wrap {
  position: relative;
  flex: 1;
  min-width: 220px;
}
.rt-search-wrap::before {
  content: '⌕';
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 15px;
  color: var(--muted);
  pointer-events: none;
}
.rt-filter-btn {
  padding: 9px 14px;
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  color: var(--muted);
  font-family: var(--font-b);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.rt-filter-btn:hover { border-color: var(--border2); color: var(--text); }
.rt-filter-btn.active { border-color: var(--red2); color: var(--red3); background: rgba(185,28,28,0.08); }

.rt-filter-group {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

/* ── Table ── */
.rt-table-wrap {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  overflow: hidden;
}
.rt-table {
  width: 100%;
  border-collapse: collapse;
}
.rt-table thead th {
  padding: 11px 14px;
  text-align: left;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--muted);
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 5;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}
.rt-table thead th:hover { color: var(--text); }
.rt-table tbody tr {
  border-bottom: 1px solid rgba(255,255,255,0.03);
  transition: background 0.1s;
}
.rt-table tbody tr:hover { background: rgba(255,255,255,0.02); }
.rt-table tbody td {
  padding: 10px 14px;
  font-size: 13px;
  vertical-align: middle;
}
.rt-table tbody tr.rt-contacted { background: rgba(185,28,28,0.04); }

/* ── Contact Toggle ── */
.rt-toggle {
  position: relative;
  width: 38px;
  height: 20px;
  background: var(--bg4);
  border: 1.5px solid var(--border2);
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}
.rt-toggle.on {
  background: rgba(185,28,28,0.3);
  border-color: var(--red2);
}
.rt-toggle::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--muted);
  transition: all 0.2s;
}
.rt-toggle.on::after {
  left: 20px;
  background: var(--red2);
  box-shadow: 0 0 8px rgba(239,68,68,0.4);
}

/* ── Status Pill ── */
.rt-status-wrap {
  position: relative;
}
.rt-status-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  border: 1.5px solid transparent;
}
.rt-status-pill:hover { filter: brightness(1.2); }
.rt-status-pill[data-status="none"] {
  background: var(--bg4);
  border-color: var(--border);
  color: var(--muted);
}
.rt-status-pill[data-status="appele"] {
  background: rgba(96,165,250,0.12);
  border-color: rgba(96,165,250,0.3);
  color: #93bbfd;
}
.rt-status-pill[data-status="decroche"] {
  background: rgba(251,191,36,0.12);
  border-color: rgba(251,191,36,0.3);
  color: #fcd34d;
}
.rt-status-pill[data-status="parle"] {
  background: rgba(52,211,153,0.12);
  border-color: rgba(52,211,153,0.3);
  color: #6ee7b7;
}
.rt-status-pill[data-status="rdv"] {
  background: rgba(167,139,250,0.12);
  border-color: rgba(167,139,250,0.3);
  color: #c4b5fd;
}
.rt-status-pill[data-status="pasinteresse"] {
  background: rgba(239,68,68,0.1);
  border-color: rgba(239,68,68,0.25);
  color: #fca5a5;
}
.rt-status-pill[data-status="arappeler"] {
  background: rgba(245,158,11,0.15);
  border-color: rgba(245,158,11,0.35);
  color: #fbbf24;
}

/* Status dropdown */
.rt-status-dropdown {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  z-index: 50;
  min-width: 180px;
  padding: 4px;
  display: none;
}
.rt-status-dropdown.show { display: block; }
.rt-status-opt {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.1s;
  color: var(--text);
}
.rt-status-opt:hover { background: rgba(255,255,255,0.06); }
.rt-status-opt .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Rappel date input */
.rt-rappel-date {
  padding: 4px 8px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--gold);
  font-family: var(--font-m);
  font-size: 11px;
  outline: none;
  margin-left: 4px;
  cursor: pointer;
}
.rt-rappel-date::-webkit-calendar-picker-indicator { filter: invert(0.7); }

/* ── Setter Select ── */
.rt-setter-select {
  padding: 6px 10px;
  background: var(--bg3);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 12px;
  font-family: var(--font-b);
  cursor: pointer;
  min-width: 110px;
}
.rt-setter-select:focus {
  border-color: var(--red2);
  outline: none;
}

/* ── Tags ── */
.rt-tags {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.rt-tag {
  padding: 2px 7px;
  border-radius: 6px;
  font-size: 10px;
  font-weight: 600;
  background: rgba(255,255,255,0.05);
  color: var(--muted);
  white-space: nowrap;
}
.rt-tag.present { background: rgba(52,211,153,0.12); color: #6ee7b7; }
.rt-tag.absent { background: rgba(239,68,68,0.1); color: #fca5a5; }
.rt-tag.client { background: rgba(167,139,250,0.12); color: #c4b5fd; }
.rt-tag.replay { background: rgba(96,165,250,0.12); color: #93bbfd; }
.rt-tag.long { background: rgba(245,158,11,0.12); color: #fcd34d; }

/* ── Notes ── */
.rt-notes-cell {
  min-width: 160px;
}
.rt-notes-input {
  width: 100%;
  padding: 6px 10px;
  background: transparent;
  border: 1.5px solid transparent;
  border-radius: 8px;
  color: var(--text);
  font-family: var(--font-b);
  font-size: 12px;
  outline: none;
  transition: all 0.15s;
  resize: none;
}
.rt-notes-input:hover { border-color: var(--border); background: var(--bg3); }
.rt-notes-input:focus { border-color: var(--red2); background: var(--bg3); }
.rt-notes-input::placeholder { color: var(--muted2); }

/* ── Pagination ── */
.rt-pagination {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-top: 1px solid var(--border);
  background: var(--bg3);
}
.rt-page-info {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
}
.rt-page-btns {
  display: flex;
  gap: 4px;
}
.rt-page-btn {
  padding: 6px 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--font-b);
}
.rt-page-btn:hover { border-color: var(--border2); color: var(--text); }
.rt-page-btn.active { background: rgba(185,28,28,0.15); border-color: var(--red2); color: var(--red3); }
.rt-page-btn:disabled { opacity: 0.3; cursor: default; }

/* ── Client name ── */
.rt-client-name {
  font-weight: 700;
  letter-spacing: -0.2px;
}
.rt-client-email {
  font-size: 11px;
  color: var(--muted);
  margin-top: 1px;
}
.rt-client-tel {
  font-family: var(--font-m);
  font-size: 12px;
  color: var(--muted);
}

/* ── Responsive ── */
@media (max-width: 1100px) {
  .rt-table-wrap { overflow-x: auto; }
  .rt-table { min-width: 1000px; }
}

/* ── Toast ── */
.rt-toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #1a2e1a;
  border: 1px solid rgba(52,211,153,0.3);
  color: #6ee7b7;
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  z-index: 2000;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.3s;
  pointer-events: none;
}
.rt-toast.show { opacity: 1; transform: translateY(0); }

/* ── Export btn ── */
.rt-export-btn {
  padding: 9px 16px;
  background: linear-gradient(135deg, #7f1d1d, #b91c1c);
  border: none;
  border-radius: var(--radius);
  color: white;
  font-family: var(--font-b);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.rt-export-btn:hover { filter: brightness(1.15); transform: translateY(-1px); }

/* Per-row page size selector */
.rt-pagesize {
  padding: 6px 10px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 12px;
  font-family: var(--font-b);
  cursor: pointer;
}
.rt-pagesize option { background: var(--bg2); }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-logo">A</div>
  <span class="tb-title">Ambitio <em>Sales</em></span>
  <span class="tb-sep"></span>
  <span class="tb-page">Retargeting</span>
  <div class="tb-right">
    <div class="tb-user">
      <div class="tb-av" style="display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff">G</div>
      <span style="font-size:13px;font-weight:600" id="tbUserName">Guillaume</span>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="rt-container">

  <!-- Stats -->
  <div class="rt-stats" id="rtStats">
    <div class="rt-stat-card">
      <span class="rt-stat-label">Total contacts</span>
      <span class="rt-stat-value" id="statTotal">—</span>
    </div>
    <div class="rt-stat-card">
      <span class="rt-stat-label">À contacter</span>
      <span class="rt-stat-value accent-red" id="statContacter">—</span>
    </div>
    <div class="rt-stat-card">
      <span class="rt-stat-label">Appelés</span>
      <span class="rt-stat-value accent-blue" id="statAppeles">—</span>
    </div>
    <div class="rt-stat-card">
      <span class="rt-stat-label">RDV obtenus</span>
      <span class="rt-stat-value accent-green" id="statRdv">—</span>
    </div>
    <div class="rt-stat-card">
      <span class="rt-stat-label">À rappeler</span>
      <span class="rt-stat-value accent-gold" id="statRappeler">—</span>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="rt-toolbar">
    <div class="rt-search-wrap">
      <input type="text" class="rt-search" id="rtSearch" placeholder="Rechercher par nom, email, téléphone..."/>
    </div>
    <div class="rt-filter-group">
      <button class="rt-filter-btn active" data-filter="all">Tous</button>
      <button class="rt-filter-btn" data-filter="contacter">À contacter</button>
      <button class="rt-filter-btn" data-filter="appele">Appelés</button>
      <button class="rt-filter-btn" data-filter="decroche">Décroché</button>
      <button class="rt-filter-btn" data-filter="parle">Parlé</button>
      <button class="rt-filter-btn" data-filter="rdv">RDV</button>
      <button class="rt-filter-btn" data-filter="arappeler">À rappeler</button>
      <button class="rt-filter-btn" data-filter="pasinteresse">Pas intéressé</button>
    </div>
    <select class="rt-pagesize" id="rtPageSize" title="Lignes par page">
      <option value="25">25 / page</option>
      <option value="50" selected>50 / page</option>
      <option value="100">100 / page</option>
    </select>
    <button class="rt-export-btn" id="rtExport">↓ Exporter</button>
  </div>

  <!-- Table -->
  <div class="rt-table-wrap">
    <table class="rt-table">
      <thead>
        <tr>
          <th style="width:48px">⚡</th>
          <th>Contact</th>
          <th>Téléphone</th>
          <th>Tags</th>
          <th>Webinar</th>
          <th>Statut</th>
          <th>Setter</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody id="rtBody"></tbody>
    </table>
    <div class="rt-pagination">
      <span class="rt-page-info" id="rtPageInfo">—</span>
      <div class="rt-page-btns" id="rtPageBtns"></div>
    </div>
  </div>
</div>

<div class="rt-toast" id="rtToast">✅ Sauvegardé</div>

<!-- DATA -->
<script src="retargeting-data.js"></script>

<script>
/* ═══════════════════════════════════════════
   RETARGETING MODULE — Logic
═══════════════════════════════════════════ */

const STATUS_MAP = {
  none:          { label: '—',                color: '#666',    dot: '#444' },
  appele:        { label: 'Appelé',           color: '#60a5fa', dot: '#60a5fa' },
  decroche:      { label: 'Décroché',         color: '#fbbf24', dot: '#fbbf24' },
  parle:         { label: 'Parlé',            color: '#34d399', dot: '#34d399' },
  rdv:           { label: 'RDV',              color: '#a78bfa', dot: '#a78bfa' },
  pasinteresse:  { label: 'Pas intéressé',    color: '#ef4444', dot: '#ef4444' },
  arappeler:     { label: 'À rappeler',       color: '#f59e0b', dot: '#f59e0b' },
};

// ── State (persisted in localStorage) ──
const STORAGE_KEY = 'ambitio_retargeting_state';
let STATE = {};

function loadState() {
  try { STATE = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { STATE = {}; }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE));
}
function getContactState(id) {
  if (!STATE[id]) {
    STATE[id] = { 
      contacter: false, 
      status: 'none', 
      notes: '', 
      rappelDate: '', 
      setter: '' 
    };
  } else {
    // Rétro-compatibilité
    if (typeof STATE[id].setter === 'undefined') STATE[id].setter = '';
  }
  return STATE[id];
}

loadState();

// ── Build contacts array ──
const CONTACTS = RAW_CONTACTS.map(r => ({
  id: r.i,
  email: r.e,
  prenom: r.p,
  nom: r.n,
  tel: r.t,
  date: r.d,
  webinarDate: r.w,
  tags: r.g,
}));

// ── Classify tags ──
function tagClass(t) {
  if (t.includes('présent') && (t.includes('+1h30') || t.includes('+2h'))) return 'long';
  if (t.includes('présent')) return 'present';
  if (t.includes('absent')) return 'absent';
  if (t.includes('Client') || t.includes('vente')) return 'client';
  if (t.includes('replay')) return 'replay';
  return '';
}
function tagLabel(t) {
  return t.replace('[webinar] ', '').replace('[everwebinar] ', '').replace('[', '').replace(']', '');
}

// ── Pagination & filter state ──
let currentPage = 1;
let pageSize = 50;
let searchQuery = '';
let activeFilter = 'all';
let openDropdownId = null;

function getFilteredContacts() {
  let list = CONTACTS;

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(c =>
      (c.prenom + ' ' + c.nom).toLowerCase().includes(q) ||
      c.email.toLowerCase().includes(q) ||
      c.tel.includes(q)
    );
  }

  if (activeFilter !== 'all') {
    if (activeFilter === 'contacter') {
      list = list.filter(c => getContactState(c.id).contacter);
    } else {
      list = list.filter(c => getContactState(c.id).status === activeFilter);
    }
  }

  return list;
}

// ── Render ──
function render() {
  const filtered = getFilteredContacts();
  const total = filtered.length;
  const pages = Math.ceil(total / pageSize) || 1;
  if (currentPage > pages) currentPage = pages;

  const start = (currentPage - 1) * pageSize;
  const end = Math.min(start + pageSize, total);
  const slice = filtered.slice(start, end);

  const tbody = document.getElementById('rtBody');
  tbody.innerHTML = slice.map(c => {
    const st = getContactState(c.id);
    const statusInfo = STATUS_MAP[st.status] || STATUS_MAP.none;
    const tagsHtml = c.tags.slice(0, 4).map(t =>
      `<span class="rt-tag ${tagClass(t)}">${tagLabel(t)}</span>`
    ).join('');

    return `
    <tr class="${st.contacter ? 'rt-contacted' : ''}" data-id="${c.id}">
      <td>
        <div class="rt-toggle ${st.contacter ? 'on' : ''}" data-action="toggle" data-id="${c.id}" title="${st.contacter ? 'Marqué à contacter' : 'Non contacté'}"></div>
      </td>
      <td>
        <div class="rt-client-name">${c.prenom || '—'}${c.nom ? ' ' + c.nom : ''}</div>
        <div class="rt-client-email">${c.email}</div>
      </td>
      <td><span class="rt-client-tel">${formatTel(c.tel)}</span></td>
      <td><div class="rt-tags">${tagsHtml}</div></td>
      <td style="font-size:12px;color:var(--muted);white-space:nowrap">${c.webinarDate || '—'}</td>
      <td>
        <div class="rt-status-wrap">
          <div class="rt-status-pill" data-status="${st.status}" data-action="status" data-id="${c.id}">
            <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${statusInfo.dot}"></span>
            ${statusInfo.label}
            ${st.status === 'arappeler' && st.rappelDate ? `<span style="font-size:10px;opacity:0.7;margin-left:2px">${st.rappelDate}</span>` : ''}
          </div>
          <div class="rt-status-dropdown" data-dropdown="${c.id}">
            ${Object.entries(STATUS_MAP).map(([key, val]) => `
              <div class="rt-status-opt" data-action="setStatus" data-id="${c.id}" data-status="${key}">
                <span class="dot" style="background:${val.dot}"></span>
                ${val.label}
              </div>
            `).join('')}
            <div style="padding:6px 12px;border-top:1px solid var(--border);margin-top:4px;display:${st.status === 'arappeler' ? 'block' : 'none'}" data-rappel-wrap="${c.id}">
              <label style="font-size:10px;color:var(--muted);font-weight:600">Date de rappel</label>
              <input type="date" class="rt-rappel-date" data-action="rappelDate" data-id="${c.id}" value="${st.rappelDate || ''}"/>
            </div>
          </div>
        </div>
      </td>
      <td>
        <select class="rt-setter-select" data-action="setter" data-id="${c.id}">
          <option value="">—</option>
          <option value="Elodie" ${st.setter === 'Elodie' ? 'selected' : ''}>Élodie</option>
          <option value="Guillaume" ${st.setter === 'Guillaume' ? 'selected' : ''}>Guillaume</option>
        </select>
      </td>
      <td class="rt-notes-cell">
        <input type="text" class="rt-notes-input" data-action="notes" data-id="${c.id}" value="${escHtml(st.notes)}" placeholder="Ajouter une note..."/>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('rtPageInfo').textContent = `${start + 1}–${end} sur ${total} contacts`;

  const btnsEl = document.getElementById('rtPageBtns');
  let btnsHtml = `<button class="rt-page-btn" ${currentPage <= 1 ? 'disabled' : ''} data-page="${currentPage-1}">‹</button>`;
  const maxBtns = 7;
  let startP = Math.max(1, currentPage - 3);
  let endP = Math.min(pages, startP + maxBtns - 1);
  if (endP - startP < maxBtns - 1) startP = Math.max(1, endP - maxBtns + 1);
  for (let p = startP; p <= endP; p++) {
    btnsHtml += `<button class="rt-page-btn ${p === currentPage ? 'active' : ''}" data-page="${p}">${p}</button>`;
  }
  btnsHtml += `<button class="rt-page-btn" ${currentPage >= pages ? 'disabled' : ''} data-page="${currentPage+1}">›</button>`;
  btnsEl.innerHTML = btnsHtml;

  updateStats();
}

function updateStats() {
  let contacter = 0, appeles = 0, rdv = 0, rappeler = 0;
  CONTACTS.forEach(c => {
    const st = getContactState(c.id);
    if (st.contacter) contacter++;
    if (['appele','decroche','parle','rdv','pasinteresse','arappeler'].includes(st.status)) appeles++;
    if (st.status === 'rdv') rdv++;
    if (st.status === 'arappeler') rappeler++;
  });
  document.getElementById('statTotal').textContent = CONTACTS.length.toLocaleString('fr-FR');
  document.getElementById('statContacter').textContent = contacter;
  document.getElementById('statAppeles').textContent = appeles;
  document.getElementById('statRdv').textContent = rdv;
  document.getElementById('statRappeler').textContent = rappeler;
}

function formatTel(t) {
  if (!t) return '—';
  let s = t.replace(/\D/g, '');
  if (s.startsWith('33') && s.length > 9) s = '0' + s.slice(2);
  if (s.length === 10) return s.replace(/(\d{2})(\d{2})(\d{2})(\d{2})(\d{2})/, '$1 $2 $3 $4 $5');
  return t;
}

function escHtml(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function toast(msg) {
  const el = document.getElementById('rtToast');
  el.textContent = msg || '✅ Sauvegardé';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

// ── Events ──
document.addEventListener('click', e => {
  const action = e.target.dataset?.action || e.target.closest('[data-action]')?.dataset?.action;
  const el = e.target.closest('[data-action]') || e.target;
  const id = el?.dataset?.id;

  if (action !== 'status' && action !== 'setStatus') {
    document.querySelectorAll('.rt-status-dropdown.show').forEach(d => d.classList.remove('show'));
    openDropdownId = null;
  }

  if (action === 'toggle' && id) {
    const st = getContactState(id);
    st.contacter = !st.contacter;
    saveState();
    render();
  }

  if (action === 'status' && id) {
    const dd = document.querySelector(`[data-dropdown="${id}"]`);
    if (dd) {
      const wasOpen = dd.classList.contains('show');
      document.querySelectorAll('.rt-status-dropdown.show').forEach(d => d.classList.remove('show'));
      if (!wasOpen) dd.classList.add('show');
    }
  }

  if (action === 'setStatus' && id) {
    const status = el.dataset.status;
    const st = getContactState(id);
    st.status = status;
    if (status !== 'arappeler') st.rappelDate = '';
    if (status !== 'none') st.contacter = true;
    saveState();
    document.querySelectorAll('.rt-status-dropdown.show').forEach(d => d.classList.remove('show'));
    render();
    toast();
  }
});

// Notes + rappel + setter
let notesTimer = null;
document.addEventListener('input', e => {
  if (e.target.dataset?.action === 'notes') {
    const id = e.target.dataset.id;
    const st = getContactState(id);
    st.notes = e.target.value;
    clearTimeout(notesTimer);
    notesTimer = setTimeout(() => { saveState(); toast(); }, 800);
  }
  if (e.target.dataset?.action === 'rappelDate') {
    const id = e.target.dataset.id;
    const st = getContactState(id);
    st.rappelDate = e.target.value;
    st.status = 'arappeler';
    saveState();
    render();
    toast();
  }
});

document.addEventListener('change', e => {
  if (e.target.dataset?.action === 'setter') {
    const id = e.target.dataset.id;
    const st = getContactState(id);
    st.setter = e.target.value;
    saveState();
    toast('Setter mis à jour');
  }
});

// Search
document.getElementById('rtSearch').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  currentPage = 1;
  render();
});

// Filters
document.querySelectorAll('.rt-filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.rt-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    currentPage = 1;
    render();
  });
});

// Pagination
document.getElementById('rtPageBtns').addEventListener('click', e => {
  const btn = e.target.closest('[data-page]');
  if (btn && !btn.disabled) {
    currentPage = parseInt(btn.dataset.page);
    render();
    document.querySelector('.rt-table-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
});

// Page size
document.getElementById('rtPageSize').addEventListener('change', e => {
  pageSize = parseInt(e.target.value);
  currentPage = 1;
  render();
});

// Export
document.getElementById('rtExport').addEventListener('click', () => {
  const filtered = getFilteredContacts();
  const rows = [['ID','Prénom','Nom','Email','Téléphone','Tags','Statut','Setter','Notes','Date rappel','Contacter']];
  filtered.forEach(c => {
    const st = getContactState(c.id);
    rows.push([
      c.id, c.prenom, c.nom, c.email, c.tel,
      c.tags.join('; '),
      STATUS_MAP[st.status]?.label || '—',
      st.setter || '—',
      st.notes, 
      st.rappelDate,
      st.contacter ? 'Oui' : 'Non'
    ]);
  });
  const csv = rows.map(r => r.map(v => `"${(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `retargeting_export_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('📁 Export téléchargé');
});

// Close dropdowns
document.addEventListener('click', e => {
  if (!e.target.closest('.rt-status-wrap')) {
    document.querySelectorAll('.rt-status-dropdown.show').forEach(d => d.classList.remove('show'));
  }
});

// ── Init ──
render();
</script>
